<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Skincare Tracker (AM + PM)</title>

  <!-- Optional Firebase for real cross-device sync.
       Leave as-is if you only want same-device saving. -->
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

  <style>
    :root{
      --app-bg: #ffffff;

      --ink: #2b2b2b;
      --muted: #7a7a7a;

      --border-rgb: 30,30,30;
      --border-a: 0.18;
      --border: rgba(var(--border-rgb), var(--border-a));
      --shadow: 0 14px 34px rgba(20, 20, 20, 0.09);

      --surface-a: 0.78;
      --panel-a: 0.94;

      --btn-a: 0.94;
      --btn-border-a: 0.16;
      --btn-ink: rgba(43,43,43,0.78);

      --accent: #cbb8ae;

      --overlay-base: #ffffff;
      --overlay-a: 0.34;

      --board-tint: #efe7e1;
      --board-tint-a: 0.30;
      --board-image: none;
      --board-blur: 0px;

      --day-bg: #ffffff;
      --day-bg-a: 0.95;

      --block-bg: #ffffff;
      --block-bg-a: 0.78;

      --input-bg: #ffffff;
      --input-bg-a: 0.97;

      --header-bg: #ffffff;
      --step-bg: #ffffff;
      --step-bg-rgb: 255,255,255;
      --step-bg-a: 0.84;

      --board-radius: 26px;
      --radius: 22px;

      --page-max: 1600px;

      --gap: clamp(10px, 1vw, 18px);
      --pad: clamp(10px, 1.1vw, 18px);

      --h1: clamp(16px, 1.25vw, 20px);
      --sub: clamp(12px, 1vw, 14px);

      --label: clamp(10px, 0.85vw, 12px);
      --text: clamp(12px, 0.95vw, 15px);

      --input-pad: clamp(9px, 0.9vw, 12px) clamp(9px, 0.9vw, 12px);
      --input-radius: 14px;

      --header-pad: clamp(10px, 0.9vw, 14px) clamp(10px, 1vw, 16px);
      --chip-pad: 8px 12px;

      --day-min-h: 520px;

      --am-empty: #eae6e2;
      --am-filled: #cbb8ae;
      --pm-empty: #eae6e2;
      --pm-filled: #c9d7dd;
    }

    *{ box-sizing: border-box; }

    html, body{
      width: 100%;
      max-width: 100%;
      overflow-x: hidden !important;
      -webkit-text-size-adjust: 100%;
    }

    body{
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--ink);
      background: var(--app-bg);
      touch-action: manipulation;
    }

    button, input, textarea, select{
      font: inherit;
    }

    .wrap{
      max-width: var(--page-max);
      margin: 22px auto;
      padding: clamp(12px, 1.2vw, 18px);
    }

    .titlebar{
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .title{
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 240px;
    }

    h1{
      margin: 0;
      font-size: var(--h1);
      font-weight: 750;
      letter-spacing: 0.2px;
    }

    .controls{
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .icon-pill{
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255, var(--surface-a));
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: var(--chip-pad);
      box-shadow: 0 8px 22px rgba(20,20,20,0.06);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .bg-btn, .nav-btn, .theme-btn, .settings-btn{
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(var(--border-rgb), var(--btn-border-a));
      background: rgba(255,255,255, var(--btn-a));
      cursor: pointer;
      display: grid;
      place-items: center;
      -webkit-tap-highlight-color: transparent;
      color: var(--btn-ink);
      font-weight: 900;
      line-height: 1;
      appearance: none;
    }
    .bg-btn:active, .nav-btn:active, .theme-btn:active, .settings-btn:active{ transform: translateY(1px); }

    .bg-dot, .theme-dot{
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 1px solid rgba(var(--border-rgb), 0.18);
      background: var(--board-tint);
      box-shadow: 0 0 0 7px rgba(239,231,225,0.30);
    }
    .theme-dot{
      background: var(--accent);
      box-shadow: 0 0 0 7px rgba(203,184,174,0.22);
    }

    .popover{ position: relative; }

    .panel{
      position: absolute;
      top: 48px;
      right: 0;
      width: 390px;
      max-width: min(390px, calc(100vw - 24px));
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255,255,255, var(--panel-a));
      box-shadow: 0 22px 50px rgba(20,20,20,0.12);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 14px;
      display: none;
      z-index: 50;
      max-height: min(72vh, 640px);
      overflow: auto;
    }
    .panel.open{ display: block; }

    .panelTitle{
      margin: 0 0 10px 0;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .10em;
      text-transform: uppercase;
      color: rgba(43,43,43,0.70);
    }

    .row{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 0;
    }

    .row label{
      font-size: 12px;
      color: var(--muted);
      flex: 1 1 auto;
      min-width: 0;
    }

    .row > input[type="range"]{
      flex: 0 0 170px;
    }

    input[type="color"]{
      width: 38px;
      min-width: 38px;
      height: 30px;
      border: 1px solid rgba(var(--border-rgb), 0.16);
      border-radius: 10px;
      padding: 0;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    input[type="range"]{
      width: 170px;
    }

    .file{
      width: 100%;
      font-size: 12px;
      color: rgba(43,43,43,0.75);
    }

    .mini-btn{
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.94);
      border-radius: 14px;
      padding: 11px 12px;
      cursor: pointer;
      font-weight: 750;
      color: rgba(43,43,43,0.88);
      -webkit-tap-highlight-color: transparent;
      appearance: none;
    }
    .mini-btn:active{ transform: translateY(1px); }

    .divider{
      height: 1px;
      background: rgba(var(--border-rgb), 0.10);
      margin: 10px 0;
    }

    .week-pill{
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: var(--chip-pad);
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255, var(--surface-a));
      box-shadow: 0 8px 22px rgba(20,20,20,0.06);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .week-label{
      font-size: 13px;
      color: rgba(43,43,43,0.82);
      min-width: 190px;
      text-align: center;
      user-select: none;
      font-weight: 700;
      letter-spacing: 0.1px;
    }

    .board{
      border: 1.5px solid var(--border);
      border-radius: var(--board-radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      background: none;
      max-width: 100%;
      isolation: isolate;
    }

    .board::before{
      content: "";
      position: absolute;
      inset: 0;
      background-image: var(--board-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(var(--board-blur)) saturate(1.02) contrast(1.02);
      transform: scale(1.02);
    }

    .board::after{
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: rgba(255,255,255,0.34);
    }

    .board-tint{
      position: absolute;
      inset: 0;
      pointer-events: none;
      mix-blend-mode: multiply;
    }

    .board-content{
      position: relative;
      z-index: 2;
    }

    .grid{
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: var(--gap);
      padding: var(--pad);
      overflow: hidden;
      max-width: 100%;
    }

    .day{
      background: rgba(255,255,255, var(--day-bg-a));
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 10px 26px rgba(20,20,20,0.06);
      display: flex;
      flex-direction: column;
      position: relative;
      min-width: 0;
      min-height: var(--day-min-h);
    }

    .day.selected{
      outline: 4px solid rgba(0,0,0,0);
      outline-offset: 3px;
    }

    .day-header{
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--header-pad);
      border-bottom: 1px solid rgba(var(--border-rgb), 0.12);
      background: var(--header-bg);
      min-width: 0;
    }

    .day-title{
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .day-name{
      font-weight: 850;
      font-size: clamp(12px, 0.95vw, 15px);
      letter-spacing: 0.15px;
      white-space: nowrap;
    }

    .day-date{
      font-size: clamp(11px, 0.9vw, 13px);
      color: var(--muted);
      font-weight: 650;
      white-space: nowrap;
    }

    .today-chip{
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(43,43,43,0.70);
      border: 1px solid rgba(var(--border-rgb), 0.12);
      background: rgba(255,255,255,0.76);
      padding: 3px 8px;
      border-radius: 999px;
      user-select: none;
    }

    .day-body{
      padding: clamp(10px, 1vw, 16px);
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 0.9vw, 14px);
      flex: 1;
      min-height: 0;
      min-width: 0;
    }

    .block{
      border-radius: 18px;
      padding: clamp(10px, 0.9vw, 14px);
      border: 1.5px dashed rgba(var(--border-rgb), 0.18);
      background: rgba(255,255,255, var(--block-bg-a));
      min-width: 0;
    }

    .block .label{
      font-size: var(--label);
      color: var(--muted);
      margin-bottom: clamp(8px, 0.8vw, 12px);
      font-weight: 800;
      letter-spacing: .03em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .subpill{
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .06em;
      text-transform: uppercase;
      border: 1px solid rgba(var(--border-rgb), 0.12);
      background: rgba(255,255,255,0.74);
      padding: 4px 10px;
      border-radius: 999px;
      color: rgba(43,43,43,0.72);
      user-select: none;
      white-space: nowrap;
    }

    .routine{
      display: flex;
      flex-direction: column;
      gap: clamp(8px, 0.75vw, 12px);
      min-width: 0;
    }

    .step{
      display: grid;
      grid-template-columns: 22px 1fr;
      align-items: center;
      gap: clamp(8px, 0.75vw, 12px);
      border-radius: 16px;
      border: 1.5px solid rgba(var(--border-rgb), 0.14);
      box-shadow: 0 10px 24px rgba(20,20,20,0.05);
      background: rgba(var(--step-bg-rgb), var(--step-bg-a));
      padding: clamp(9px, 0.8vw, 12px);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      min-width: 0;
    }
    .step:active{ transform: translateY(1px); }

    .tick{
      width: 20px;
      height: 20px;
      border-radius: 9px;
      border: 1.5px solid rgba(var(--border-rgb), 0.18);
      background: var(--empty);
      box-shadow: 0 8px 18px rgba(20,20,20,0.05);
    }

    .step.done .tick{
      background: var(--filled);
      filter: saturate(1.03) contrast(1.02);
    }

    .step-text{
      font-size: clamp(11px, 0.9vw, 14px);
      color: rgba(43,43,43,0.90);
      font-weight: 750;
      line-height: 1.25;
      word-break: break-word;
      overflow-wrap: anywhere;
      min-width: 0;
    }

    textarea{
      width: 100%;
      border: 1.5px solid rgba(var(--border-rgb), 0.14);
      border-radius: var(--input-radius);
      padding: var(--input-pad);
      outline: none;
      background: rgba(255,255,255, var(--input-bg-a));
      color: var(--ink);
      font-size: var(--text);
      line-height: 1.35;
      resize: vertical;
      min-height: 76px;
      max-height: 220px;
      appearance: none;
    }

    textarea:focus,
    .line input[type="text"]:focus,
    .presetName:focus,
    .presetSelect:focus{
      border-color: rgba(var(--border-rgb), 0.22);
      box-shadow: 0 0 0 5px rgba(203,184,174,0.18);
    }

    #confetti{
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      display: none;
    }

    .list{ display: flex; flex-direction: column; gap: 10px; }

    .line{
      display: grid;
      grid-template-columns: 1fr 44px;
      gap: 10px;
      align-items: stretch;
    }

    .line input[type="text"]{
      width: 100%;
      border: 1.5px solid rgba(var(--border-rgb), 0.14);
      border-radius: 14px;
      padding: 12px 12px;
      outline: none;
      background: rgba(255,255,255, var(--input-bg-a));
      color: var(--ink);
      font-size: 14px;
      font-weight: 650;
      appearance: none;
    }

    .xbtn{
      width: 44px;
      border-radius: 14px;
      border: 1.5px solid rgba(var(--border-rgb), 0.14);
      background: rgba(255,255,255,0.82);
      cursor: pointer;
      font-weight: 900;
      color: rgba(43,43,43,0.76);
      -webkit-tap-highlight-color: transparent;
      font-size: 18px;
      appearance: none;
    }

    .xbtn:active{ transform: translateY(1px); }

    .addRowBtn{
      width: 100%;
      border: 1.5px solid rgba(var(--border-rgb), 0.14);
      background: rgba(255,255,255,0.92);
      border-radius: 14px;
      padding: 11px 12px;
      cursor: pointer;
      font-weight: 850;
      color: rgba(43,43,43,0.88);
      -webkit-tap-highlight-color: transparent;
      appearance: none;
    }

    .addRowBtn:active{ transform: translateY(1px); }

    .presetName{
      width:100%;
      border:1.5px solid rgba(var(--border-rgb), 0.14);
      background: rgba(255,255,255,0.94);
      border-radius:14px;
      padding:11px 12px;
      font-size:12px;
      color: var(--ink);
      outline: none;
      appearance: none;
    }

    .presetSelect{
      height:40px;
      border-radius:999px;
      border:1.5px solid rgba(var(--border-rgb), 0.14);
      background: rgba(255,255,255, var(--btn-a));
      padding:0 12px;
      color: var(--ink);
      width: 100%;
      font-size:12px;
      outline:none;
      appearance: none;
    }

    .status{
      font-size:12px;
      color: var(--muted);
      margin-top: 6px;
      min-height: 16px;
    }

    .sync-badge{
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    @media (max-width: 1320px){
      .grid{ grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    @media (max-width: 980px){
      .controls{
        width: 100%;
        justify-content: flex-start;
      }
      .grid{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .week-label{ min-width: 160px; }
    }

    @media (max-width: 680px){
      .wrap{
        margin: 14px auto;
        padding: 10px;
      }

      .titlebar{
        align-items: stretch;
      }

      .title{
        min-width: 0;
      }

      .controls{
        gap: 10px;
      }

      .week-pill{
        width: 100%;
        justify-content: space-between;
      }

      .week-label{
        min-width: 0;
        flex: 1 1 auto;
      }

      .grid{ grid-template-columns: 1fr; }

      .panel{
        position: fixed;
        left: 12px;
        right: 12px;
        top: auto;
        bottom: 12px;
        width: auto;
        max-width: none;
        max-height: 78vh;
        border-radius: 18px;
      }

      .row{
        align-items: center;
      }

      .row > input[type="range"]{
        flex: 0 0 140px;
      }
    }
  </style>
</head>

<body>
  <canvas id="confetti"></canvas>

  <div class="wrap">
    <div class="titlebar">
      <div class="title">
        <h1>Skincare Tracker</h1>
      </div>

      <div class="controls">
        <div class="week-pill" aria-label="Week navigation">
          <button class="nav-btn" id="prevWeek" type="button" aria-label="Previous week" title="Previous week">‹</button>
          <div class="week-label" id="weekLabel">Week</div>
          <button class="nav-btn" id="nextWeek" type="button" aria-label="Next week" title="Next week">›</button>
        </div>

        <!-- ROUTINE SETTINGS -->
        <div class="popover">
          <div class="icon-pill">
            <button class="settings-btn" id="routineBtn" type="button" aria-label="Routine settings" title="Routine settings">≡</button>
          </div>

          <div class="panel" id="routinePanel" role="dialog" aria-label="Routine settings">
            <div class="panelTitle">Routine & Colors</div>

            <div class="row"><label for="amEmpty">AM empty</label><input id="amEmpty" type="color" value="#eae6e2" /></div>
            <div class="row"><label for="amFilled">AM filled</label><input id="amFilled" type="color" value="#cbb8ae" /></div>
            <div class="divider"></div>
            <div class="row"><label for="pmEmpty">PM empty</label><input id="pmEmpty" type="color" value="#eae6e2" /></div>
            <div class="row"><label for="pmFilled">PM filled</label><input id="pmFilled" type="color" value="#c9d7dd" /></div>

            <div class="divider"></div>

            <div class="panelTitle" style="margin-top:6px;">AM steps</div>
            <div class="list" id="amList"></div>
            <button class="addRowBtn" id="addAmStep" type="button">+ Add AM step</button>

            <div class="divider"></div>

            <div class="panelTitle">PM steps</div>
            <div class="list" id="pmList"></div>
            <button class="addRowBtn" id="addPmStep" type="button">+ Add PM step</button>

            <div class="divider"></div>

            <button class="mini-btn" id="resetRoutine" type="button">Reset routine to default</button>
          </div>
        </div>

        <!-- THEME -->
        <div class="popover">
          <div class="icon-pill">
            <button class="theme-btn" id="themeBtn" type="button" aria-label="Theme settings" title="Theme settings">
              <span class="theme-dot" id="themeDot" aria-hidden="true"></span>
            </button>
          </div>

          <div class="panel" id="themePanel" role="dialog" aria-label="Theme settings">
            <div class="panelTitle">Theme</div>

            <div class="row"><label for="tAppBg">App background</label><input id="tAppBg" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tInk">Text</label><input id="tInk" type="color" value="#2b2b2b" /></div>
            <div class="row"><label for="tMuted">Muted text</label><input id="tMuted" type="color" value="#7a7a7a" /></div>
            <div class="row"><label for="tAccent">Accent</label><input id="tAccent" type="color" value="#cbb8ae" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tBorderColor">Border color</label><input id="tBorderColor" type="color" value="#1e1e1e" /></div>
            <div class="row"><label for="tBorderA">Border strength</label><input id="tBorderA" type="range" min="8" max="55" value="18" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tSurfaceA">Pills opacity</label><input id="tSurfaceA" type="range" min="40" max="98" value="78" /></div>
            <div class="row"><label for="tPanelA">Panel opacity</label><input id="tPanelA" type="range" min="65" max="99" value="94" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tBtnA">Buttons opacity</label><input id="tBtnA" type="range" min="55" max="100" value="94" /></div>
            <div class="row"><label for="tBtnBorderA">Button border</label><input id="tBtnBorderA" type="range" min="4" max="40" value="16" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tOverlayBase">Overlay color</label><input id="tOverlayBase" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tOverlayA">Overlay strength</label><input id="tOverlayA" type="range" min="0" max="70" value="34" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tDayBg">Day card background</label><input id="tDayBg" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tDayBgA">Day card opacity</label><input id="tDayBgA" type="range" min="70" max="100" value="95" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tBlockBg">Section background</label><input id="tBlockBg" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tBlockBgA">Section opacity</label><input id="tBlockBgA" type="range" min="55" max="100" value="78" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tInputBg">Input background</label><input id="tInputBg" type="color" value="#ffffff" /></div>

  <script>
    /* =========================================================
       IMPORTANT
       - Local saving now uses BOTH localStorage + IndexedDB.
       - Real cross-device sync needs Firebase config below.
       - For safe per-instance sync, use a stable ?wid=... in the widget URL.
       ========================================================= */

    const SYNC_CONFIG = {
      enabled: false, // set to true after pasting your Firebase config
      firebaseConfig: {
        apiKey: "",
        authDomain: "",
        databaseURL: "",
        projectId: "",
        storageBucket: "",
        messagingSenderId: "",
        appId: ""
      },
      namespace: "skincare-tracker"
    };

    (function(){
      const mem = Object.create(null);

      function canUseLocalStorage(){
        try{
          const k="__t__"+Math.random().toString(16).slice(2);
          localStorage.setItem(k,"1");
          localStorage.removeItem(k);
          return true;
        }catch{
          return false;
        }
      }

      const hasLS = canUseLocalStorage();

      function storageGet(key){
        try{ return hasLS ? localStorage.getItem(key) : (mem[key] ?? null); }
        catch{ return mem[key] ?? null; }
      }

      function storageSet(key, value){
        try{
          if(hasLS) localStorage.setItem(key, value);
          else mem[key] = String(value);
        }catch{
          mem[key] = String(value);
        }
      }

      function storageRemove(key){
        try{
          if(hasLS) localStorage.removeItem(key);
          else delete mem[key];
        }catch{
          delete mem[key];
        }
      }

      function uid(){
        return Math.random().toString(16).slice(2) + Date.now().toString(16);
      }

      function getWidgetId(){
        try{
          const sp = new URLSearchParams(location.search);
          const wid = (sp.get("wid") || "").trim();
          if(wid) return wid;
        }catch{}

        /* fallback:
           same URL on same device keeps the same widget id,
           but true cross-device sync still needs ?wid=... */
        const key = "skincare_widget_fallback_wid__" + location.pathname;
        const existing = storageGet(key);
        if(existing) return existing;

        const fresh = uid();
        storageSet(key, fresh);
        return fresh;
      }

      window.__SKIN__ = {
        wid: getWidgetId(),
        get: storageGet,
        set: storageSet,
        remove: storageRemove
      };
    })();

    const WID = window.__SKIN__?.wid || "default";
    const PRESETS_KEY = "widget_presets_v3";
    const STORE_KEY   = "skincare_tracker_store_v5__" + WID;
    const THEME_KEY   = "skincare_tracker_theme_v5__" + WID;
    const BG_KEY      = "skincare_tracker_bg_v5__" + WID;
    const ROUTINE_KEY = "skincare_tracker_routine_v5__" + WID;
    const META_KEY    = "skincare_tracker_meta_v5__" + WID;

    const $  = (sel, root=document) => root.querySelector(sel);
    const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

    function clamp(n, min, max){
      const x = Number(n);
      if(!Number.isFinite(x)) return min;
      return Math.max(min, Math.min(max, x));
    }

    function normHex(hex, fallback){
      const s = String(hex || "").trim();
      return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : fallback;
    }

    function hexToRgbTuple(hex){
      const h = normHex(hex, "#ffffff").slice(1);
      const r = parseInt(h.slice(0,2), 16);
      const g = parseInt(h.slice(2,4), 16);
      const b = parseInt(h.slice(4,6), 16);
      return `${r},${g},${b}`;
    }

    function hexToRgba(hex, a){
      const [r,g,b] = hexToRgbTuple(hex).split(",").map(Number);
      return `rgba(${r},${g},${b},${a})`;
    }

    function deepCopy(obj){
      return JSON.parse(JSON.stringify(obj));
    }

    function debounce(fn, wait=250){
      let t = null;
      return function(...args){
        clearTimeout(t);
        t = setTimeout(() => fn.apply(this, args), wait);
      };
    }

    function loadJSON(key){
      try{
        const raw = window.__SKIN__.get(key);
        return raw ? JSON.parse(raw) : null;
      }catch{
        return null;
      }
    }

    function saveJSON(key, val){
      try{
        window.__SKIN__.set(key, JSON.stringify(val));
      }catch{}
    }

    function removeJSON(key){
      try{
        window.__SKIN__.remove(key);
      }catch{}
    }

    function escapeAttr(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll('"',"&quot;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;");
    }

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;");
    }

    function escapeText(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;");
    }

    function uid(){
      return Math.random().toString(16).slice(2) + Date.now().toString(16);
    }

    function setStatus(msg){
      const el = document.getElementById("presetStatus");
      if(el) el.textContent = msg || "";
    }

    function setSyncBadge(msg){
      const el = document.getElementById("syncBadge");
      if(el) el.textContent = msg;
    }

    function toISODate(d){
      const x = new Date(d);
      x.setHours(0,0,0,0);
      return x.toISOString().slice(0,10);
    }

    function mondayOfWeek(date){
      const d = new Date(date);
      const day = d.getDay();
      const diff = (day === 0 ? -6 : 1) - day;
      d.setDate(d.getDate() + diff);
      d.setHours(0,0,0,0);
      return d;
    }

    function addDays(d, n){
      const x = new Date(d);
      x.setDate(x.getDate() + n);
      return x;
    }

    function formatShortDate(d){
      return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
    }

    function prettyWeekLabel(weekId){
      const mon = new Date(weekId + "T00:00:00");
      const sun = addDays(mon, 6);
      const opts = { month: "short", day: "numeric" };
      return `${mon.toLocaleDateString(undefined, opts)} – ${sun.toLocaleDateString(undefined, opts)}`;
    }

    /* =========================
       IndexedDB helpers
       ========================= */
    const IDB_NAME = "skincare_tracker_db_v1";
    const IDB_STORE = "kv";

    function openDB(){
      return new Promise((resolve, reject) => {
        if(!window.indexedDB){
          reject(new Error("IndexedDB unavailable"));
          return;
        }
        const req = indexedDB.open(IDB_NAME, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if(!db.objectStoreNames.contains(IDB_STORE)){
            db.createObjectStore(IDB_STORE);
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error || new Error("IndexedDB open failed"));
      });
    }

    async function idbGet(key){
      try{
        const db = await openDB();
        return await new Promise((resolve, reject) => {
          const tx = db.transaction(IDB_STORE, "readonly");
          const store = tx.objectStore(IDB_STORE);
          const req = store.get(key);
          req.onsuccess = () => resolve(req.result ?? null);
          req.onerror = () => reject(req.error);
        });
      }catch{
        return null;
      }
    }

    async function idbSet(key, value){
      try{
        const db = await openDB();
        await new Promise((resolve, reject) => {
          const tx = db.transaction(IDB_STORE, "readwrite");
          const store = tx.objectStore(IDB_STORE);
          const req = store.put(value, key);
          req.onsuccess = () => resolve();
          req.onerror = () => reject(req.error);
        });
      }catch{}
    }

    async function idbRemove(key){
      try{
        const db = await openDB();
        await new Promise((resolve, reject) => {
          const tx = db.transaction(IDB_STORE, "readwrite");
          const store = tx.objectStore(IDB_STORE);
          const req = store.delete(key);
          req.onsuccess = () => resolve();
          req.onerror = () => reject(req.error);
        });
      }catch{}
    }

    /* =========================
       Optional cloud sync
       ========================= */
    let remoteReady = false;
    let remoteRef = null;
    let applyingRemote = false;
    let lastRemoteUpdatedAt = 0;
    let bootFinished = false;

    function hasFirebaseConfig(){
      const c = SYNC_CONFIG.firebaseConfig || {};
      return !!(
        SYNC_CONFIG.enabled &&
        c.apiKey && c.authDomain && c.databaseURL &&
        c.projectId && c.appId
      );
    }

    function buildStatePayload(){
      return {
        version: 1,
        wid: WID,
        updatedAt: Date.now(),
        theme: deepCopy(themeCommitted),
        bg: deepCopy(bgCommitted),
        routine: deepCopy(routine),
        store: deepCopy(store),
        meta: {
          activeWeekId,
          selectedDayIso
        }
      };
    }

    async function applyFullState(payload, source="local"){
      if(!payload || typeof payload !== "object") return;

      if(payload.theme && typeof payload.theme === "object"){
        themeCommitted = Object.assign({}, DEFAULT_THEME, payload.theme);
        themeDraft = deepCopy(themeCommitted);
        saveJSON(THEME_KEY, themeCommitted);
        themeApplyCSS(themeCommitted);
        themeSyncInputs(themeDraft);
      }

      if(payload.bg && typeof payload.bg === "object"){
        bgCommitted = Object.assign({}, DEFAULT_BG, payload.bg);
        bgDraft = deepCopy(bgCommitted);
        await persistBackgroundCommitted(bgCommitted);
        applyBackgroundDraft(bgDraft);
      }

      if(payload.routine && typeof payload.routine === "object"){
        routine = normalizeRoutine(payload.routine);
        await persistRoutine();
        routineApplyColors(routine.colors);
        renderRoutineEditor();
      }

      if(payload.store && typeof payload.store === "object"){
        store = normalizeStore(payload.store);
        await persistStore();
      }

      if(payload.meta && typeof payload.meta === "object"){
        if(typeof payload.meta.activeWeekId === "string") activeWeekId = payload.meta.activeWeekId;
        if(typeof payload.meta.selectedDayIso === "string") selectedDayIso = payload.meta.selectedDayIso;
        saveJSON(META_KEY, { activeWeekId, selectedDayIso });
      }

      if(bootFinished){
        rebuildWeek(activeWeekId);
      }

      if(source === "remote"){
        setStatus("Synced from cloud.");
      }
    }

    async function initRemoteSync(){
      if(!hasFirebaseConfig() || !window.firebase || !firebase.apps){
        setSyncBadge("Saving locally on this device.");
        return;
      }

      try{
        const app = firebase.apps.length
          ? firebase.app()
          : firebase.initializeApp(SYNC_CONFIG.firebaseConfig);

        const db = firebase.database(app);
        const path = `${SYNC_CONFIG.namespace}/${encodeURIComponent(WID)}`;
        remoteRef = db.ref(path);
        remoteReady = true;
        setSyncBadge("Cloud sync enabled.");

        const snap = await remoteRef.get();
        const remoteVal = snap.exists() ? snap.val() : null;
        const localMeta = loadJSON(META_KEY) || {};
        const localUpdated = Number(localMeta.lastSavedAt || 0);
        const remoteUpdated = Number(remoteVal?.updatedAt || 0);

        if(remoteVal && remoteUpdated > localUpdated){
          applyingRemote = true;
          lastRemoteUpdatedAt = remoteUpdated;
          await applyFullState(remoteVal, "remote");
          applyingRemote = false;
        }else{
          await pushRemoteState(true);
        }

        remoteRef.on("value", async (snapshot) => {
          if(!snapshot.exists()) return;
          const incoming = snapshot.val();
          const incomingTs = Number(incoming?.updatedAt || 0);
          const localStateMeta = loadJSON(META_KEY) || {};
          const localTs = Number(localStateMeta.lastSavedAt || 0);

          if(applyingRemote) return;
          if(incomingTs <= Math.max(localTs, lastRemoteUpdatedAt)) return;

          applyingRemote = true;
          lastRemoteUpdatedAt = incomingTs;
          await applyFullState(incoming, "remote");
          applyingRemote = false;
        });
      }catch{
        remoteReady = false;
        setSyncBadge("Local save only. Cloud sync not connected.");
      }
    }

    async function pushRemoteState(force=false){
      if(!remoteReady || !remoteRef || applyingRemote) return;
      try{
        const payload = buildStatePayload();
        const meta = loadJSON(META_KEY) || {};
        const lastLocal = Number(meta.lastSavedAt || 0);
        if(!force && payload.updatedAt <= lastLocal) return;
        lastRemoteUpdatedAt = payload.updatedAt;
        await remoteRef.set(payload);
      }catch{}
    }

    const debouncedPushRemote = debounce(() => { pushRemoteState(false); }, 400);

    /* =========================
       Theme
       ========================= */
    const DEFAULT_THEME = {
      appBg: "#ffffff",
      ink: "#2b2b2b",
      muted: "#7a7a7a",
      accent: "#cbb8ae",

      borderColor: "#1e1e1e",
      borderA: 0.18,

      surfaceA: 0.78,
      panelA: 0.94,

      btnA: 0.94,
      btnBorderA: 0.16,

      overlayBase: "#ffffff",
      overlayA: 0.34,

      dayBg: "#ffffff",
      dayBgA: 0.95,

      blockBg: "#ffffff",
      blockBgA: 0.78,

      inputBg: "#ffffff",
      inputBgA: 0.97,

      headerBg: "#ffffff",
      stepBg: "#ffffff",
      stepBgA: 0.84
    };

    function setSelectionRingFromAccent(accentHex){
      const accent = normHex(accentHex, DEFAULT_THEME.accent);
      let st = document.getElementById("accentRingStyle");
      if(!st){
        st = document.createElement("style");
        st.id = "accentRingStyle";
        document.head.appendChild(st);
      }
      st.textContent = `
        .day.selected{
          outline-color: ${hexToRgba(accent, 0.62)} !important;
          box-shadow: 0 0 0 1px ${hexToRgba(accent, 0.22)} inset;
        }
      `;
    }

    function themeApplyCSS(t){
      const theme = Object.assign({}, DEFAULT_THEME, t || {});
      const r = document.documentElement.style;

      r.setProperty("--app-bg", normHex(theme.appBg, DEFAULT_THEME.appBg));
      r.setProperty("--ink", normHex(theme.ink, DEFAULT_THEME.ink));
      r.setProperty("--muted", normHex(theme.muted, DEFAULT_THEME.muted));
      r.setProperty("--accent", normHex(theme.accent, DEFAULT_THEME.accent));

      r.setProperty("--border-rgb", hexToRgbTuple(theme.borderColor));
      r.setProperty("--border-a", String(clamp(theme.borderA, 0.08, 0.55)));

      r.setProperty("--surface-a", String(clamp(theme.surfaceA, 0.40, 0.98)));
      r.setProperty("--panel-a", String(clamp(theme.panelA, 0.65, 0.99)));

      r.setProperty("--btn-a", String(clamp(theme.btnA, 0.55, 1.00)));
      r.setProperty("--btn-border-a", String(clamp(theme.btnBorderA, 0.04, 0.40)));

      const dot = $("#themeDot");
      if(dot){
        const accent = normHex(theme.accent, DEFAULT_THEME.accent);
        dot.style.background = accent;
        dot.style.boxShadow = `0 0 0 7px ${hexToRgba(accent, 0.22)}`;
      }

      setSelectionRingFromAccent(theme.accent);

      const overlayBase = normHex(theme.overlayBase, DEFAULT_THEME.overlayBase);
      const overlayA = clamp(theme.overlayA, 0.00, 0.70);
      const overlayCSS = hexToRgba(overlayBase, overlayA);

      let st = document.getElementById("overlayStyle");
      if(!st){
        st = document.createElement("style");
        st.id = "overlayStyle";
        document.head.appendChild(st);
      }
      st.textContent = `.board::after{ background: ${overlayCSS} !important; }`;

      const headerBg = normHex(theme.headerBg, "#ffffff");
      r.setProperty("--header-bg", headerBg);

      const stepBg = normHex(theme.stepBg, "#ffffff");
      r.setProperty("--step-bg", stepBg);
      r.setProperty("--step-bg-rgb", hexToRgbTuple(stepBg));
      r.setProperty("--step-bg-a", String(clamp(theme.stepBgA, 0.40, 1.00)));

      let st2 = document.getElementById("surfaceStyle");
      if(!st2){
        st2 = document.createElement("style");
        st2.id = "surfaceStyle";
        document.head.appendChild(st2);
      }
      st2.textContent = `
        body{ background: ${normHex(theme.appBg, "#ffffff")} !important; color: ${normHex(theme.ink, "#2b2b2b")} !important; }
        .day{ background: ${hexToRgba(normHex(theme.dayBg, "#ffffff"), clamp(theme.dayBgA,0.70,1.00))} !important; }
        .block{ background: ${hexToRgba(normHex(theme.blockBg, "#ffffff"), clamp(theme.blockBgA,0.55,1.00))} !important; }
        textarea, .line input[type="text"], .presetName, .presetSelect{
          background: ${hexToRgba(normHex(theme.inputBg, "#ffffff"), clamp(theme.inputBgA,0.60,1.00))} !important;
          color: ${normHex(theme.ink, "#2b2b2b")} !important;
        }
      `;
    }

    function themeSyncInputs(t){
      const theme = Object.assign({}, DEFAULT_THEME, t || {});
      const set = (id, val) => {
        const el = document.getElementById(id);
        if(el) el.value = String(val);
      };

      set("tAppBg", theme.appBg);
      set("tInk", theme.ink);
      set("tMuted", theme.muted);
      set("tAccent", theme.accent);

      set("tBorderColor", theme.borderColor);
      set("tBorderA", Math.round(clamp(theme.borderA, 0.08, 0.55) * 100));

      set("tSurfaceA", Math.round(clamp(theme.surfaceA, 0.40, 0.98) * 100));
      set("tPanelA", Math.round(clamp(theme.panelA, 0.65, 0.99) * 100));

      set("tBtnA", Math.round(clamp(theme.btnA, 0.55, 1.00) * 100));
      set("tBtnBorderA", Math.round(clamp(theme.btnBorderA, 0.04, 0.40) * 100));

      set("tOverlayBase", theme.overlayBase);
      set("tOverlayA", Math.round(clamp(theme.overlayA, 0.00, 0.70) * 100));

      set("tDayBg", theme.dayBg);
      set("tDayBgA", Math.round(clamp(theme.dayBgA, 0.70, 1.00) * 100));

      set("tBlockBg", theme.blockBg);
      set("tBlockBgA", Math.round(clamp(theme.blockBgA, 0.55, 1.00) * 100));

      set("tInputBg", theme.inputBg);
      set("tInputBgA", Math.round(clamp(theme.inputBgA, 0.60, 1.00) * 100));

      set("tHeaderBg", theme.headerBg);
      set("tStepBg", theme.stepBg);
      set("tStepBgA", Math.round(clamp(theme.stepBgA, 0.40, 1.00) * 100));
    }

    function themeReadFromInputs(){
      const g = (id)=>document.getElementById(id);
      return {
        appBg: g("tAppBg")?.value,
        ink: g("tInk")?.value,
        muted: g("tMuted")?.value,
        accent: g("tAccent")?.value,

        borderColor: g("tBorderColor")?.value,
        borderA: clamp(Number(g("tBorderA")?.value)/100, 0.08, 0.55),

        surfaceA: clamp(Number(g("tSurfaceA")?.value)/100, 0.40, 0.98),
        panelA: clamp(Number(g("tPanelA")?.value)/100, 0.65, 0.99),

        btnA: clamp(Number(g("tBtnA")?.value)/100, 0.55, 1.00),
        btnBorderA: clamp(Number(g("tBtnBorderA")?.value)/100, 0.04, 0.40),

        overlayBase: g("tOverlayBase")?.value,
        overlayA: clamp(Number(g("tOverlayA")?.value)/100, 0.00, 0.70),

        dayBg: g("tDayBg")?.value,
        dayBgA: clamp(Number(g("tDayBgA")?.value)/100, 0.70, 1.00),

        blockBg: g("tBlockBg")?.value,
        blockBgA: clamp(Number(g("tBlockBgA")?.value)/100, 0.55, 1.00),

        inputBg: g("tInputBg")?.value,
        inputBgA: clamp(Number(g("tInputBgA")?.value)/100, 0.60, 1.00),

        headerBg: g("tHeaderBg")?.value,
        stepBg: g("tStepBg")?.value,
        stepBgA: clamp(Number(g("tStepBgA")?.value)/100, 0.40, 1.00),
      };
    }

    let themeCommitted = Object.assign({}, DEFAULT_THEME, loadJSON(THEME_KEY) || {});
    let themeDraft = deepCopy(themeCommitted);

    async function persistTheme(){
      saveJSON(THEME_KEY, themeCommitted);
      const meta = loadJSON(META_KEY) || {};
      meta.lastSavedAt = Date.now();
      meta.activeWeekId = activeWeekId;
      meta.selectedDayIso = selectedDayIso;
      saveJSON(META_KEY, meta);
      debouncedPushRemote();
    }

    function initTheme(){
      themeApplyCSS(themeCommitted);
      themeSyncInputs(themeDraft);

      const ids = [
        "tAppBg","tInk","tMuted","tAccent",
        "tBorderColor","tBorderA",
        "tSurfaceA","tPanelA",
        "tBtnA","tBtnBorderA",
        "tOverlayBase","tOverlayA",

    function setBoardImage(dataUrlOrNull){
      document.documentElement.style.setProperty("--board-image", dataUrlOrNull ? `url("${dataUrlOrNull}")` : "none");
    }

    function setBoardBlur(px){
      document.documentElement.style.setProperty("--board-blur", `${clamp(px, 0, 24)}px`);

    function applyBoardTint(colorHex, strengthPct){
      const tint = normHex(colorHex, DEFAULT_BG.tint);
      const strength = clamp(Number(strengthPct)/100, 0, 0.70);

      document.documentElement.style.setProperty("--board-tint", tint);

    async function fileToDataUrl(file){
      return new Promise((resolve, reject) => {

        r.onload = () => resolve(String(r.result));
        r.onerror = reject;
        r.readAsDataURL(file);
      });

    const BG_IMAGE_IDB_KEY = "skincare_bg_image_v5__" + WID;

    async function hydrateBackgroundFromIDB(){
      if(!bgCommitted.imageDataUrl){
        const fromDb = await idbGet(BG_IMAGE_IDB_KEY);
        if(typeof fromDb === "string" && fromDb.startsWith("data:image/")){
          bgCommitted.imageDataUrl = fromDb;
          bgDraft.imageDataUrl = fromDb;

      }

    function applyBackgroundDraft(bg){

      $("#bgBlur").value = String(clamp(bg.blur, 0, 24));
      applyBoardTint(bg.tint, bg.strength);
      setBoardBlur(bg.blur);
      setBoardImage(bg.imageDataUrl || null);

    async function persistBackgroundCommitted(bg){
      bgCommitted = Object.assign({}, DEFAULT_BG, bg || {});

      if(bgCommitted.imageDataUrl){

    async function applyPresetToThisWidget(p){
      const nextTheme = Object.assign({}, DEFAULT_THEME, p?.theme || {});
      const nextBg = Object.assign({}, DEFAULT_BG, p?.bg || {});

      themeCommitted = deepCopy(nextTheme);
      themeDraft = deepCopy(nextTheme);
      themeApplyCSS(themeCommitted);
      themeSyncInputs(themeDraft);
      await persistTheme();

      bgCommitted = deepCopy(nextBg);

    function initPresetsUI(){
      const nameEl = document.getElementById("presetName");
      const saveBtn = document.getElementById("presetSave");
      const sel = document.getElementById("presetSelect");
      const applyBtn = document.getElementById("presetApply");
      const delBtn = document.getElementById("presetDelete");

      if(!nameEl || !saveBtn || !sel || !applyBtn || !delBtn) return;

      refreshPresetSelect();

      saveBtn.addEventListener("click", () => {
        const name = (nameEl.value || "").trim();
        if(!name){
          setStatus("Type a preset name first.");
          return;
        }

        const entry = {
          id: uid(),
          name,
          theme: deepCopy(themeCommitted),
          bg: deepCopy(bgCommitted)
        };

        const list = loadPresets();
        list.unshift(entry);
        savePresets(list);

        nameEl.value = "";
        refreshPresetSelect();
        sel.value = entry.id;
        setStatus("Preset saved.");
      });

      applyBtn.addEventListener("click", async () => {
        const id = sel.value;
        if(!id){
          setStatus("Choose a preset first.");
          return;
        }
        const p = loadPresets().find(x => x.id === id);
        if(!p){
          setStatus("Preset not found.");
          return;
        }
        await applyPresetToThisWidget(p);
      });

      delBtn.addEventListener("click", () => {
        const id = sel.value;
        if(!id){
          setStatus("Choose a preset first.");
          return;
        }
        let list = loadPresets();
        const before = list.length;
        list = list.filter(x => x.id !== id);
        if(list.length === before){
          setStatus("Preset not found.");
          return;
        }
        savePresets(list);
        refreshPresetSelect();
        sel.value = "";
        setStatus("Preset deleted.");
      });
    }

    const DEFAULT_ROUTINE = {

    function normalizeRoutine(input){
      const base = deepCopy(DEFAULT_ROUTINE);

      base.colors = Object.assign({}, base.colors, r.colors || {});
      base.am = Array.isArray(r.am) ? r.am.map(v => String(v ?? "")) : base.am;
      base.pm = Array.isArray(r.pm) ? r.pm.map(v => String(v ?? "")) : base.pm;

    function renderRoutineEditor(){
      const r = getRoutine();
      const amList = $("#amList");
      const pmList = $("#pmList");
      amList.innerHTML = "";
      pmList.innerHTML = "";

      const makeRow = (text, onText, onDel) => {
        const row = document.createElement("div");
        row.className = "line";
        row.innerHTML = `
          <input type="text" value="${escapeAttr(text)}" />
          <button class="xbtn" type="button" aria-label="Remove">×</button>
        `;
        const input = row.querySelector("input");
        const del = row.querySelector("button");

        const saveText = debounce(async () => {
          onText(input.value);
          await persistRoutine();
          rebuildWeek(activeWeekId);
        }, 140);

        input.addEventListener("input", saveText);
        input.addEventListener("change", saveText);

        del.addEventListener("click", async () => {
          onDel();
          await persistRoutine();
          renderRoutineEditor();
          rebuildWeek(activeWeekId);

        return row;
      };

        amList.appendChild(makeRow(

    /* =========================
       Store
       ========================= */
    function normalizeStore(input){
      const s = (input && typeof input === "object") ? input : {};
      if(!s.days || typeof s.days !== "object") s.days = {};
      return s;
    }

    function loadStore(){
      try{
        const raw = window.__SKIN__.get(STORE_KEY);
        return raw ? normalizeStore(JSON.parse(raw)) : { days: {} };
      }catch{
        return { days: {} };
      }
    }

    async function persistStore(){
      window.__SKIN__.set(STORE_KEY, JSON.stringify(store));
      const meta = loadJSON(META_KEY) || {};
      meta.lastSavedAt = Date.now();
      meta.activeWeekId = activeWeekId;
      meta.selectedDayIso = selectedDayIso;
      saveJSON(META_KEY, meta);
      debouncedPushRemote();
    }

    let store = normalizeStore(loadStore());

    function ensureDay(iso){
      const r = getRoutine();
      if(!store.days[iso]){
        store.days[iso] = {
          am: new Array(r.am.length).fill(false),
          pm: new Array(r.pm.length).fill(false),
          note: ""
        };
      }else{
        const d = store.days[iso];
        if(!Array.isArray(d.am)) d.am = [];
        if(!Array.isArray(d.pm)) d.pm = [];
        while(d.am.length < r.am.length) d.am.push(false);
        while(d.pm.length < r.pm.length) d.pm.push(false);
        d.am = d.am.slice(0, r.am.length);
        d.pm = d.pm.slice(0, r.pm.length);
        if(typeof d.note !== "string") d.note = "";
      }
      return store.days[iso];
    }

    function dayCompletion(iso){
      const r = getRoutine();
      const d = ensureDay(iso);
      const amDone = r.am.length ? d.am.every(Boolean) : true;
      const pmDone = r.pm.length ? d.pm.every(Boolean) : true;
      return { amDone, pmDone, allDone: amDone && pmDone };
    }

    /* =========================
       Week UI

    const dayNames = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
    const grid = $("#grid");

    const meta = loadJSON(META_KEY) || {};
    let selectedDayIso = typeof meta.selectedDayIso === "string" ? meta.selectedDayIso : toISODate(new Date());
    let activeWeekId = typeof meta.activeWeekId === "string" ? meta.activeWeekId : toISODate(mondayOfWeek(new Date()));

    function persistMetaOnly(){
      const meta = loadJSON(META_KEY) || {};
      meta.lastSavedAt = Date.now();
      meta.activeWeekId = activeWeekId;
      meta.selectedDayIso = selectedDayIso;
      saveJSON(META_KEY, meta);
      debouncedPushRemote();
    }

    function selectDay(iso){
      selectedDayIso = iso;
      $$(".day").forEach(d => d.classList.toggle("selected", d.dataset.iso === iso));
      persistMetaOnly();
    }

    function rebuildWeek(weekId){
      activeWeekId = weekId;
      $("#weekLabel").textContent = prettyWeekLabel(weekId);

      const monday = new Date(weekId + "T00:00:00");
      grid.innerHTML = "";

      const r = getRoutine();
      const amEmpty = getComputedStyle(document.documentElement).getPropertyValue("--am-empty").trim() || "#eae6e2";
      const amFilled = getComputedStyle(document.documentElement).getPropertyValue("--am-filled").trim() || "#cbb8ae";
      const pmEmpty = getComputedStyle(document.documentElement).getPropertyValue("--pm-empty").trim() || "#eae6e2";
      const pmFilled = getComputedStyle(document.documentElement).getPropertyValue("--pm-filled").trim() || "#c9d7dd";

      for(let i=0;i<7;i++){
        const date = addDays(monday, i);
        const iso = toISODate(date);
        const dayData = ensureDay(iso);
        const isToday = iso === toISODate(new Date());
        const { amDone, pmDone } = dayCompletion(iso);

        const day = document.createElement("section");
        day.className = "day";
        day.dataset.iso = iso;

        day.innerHTML = `
          <div class="day-header">
            <div class="day-title">
              <div class="day-name">${dayNames[i]}</div>
              ${isToday ? `<span class="today-chip">Today</span>` : ``}
              <div class="day-date">${formatShortDate(date)}</div>
            </div>
          </div>

          <div class="day-body">
            <div class="block" data-part="am">
              <div class="label">
                <span>AM</span>
                <span class="subpill">${amDone ? "done" : "in progress"}</span>
              </div>
              <div class="routine" data-routine="am"></div>
            </div>

            <div class="block" data-part="pm">
              <div class="label">
                <span>PM</span>
                <span class="subpill">${pmDone ? "done" : "in progress"}</span>
              </div>
              <div class="routine" data-routine="pm"></div>
            </div>

            <div class="block">
              <div class="label">Notes</div>
              <textarea class="note" placeholder="">${escapeText(dayData.note)}</textarea>
            </div>
          </div>
        `;

        const amWrap = day.querySelector('[data-routine="am"]');
        const pmWrap = day.querySelector('[data-routine="pm"]');

        r.am.forEach((label, idx) => {
          const step = document.createElement("button");
          step.className = "step" + (dayData.am[idx] ? " done" : "");
          step.dataset.slot = "am";
          step.dataset.idx = String(idx);
          step.type = "button";
          step.style.setProperty("--empty", amEmpty);
          step.style.setProperty("--filled", amFilled);
          step.innerHTML = `
            <div class="tick" aria-hidden="true"></div>
            <div class="step-text">${escapeHtml(label)}</div>
          `;
          amWrap.appendChild(step);
        });

        r.pm.forEach((label, idx) => {
          const step = document.createElement("button");
          step.className = "step" + (dayData.pm[idx] ? " done" : "");
          step.dataset.slot = "pm";
          step.dataset.idx = String(idx);
          step.type = "button";
          step.style.setProperty("--empty", pmEmpty);
          step.style.setProperty("--filled", pmFilled);
          step.innerHTML = `
            <div class="tick" aria-hidden="true"></div>
            <div class="step-text">${escapeHtml(label)}</div>
          `;
          pmWrap.appendChild(step);
        });

        grid.appendChild(day);
      }

      selectDay(selectedDayIso);
    }

    /* =========================
       Interactions
       ========================= */
    grid.addEventListener("click", async (e) => {
      const dayEl = e.target.closest(".day");
      if(!dayEl) return;
      const iso = dayEl.dataset.iso;

      if(!e.target.closest("textarea")) selectDay(iso);

      const step = e.target.closest(".step");
      if(step){
        const slot = step.dataset.slot;
        const idx = Number(step.dataset.idx);
        if((slot !== "am" && slot !== "pm") || !Number.isFinite(idx)) return;

        const d = ensureDay(iso);
        const arr = slot === "am" ? d.am : d.pm;
        arr[idx] = !arr[idx];
        await persistStore();

        step.classList.toggle("done", arr[idx]);

        const { amDone, pmDone, allDone } = dayCompletion(iso);
        const amPill = dayEl.querySelector('[data-part="am"] .subpill');
        const pmPill = dayEl.querySelector('[data-part="pm"] .subpill');
        if(amPill) amPill.textContent = amDone ? "done" : "in progress";
        if(pmPill) pmPill.textContent = pmDone ? "done" : "in progress";

        if(allDone) confettiBurst();
      }
    });

    /* =========================
       Confetti
       ========================= */
    const confettiCanvas = document.getElementById("confetti");
    const ctx = confettiCanvas.getContext("2d");
    let confettiLock = false;

    function resizeConfetti(){
      const ratio = Math.max(1, window.devicePixelRatio || 1);
      confettiCanvas.width = Math.floor(window.innerWidth * ratio);
      confettiCanvas.height = Math.floor(window.innerHeight * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    window.addEventListener("resize", resizeConfetti);

    function confettiBurst(){
      if(confettiLock) return;
      confettiLock = true;
      resizeConfetti();
      confettiCanvas.style.display = "block";

      const accent = getComputedStyle(document.documentElement).getPropertyValue("--accent").trim() || "#cbb8ae";
      const palette = [accent, "#e3d4d2", "#cdd5d0", "#c9d7dd", "#d1cde2", "#d9c6bd", "#d6d0c8"]
        .map(c => normHex(c, "#cbb8ae"));

      const W = window.innerWidth;
      const H = window.innerHeight;
      const particles = [];
      const N = 140;

      for(let i=0;i<N;i++){
        particles.push({
          x: W * 0.5 + (Math.random()-0.5)*40,
          y: H * 0.18 + (Math.random()-0.5)*20,
          vx: (Math.random()-0.5) * 10,
          vy: (Math.random()*-8) - 4,
          g: 0.18 + Math.random()*0.18,
          r: 3 + Math.random()*4,
          a: 1,
          rot: Math.random()*Math.PI,
          vr: (Math.random()-0.5) * 0.25,
          color: palette[(Math.random()*palette.length)|0],
        });
      }

      const start = performance.now();
      const duration = 1100;

      function tick(now){
        const t = now - start;
        ctx.clearRect(0,0,W,H);

        particles.forEach(p => {
          p.vy += p.g;
          p.x += p.vx;
          p.y += p.vy;
          p.rot += p.vr;
          const life = 1 - (t / duration);
          p.a = Math.max(0, life);

          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.globalAlpha = p.a;
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.r, -p.r, p.r*2.2, p.r*1.4);
          ctx.restore();
        });

        if(t < duration){
          requestAnimationFrame(tick);
        }else{
          ctx.clearRect(0,0,W,H);
          confettiCanvas.style.display = "none";
          confettiLock = false;
        }
      }

      requestAnimationFrame(tick);
    }

    /* =========================
       Save hardening for mobile/webview
       ========================= */
    async function flushAllNow(){
      try{
        saveJSON(THEME_KEY, themeCommitted);
        saveJSON(BG_KEY, bgCommitted);
        saveJSON(ROUTINE_KEY, routine);
        saveJSON(STORE_KEY, store);
        saveJSON(META_KEY, {
          lastSavedAt: Date.now(),
          activeWeekId,
          selectedDayIso
        });
        if(bgCommitted?.imageDataUrl){
          await idbSet(BG_IMAGE_IDB_KEY, bgCommitted.imageDataUrl);
        }
        await pushRemoteState(true);
      }catch{}
    }

    window.addEventListener("pagehide", () => { flushAllNow(); });
    window.addEventListener("beforeunload", () => { flushAllNow(); });
    document.addEventListener("visibilitychange", () => {
      if(document.visibilityState === "hidden"){
        flushAllNow();
      }
    });

    /* =========================
       Boot
       ========================= */
    async function boot(){
      await hydrateBackgroundFromIDB();

      initPopovers();
      initTheme();
      initBackground();
      initPresetsUI();
      initRoutine();

      store = normalizeStore(loadStore());

      themeApplyCSS(themeCommitted);
      applyBackgroundDraft(bgCommitted);
      routineApplyColors(routine.colors);

      rebuildWeek(activeWeekId);
      bootFinished = true;

      await initRemoteSync();
      await flushAllNow();
    }

    boot();
  </script>
