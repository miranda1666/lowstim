<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Career Goals</title>
  <style>
    :root{
      --bg:#ffffff;
      --card: rgba(255,255,255,0.84);
      --stroke:#e9e4dd;
      --ink:#2b2a28;
      --muted:#6a665f;
      --soft:#f3efe9;
      --shadow:0 10px 30px rgba(30,20,10,.06);
      --r:18px;

      --board-tint:#efe7e1;
      --board-image:none;
      --bg-blur:0px;
    }

    *{ box-sizing:border-box; }

    html, body{
      width:100%;
      min-height:100%;
    }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color:var(--ink);
      background:var(--bg);
      padding:28px 18px;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      overflow-x:hidden;
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
    }

    h1{
      margin:0;
      font-size:18px;
      font-weight:700;
    }

    .widgetBoard{
      position:relative;
      border-radius: var(--r);
      overflow:visible; /* FIX: panel must not be clipped */
      border:1px solid var(--stroke);
      box-shadow: var(--shadow);
      isolation:isolate;
    }

    .widgetBoard::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      background-image: var(--board-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index:0;
      pointer-events:none;
      transform:translateZ(0);
      filter: blur(var(--bg-blur)) saturate(1.08) contrast(1.04) brightness(1.02);
    }

    .boardTint{
      position:absolute;
      inset:0;
      z-index:1;
      pointer-events:none;
      background: rgba(0,0,0,0);
      border-radius:inherit;
    }

    .boardContent{
      position:relative;
      z-index:2;
      border-radius:inherit;
    }

    .card{
      background:var(--card);
      border:0;
      border-radius:inherit;
      box-shadow:none;
      padding:14px;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .title{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .title h2{
      margin:0;
      font-size:14px;
      font-weight:650;
      letter-spacing:.2px;
    }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    button, input, select, textarea{
      font:inherit;
      border:1px solid var(--stroke);
      background:#fff;
      color:var(--ink);
      border-radius:12px;
      padding:10px 12px;
      outline:none;
      -webkit-tap-highlight-color: transparent;
    }

    textarea{
      width:100%;
      min-height:90px;
      resize:vertical;
      -webkit-appearance:none;
      appearance:none;
      line-height:1.35;
    }

    button{
      cursor:pointer;
      user-select:none;
      touch-action:manipulation;
    }

    button.soft{ background:var(--soft); }
    button.primary{ background: rgba(239,231,225,0.9); }
    button:active{ transform:translateY(1px); }

    .divider{
      height:1px;
      background:var(--stroke);
      margin:12px 0;
    }

    .kpi{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .kpi .box{
      flex:1;
      min-width:200px;
      background:var(--soft);
      border:1px solid var(--stroke);
      border-radius:14px;
      padding:10px;
    }

    .kpi .num{
      font-weight:750;
      font-size:16px;
    }

    .kpi .lab{
      font-size:12px;
      color:var(--muted);
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--stroke);
      background:#fff;
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      white-space:nowrap;
    }

    .tiny{
      font-size:12px;
      color:var(--muted);
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .item{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      align-items:center;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid var(--stroke);
      background:#fff;
    }

    .meta{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
    }

    .meta b{
      font-size:13px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .meta span{
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
    }

    .right{
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:flex-end;
      flex-wrap:wrap;
    }

    .tag{
      font-size:11px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:var(--soft);
      user-select:none;
      white-space:nowrap;
    }

    .smallbtn{
      padding:8px 10px;
      border-radius:12px;
    }

    .danger{
      border-color:#efc2c2;
    }

    .ctrls{
      display:flex;
      gap:8px;
      align-items:center;
      margin-left:auto;
      position:relative;
      z-index:20;
    }

    .panelWrap{
      position:relative;
    }

    .panelBtn{
      width:34px;
      height:34px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.92);
      padding:0;
      display:grid;
      place-items:center;
      box-shadow: 0 3px 12px rgba(30,20,10,.08);
      position:relative;
      z-index:21;
    }

    .bgDot,
    .themeDot{
      width:14px;
      height:14px;
      border-radius:999px;
      border:1px solid rgba(233,228,221,0.95);
    }

    .bgDot{
      background:var(--board-tint);
      box-shadow: 0 0 0 6px rgba(239,231,225,0.22);
    }

    .themeDot{
      background:var(--ink);
      box-shadow: 0 0 0 6px rgba(239,231,225,0.22);
    }

    .panel{
      position:absolute;
      top:44px;
      right:0;
      width:min(320px, calc(100vw - 32px));
      border-radius:16px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.97);
      box-shadow:0 18px 40px rgba(30,20,10,.16);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding:12px;
      display:none;
      z-index:99999;
      max-height:min(82vh, 720px);
      overflow:auto;
      overscroll-behavior:contain;
      -webkit-overflow-scrolling:touch;
    }

    .panel.open{
      display:block;
    }

    .panelTitle{
      margin:0 0 10px 0;
      font-size:12px;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      color: rgba(43,42,40,0.72);
    }

    .panelRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:7px 0;
      flex-wrap:wrap;
    }

    .panelRow label{
      font-size:12px;
      color:var(--muted);
    }

    .panelRow input[type="color"]{
      width:36px;
      height:28px;
      border-radius:10px;
      padding:0;
      border:1px solid var(--stroke);
      background: transparent;
      cursor:pointer;
    }

    .panelRow input[type="range"]{
      width:150px;
      max-width:46vw;
      touch-action:pan-y;
    }

    .panelFile{
      width:100%;
      font-size:12px;
      color: rgba(43,42,40,0.75);
    }

    .panelBtnFull{
      width:100%;
      border-radius:12px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.97);
      padding:9px 10px;
      font-weight:700;
      letter-spacing:.06em;
      text-transform:uppercase;
      font-size:11px;
      color: rgba(43,42,40,0.82);
      box-shadow: 0 2px 8px rgba(30,20,10,.06);
    }

    .panelDivider{
      height:1px;
      background:var(--stroke);
      margin:8px 0;
    }

    .presetName{
      width:100%;
    }

    .status{
      font-size:12px;
      color:var(--muted);
      margin-top:6px;
      min-height:16px;
    }

    .confirm{
      margin-top:10px;
      border:1px solid var(--stroke);
      border-radius:14px;
      padding:12px;
      background:#fff;
    }

    .confirmTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }

    .confirmTitle{
      margin:0;
      font-weight:750;
      font-size:13px;
      line-height:1.25;
    }

    @media (max-width:900px){
      .panel{
        position:fixed;
        top:auto;
        right:16px;
        left:16px;
        bottom:max(16px, env(safe-area-inset-bottom));
        width:auto;
        max-height:min(78vh, 720px);
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1></h1>

    <div class="widgetBoard" id="widgetBoard" aria-label="Career goals board">
      <div class="boardTint" id="boardTint"></div>
      <div class="boardContent">
        <section class="card">

          <div class="title">
            <div>
              <h2 style="margin:0;">Goals</h2>
            </div>

            <div class="ctrls">
              <div class="panelWrap">
                <button class="panelBtn" id="themeBtn" type="button" aria-label="Theme settings" title="Theme settings">
                  <span class="themeDot" id="themeDot" aria-hidden="true"></span>
                </button>

                <div class="panel" id="themePanel" role="dialog" aria-label="Theme settings">
                  <div class="panelTitle">Theme</div>

                  <div class="panelRow">
                    <label for="tBg">Page bg</label>
                    <input id="tBg" type="color" value="#ffffff" />
                  </div>

                  <div class="panelRow">
                    <label for="tCard">Card</label>
                    <input id="tCard" type="color" value="#ffffff" />
                  </div>

                  <div class="panelRow">
                    <label for="tCardA">Card opacity</label>
                    <input id="tCardA" type="range" min="20" max="95" value="84" />
                  </div>

                  <div class="panelRow">
                    <label for="tStroke">Borders</label>
                    <input id="tStroke" type="color" value="#e9e4dd" />
                  </div>

                  <div class="panelRow">
                    <label for="tInk">Text</label>
                    <input id="tInk" type="color" value="#2b2a28" />
                  </div>

                  <div class="panelRow">
                    <label for="tMuted">Muted</label>
                    <input id="tMuted" type="color" value="#6a665f" />
                  </div>

                  <div class="panelRow">
                    <label for="tSoft">Secondary</label>
                    <input id="tSoft" type="color" value="#f3efe9" />
                  </div>

                  <div class="panelDivider"></div>

                  <div class="panelRow">
                    <button id="themeApply" class="panelBtnFull" type="button">Apply theme</button>
                  </div>

                  <div class="panelRow">
                    <button id="themeReset" class="panelBtnFull" type="button">Reset theme</button>
                  </div>

                  <div class="panelDivider"></div>

                  <div class="panelTitle" style="margin-top:2px;">Presets</div>

                  <div class="panelRow" style="align-items:flex-start; flex-direction:column; gap:8px;">
                    <input id="presetName" class="presetName" placeholder="Preset name" />
                    <button id="presetSave" class="panelBtnFull" type="button">Save current as preset</button>
                  </div>

                  <div class="panelRow">
                    <label for="presetSelect">Choose</label>
                    <select id="presetSelect" style="width:170px;">
                      <option value="">—</option>
                    </select>
                  </div>

                  <div class="panelRow">
                    <button id="presetApply" class="panelBtnFull" type="button">Apply preset</button>
                  </div>

                  <div class="panelRow">
                    <button id="presetDelete" class="panelBtnFull" type="button">Delete preset</button>
                  </div>

                  <div class="status" id="presetStatus" aria-live="polite"></div>
                </div>
              </div>

              <div class="panelWrap">
                <button class="panelBtn" id="bgBtn" type="button" aria-label="Background settings" title="Background settings">
                  <span class="bgDot" id="bgDot" aria-hidden="true"></span>
                </button>

                <div class="panel" id="bgPanel" role="dialog" aria-label="Background settings">
                  <div class="panelTitle">Background</div>

                  <div class="panelRow">
                    <label for="bgColor">Tint</label>
                    <input id="bgColor" type="color" value="#efe7e1" />
                  </div>

                  <div class="panelRow">
                    <label for="bgStrength">Strength</label>
                    <input id="bgStrength" type="range" min="0" max="70" value="12" />
                  </div>

                  <div class="panelRow">
                    <label for="bgBlur">Image blur</label>
                    <input id="bgBlur" type="range" min="0" max="24" value="0" />
                  </div>

                  <div class="panelDivider"></div>

                  <div class="panelRow" style="align-items:flex-start;">
                    <label for="bgImage">Image</label>
                    <input id="bgImage" class="panelFile" type="file" accept="image/*" />
                  </div>

                  <div class="panelRow">
                    <button id="bgRemove" class="panelBtnFull" type="button">Remove image</button>
                  </div>

                  <div class="panelDivider"></div>

                  <div class="panelRow">
                    <button id="bgApply" class="panelBtnFull" type="button">Apply background</button>
                  </div>

                  <div class="panelRow">
                    <button id="bgReset" class="panelBtnFull" type="button">Reset background</button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="divider"></div>

          <div class="row" aria-label="Add goal">
            <input id="goalTitle" style="flex:1; min-width:220px;" placeholder="Goal title (e.g., Get promoted)…" />
            <span class="pill">
              Priority
              <select id="goalPriority">
                <option value="low">Low</option>
                <option value="mid" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </span>
            <input id="goalDeadline" type="date" title="Optional deadline" />
            <button id="addGoal" class="primary" type="button">Add</button>
            <button id="clearDone" class="soft" type="button">Clear achieved</button>
          </div>

          <div style="height:10px;"></div>

          <textarea id="goalNext" placeholder="Notes..."></textarea>

          <div class="divider"></div>

          <div class="row" style="justify-content:space-between; align-items:center;">
            <button id="resetAll" class="danger" type="button">Reset</button>
          </div>

          <div id="resetConfirm" class="confirm" style="display:none;">
            <div class="confirmTop">
              <p class="confirmTitle">Reset all career goals?</p>
              <span class="tiny">This can’t be undone.</span>
            </div>
            <div class="row">
              <button id="resetYes" class="danger" type="button">Yes, reset</button>
              <button id="resetNo" class="soft" type="button">Cancel</button>
            </div>
          </div>

          <div class="divider"></div>

          <div class="kpi" aria-label="Summary">
            <div class="box">
              <div class="num" id="kTotal">—</div>
              <div class="lab">Total goals</div>
            </div>
            <div class="box">
              <div class="num" id="kActive">—</div>
              <div class="lab">Active</div>
            </div>
            <div class="box">
              <div class="num" id="kDone">—</div>
              <div class="lab">Achieved</div>
            </div>
          </div>

          <div class="divider"></div>

          <div class="row" style="justify-content:space-between; align-items:flex-end;">
            <div class="tiny">Goals</div>
            <span class="pill">
              View
              <select id="viewFilter">
                <option value="all" selected>All</option>
                <option value="active">Active</option>
                <option value="done">Achieved</option>
              </select>
            </span>
          </div>

          <div style="height:10px;"></div>
          <div class="list" id="goalList"></div>

          <div class="divider"></div>
        </section>
      </div>
    </div>
  </div>

<script>
(async function(){
  "use strict";

  const DEFAULT_THEME = {
    bg:"#ffffff",
    card:"#ffffff",
    cardA:84,
    stroke:"#e9e4dd",
    ink:"#2b2a28",
    muted:"#6a665f",
    soft:"#f3efe9"
  };

  const DEFAULT_BG = {
    tint:"#efe7e1",
    strength:12,
    blur:0,
    imageDataUrl:null
  };

  const APP_VERSION = 11;
  const STORAGE_NS = "career_goals_v11";
  const CHANNEL_NAME = "career-goals-sync-v11";
  const $ = (id)=>document.getElementById(id);

  function clamp(n, min, max){
    n = Number(n);
    if(!Number.isFinite(n)) return min;
    return Math.max(min, Math.min(max, n));
  }

  function uid(){
    return Math.random().toString(16).slice(2) + Date.now().toString(16);
  }

  function stableWidgetId(){
    try{
      const sp = new URLSearchParams(location.search);
      const wid = (sp.get("wid") || "").trim();
      if (wid) return wid;
    }catch{}
    const pathPart = (location.pathname || "career-goals").replace(/[^a-zA-Z0-9_-]+/g, "_");
    return pathPart || "career-goals";
  }

  const WID = stableWidgetId();

  function normalizeHex(hex, fallback){
    const s = String(hex || "").trim();
    return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : fallback;
  }

  function hexToRgb(hex){
    const h = normalizeHex(hex, "#ffffff").slice(1);
    const num = parseInt(h, 16);
    return { r:(num>>16)&255, g:(num>>8)&255, b:num&255 };
  }

  function rgbaFromHex(hex, a){
    const {r,g,b} = hexToRgb(hex);
    return `rgba(${r},${g},${b},${a})`;
  }

  function setStatus(msg=""){
    const el = $("presetStatus");
    if(el) el.textContent = msg;
  }

  function debounce(fn, delay){
    let t = null;
    return function(...args){
      clearTimeout(t);
      t = setTimeout(() => fn.apply(this, args), delay);
    };
  }

  const storage = {
    db: null,
    hasIDB: false,
    key: `${STORAGE_NS}__${WID}`,

    async init(){
      if (!("indexedDB" in window)) {
        this.hasIDB = false;
        return;
      }
      try{
        this.db = await new Promise((resolve, reject) => {
          const req = indexedDB.open(`${STORAGE_NS}_db`, 1);
          req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains("state")) db.createObjectStore("state");
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
        this.hasIDB = true;
      }catch{
        this.hasIDB = false;
        this.db = null;
      }
    },

    async get(){
      if (this.hasIDB && this.db){
        try{
          const result = await new Promise((resolve, reject) => {
            const tx = this.db.transaction("state", "readonly");
            const store = tx.objectStore("state");
            const req = store.get(this.key);
            req.onsuccess = () => resolve(req.result ?? null);
            req.onerror = () => reject(req.error);
          });
          if (result) return result;
        }catch{}
      }

      try{
        const raw = localStorage.getItem(this.key);
        return raw ? JSON.parse(raw) : null;
      }catch{
        return null;
      }
    },

    async set(value){
      try{
        localStorage.setItem(this.key, JSON.stringify(value));
      }catch{}

      if (this.hasIDB && this.db){
        try{
          await new Promise((resolve, reject) => {
            const tx = this.db.transaction("state", "readwrite");
            const store = tx.objectStore("state");
            const req = store.put(value, this.key);
            req.onsuccess = () => resolve();
            req.onerror = () => reject(req.error);
          });
        }catch{}
      }
    }
  };

  function normalizeTheme(obj){
    const t = Object.assign({}, DEFAULT_THEME, obj || {});
    return {
      bg: normalizeHex(t.bg, DEFAULT_THEME.bg),
      card: normalizeHex(t.card, DEFAULT_THEME.card),
      cardA: clamp(t.cardA, 20, 95),
      stroke: normalizeHex(t.stroke, DEFAULT_THEME.stroke),
      ink: normalizeHex(t.ink, DEFAULT_THEME.ink),
      muted: normalizeHex(t.muted, DEFAULT_THEME.muted),
      soft: normalizeHex(t.soft, DEFAULT_THEME.soft)
    };
  }

  function normalizeBg(obj){
    const bg = Object.assign({}, DEFAULT_BG, obj || {});
    return {
      tint: normalizeHex(bg.tint, DEFAULT_BG.tint),
      strength: clamp(bg.strength, 0, 70),
      blur: clamp(bg.blur, 0, 24),
      imageDataUrl: typeof bg.imageDataUrl === "string" && bg.imageDataUrl ? bg.imageDataUrl : null
    };
  }

  function normalizeGoal(goal){
    return {
      id: String(goal?.id || uid()),
      title: String(goal?.title || "").trim(),
      priority: ["low","mid","high"].includes(goal?.priority) ? goal.priority : "mid",
      deadline: typeof goal?.deadline === "string" ? goal.deadline : "",
      nextAction: String(goal?.nextAction || ""),
      done: !!goal?.done,
      createdAt: Number(goal?.createdAt || Date.now()) || Date.now()
    };
  }

  function normalizeAppState(raw){
    return {
      version: APP_VERSION,
      wid: WID,
      lastUpdated: Number(raw?.lastUpdated || 0) || 0,
      theme: normalizeTheme(raw?.theme),
      background: normalizeBg(raw?.background),
      presets: Array.isArray(raw?.presets)
        ? raw.presets.map(p => ({
            id: String(p?.id || uid()),
            name: String(p?.name || "Untitled"),
            theme: normalizeTheme(p?.theme),
            bg: normalizeBg(p?.bg)
          }))
        : [],
      goalsState: {
        goals: Array.isArray(raw?.goalsState?.goals) ? raw.goalsState.goals.map(normalizeGoal).filter(g => g.title) : [],
        ui: {
          view: ["all","active","done"].includes(raw?.goalsState?.ui?.view) ? raw.goalsState.ui.view : "all"
        },
        draft: {
          goalTitle: String(raw?.goalsState?.draft?.goalTitle || ""),
          goalPriority: ["low","mid","high"].includes(raw?.goalsState?.draft?.goalPriority) ? raw.goalsState.draft.goalPriority : "mid",
          goalDeadline: String(raw?.goalsState?.draft?.goalDeadline || ""),
          goalNext: String(raw?.goalsState?.draft?.goalNext || "")
        }
      }
    };
  }

  let state = normalizeAppState(null);
  let themeDraft = normalizeTheme(DEFAULT_THEME);
  let bgDraft = normalizeBg(DEFAULT_BG);

  const bc = "BroadcastChannel" in window ? new BroadcastChannel(CHANNEL_NAME) : null;

  function touchState(){
    state.lastUpdated = Date.now();
  }

  async function saveState(){
    captureDraftInputs();
    touchState();
    await storage.set(state);
    if (bc){
      try{
        bc.postMessage({ type: "state-updated", wid: WID, lastUpdated: state.lastUpdated });
      }catch{}
    }
  }

  const debouncedSave = debounce(() => { saveState(); }, 120);

  async function flushSave(){
    await saveState();
  }

  function captureDraftInputs(){
    state.goalsState.draft = {
      goalTitle: $("goalTitle").value || "",
      goalPriority: $("goalPriority").value || "mid",
      goalDeadline: $("goalDeadline").value || "",
      goalNext: $("goalNext").value || ""
    };
  }

  function restoreDraftInputs(){
    const d = state.goalsState.draft;
    $("goalTitle").value = d.goalTitle || "";
    $("goalPriority").value = d.goalPriority || "mid";
    $("goalDeadline").value = d.goalDeadline || "";
    $("goalNext").value = d.goalNext || "";
  }

  function applyTheme(theme){
    const t = normalizeTheme(theme);

    document.documentElement.style.setProperty("--bg", t.bg);
    document.documentElement.style.setProperty("--stroke", t.stroke);
    document.documentElement.style.setProperty("--ink", t.ink);
    document.documentElement.style.setProperty("--muted", t.muted);
    document.documentElement.style.setProperty("--soft", t.soft);
    document.documentElement.style.setProperty("--card", rgbaFromHex(t.card, t.cardA / 100));

    const dot = $("themeDot");
    if(dot){
      dot.style.background = t.ink;
      dot.style.boxShadow = `0 0 0 6px ${rgbaFromHex(t.ink, 0.14)}`;
    }
  }

  function syncThemeInputs(){
    $("tBg").value = themeDraft.bg;
    $("tCard").value = themeDraft.card;
    $("tCardA").value = String(themeDraft.cardA);
    $("tStroke").value = themeDraft.stroke;
    $("tInk").value = themeDraft.ink;
    $("tMuted").value = themeDraft.muted;
    $("tSoft").value = themeDraft.soft;
  }

  function readThemeInputs(){
    return normalizeTheme({
      bg: $("tBg").value,
      card: $("tCard").value,
      cardA: Number($("tCardA").value),
      stroke: $("tStroke").value,
      ink: $("tInk").value,
      muted: $("tMuted").value,
      soft: $("tSoft").value
    });
  }

  function applyBg(bgState){
    const bg = normalizeBg(bgState);

    document.documentElement.style.setProperty("--board-tint", bg.tint);
    document.documentElement.style.setProperty("--board-image", bg.imageDataUrl ? `url("${bg.imageDataUrl}")` : "none");
    document.documentElement.style.setProperty("--bg-blur", `${bg.blur}px`);

    $("boardTint").style.background = rgbaFromHex(bg.tint, bg.strength / 100);

    const bgDot = $("bgDot");
    bgDot.style.background = bg.tint;
    bgDot.style.boxShadow = `0 0 0 6px ${rgbaFromHex(bg.tint, Math.min(0.28, (bg.strength / 100) + 0.10))}`;
  }

  function syncBgInputs(){
    $("bgColor").value = bgDraft.tint;
    $("bgStrength").value = String(bgDraft.strength);
    $("bgBlur").value = String(bgDraft.blur);
    $("bgImage").value = "";
  }

  function readBgInputs(){
    return normalizeBg({
      tint: $("bgColor").value,
      strength: Number($("bgStrength").value),
      blur: Number($("bgBlur").value),
      imageDataUrl: bgDraft.imageDataUrl
    });
  }

  function priorityLabel(p){
    if(p === "high") return "High";
    if(p === "low") return "Low";
    return "Medium";
  }

  function filteredGoals(){
    let list = [...state.goalsState.goals];

    if(state.goalsState.ui.view === "active") list = list.filter(g => !g.done);
    if(state.goalsState.ui.view === "done") list = list.filter(g => g.done);

    const order = { high:0, mid:1, low:2 };
    list.sort((a,b) => {
      if(a.done !== b.done) return a.done ? 1 : -1;
      if((order[a.priority] ?? 9) !== (order[b.priority] ?? 9)) return (order[a.priority] ?? 9) - (order[b.priority] ?? 9);
      const ad = a.deadline ? new Date(a.deadline).getTime() : Infinity;
      const bd = b.deadline ? new Date(b.deadline).getTime() : Infinity;
      if(ad !== bd) return ad - bd;
      return (b.createdAt||0) - (a.createdAt||0);
    });

    return list;
  }

  function renderKPIs(){
    const total = state.goalsState.goals.length;
    const done = state.goalsState.goals.filter(g => g.done).length;
    const active = total - done;

    $("kTotal").textContent = String(total);
    $("kActive").textContent = String(active);
    $("kDone").textContent = String(done);
  }

  function renderList(){
    const root = $("goalList");
    const list = filteredGoals();
    root.innerHTML = "";

    if(list.length === 0){
      root.innerHTML = `<div class="tiny">No goals yet. Add one above.</div>`;
      return;
    }

    for(const g of list){
      const el = document.createElement("div");
      el.className = "item";

      const meta = document.createElement("div");
      meta.className = "meta";

      const b = document.createElement("b");
      b.textContent = g.title || "(Untitled)";
      if(g.done){
        b.style.textDecoration = "line-through";
        b.style.opacity = "0.72";
      }

      const deadlineTxt = g.deadline ? ` · due ${g.deadline}` : "";
      const nextTxt = (g.nextAction || "").trim() ? `, notes: ${g.nextAction}` : "";
      const s = document.createElement("span");
      s.textContent = `${priorityLabel(g.priority)} priority${deadlineTxt}${nextTxt}`;

      meta.appendChild(b);
      meta.appendChild(s);

      const right = document.createElement("div");
      right.className = "right";

      const tag = document.createElement("span");
      tag.className = "tag";
      tag.textContent = priorityLabel(g.priority);

      const doneBtn = document.createElement("button");
      doneBtn.type = "button";
      doneBtn.className = "smallbtn";
      doneBtn.textContent = g.done ? "Undo" : "Done";
      doneBtn.addEventListener("click", async () => {
        g.done = !g.done;
        await flushSave();
        renderAll();
      });

      const editBtn = document.createElement("button");
      editBtn.type = "button";
      editBtn.className = "smallbtn soft";
      editBtn.textContent = "Edit";
      editBtn.addEventListener("click", async () => {
        $("goalTitle").value = g.title || "";
        $("goalPriority").value = g.priority || "mid";
        $("goalDeadline").value = g.deadline || "";
        $("goalNext").value = g.nextAction || "";
        captureDraftInputs();
        await flushSave();
      });

      const delBtn = document.createElement("button");
      delBtn.type = "button";
      delBtn.className = "smallbtn danger";
      delBtn.textContent = "✕";
      delBtn.title = "Remove";
      delBtn.addEventListener("click", async () => {
        state.goalsState.goals = state.goalsState.goals.filter(x => x.id !== g.id);
        await flushSave();
        renderAll();
      });

      right.appendChild(tag);
      right.appendChild(doneBtn);
      right.appendChild(editBtn);
      right.appendChild(delBtn);

      el.appendChild(meta);
      el.appendChild(right);
      root.appendChild(el);
    }
  }

  function renderAll(){
    $("viewFilter").value = state.goalsState.ui.view;
    renderKPIs();
    renderList();
    debouncedSave();
  }

  async function addGoal(){
    const title = ($("goalTitle").value || "").trim();
    const nextAction = ($("goalNext").value || "").trim();
    if(!title) return;

    state.goalsState.goals.unshift(normalizeGoal({
      id: uid(),
      title,
      priority: $("goalPriority").value || "mid",
      deadline: $("goalDeadline").value || "",
      nextAction,
      done:false,
      createdAt: Date.now()
    }));

    $("goalTitle").value = "";
    $("goalDeadline").value = "";
    $("goalNext").value = "";
    $("goalPriority").value = "mid";

    captureDraftInputs();
    await flushSave();
    $("goalTitle").focus();
    renderAll();
  }

  function refreshPresetSelect(){
    const select = $("presetSelect");
    const current = select.value;
    select.innerHTML = `<option value="">—</option>`;
    for(const p of state.presets){
      const opt = document.createElement("option");
      opt.value = p.id;
      opt.textContent = p.name || "Untitled";
      select.appendChild(opt);
    }
    if(current && state.presets.some(p => p.id === current)){
      select.value = current;
    }
  }

  function initPanels(){
    function closeAll(except){
      if(except !== "theme") $("themePanel").classList.remove("open");
      if(except !== "bg") $("bgPanel").classList.remove("open");
    }

    $("themeBtn").addEventListener("click", (e)=>{
      e.stopPropagation();
      const open = !$("themePanel").classList.contains("open");
      closeAll(open ? "theme" : null);
      $("themePanel").classList.toggle("open", open);
    });

    $("bgBtn").addEventListener("click", (e)=>{
      e.stopPropagation();
      const open = !$("bgPanel").classList.contains("open");
      closeAll(open ? "bg" : null);
      $("bgPanel").classList.toggle("open", open);
    });

    document.addEventListener("click", (e) => {
      const inside =
        e.target.closest("#themePanel") || e.target.closest("#themeBtn") ||
        e.target.closest("#bgPanel") || e.target.closest("#bgBtn");
      if(!inside) closeAll(null);
    });
  }

  function initThemeModule(){
    themeDraft = normalizeTheme(state.theme);
    applyTheme(themeDraft);
    syncThemeInputs();

    ["tBg","tCard","tCardA","tStroke","tInk","tMuted","tSoft"].forEach(id => {
      $(id).addEventListener("input", () => {
        themeDraft = readThemeInputs();
        applyTheme(themeDraft);
        setStatus("");
      });
    });

    $("themeApply").addEventListener("click", async ()=>{
      themeDraft = readThemeInputs();
      state.theme = normalizeTheme(themeDraft);
      applyTheme(state.theme);
      await flushSave();
      setStatus("Theme applied.");
    });

    $("themeReset").addEventListener("click", async ()=>{
      themeDraft = normalizeTheme(DEFAULT_THEME);
      state.theme = normalizeTheme(DEFAULT_THEME);
      syncThemeInputs();
      applyTheme(themeDraft);
      await flushSave();
      setStatus("Theme reset.");
    });
  }

  function initBackgroundModule(){
    bgDraft = normalizeBg(state.background);
    applyBg(bgDraft);
    syncBgInputs();

    function previewBg(){
      bgDraft = readBgInputs();
      applyBg(bgDraft);
      setStatus("");
    }

    $("bgColor").addEventListener("input", previewBg);
    $("bgStrength").addEventListener("input", previewBg);
    $("bgBlur").addEventListener("input", previewBg);

    $("bgImage").addEventListener("change", async () => {
      const file = $("bgImage").files && $("bgImage").files[0];
      if(!file) return;

      try{
        const dataUrl = await new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = () => resolve(String(r.result));
          r.onerror = reject;
          r.readAsDataURL(file);
        });
        bgDraft.imageDataUrl = dataUrl;
        bgDraft = normalizeBg(bgDraft);
        applyBg(bgDraft);
        setStatus("");
      }catch{
        setStatus("Could not read that image.");
      }
    });

    $("bgRemove").addEventListener("click", () => {
      bgDraft.imageDataUrl = null;
      $("bgImage").value = "";
      bgDraft = normalizeBg(bgDraft);
      applyBg(bgDraft);
      setStatus("");
    });

    $("bgApply").addEventListener("click", async ()=>{
      bgDraft = readBgInputs();
      state.background = normalizeBg(bgDraft);
      applyBg(state.background);
      await flushSave();
      setStatus("Background applied.");
    });

    $("bgReset").addEventListener("click", async ()=>{
      bgDraft = normalizeBg(DEFAULT_BG);
      state.background = normalizeBg(DEFAULT_BG);
      syncBgInputs();
      applyBg(bgDraft);
      await flushSave();
      setStatus("Background reset.");
    });
  }

  function initPresetModule(){
    refreshPresetSelect();

    $("presetSave").addEventListener("click", async ()=>{
      const name = ($("presetName").value || "").trim();
      if(!name){
        setStatus("Type a preset name first.");
        return;
      }

      const entry = {
        id: uid(),
        name,
        theme: normalizeTheme(themeDraft),
        bg: normalizeBg(bgDraft)
      };

      state.presets.unshift(entry);
      $("presetName").value = "";
      refreshPresetSelect();
      $("presetSelect").value = entry.id;
      await flushSave();
      setStatus("Preset saved.");
    });

    $("presetApply").addEventListener("click", async ()=>{
      const id = $("presetSelect").value;
      if(!id){
        setStatus("Choose a preset first.");
        return;
      }

      const p = state.presets.find(x => x.id === id);
      if(!p){
        setStatus("Preset not found.");
        return;
      }

      themeDraft = normalizeTheme(p.theme);
      state.theme = normalizeTheme(p.theme);
      syncThemeInputs();
      applyTheme(themeDraft);

      bgDraft = normalizeBg(p.bg);
      state.background = normalizeBg(p.bg);
      syncBgInputs();
      applyBg(bgDraft);

      await flushSave();
      setStatus("Preset applied.");
    });

    $("presetDelete").addEventListener("click", async ()=>{
      const id = $("presetSelect").value;
      if(!id){
        setStatus("Choose a preset first.");
        return;
      }

      const before = state.presets.length;
      state.presets = state.presets.filter(x => x.id !== id);
      if(state.presets.length === before){
        setStatus("Preset not found.");
        return;
      }

      refreshPresetSelect();
      $("presetSelect").value = "";
      await flushSave();
      setStatus("Preset deleted.");
    });
  }

  function initGoalsModule(){
    const resetConfirm = $("resetConfirm");

    function hideReset(){
      resetConfirm.style.display = "none";
    }

    function showReset(){
      resetConfirm.style.display = "block";
      $("themePanel").classList.remove("open");
      $("bgPanel").classList.remove("open");
    }

    restoreDraftInputs();

    $("addGoal").addEventListener("click", addGoal);

    $("goalTitle").addEventListener("keydown", (e)=>{
      if(e.key === "Enter"){
        e.preventDefault();
        addGoal();
      }
    });

    $("viewFilter").addEventListener("change", ()=>{
      state.goalsState.ui.view = $("viewFilter").value;
      renderAll();
    });

    $("clearDone").addEventListener("click", async ()=> {
      state.goalsState.goals = state.goalsState.goals.filter(g => !g.done);
      await flushSave();
      renderAll();
    });

    $("resetAll").addEventListener("click", ()=>{
      resetConfirm.style.display === "block" ? hideReset() : showReset();
    });

    $("resetNo").addEventListener("click", hideReset);

    $("resetYes").addEventListener("click", async ()=>{
      state.goalsState = {
        goals: [],
        ui: { view: "all" },
        draft: {
          goalTitle: "",
          goalPriority: "mid",
          goalDeadline: "",
          goalNext: ""
        }
      };
      restoreDraftInputs();
      hideReset();
      await flushSave();
      renderAll();
    });

    ["goalTitle","goalPriority","goalDeadline","goalNext"].forEach(id => {
      $(id).addEventListener("input", debouncedSave);
      $(id).addEventListener("change", debouncedSave);
      $(id).addEventListener("blur", debouncedSave);
    });

    renderAll();
  }

  if (bc){
    bc.onmessage = async (event) => {
      const msg = event.data;
      if (!msg || msg.type !== "state-updated" || msg.wid !== WID) return;

      const incoming = await storage.get();
      if (!incoming) return;

      if ((incoming.lastUpdated || 0) > (state.lastUpdated || 0)){
        state = normalizeAppState(incoming);
        themeDraft = normalizeTheme(state.theme);
        bgDraft = normalizeBg(state.background);
        applyTheme(themeDraft);
        syncThemeInputs();
        applyBg(bgDraft);
        syncBgInputs();
        restoreDraftInputs();
        refreshPresetSelect();
        renderAll();
      }
    };
  }

  window.addEventListener("storage", async (e) => {
    if (e.key !== storage.key || !e.newValue) return;
    try{
      const incoming = normalizeAppState(JSON.parse(e.newValue));
      if ((incoming.lastUpdated || 0) > (state.lastUpdated || 0)){
        state = incoming;
        themeDraft = normalizeTheme(state.theme);
        bgDraft = normalizeBg(state.background);
        applyTheme(themeDraft);
        syncThemeInputs();
        applyBg(bgDraft);
        syncBgInputs();
        restoreDraftInputs();
        refreshPresetSelect();
        renderAll();
      }
    }catch{}
  });

  async function emergencySave(){
    try{
      captureDraftInputs();
      await flushSave();
    }catch{}
  }

  window.addEventListener("beforeunload", emergencySave);
  window.addEventListener("pagehide", emergencySave);
  window.addEventListener("blur", emergencySave);

  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden"){
      emergencySave();
    }
  });

  await storage.init();

  const loaded = await storage.get();
  state = normalizeAppState(loaded);
  themeDraft = normalizeTheme(state.theme);
  bgDraft = normalizeBg(state.background);

  initPanels();
  initThemeModule();
  initBackgroundModule();
  initPresetModule();
  initGoalsModule();

  applyTheme(themeDraft);
  syncThemeInputs();
  applyBg(bgDraft);
  syncBgInputs();
  restoreDraftInputs();
  refreshPresetSelect();
  renderAll();
})();
</script>
</body>
</html>
