<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Timetable</title>
  <style>
    :root{
      --bg: #ffffff;
      --panel: rgba(255,255,255,.68);
      --panel2: rgba(255,255,255,.84);
      --text: #2b2b2b;
      --muted: #6f6a63;
      --line: rgba(43,43,43,.18);
      --lineStrong: rgba(43,43,43,.28);
      --gridLine: rgba(43,43,43,.14);
      --focus: rgba(43,43,43,.22);
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --shadow2: 0 16px 50px rgba(0,0,0,.14);
      --radius: 18px;
      --radius2: 14px;
      --inkSoft: rgba(43,43,43,.60);

      --board-tint: #efe7e1;
      --board-tint-a: 0.35;
      --board-image: none;
      --board-blur: 0px;

      --time-col-width: 96px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin: 0;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: var(--bg);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    input, textarea, select, button{
      font: inherit;
    }

    .wrap{
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }

    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 14px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .title{
      display:grid;
      gap: 6px;
      min-width: 280px;
    }
    .title h1{
      font-size: clamp(22px, 2.6vw, 32px);
      line-height: 1.1;
      margin: 0;
      letter-spacing: -.02em;
    }

    .actions{
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn{
      appearance:none;
      border: 1px solid var(--lineStrong);
      background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,255,255,.74));
      color: var(--text);
      padding: 10px 12px;
      border-radius: 999px;
      box-shadow: 0 6px 18px rgba(0,0,0,.06);
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
      font-size: 13px;
      display:inline-flex;
      align-items:center;
      gap: 8px;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn:hover{ transform: translateY(-1px); box-shadow: 0 10px 22px rgba(0,0,0,.08); border-color: rgba(43,43,43,.30); }
    .btn:active{ transform: translateY(0px); }
    .btn:focus-visible{ outline: 3px solid var(--focus); outline-offset: 2px; }
    .btn.primary{ border-color: var(--lineStrong); }
    .btn.danger{ border-color: rgba(160, 60, 60, .30); }

    .popover{ position: relative; }

    .bgBtn{
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid var(--lineStrong);
      background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,255,255,.74));
      box-shadow: 0 6px 18px rgba(0,0,0,.06);
      display:grid;
      place-items:center;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .bgBtn:active{ transform: translateY(1px); }

    .bgDot{
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid var(--lineStrong);
      background: var(--board-tint);
      box-shadow: 0 0 0 6px rgba(239,231,225,0.35);
    }

    .themeDot{
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid var(--lineStrong);
      background: var(--text);
      box-shadow: 0 0 0 6px rgba(43,43,43,0.08);
      opacity: .9;
    }

    .panel{
      position: absolute;
      top: 50px;
      right: 0;
      width: 320px;
      border-radius: 16px;
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.94);
      box-shadow: 0 18px 40px rgba(0,0,0,.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 12px;
      display:none;
      z-index: 60;
      max-height: min(72vh, 620px);
      overflow:auto;
    }
    .panel.open{ display:block; }
    .panel h3{
      margin: 0 0 10px 0;
      font-size: 13px;
      font-weight: 650;
      color: rgba(43,43,43,.88);
    }
    .pRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 8px 0;
    }
    .pRow label{
      font-size: 12px;
      color: var(--muted);
      padding-left: 0;
    }
    input[type="color"].pColor{
      width: 34px;
      height: 26px;
      border: 1px solid var(--lineStrong);
      border-radius: 10px;
      padding: 0;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    input[type="range"].pRange{ width: 150px; }
    .pFile{
      width: 100%;
      font-size: 12px;
      color: rgba(43,43,43,.75);
    }
    .miniBtn{
      width: 100%;
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.92);
      border-radius: 12px;
      padding: 9px 10px;
      cursor: pointer;
      font-weight: 650;
      color: rgba(43,43,43,.88);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .miniBtn:active{ transform: translateY(1px); }
    .pDiv{
      height: 1px;
      background: var(--line);
      margin: 8px 0;
    }

    .presetName{
      width:100%;
      border:1px solid var(--lineStrong);
      background: rgba(255,255,255,.96);
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
      color: var(--text);
      outline:none;
    }
    .presetSelect{
      width:100%;
      border:1px solid var(--lineStrong);
      background: rgba(255,255,255,.96);
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
      color: var(--text);
      outline:none;
      height:40px;
    }
    .status{
      font-size:12px;
      color: var(--muted);
      margin-top: 6px;
      min-height: 16px;
    }

    .widgetBoard{
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
    }
    .widgetBoard::before{
      content:"";
      position:absolute;
      inset:0;
      background-image: var(--board-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(var(--board-blur)) saturate(.98);
      transform: scale(1.03);
      pointer-events:none;
    }
    .widgetBoard::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(900px 520px at 18% 20%, rgba(255,255,255,0.24), transparent 62%),
        radial-gradient(700px 460px at 82% 34%, rgba(255,255,255,0.16), transparent 62%),
        rgba(255,255,255,0.24);
      background-blend-mode: screen;
      pointer-events:none;
    }
    .boardTint{
      position:absolute;
      inset:0;
      pointer-events:none;
      mix-blend-mode: multiply;
      background: rgba(239,231,225,.35);
    }
    .boardContent{
      position: relative;
      z-index: 2;
    }

    .controls{
      display:grid;
      grid-template-columns: 1.1fr .7fr .6fr .6fr;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--lineStrong);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      align-items: end;
    }

    @media (max-width: 980px){
      .controls{ grid-template-columns: 1fr 1fr; }
      .panel{ width: min(92vw, 340px); }
    }
    @media (max-width: 620px){
      .controls{ grid-template-columns: 1fr; }
      .actions{ width:100%; justify-content:flex-start; }
      .wrap{ padding: 18px 12px 28px; }
      .btn{ min-height: 42px; }
      :root{ --time-col-width: 90px; }
    }

    .field{ position: relative; display:grid; gap: 6px; }
    label{ font-size: 12px; color: var(--muted); padding-left: 6px; }
    .input, select{
      width:100%;
      min-height: 46px;
      padding: 12px 12px 12px 40px;
      border-radius: 14px;
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.80);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.94);
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color .12s ease, box-shadow .12s ease;
    }
    select{ padding-left: 12px; }
    .input:focus, select:focus{
      border-color: rgba(43,43,43,.30);
      box-shadow: 0 0 0 3px rgba(43,43,43,.10);
    }
    .icon{
      position:absolute;
      left: 12px;
      top: 38px;
      width: 16px;
      height: 16px;
      opacity: .65;
      pointer-events:none;
    }

    .ttPanel{
      margin-top: 16px;
      background: var(--panel);
      border: 1px solid var(--lineStrong);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow: hidden;
    }
    .panelHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 14px 14px 12px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }
    .meta{
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }
    .pill{
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.68);
      padding: 6px 10px;
      border-radius: 999px;
      display:inline-flex;
      align-items:center;
      gap: 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.94);
    }

    .gridWrap{ padding: 14px; overflow-x: auto; }
    .timetable{
      width: 100%;
      min-width: 780px;
      border-radius: var(--radius2);
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.66);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.88);
      overflow: hidden;
    }

    .ttHeader{
      display:grid;
      grid-template-columns: var(--time-col-width) repeat(7, minmax(0, 1fr));
      gap: 0;
      border-bottom: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.76);
    }
    .ttHeader div{
      padding: 10px 10px;
      font-size: 12px;
      color: var(--muted);
      border-right: 1px solid var(--line);
    }
    .ttHeader div:last-child{ border-right: none; }
    .ttHeader .corner{ color: rgba(43,43,43,.58); }
    .dayName{
      display:flex;
      align-items:center;
      justify-content:center;
      gap: 6px;
      font-weight: 700;
      color: rgba(43,43,43,.80);
      letter-spacing: -.01em;
    }

    .ttBody{
      position: relative;
      height: 720px;
      display:grid;
      grid-template-columns: var(--time-col-width) repeat(7, minmax(0, 1fr));
    }

    .timeCol{
      border-right: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.64);
      position: relative;
      isolation: isolate;
      z-index: 2;
      overflow: hidden;
    }
    .timeLabel{
      position: absolute;
      left: 8px;
      right: 8px;
      transform: translateY(-50%);
      font-size: 11px;
      color: rgba(43,43,43,.72);
      text-align: left;
      pointer-events:none;
      z-index: 3;
      display: flex;
      justify-content: flex-start;
    }
    .timeLabel span{
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.94);
      box-shadow: 0 1px 0 rgba(255,255,255,.95);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      white-space: nowrap;
    }

    .dayCol{
      position: relative;
      border-right: 1px solid var(--line);
      background: rgba(255,255,255,.56);
      overflow: hidden;
    }
    .dayCol:last-child{ border-right: none; }

    .hLine{
      position:absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--gridLine);
      opacity: .95;
      pointer-events:none;
      z-index: 1;
    }
    .hLine.major{ background: var(--lineStrong); }

    .event{
      position:absolute;
      left: 8px;
      right: 8px;
      border-radius: 14px;
      border: 1.5px solid var(--lineStrong);
      background: rgba(255,255,255,.74);
      box-shadow:
        0 10px 22px rgba(0,0,0,.06),
        inset 0 1px 0 rgba(255,255,255,.90);
      padding: 10px 10px;
      display:flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
      overflow: hidden;
      touch-action: manipulation;
      z-index: 2;
    }
    .event:hover{
      transform: translateY(-1px);
      box-shadow:
        0 14px 30px rgba(0,0,0,.09),
        inset 0 1px 0 rgba(255,255,255,.92);
      border-color: rgba(43,43,43,.34);
    }
    .event:focus-visible{
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }
    .eventTitle{
      font-weight: 750;
      font-size: 12.5px;
      letter-spacing: -.01em;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .eventMeta{
      font-size: 11.5px;
      color: rgba(43,43,43,.66);
      display:flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .tinyPill{
      font-size: 11px;
      color: rgba(43,43,43,.78);
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.64);
      padding: 3px 8px;
      border-radius: 999px;
    }
    .eventNotes{
      font-size: 11.5px;
      color: rgba(43,43,43,.70);
      line-height: 1.35;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .nowLine{
      position:absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(43,43,43,.30);
      opacity: .9;
      pointer-events:none;
      z-index: 4;
    }
    .nowDot{
      position:absolute;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(43,43,43,.76);
      transform: translate(-50%, -50%);
      opacity: .9;
      pointer-events:none;
      z-index: 5;
    }

    .empty{
      padding: 44px 18px 50px;
      display:grid;
      place-items:center;
      text-align:center;
      gap: 12px;
      color: var(--muted);
    }
    .empty .big{
      width: 56px;
      height: 56px;
      border-radius: 18px;
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.74);
      display:grid;
      place-items:center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.92), 0 12px 30px rgba(0,0,0,.06);
      font-size: 22px;
    }
    .empty h2{ margin:0; color: var(--text); font-size: 16px; letter-spacing: -.01em; }
    .empty p{ margin:0; max-width: 60ch; font-size: 13.5px; line-height: 1.5; }

    .modalBackdrop{
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(20,18,16,.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 80;
    }
    .modalBackdrop.show{ display: grid; }

    .modal{
      width: min(820px, 100%);
      background: rgba(255,255,255,.90);
      border: 1px solid var(--lineStrong);
      border-radius: 20px;
      box-shadow: var(--shadow2);
      overflow: hidden;
    }
    .modalHead{
      padding: 14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.74);
    }
    .modalHead h3{ margin:0; font-size: 15px; letter-spacing: -.01em; }
    .modalBody{
      padding: 14px 16px 16px;
      display:grid;
      gap: 12px;
    }
    .formGrid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 760px){ .formGrid{ grid-template-columns: 1fr; } }

    .input2, .textarea, .select2{
      width:100%;
      min-height: 46px;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.82);
      font-size: 14px;
      color: var(--text);
      outline:none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.92);
      transition: border-color .12s ease, box-shadow .12s ease;
    }
    .textarea{ min-height: 88px; resize: vertical; }
    .input2:focus, .textarea:focus, .select2:focus{
      border-color: rgba(43,43,43,.30);
      box-shadow: 0 0 0 3px rgba(43,43,43,.10);
    }

    .modalFoot{
      display:flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 16px 14px;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,.72);
      flex-wrap: wrap;
    }

    .colorRow{
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .colorInput{
      width: 44px;
      height: 38px;
      padding: 0;
      border-radius: 12px;
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.78);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.92);
      cursor: pointer;
    }

    .savingBadge{
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      z-index: 120;
      background: rgba(20,20,20,.84);
      color: rgba(255,255,255,.96);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }
    .savingBadge.show{
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="title">
        <h1>Timetable</h1>
      </div>

      <div class="actions">
        <button class="btn primary" id="addBtn" type="button"><span aria-hidden="true">＋</span> Add block</button>
        <button class="btn" id="exportBtn" type="button"><span aria-hidden="true">⤓</span> Export</button>
        <button class="btn danger" id="clearBtn" type="button"><span aria-hidden="true">✕</span> Clear</button>

        <div class="popover" id="themePopover">
          <button class="bgBtn" id="themeBtn" type="button" aria-label="Theme settings" title="Theme settings">
            <span class="themeDot" id="themeDot" aria-hidden="true"></span>
          </button>

          <div class="panel" id="themePanel" role="dialog" aria-label="Theme settings">
            <h3>Theme</h3>

            <div class="pRow">
              <label for="themeBg">Page background</label>
              <input class="pColor" id="themeBg" type="color" value="#ffffff" />
            </div>

            <div class="pRow">
              <label for="themeText">Text</label>
              <input class="pColor" id="themeText" type="color" value="#2b2b2b" />
            </div>

            <div class="pRow">
              <label for="themeMuted">Muted text</label>
              <input class="pColor" id="themeMuted" type="color" value="#6f6a63" />
            </div>

            <div class="pRow">
              <label for="themeBorders">Border/base color</label>
              <input class="pColor" id="themeBorders" type="color" value="#2b2b2b" />
            </div>

            <div class="pRow">
              <label for="themeBorderAlpha">Border strength</label>
              <input class="pRange" id="themeBorderAlpha" type="range" min="8" max="55" value="18" />
            </div>

            <div class="pRow">
              <label for="themeGridAlpha">Grid strength</label>
              <input class="pRange" id="themeGridAlpha" type="range" min="6" max="40" value="14" />
            </div>

            <div class="pRow">
              <label for="themePanelAlpha">Panel transparency</label>
              <input class="pRange" id="themePanelAlpha" type="range" min="40" max="95" value="68" />
            </div>

            <div class="pDiv"></div>

            <button class="miniBtn" id="themeApply" type="button">Apply theme</button>
            <button class="miniBtn" id="resetTheme" type="button" style="margin-top:8px;">Reset theme</button>

            <div class="pDiv"></div>

            <h3 style="margin:0 0 10px 0; font-size:12px; letter-spacing:.08em; text-transform:uppercase; opacity:.85;">Presets</h3>

            <input class="presetName" id="presetName" placeholder="Preset name">

            <button class="miniBtn" id="presetSave" type="button" style="margin-top:8px;">Save current as preset</button>

            <div class="pDiv"></div>

            <select class="presetSelect" id="presetSelect"></select>

            <button class="miniBtn" id="presetApply" type="button" style="margin-top:8px;">Apply preset</button>
            <button class="miniBtn" id="presetDelete" type="button" style="margin-top:8px;">Delete preset</button>

            <div class="status" id="presetStatus" aria-live="polite"></div>
          </div>
        </div>

        <div class="popover" id="bgPopover">
          <button class="bgBtn" id="bgBtn" type="button" aria-label="Background settings" title="Background settings">
            <span class="bgDot" id="bgDot" aria-hidden="true"></span>
          </button>

          <div class="panel" id="bgPanel" role="dialog" aria-label="Background settings">
            <h3>Background</h3>

            <div class="pRow">
              <label for="bgColor">Tint</label>
              <input class="pColor" id="bgColor" type="color" value="#efe7e1" />
            </div>

            <div class="pRow">
              <label for="bgStrength">Tint strength</label>

            <input class="colorInput" id="bColor" type="color" value="#ffffff" aria-label="Choose block colour"/>

          <label for="bNotes">Notes (optional)</label>
          <textarea class="textarea" id="bNotes" placeholder="Materials to bring, etc."></textarea>

  <div class="savingBadge" id="savingBadge">Saved</div>

  <script>
    (function(){
      "use strict";

      const DAY_NAMES = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

      const escapeHtml = (s) =>
        String(s ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");

      const clamp = (n,a,b) => Math.max(a, Math.min(b, n));
      const nowISO = () => new Date().toISOString();

      function uid(){
        try{
          if (crypto && crypto.randomUUID) return crypto.randomUUID();
        }catch{}
        return Math.random().toString(16).slice(2) + Date.now().toString(16);
      }

      function stableWidgetId(){
        try{
          const sp = new URLSearchParams(location.search);
          const wid = (sp.get("wid") || "").trim();
          if (wid) return "wid:" + wid;
        }catch{}
        const base = (location.origin || "") + (location.pathname || "timetable");
        return "path:" + base.replace(/[^\w:/.-]+/g, "_");
      }

      const WID = stableWidgetId();
      const STORAGE_KEY = "timetable_widget_state_v5__" + WID;
      const PRESETS_KEY = "timetable_widget_presets_v5";
      const PRESET_NAMESPACE = "timetable";
      const DB_NAME = "timetable_widget_db_v5";
      const STORE_NAME = "kv";

      const els = {
        panelBody: document.getElementById("panelBody"),
        countPill: document.getElementById("countPill"),
        tagPill: document.getElementById("tagPill"),
        filteredMeta: document.getElementById("filteredMeta"),

        search: document.getElementById("search"),
        tagFilter: document.getElementById("tagFilter"),
        startHour: document.getElementById("startHour"),
        endHour: document.getElementById("endHour"),

        addBtn: document.getElementById("addBtn"),
        exportBtn: document.getElementById("exportBtn"),
        clearBtn: document.getElementById("clearBtn"),

        modalBackdrop: document.getElementById("modalBackdrop"),
        closeModalBtn: document.getElementById("closeModalBtn"),
        cancelBtn: document.getElementById("cancelBtn"),

        blockForm: document.getElementById("blockForm"),
        editId: document.getElementById("editId"),
        modalTitle: document.getElementById("modalTitle"),
        saveBtn: document.getElementById("saveBtn"),

        bTitle: document.getElementById("bTitle"),
        bDay: document.getElementById("bDay"),
        bStart: document.getElementById("bStart"),
        bEnd: document.getElementById("bEnd"),
        bLocation: document.getElementById("bLocation"),
        bTags: document.getElementById("bTags"),
        bNotes: document.getElementById("bNotes"),
        bColor: document.getElementById("bColor"),

        boardTint: document.getElementById("boardTint"),

        bgBtn: document.getElementById("bgBtn"),
        bgPanel: document.getElementById("bgPanel"),
        bgColor: document.getElementById("bgColor"),
        bgStrength: document.getElementById("bgStrength"),
        bgBlur: document.getElementById("bgBlur"),
        bgImage: document.getElementById("bgImage"),
        removeImage: document.getElementById("removeImage"),
        bgDot: document.getElementById("bgDot"),
        bgPopover: document.getElementById("bgPopover"),
        bgApply: document.getElementById("bgApply"),
        bgReset: document.getElementById("bgReset"),

        themeBtn: document.getElementById("themeBtn"),
        themePanel: document.getElementById("themePanel"),
        themePopover: document.getElementById("themePopover"),
        themeDot: document.getElementById("themeDot"),
        themeBg: document.getElementById("themeBg"),
        themeText: document.getElementById("themeText"),
        themeMuted: document.getElementById("themeMuted"),
        themeBorders: document.getElementById("themeBorders"),
        themeBorderAlpha: document.getElementById("themeBorderAlpha"),
        themeGridAlpha: document.getElementById("themeGridAlpha"),
        themePanelAlpha: document.getElementById("themePanelAlpha"),
        themeApply: document.getElementById("themeApply"),
        resetTheme: document.getElementById("resetTheme"),

        presetName: document.getElementById("presetName"),
        presetSave: document.getElementById("presetSave"),
        presetSelect: document.getElementById("presetSelect"),
        presetApply: document.getElementById("presetApply"),
        presetDelete: document.getElementById("presetDelete"),
        presetStatus: document.getElementById("presetStatus"),

        savingBadge: document.getElementById("savingBadge")
      };

      const DEFAULT_THEME = {
        bg: "#ffffff",
        text: "#2b2b2b",
        muted: "#6f6a63",
        border: "#2b2b2b",
        borderA: 18,
        gridA: 14,
        panelAlpha: 68
      };

      const DEFAULT_BG = {
        tint: "#efe7e1",
        strength: 35,
        blur: 0,
        imageDataUrl: null
      };

      const DEFAULT_VIEW = {
        q: "",
        tag: "",
        startHour: 8,
        endHour: 20
      };

      const DEFAULT_STATE = {
        version: 5,
        updatedAt: nowISO(),
        blocks: [],
        theme: { ...DEFAULT_THEME },
        background: { ...DEFAULT_BG },
        view: { ...DEFAULT_VIEW }
      };

      let appState = structuredCloneSafe(DEFAULT_STATE);
      let themeDraft = { ...DEFAULT_THEME };
      let bgDraft = { ...DEFAULT_BG };
      let lastFocusEl = null;
      let renderResizeTimer = null;
      let saveToastTimer = null;
      let isBooting = true;
      let saveQueue = Promise.resolve();

      const Storage = {
        dbPromise: null,

        openDb(){
          if (!("indexedDB" in window)) return Promise.resolve(null);
          if (this.dbPromise) return this.dbPromise;
          this.dbPromise = new Promise((resolve) => {
            try{
              const req = indexedDB.open(DB_NAME, 1);
              req.onupgradeneeded = () => {
                const db = req.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                  db.createObjectStore(STORE_NAME);
                }
              };
              req.onsuccess = () => resolve(req.result);
              req.onerror = () => resolve(null);
            }catch{
              resolve(null);
            }
          });
          return this.dbPromise;
        },

        async idbGet(key){
          const db = await this.openDb();
          if (!db) return null;
          return new Promise((resolve) => {
            try{
              const tx = db.transaction(STORE_NAME, "readonly");
              const store = tx.objectStore(STORE_NAME);
              const req = store.get(key);
              req.onsuccess = () => resolve(req.result ?? null);
              req.onerror = () => resolve(null);
            }catch{
              resolve(null);
            }
          });
        },

        async idbSet(key, value){
          const db = await this.openDb();
          if (!db) return false;
          return new Promise((resolve) => {
            try{
              const tx = db.transaction(STORE_NAME, "readwrite");
              tx.objectStore(STORE_NAME).put(value, key);
              tx.oncomplete = () => resolve(true);
              tx.onerror = () => resolve(false);
            }catch{
              resolve(false);
            }
          });
        },

        async idbRemove(key){
          const db = await this.openDb();
          if (!db) return false;
          return new Promise((resolve) => {
            try{
              const tx = db.transaction(STORE_NAME, "readwrite");
              tx.objectStore(STORE_NAME).delete(key);
              tx.oncomplete = () => resolve(true);
              tx.onerror = () => resolve(false);
            }catch{
              resolve(false);
            }
          });
        },

        lsGet(key){
          try{ return localStorage.getItem(key); }catch{ return null; }
        },

        lsSet(key, value){
          try{
            localStorage.setItem(key, value);
            return true;
          }catch{
            return false;
          }
        },

        lsRemove(key){
          try{
            localStorage.removeItem(key);
            return true;
          }catch{
            return false;
          }
        },

        parseJSON(raw){
          if (!raw || typeof raw !== "string") return null;
          try{ return JSON.parse(raw); }catch{ return null; }
        },

        pickNewest(a, b){
          if (!a && !b) return null;
          if (a && !b) return a;
          if (!a && b) return b;

          const aTime = Date.parse(a?.updatedAt || "") || 0;
          const bTime = Date.parse(b?.updatedAt || "") || 0;
          return bTime > aTime ? b : a;
        },

        async getJSON(key){
          const fromLs = this.parseJSON(this.lsGet(key));
          const fromDbRaw = await this.idbGet(key);
          const fromDb = this.parseJSON(typeof fromDbRaw === "string" ? fromDbRaw : null);

          const chosen = this.pickNewest(fromLs, fromDb);
          if (chosen){
            const raw = JSON.stringify(chosen);
            this.lsSet(key, raw);
            return chosen;
          }
          return null;
        },

        async setJSON(key, value){
          const raw = JSON.stringify(value);
          this.lsSet(key, raw);
          await this.idbSet(key, raw);
          return true;
        },

        async remove(key){
          this.lsRemove(key);
          await this.idbRemove(key);
        }
      };

      function structuredCloneSafe(v){
        try{
          return structuredClone(v);
        }catch{
          return JSON.parse(JSON.stringify(v));
        }
      }

      function normalizeHex(hex, fallback="#ffffff"){
        const s = String(hex || "").trim();
        return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : fallback;
      }

      function hexToRgb(hex){
        const h = normalizeHex(hex).slice(1);
        return {
          r: parseInt(h.slice(0,2), 16),
          g: parseInt(h.slice(2,4), 16),
          b: parseInt(h.slice(4,6), 16)
        };
      }

      function hexToRgba(hex, a){
        const { r, g, b } = hexToRgb(hex);
        return `rgba(${r},${g},${b},${a})`;
      }

      function alphaFromPct(pct){
        return clamp(Number(pct) / 100, 0.01, 0.98);
      }

      function setStatus(msg=""){
        els.presetStatus.textContent = msg;
      }

      function showSavedToast(msg="Saved"){
        els.savingBadge.textContent = msg;
        els.savingBadge.classList.add("show");
        clearTimeout(saveToastTimer);
        saveToastTimer = setTimeout(() => {
          els.savingBadge.classList.remove("show");
        }, 1200);
      }

      function sanitizeTheme(theme){
        return {
          bg: normalizeHex(theme?.bg, DEFAULT_THEME.bg),
          text: normalizeHex(theme?.text, DEFAULT_THEME.text),
          muted: normalizeHex(theme?.muted, DEFAULT_THEME.muted),
          border: normalizeHex(theme?.border, DEFAULT_THEME.border),
          borderA: clamp(Number(theme?.borderA ?? DEFAULT_THEME.borderA), 8, 55),
          gridA: clamp(Number(theme?.gridA ?? DEFAULT_THEME.gridA), 6, 40),
          panelAlpha: clamp(Number(theme?.panelAlpha ?? DEFAULT_THEME.panelAlpha), 40, 95)
        };
      }

      function sanitizeBackground(bg){
        return {
          tint: normalizeHex(bg?.tint, DEFAULT_BG.tint),
          strength: clamp(Number(bg?.strength ?? DEFAULT_BG.strength), 0, 70),
          blur: clamp(Number(bg?.blur ?? DEFAULT_BG.blur), 0, 30),
          imageDataUrl: typeof bg?.imageDataUrl === "string" && bg.imageDataUrl ? bg.imageDataUrl : null
        };
      }

      function sanitizeView(view){
        let startHour = clamp(Number(view?.startHour ?? DEFAULT_VIEW.startHour), 0, 23);
        let endHour = clamp(Number(view?.endHour ?? DEFAULT_VIEW.endHour), 1, 24);
        if (endHour <= startHour) endHour = Math.min(24, startHour + 8);
        return {
          q: String(view?.q ?? DEFAULT_VIEW.q),
          tag: String(view?.tag ?? DEFAULT_VIEW.tag),
          startHour,
          endHour
        };
      }

      function normalizeTags(raw){
        if (!raw) return [];
        const src = Array.isArray(raw) ? raw.join(",") : String(raw);
        const parts = src.split(",").map(s => s.trim().toLowerCase()).filter(Boolean);
        return [...new Set(parts)].slice(0, 14);
      }

      function sanitizeBlock(it){
        const day = clamp(Number(it?.day ?? 0), 0, 6);
        return {
          id: String(it?.id || uid()),
          title: String(it?.title || "").trim().slice(0, 90),
          day,
          dayName: DAY_NAMES[day],
          start: /^\d{2}:\d{2}$/.test(String(it?.start || "")) ? String(it.start) : "09:00",
          end: /^\d{2}:\d{2}$/.test(String(it?.end || "")) ? String(it.end) : "10:00",
          location: String(it?.location || "").trim().slice(0, 70),
          tags: normalizeTags(it?.tags),
          notes: String(it?.notes || "").trim(),
          color: normalizeHex(it?.color || "#ffffff", "#ffffff"),
          createdAt: it?.createdAt || nowISO(),
          updatedAt: it?.updatedAt || nowISO()
        };
      }

      function sanitizeState(raw){
        const clean = {
          version: 5,
          updatedAt: raw?.updatedAt || nowISO(),
          blocks: Array.isArray(raw?.blocks) ? raw.blocks.map(sanitizeBlock) : [],
          theme: sanitizeTheme(raw?.theme || DEFAULT_THEME),
          background: sanitizeBackground(raw?.background || DEFAULT_BG),
          view: sanitizeView(raw?.view || DEFAULT_VIEW)
        };
        clean.blocks.sort((a,b) => (a.day - b.day) || a.start.localeCompare(b.start) || a.title.localeCompare(b.title));
        return clean;
      }

      async function persistState(message){
        appState.updatedAt = nowISO();
        const snapshot = structuredCloneSafe(appState);
        saveQueue = saveQueue.then(() => Storage.setJSON(STORAGE_KEY, snapshot)).catch(() => {});
        await saveQueue;
        if (!isBooting) showSavedToast(message || "Saved");
      }

      async function loadState(){
        const saved =
          await Storage.getJSON(STORAGE_KEY) ||
          await Storage.getJSON("timetable_widget_state_v4__" + WID);

        appState = sanitizeState(saved || DEFAULT_STATE);
        themeDraft = { ...appState.theme };
        bgDraft = { ...appState.background };
      }

      async function loadPresets(){
        const raw =
          await Storage.getJSON(PRESETS_KEY) ||
          await Storage.getJSON("timetable_widget_presets_v4");

        const list = Array.isArray(raw) ? raw : [];
        return list
          .filter(Boolean)
          .map((p) => ({
            id: String(p.id || uid()),
            name: String(p.name || "Untitled"),
            ns: String(p.ns || PRESET_NAMESPACE),
            updatedAt: p.updatedAt || nowISO(),
            theme: sanitizeTheme(p.theme || {}),
            bg: sanitizeBackground(p.bg || {})
          }));
      }

      async function savePresets(list){
        const clean = Array.isArray(list) ? list.map((p) => ({
          id: String(p.id || uid()),
          name: String(p.name || "Untitled"),
          ns: String(p.ns || PRESET_NAMESPACE),
          updatedAt: p.updatedAt || nowISO(),
          theme: sanitizeTheme(p.theme || {}),
          bg: sanitizeBackground(p.bg || {})
        })) : [];
        await Storage.setJSON(PRESETS_KEY, clean);
      }

      async function refreshPresetSelect(){
        const list = (await loadPresets()).filter(p => p.ns === PRESET_NAMESPACE);
        const current = els.presetSelect.value;
        els.presetSelect.innerHTML = `<option value="">—</option>`;
        for (const p of list){
          const opt = document.createElement("option");
          opt.value = p.id;
          opt.textContent = p.name || "Untitled";
          els.presetSelect.appendChild(opt);
        }
        if ([...els.presetSelect.options].some(o => o.value === current)) {
          els.presetSelect.value = current;
        }
      }

      async function getPresetById(id){
        const all = await loadPresets();
        return all.find(p => p.ns === PRESET_NAMESPACE && p.id === id) || null;
      }

      function readThemeUi(){
        return sanitizeTheme({
          bg: els.themeBg.value,
          text: els.themeText.value,
          muted: els.themeMuted.value,
          border: els.themeBorders.value,
          borderA: Number(els.themeBorderAlpha.value),
          gridA: Number(els.themeGridAlpha.value),
          panelAlpha: Number(els.themePanelAlpha.value)
        });
      }

      function syncThemeInputs(theme){
        els.themeBg.value = theme.bg;
        els.themeText.value = theme.text;
        els.themeMuted.value = theme.muted;
        els.themeBorders.value = theme.border;
        els.themeBorderAlpha.value = String(theme.borderA);
        els.themeGridAlpha.value = String(theme.gridA);
        els.themePanelAlpha.value = String(theme.panelAlpha);
      }

      function applyTheme(theme){
        const t = sanitizeTheme(theme);
        document.documentElement.style.setProperty("--bg", t.bg);
        document.documentElement.style.setProperty("--text", t.text);
        document.documentElement.style.setProperty("--muted", t.muted);

        const lineA = alphaFromPct(t.borderA);
        const strongA = clamp(lineA + 0.12, 0.14, 0.7);
        const gridA = alphaFromPct(t.gridA);

        document.documentElement.style.setProperty("--line", hexToRgba(t.border, lineA));
        document.documentElement.style.setProperty("--lineStrong", hexToRgba(t.border, strongA));
        document.documentElement.style.setProperty("--gridLine", hexToRgba(t.border, gridA));
        document.documentElement.style.setProperty("--focus", hexToRgba(t.border, 0.22));

        const pA = clamp(t.panelAlpha / 100, 0.4, 0.95);
        document.documentElement.style.setProperty("--panel", `rgba(255,255,255,${pA})`);
        document.documentElement.style.setProperty("--panel2", `rgba(255,255,255,${clamp(pA + 0.16, 0.5, 0.98)})`);

        els.themeDot.style.background = t.text;
        els.themeDot.style.boxShadow = `0 0 0 6px ${hexToRgba(t.text, 0.10)}`;

        syncThemeInputs(t);
        render();
      }

      function syncBgInputs(bg){
        els.bgColor.value = bg.tint;
        els.bgStrength.value = String(bg.strength);
        els.bgBlur.value = String(bg.blur);
      }

      function setBoardImage(dataUrlOrNull){
        document.documentElement.style.setProperty("--board-image", dataUrlOrNull ? `url("${dataUrlOrNull}")` : "none");
      }

      function applyBackground(bg){
        const b = sanitizeBackground(bg);
        const strength = clamp(b.strength / 100, 0, 0.7);

        document.documentElement.style.setProperty("--board-tint", b.tint);
        document.documentElement.style.setProperty("--board-tint-a", String(strength));
        document.documentElement.style.setProperty("--board-blur", `${b.blur}px`);

        els.boardTint.style.background = hexToRgba(b.tint, strength);

        els.bgDot.style.background = b.tint;
        els.bgDot.style.boxShadow = `0 0 0 6px ${hexToRgba(b.tint, Math.min(0.36, strength + 0.12))}`;

        setBoardImage(b.imageDataUrl || null);
        syncBgInputs(b);
      }

      function fillHourSelect(selectEl, selected){
        selectEl.innerHTML = "";
        for (let h = 0; h <= 24; h++){
          const opt = document.createElement("option");
          opt.value = String(h);
          opt.textContent = (h === 24) ? "12 AM (next day)" : hourLabel(h);
          if (h === selected) opt.selected = true;
          selectEl.appendChild(opt);
        }
      }

      function hourLabel(h){
        const ampm = h < 12 ? "AM" : "PM";
        const hr = h % 12 === 0 ? 12 : h % 12;
        return `${hr} ${ampm}`;
      }

      function timeToMinutes(hhmm){
        const [h,m] = String(hhmm || "").split(":").map(Number);
        if (!Number.isFinite(h) || !Number.isFinite(m)) return null;
        return h*60 + m;
      }

      function minutesToLabel(mins){
        const h = Math.floor(mins / 60);
        const m = mins % 60;
        const ampm = h < 12 ? "AM" : "PM";
        const hr = h % 12 === 0 ? 12 : h % 12;
        return `${hr}:${String(m).padStart(2,"0")} ${ampm}`;
      }

      function withinRange(startMin, endMin){
        const a = appState.view.startHour * 60;
        const b = appState.view.endHour * 60;
        return endMin > a && startMin < b;
      }

      function mixWithWhite(hex, alphaToWhite = 0.66){
        const { r, g, b } = hexToRgb(hex);
        const rr = Math.round(r * (1 - alphaToWhite) + 255 * alphaToWhite);
        const gg = Math.round(g * (1 - alphaToWhite) + 255 * alphaToWhite);
        const bb = Math.round(b * (1 - alphaToWhite) + 255 * alphaToWhite);
        return `rgb(${rr} ${gg} ${bb})`;
      }

      function contrastInk(hex){
        const { r, g, b } = hexToRgb(hex);
        const lum = (0.2126*r + 0.7152*g + 0.0722*b) / 255;
        return lum < 0.55 ? "rgba(255,255,255,.94)" : "rgba(43,43,43,.92)";
      }

      function buildTagOptions(allItems){
        const tagSet = new Set();
        allItems.forEach(it => (it.tags || []).forEach(t => tagSet.add(t)));
        const tags = [...tagSet].sort((a,b) => a.localeCompare(b));
        const selected = appState.view.tag;

        els.tagFilter.innerHTML =
          `<option value="">All tags</option>` +
          tags.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join("");

        if ([...els.tagFilter.options].some(o => o.value === selected)) {
          els.tagFilter.value = selected;
        } else {
          appState.view.tag = "";
          els.tagFilter.value = "";
        }
        els.tagPill.textContent = `${tags.length} tag${tags.length === 1 ? "" : "s"}`;
      }

      function matches(it, q){
        if (!q) return true;
        const hay = [
          it.title, it.location, it.notes,
          it.dayName, it.start, it.end,
          ...(it.tags || [])
        ].join(" ").toLowerCase();
        return hay.includes(q.toLowerCase());
      }

      function applyFilters(){
        const q = appState.view.q.trim();
        const tag = appState.view.tag;
        let out = appState.blocks.filter(it => matches(it, q));
        if (tag) out = out.filter(it => (it.tags || []).includes(tag));
        out.sort((a,b) => (a.day - b.day) || (a.start.localeCompare(b.start)));
        return out;
      }

      function renderEmpty(){
        els.panelBody.innerHTML = `
          <div class="empty">
            <div class="big" aria-hidden="true">▦</div>
            <h2>No blocks yet</h2>
            <button class="btn primary" type="button" id="emptyAddBtn">＋ Add your first block</button>
          </div>
        `;
        document.getElementById("emptyAddBtn").addEventListener("click", openAddModal);
      }

      function renderTimetable(filtered){
        const startMin = appState.view.startHour * 60;
        const endMin = appState.view.endHour * 60;
        const totalMin = Math.max(60, endMin - startMin);

        const pxPerMin = 1.2;
        const bodyHeight = Math.max(420, Math.round(totalMin * pxPerMin));

        const headerHtml = `
          <div class="ttHeader">
            <div class="corner">time</div>
            ${DAY_NAMES.map(d => `<div class="dayName">${d}</div>`).join("")}
          </div>
        `;

        const bodyHtml = `
          <div class="ttBody" id="ttBody" style="height:${bodyHeight}px">
            <div class="timeCol" id="timeCol"></div>
            ${DAY_NAMES.map((_,i)=>`<div class="dayCol" data-day="${i}" id="day_${i}"></div>`).join("")}
          </div>
        `;

        els.panelBody.innerHTML = `
          <div class="gridWrap">
            <div class="timetable">
              ${headerHtml}
              ${bodyHtml}
            </div>
          </div>
        `;

        const timeCol = document.getElementById("timeCol");

        for (let t=startMin; t<=endMin; t+=30){
          const y = ((t - startMin) / totalMin) * bodyHeight;

          const line = document.createElement("div");
          line.className = "hLine" + ((t % 60 === 0) ? " major" : "");
          line.style.top = `${y}px`;
          timeCol.appendChild(line);

          if (t % 60 === 0){
            const lbl = document.createElement("div");
            lbl.className = "timeLabel";
            lbl.style.top = `${y}px`;
            lbl.innerHTML = `<span>${escapeHtml(minutesToLabel(t))}</span>`;
            timeCol.appendChild(lbl);
          }
        }

        for (let i=0; i<7; i++){
          const col = document.getElementById(`day_${i}`);
          for (let t=startMin; t<=endMin; t+=30){
            const y = ((t - startMin) / totalMin) * bodyHeight;
            const line = document.createElement("div");
            line.className = "hLine" + ((t % 60 === 0) ? " major" : "");
            line.style.top = `${y}px`;
            col.appendChild(line);
          }
        }

        filtered.forEach((it) => {
          const s = timeToMinutes(it.start);
          const e = timeToMinutes(it.end);
          if (s == null || e == null) return;
          if (!withinRange(s,e)) return;

          const col = document.getElementById(`day_${it.day}`);
          if (!col) return;

          const top = ((clamp(s, startMin, endMin) - startMin) / totalMin) * bodyHeight;
          const bottom = ((clamp(e, startMin, endMin) - startMin) / totalMin) * bodyHeight;
          const height = Math.max(34, bottom - top);

          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "event";
          btn.style.top = `${top + 6}px`;
          btn.style.height = `${height - 12}px`;
          btn.setAttribute("aria-label", `${it.title} ${it.start} to ${it.end}`);

          const base = normalizeHex(it.color || "#ffffff");
          btn.style.background = mixWithWhite(base, 0.64);
          btn.style.color = contrastInk(base);

          btn.innerHTML = `
            <div class="eventTitle">${escapeHtml(it.title)}</div>
            <div class="eventMeta">
              <span class="tinyPill">${escapeHtml(it.start)}–${escapeHtml(it.end)}</span>
              ${it.location ? `<span class="tinyPill">${escapeHtml(it.location)}</span>` : ""}
              ${(it.tags || []).slice(0,2).map(t => `<span class="tinyPill">${escapeHtml(t)}</span>`).join("")}
            </div>
            ${it.notes ? `<div class="eventNotes">${escapeHtml(it.notes)}</div>` : ""}
          `;

          btn.addEventListener("click", () => openEditModal(it.id));
          col.appendChild(btn);
        });

        const now = new Date();
        const jsDay = now.getDay();
        const dayIndex = (jsDay + 6) % 7;
        const nowMin = now.getHours()*60 + now.getMinutes();

        if (nowMin >= startMin && nowMin <= endMin){
          const y = ((nowMin - startMin) / totalMin) * bodyHeight;
          const body = document.getElementById("ttBody");

          const line = document.createElement("div");
          line.className = "nowLine";
          line.style.top = `${y}px`;

          const dot = document.createElement("div");
          dot.className = "nowDot";
          dot.style.top = `${y}px`;

          body.appendChild(line);

          const timeColWidth = timeCol.getBoundingClientRect().width || 96;
          const dayWidth = (body.clientWidth - timeColWidth) / 7;
          dot.style.left = `${timeColWidth + (dayIndex * dayWidth)}px`;

          body.appendChild(dot);
        }
      }

      function render(){
        els.search.value = appState.view.q;
        fillHourSelect(els.startHour, appState.view.startHour);
        fillHourSelect(els.endHour, appState.view.endHour);

        buildTagOptions(appState.blocks);
        const filtered = applyFilters();

        els.countPill.textContent = `${appState.blocks.length} block${appState.blocks.length === 1 ? "" : "s"}`;

        const parts = [];
        if (appState.view.q) parts.push(`Search: “${appState.view.q}”`);
        if (appState.view.tag) parts.push(`Tag: ${appState.view.tag}`);
        parts.push(`${appState.view.startHour}:00–${appState.view.endHour}:00`);
        els.filteredMeta.textContent = `${filtered.length} shown · ${parts.join(" · ")}`;

        if (appState.blocks.length === 0){
          renderEmpty();
          return;
        }
        renderTimetable(filtered);
      }

        els.modalTitle.textContent = "Add block";

        els.bTitle.value = "";
        els.bDay.value = "0";
        els.bStart.value = "09:00";
        els.bEnd.value = "10:00";
        els.bLocation.value = "";
        els.bTags.value = "";
        els.bNotes.value = "";
        els.bColor.value = "#ffffff";
      }

      function openModal(){
        lastFocusEl = document.activeElement;
        els.modalBackdrop.classList.add("show");
        setTimeout(() => els.bTitle.focus(), 0);
        document.addEventListener("keydown", onModalKeydown);
      }

      function closeModal(){
        els.modalBackdrop.classList.remove("show");
        document.removeEventListener("keydown", onModalKeydown);
        if (lastFocusEl && typeof lastFocusEl.focus === "function") lastFocusEl.focus();
        resetForm();
      }

      function onModalKeydown(e){
        if (e.key === "Escape") closeModal();
        if (e.key === "Tab"){
          const focusables = els.modalBackdrop.querySelectorAll(
            'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
          );
          const list = [...focusables].filter(x => !x.disabled && x.offsetParent !== null);
          if (!list.length) return;
          const first = list[0];
          const last = list[list.length - 1];
          if (e.shiftKey && document.activeElement === first){
            e.preventDefault();
            last.focus();
          } else if (!e.shiftKey && document.activeElement === last){
            e.preventDefault();
            first.focus();
          }
        }
      }

      function openAddModal(){
        resetForm();
        openModal();
      }

      function openEditModal(id){
        const it = appState.blocks.find(x => x.id === id);
        if (!it) return;

        els.editId.value = it.id;
        els.modalTitle.textContent = "Edit block";
        els.saveBtn.textContent = "Update";

        els.bTitle.value = it.title || "";
        els.bDay.value = String(it.day ?? 0);
        els.bStart.value = it.start || "09:00";
        els.bEnd.value = it.end || "10:00";
        els.bLocation.value = it.location || "";
        els.bTags.value = (it.tags || []).join(", ");
        els.bNotes.value = it.notes || "";
        els.bColor.value = normalizeHex(it.color || "#ffffff");

        openModal();
      }

      function closeAllPopovers(except){
        [els.bgPanel, els.themePanel].forEach(p => {
          if (p && p !== except) p.classList.remove("open");
        });
      }

      async function askConfirm(message, { okText="Confirm", cancelText="Cancel", danger=false } = {}){
        return new Promise((resolve) => {
          const wrap = document.createElement("div");
          wrap.style.position = "fixed";
          wrap.style.inset = "0";
          wrap.style.zIndex = "9999";
          wrap.style.display = "grid";
          wrap.style.placeItems = "center";
          wrap.style.padding = "18px";
          wrap.style.background = "rgba(20,18,16,.35)";
          wrap.style.backdropFilter = "blur(8px)";
          wrap.style.webkitBackdropFilter = "blur(8px)";

          wrap.innerHTML = `
            <div style="width:min(520px,100%);background:rgba(255,255,255,.94);border:1px solid rgba(43,43,43,.18);border-radius:20px;box-shadow:0 12px 40px rgba(0,0,0,.12);overflow:hidden;">
              <div style="padding:14px 16px;border-bottom:1px solid rgba(43,43,43,.12);font-weight:650;">Confirm</div>
              <div style="padding:14px 16px;line-height:1.45;color:rgba(43,43,43,.92);">${escapeHtml(message)}</div>
              <div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;padding:12px 16px;border-top:1px solid rgba(43,43,43,.12);">
                <button class="btn" type="button" id="cnlBtn">${escapeHtml(cancelText)}</button>
                <button class="btn ${danger ? "danger" : "primary"}" type="button" id="okBtn">${escapeHtml(okText)}</button>
              </div>
            </div>
          `;

          const cleanup = (val) => {
            document.removeEventListener("keydown", onKey);
            wrap.remove();
            resolve(val);
          };

          const onKey = (e) => { if (e.key === "Escape") cleanup(false); };

          wrap.addEventListener("click", (e) => {
            if (e.target === wrap) cleanup(false);
          });

          document.body.appendChild(wrap);
          document.addEventListener("keydown", onKey);

          wrap.querySelector("#cnlBtn").addEventListener("click", () => cleanup(false));
          const okBtn = wrap.querySelector("#okBtn");
          okBtn.addEventListener("click", () => cleanup(true));
          setTimeout(() => okBtn.focus(), 0);
        });
      }

      async function clearAll(){
        if (!appState.blocks.length) return;
        const ok = await askConfirm("Clear all blocks? This cannot be undone.", {
          okText: "Yes, clear",
          danger: true
        });
        if (!ok) return;
        appState.blocks = [];
        await persistState("Cleared");
        render();
      }

      function exportJson(){
        const data = JSON.stringify(appState.blocks, null, 2);
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "weekly-timetable.json";
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      async function processImageFile(file){
        if (!file) return null;

        const dataUrl = await readFileAsDataUrl(file);
        const img = await loadImage(dataUrl);

        const maxDim = 1800;
        const ratio = Math.min(1, maxDim / Math.max(img.width, img.height));
        const width = Math.max(1, Math.round(img.width * ratio));
        const height = Math.max(1, Math.round(img.height * ratio));

        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        if (!ctx) throw new Error("Canvas unavailable");
        ctx.drawImage(img, 0, 0, width, height);

        let out;
        try{
          out = canvas.toDataURL("image/webp", 0.88);
        }catch{
          out = canvas.toDataURL("image/jpeg", 0.88);
        }
        return out;
      }

      function readFileAsDataUrl(file){
        return new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = () => resolve(r.result);
          r.onerror = reject;
          r.readAsDataURL(file);
        });
      }

      function loadImage(src){
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = src;
        });
      }

      async function upsertBlock(payload){
        const clean = sanitizeBlock(payload);
        const idx = appState.blocks.findIndex(x => x.id === clean.id);
        if (idx >= 0) appState.blocks[idx] = clean;
        else appState.blocks.unshift(clean);
        appState.blocks.sort((a,b) => (a.day - b.day) || a.start.localeCompare(b.start) || a.title.localeCompare(b.title));
        await persistState("Saved");
        render();
      }

      function onThemeInputPreview(){
        themeDraft = readThemeUi();
        applyTheme(themeDraft);
        setStatus("");
      }

      function onBackgroundPreview(){
        bgDraft = sanitizeBackground({
          tint: els.bgColor.value,
          strength: Number(els.bgStrength.value),
          blur: Number(els.bgBlur.value),
          imageDataUrl: bgDraft.imageDataUrl
        });
        applyBackground(bgDraft);
        setStatus("");
      }

      async function handleStorageRefresh(){
        const saved = await Storage.getJSON(STORAGE_KEY);
        if (!saved) return;
        const next = sanitizeState(saved);
        if (String(next.updatedAt || "") === String(appState.updatedAt || "")) return;
        appState = next;
        themeDraft = { ...appState.theme };
        bgDraft = { ...appState.background };
        applyTheme(appState.theme);
        applyBackground(appState.background);
        render();
      }

      function attachEvents(){
        els.addBtn.addEventListener("click", openAddModal);
        els.exportBtn.addEventListener("click", exportJson);
        els.clearBtn.addEventListener("click", clearAll);

        els.closeModalBtn.addEventListener("click", closeModal);
        els.cancelBtn.addEventListener("click", closeModal);
        els.modalBackdrop.addEventListener("click", (e) => {
          if (e.target === els.modalBackdrop) closeModal();
        });

        els.blockForm.addEventListener("submit", async (e) => {
          e.preventDefault();

          const title = els.bTitle.value.trim();
          const day = Number(els.bDay.value);
          const start = els.bStart.value;
          const end = els.bEnd.value;

          const s = timeToMinutes(start);
          const ee = timeToMinutes(end);

          if (!title || !Number.isFinite(day) || !start || !end) return;
          if (s == null || ee == null || ee <= s){
            await askConfirm("End time must be after start time.", { okText: "OK", cancelText: "Close" });
            return;
          }

          const id = els.editId.value || uid();
          const existing = appState.blocks.find(x => x.id === id);

          await upsertBlock({
            id,
            title,
            day,
            dayName: DAY_NAMES[day],
            start,
            end,
            location: (els.bLocation.value || "").trim(),
            tags: normalizeTags(els.bTags.value),
            notes: (els.bNotes.value || "").trim(),
            color: normalizeHex(els.bColor.value, "#ffffff"),
            createdAt: existing ? existing.createdAt : nowISO(),
            updatedAt: nowISO()
          });

          closeModal();
        });

        els.search.addEventListener("input", async () => {
          appState.view.q = els.search.value;
          await persistState("Saved");
          render();
        });

        els.tagFilter.addEventListener("change", async () => {
          appState.view.tag = els.tagFilter.value;
          await persistState("Saved");
          render();
        });

        els.startHour.addEventListener("change", async () => {
          const v = Number(els.startHour.value);
          appState.view.startHour = Number.isFinite(v) ? v : 8;
          if (appState.view.endHour <= appState.view.startHour) {
            appState.view.endHour = Math.min(24, appState.view.startHour + 8);
          }
          await persistState("Saved");
          render();
        });

        els.endHour.addEventListener("change", async () => {
          const v = Number(els.endHour.value);
          appState.view.endHour = Number.isFinite(v) ? v : 20;
          if (appState.view.endHour <= appState.view.startHour) {
            appState.view.startHour = Math.max(0, appState.view.endHour - 8);
          }
          await persistState("Saved");
          render();
        });

        els.bgBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          const open = !els.bgPanel.classList.contains("open");
          closeAllPopovers(open ? els.bgPanel : null);
          els.bgPanel.classList.toggle("open", open);
        });

        els.themeBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          const open = !els.themePanel.classList.contains("open");
          closeAllPopovers(open ? els.themePanel : null);
          els.themePanel.classList.toggle("open", open);
        });

        document.addEventListener("click", (e) => {
          const inside = els.bgPopover.contains(e.target) || els.themePopover.contains(e.target);
          if (!inside) closeAllPopovers(null);
        });

        els.themeBg.addEventListener("input", onThemeInputPreview);
        els.themeText.addEventListener("input", onThemeInputPreview);
        els.themeMuted.addEventListener("input", onThemeInputPreview);
        els.themeBorders.addEventListener("input", onThemeInputPreview);
        els.themeBorderAlpha.addEventListener("input", onThemeInputPreview);
        els.themeGridAlpha.addEventListener("input", onThemeInputPreview);
        els.themePanelAlpha.addEventListener("input", onThemeInputPreview);

        els.themeApply.addEventListener("click", async () => {
          themeDraft = readThemeUi();
          appState.theme = { ...themeDraft };
          applyTheme(appState.theme);
          await persistState("Theme applied");

        els.resetTheme.addEventListener("click", async () => {

        els.bgColor.addEventListener("input", onBackgroundPreview);

          applyBackground(appState.background);

          const id = els.presetSelect.value || "";

          const list = await loadPresets();
          const next = list.filter(p => !(p && p.ns === PRESET_NAMESPACE && p.id === id));

          await refreshPresetSelect();

        document.addEventListener("keydown", (e) => {
          if (els.modalBackdrop.classList.contains("show")) return;

            const typing = a && (a.tagName === "INPUT" || a.tagName === "TEXTAREA" || a.isContentEditable);
            if (!typing){
              e.preventDefault();
              els.search.focus();
            }
          }
        });

        window.addEventListener("resize", () => {
          clearTimeout(renderResizeTimer);
          renderResizeTimer = setTimeout(render, 120);
        });

        window.addEventListener("storage", async (e) => {
          if (e.key === STORAGE_KEY || e.key === PRESETS_KEY) {
            await handleStorageRefresh();
            await refreshPresetSelect();
          }
        });

        document.addEventListener("visibilitychange", async () => {
          if (document.visibilityState === "visible") {
            await handleStorageRefresh();
          }
        });

        window.addEventListener("pageshow", async () => {
          await handleStorageRefresh();
        });
      }

      async function init(){
        fillHourSelect(els.startHour, DEFAULT_VIEW.startHour);
        fillHourSelect(els.endHour, DEFAULT_VIEW.endHour);

        await loadState();

        themeDraft = { ...appState.theme };
        bgDraft = { ...appState.background };

        applyTheme(appState.theme);
        applyBackground(appState.background);

        els.search.value = appState.view.q;
        els.tagFilter.value = appState.view.tag;

        await refreshPresetSelect();
        render();
        attachEvents();

        isBooting = false;
      }

      init();
    })();
  </script>
</body>
</html>
