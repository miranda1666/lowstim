<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Emergency Fund Comfort Meter</title>
  <style>
    :root{
      --bg:#ffffff;
      --card:#ffffffcc;
      --stroke:#e9e4dd;
      --ink:#2b2a28;
      --muted:#6a665f;
      --soft:#f3efe9;
      --shadow:0 10px 30px rgba(30,20,10,.06);
      --r:18px;

      --board-tint:#ffffff;
      --board-tint-a:0.30;
      --board-image:none;
      --board-blur:2px;
      --board-base-bg: rgba(239,231,225,0.30);

      --panel-bg: rgba(255,255,255,0.96);
      --field-bg: #ffffff;
      --theme-dot: var(--ink);
    }

    *{ box-sizing:border-box; }
    html, body{ width:100%; max-width:100%; min-height:100%; overflow-x:hidden; }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--ink);
      background: var(--bg);
      padding:28px 18px;
      -webkit-text-size-adjust:100%;
    }

    .wrap{ max-width:800px; margin:0 auto; }
    h1{ margin:0; font-size:18px; }
    .sub{ margin:6px 0 14px; color:var(--muted); font-size:13px; }

    .widgetBoard{
      max-width:700px;
      margin:0 auto;
      position:relative;
      border-radius:var(--r);
      overflow:visible;
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      background: var(--board-base-bg);
    }

    .widgetBoard::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:var(--board-image);
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      transform:scale(1.02);
      z-index:0;
      pointer-events:none;
      filter: blur(var(--board-blur)) saturate(1);
      border-radius:var(--r);
    }

    .widgetBoard::after{
      content:"";
      position:absolute;
      inset:0;
      background: transparent;
      pointer-events:none;
      z-index:0;
      border-radius:var(--r);
    }

    .boardTint{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:1;
      background:rgba(0,0,0,0);
      border-radius:var(--r);
    }

    .boardContent{
      position:relative;
      z-index:2;
      padding:10px;
    }

    .card{
      background:var(--card);
      border:0;
      border-radius:var(--r);
      box-shadow:none;
      padding:16px;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .title{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .title h2{
      margin:0;
      font-size:14px;
      font-weight:650;
      letter-spacing:.2px;
    }

    .hint{ color:var(--muted); font-size:12px; }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    button, input, select, textarea{
      font:inherit;
      border:1px solid var(--stroke);
      background:var(--field-bg);
      color:var(--ink);
      border-radius:12px;
      padding:10px 12px;
      outline:none;
      -webkit-tap-highlight-color: transparent;
    }

    input:focus, select:focus, textarea:focus{
      box-shadow: 0 0 0 3px rgba(203,184,174,0.20);
    }

    textarea{ width:100%; }
    button{ cursor:pointer; touch-action:manipulation; }
    button.soft{ background:var(--soft); }
    button:active{ transform:translateY(1px); }

    .divider{ height:1px; background:var(--stroke); margin:12px 0; }

    .meter{
      border:1px solid var(--stroke);
      border-radius:14px;
      padding:10px;
      background:var(--field-bg);
    }

    .track{
      height:12px;
      border-radius:999px;
      background:var(--soft);
      border:1px solid var(--stroke);
      overflow:hidden;
    }

    .fill{
      height:100%;
      width:0%;
      background:rgba(40,30,20,.18);
    }

    .kpi{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .kpi .box{
      flex:1;
      min-width:180px;
      background:var(--soft);
      border:1px solid var(--stroke);
      border-radius:14px;
      padding:10px;
    }

    .kpi .num{ font-weight:750; font-size:16px; }
    .kpi .lab{ font-size:12px; color:var(--muted); }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:1px solid var(--stroke);
      background:var(--field-bg);
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
    }

    .tiny{ font-size:12px; color:var(--muted); }
    .right{ margin-left:auto; display:flex; gap:8px; align-items:center; }
    .danger{ border-color:#efc2c2; }

    .controlsWrap{
      position:relative;
      display:flex;
      gap:10px;
      align-items:center;
      margin-left:auto;
    }

    .bgBtn, .themeBtn{
      width:34px;
      height:34px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.92);
      padding:0;
      display:grid;
      place-items:center;
      box-shadow: 0 3px 12px rgba(30,20,10,.08);
    }

    .bgDot{
      width:14px;
      height:14px;
      border-radius:999px;
      border:1px solid rgba(233,228,221,0.95);
      background: var(--board-tint);
      box-shadow: 0 0 0 6px rgba(239,231,225,0.30);
    }

    .themeDot{
      width:14px;
      height:14px;
      border-radius:999px;
      border:1px solid rgba(233,228,221,0.95);
      background: var(--theme-dot);
      box-shadow: 0 0 0 6px rgba(233,228,221,0.35);
    }

    .panel{
      position:fixed;
      width:300px;
      border-radius:16px;
      border:1px solid var(--stroke);
      background: var(--panel-bg);
      box-shadow: 0 18px 40px rgba(30,20,10,.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding:12px;
      display:none;
      z-index:99999;
      max-height:calc(100dvh - 24px);
      overflow:auto;
      top:12px;
      left:12px;
    }

    .panel.open{ display:block; }

    .bgTitle{
      margin:0 0 10px 0;
      font-size:12px;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      color: rgba(43,42,40,0.72);
    }

    .bgRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:7px 0;
    }

    .bgRow label{
      font-size:12px;
      color:var(--muted);
    }

    .bgRow input[type="color"]{
      width:40px;
      height:30px;
      border-radius:10px;
      padding:0;
      border:1px solid var(--stroke);
      background:transparent;
      cursor:pointer;
    }

    .bgRow input[type="range"]{ width:150px; }
    .bgFile{ width:100%; font-size:12px; color: rgba(43,42,40,0.75); }

    .bgMiniBtn{
      width:100%;
      border-radius:12px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.95);
      padding:10px 12px;
      font-weight:700;
      letter-spacing:.06em;
      text-transform:uppercase;
      font-size:11px;
      color: rgba(43,42,40,0.82);
      box-shadow: 0 2px 8px rgba(30,20,10,.06);
    }

    .bgDiv{ height:1px; background:var(--stroke); margin:8px 0; }

    .presetName{
      width:100%;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.96);
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
      color:var(--ink);
      outline:none;
    }

    .presetSelect{
      width:100%;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.96);
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
      color:var(--ink);
      outline:none;
      height:38px;
    }

    .status{
      font-size:12px;
      color:var(--muted);
      margin-top:6px;
      min-height:16px;
    }

    .confirmBackdrop{
      position:fixed;
      inset:0;
      display:none;
      place-items:center;
      padding:18px;
      background: rgba(20,18,16,.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index:999999;
    }

    .confirmBackdrop.show{ display:grid; }

    .confirmModal{
      width:min(520px, 100%);
      background: rgba(255,255,255,.96);
      border:1px solid rgba(43,42,40,.14);
      border-radius:20px;
      box-shadow: 0 12px 40px rgba(0,0,0,.12);
      overflow:hidden;
    }

    .confirmHead{
      padding:14px 16px;
      border-bottom:1px solid rgba(43,42,40,.10);
      font-weight:700;
      letter-spacing:.02em;
    }

    .confirmBody{
      padding:14px 16px;
      line-height:1.45;
      color: rgba(43,42,40,.92);
      font-size:13px;
    }

    .confirmFoot{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      flex-wrap:wrap;
      padding:12px 16px;
      border-top:1px solid rgba(43,42,40,.10);
    }

    @media (max-width: 760px){
      body{ padding:14px; }
      .row{ flex-direction:column; align-items:stretch; }
      .right{ margin-left:0; width:100%; justify-content:flex-end; }
      .panel{
        width:min(320px, calc(100vw - 20px));
        left:10px !important;
        top:10px !important;
        max-height:calc(100dvh - 20px) !important;
      }
      input, select, textarea{ font-size:16px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Emergency Fund Meter</h1>
    <div class="sub"></div>

    <div class="widgetBoard" id="widgetBoard" aria-label="Emergency Fund widget board">
      <div class="boardTint" id="boardTint"></div>
      <div class="boardContent">
        <section class="card">
          <div class="title">
            <h2>Comfort meter</h2>

            <div class="controlsWrap" id="controlsWrap">
              <button class="bgBtn" id="bgBtn" type="button" aria-label="Background settings" title="Background settings">
                <span class="bgDot" id="bgDot" aria-hidden="true"></span>
              </button>

              <button class="themeBtn" id="themeBtn" type="button" aria-label="Theme settings" title="Theme settings">
                <span class="themeDot" id="themeDot" aria-hidden="true"></span>
              </button>
            </div>
          </div>

          <div class="row">
            <input type="number" id="efCurrent" step="0.01" placeholder="Current amount">
            <input type="number" id="efTarget"  step="0.01" placeholder="Target amount">
            <button id="saveBtn">Save</button>

            <span class="pill">
              Currency
              <select id="currency">
                <option value="AUTO">Auto (from locale)</option>
                <option value="GBP">GBP (£)</option>
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="NGN">NGN (₦)</option>
                <option value="CAD">CAD ($)</option>
                <option value="AUD">AUD ($)</option>
                <option value="JPY">JPY (¥)</option>
                <option value="ZAR">ZAR (R)</option>
              </select>
            </span>

            <div class="right">
              <button class="danger" id="resetBtn" type="button">Reset</button>
            </div>
          </div>

          <div class="divider"></div>

          <div class="kpi">
            <div class="box">
              <div class="num" id="labelTxt">—</div>
              <div class="lab">Comfort level</div>
            </div>
            <div class="box">
              <div class="num" id="detailTxt">—</div>
              <div class="lab">Progress</div>
            </div>
          </div>

          <div class="divider"></div>

          <div class="meter">
            <div class="row" style="justify-content:space-between">
              <span class="tiny">Fund progress</span>
              <span class="tiny"><b id="pctTxt">—</b></span>
            </div>
            <div class="track"><div class="fill" id="fill"></div></div>
            <div class="tiny" style="margin-top:8px" id="noteTxt">—</div>
          </div>

          <div class="divider"></div>
        </section>
      </div>
    </div>
  </div>

  <div class="panel" id="bgPanel" role="dialog" aria-label="Background settings">
    <div class="bgTitle">Background</div>

    <button id="bgApply" class="bgMiniBtn" type="button">Apply background</button>
    <button id="bgReset" class="bgMiniBtn" type="button" style="margin-top:8px;">Reset background</button>

    <div class="bgDiv"></div>

    <div class="bgRow">
      <label for="bgColor">Tint</label>
      <input id="bgColor" type="color" value="#efe7e1" />
    </div>

    <div class="bgRow">
      <label for="bgStrength">Strength</label>
      <input id="bgStrength" type="range" min="0" max="70" value="30" />
    </div>

    <div class="bgRow">
      <label for="bgBlur">Image blur</label>
      <input id="bgBlur" type="range" min="2" max="20" value="2" />
    </div>

    <div class="bgDiv"></div>

    <div class="bgRow" style="align-items:flex-start;">
      <label for="bgImage">Image</label>
      <input id="bgImage" class="bgFile" type="file" accept="image/*" />
    </div>

    <div class="bgRow">
      <button id="bgRemove" class="bgMiniBtn" type="button">Remove image</button>
    </div>

    <div class="status" id="bgStatus" aria-live="polite"></div>
  </div>

  <div class="panel" id="themePanel" role="dialog" aria-label="Theme settings">
    <div class="bgTitle">Theme</div>

    <button id="themeApply" class="bgMiniBtn" type="button">Apply theme</button>
    <button id="resetTheme" class="bgMiniBtn" type="button" style="margin-top:8px;">Reset theme</button>

    <div class="bgDiv"></div>

    <div class="bgRow">
      <label for="tPageBg">Page bg</label>
      <input id="tPageBg" type="color" value="#ffffff" />
    </div>

    <div class="bgRow">
      <label for="tText">Text</label>
      <input id="tText" type="color" value="#2b2a28" />
    </div>

    <div class="bgRow">
      <label for="tMuted">Muted</label>
      <input id="tMuted" type="color" value="#6a665f" />
    </div>

    <div class="bgDiv"></div>

    <div class="bgRow">
      <label for="tStroke">Borders</label>
      <input id="tStroke" type="color" value="#e9e4dd" />
    </div>

    <div class="bgRow">
      <label for="tCard">Card</label>
      <input id="tCard" type="color" value="#ffffff" />
    </div>

    <div class="bgRow">
      <label for="tSoft">Secondary</label>
      <input id="tSoft" type="color" value="#f3efe9" />
    </div>

    <div class="bgDiv"></div>

    <div class="bgTitle" style="margin-top:2px;">Presets</div>

    <input id="presetName" class="presetName" placeholder="Preset name" />
    <button class="bgMiniBtn" id="presetSave" type="button" style="margin-top:8px;">Save current as preset</button>

    <div class="bgDiv"></div>

    <select id="presetSelect" class="presetSelect">
      <option value="">—</option>
    </select>

    <button class="bgMiniBtn" id="presetApply" type="button" style="margin-top:8px;">Apply preset</button>
    <button class="bgMiniBtn" id="presetDelete" type="button" style="margin-top:8px;">Delete preset</button>

    <div class="status" id="presetStatus" aria-live="polite"></div>
  </div>

  <div class="confirmBackdrop" id="confirmBackdrop" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <div class="confirmModal">
      <div class="confirmHead" id="confirmTitle">Confirm</div>
      <div class="confirmBody" id="confirmBody"></div>
      <div class="confirmFoot">
        <button type="button" id="confirmCancel">Cancel</button>
        <button type="button" id="confirmOk">Confirm</button>
      </div>
    </div>
  </div>

<script>
(function(){
  "use strict";

  function hexToRgba(hex, a){
    const h = String(hex || "").replace("#","").trim();
    const full = h.length === 3 ? h.split("").map(function(c){ return c + c; }).join("") : h;
    const num = parseInt(full || "efe7e1", 16);
    const r = (num >> 16) & 255;
    const g = (num >> 8) & 255;
    const b = num & 255;
    return "rgba(" + r + "," + g + "," + b + "," + a + ")";
  }

  function clamp(n, a, b){
    n = Number(n);
    if(!Number.isFinite(n)) return a;
    return Math.max(a, Math.min(b, n));
  }

  function uid(){
    return Math.random().toString(16).slice(2) + Date.now().toString(16);
  }

  function escapeHtml(s){
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function normHex(hex, fallback){
    const s = String(hex || "").trim();
    return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : fallback;
  }

  function canUseLocalStorage(){
    try{
      const k = "__ef__" + Math.random().toString(16).slice(2);
      localStorage.setItem(k, "1");
      localStorage.removeItem(k);
      return true;
    }catch{
      return false;
    }
  }

  const hasLS = canUseLocalStorage();
  const mem = Object.create(null);

  function storageGet(key){
    try{ return hasLS ? localStorage.getItem(key) : (mem[key] ?? null); }
    catch{ return mem[key] ?? null; }
  }

  function storageSet(key, value){
    try{ if(hasLS) localStorage.setItem(key, value); else mem[key] = String(value); }
    catch{ mem[key] = String(value); }
  }

  function storageRemove(key){
    try{ if(hasLS) localStorage.removeItem(key); else delete mem[key]; }
    catch{ delete mem[key]; }
  }

  function sanitizeId(value){
    return String(value || "")
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9_-]+/g, "-")
      .replace(/^-+|-+$/g, "") || "default";
  }

  function getWidgetId(){
    try{
      const sp = new URLSearchParams(location.search);
      const wid = sanitizeId(sp.get("wid"));
      if(wid && wid !== "default") return wid;
    }catch{}
    const fromPath = sanitizeId(location.pathname.replace(/\.[^/.]+$/, ""));
    return fromPath || "default";
  }

  const WID = getWidgetId();
  const PRESETS_KEY = "emergency_fund_presets_v2";
  const KEY = "emergency_fund_meter_v2__" + WID;
  const CUR_KEY = "emergency_fund_currency_pref_v2__" + WID;
  const THEME_KEY = "emergency_fund_theme_v2__" + WID;
  const BG_KEY = "emergency_fund_bg_v2__" + WID;
  const BG_IMAGE_KEY = "emergency_fund_bg_image_v2__" + WID;
  const BG_IMAGE_STAMP_KEY = "emergency_fund_bg_image_stamp_v2__" + WID;

  const DB_NAME = "emergency_fund_meter_db_v3";
  const DB_STORE = "kv";
  let dbPromise = null;

  function openDB(){
    if(dbPromise) return dbPromise;

    dbPromise = new Promise(function(resolve){
      if(!("indexedDB" in window)){
        resolve(null);
        return;
      }

      const request = indexedDB.open(DB_NAME, 1);

      request.onupgradeneeded = function(){
        const db = request.result;
        if(!db.objectStoreNames.contains(DB_STORE)){
          db.createObjectStore(DB_STORE);
        }
      };

      request.onsuccess = function(){ resolve(request.result); };
      request.onerror = function(){ resolve(null); };
    });

    return dbPromise;
  }

  async function idbGet(key){
    const db = await openDB();
    if(!db) return null;

    return new Promise(function(resolve){
      try{
        const tx = db.transaction(DB_STORE, "readonly");
        const store = tx.objectStore(DB_STORE);
        const req = store.get(key);
        req.onsuccess = function(){ resolve(req.result ?? null); };
        req.onerror = function(){ resolve(null); };
      }catch{
        resolve(null);
      }
    });
  }

  async function idbSet(key, value){
    const db = await openDB();
    if(!db) return false;

    return new Promise(function(resolve){
      try{
        const tx = db.transaction(DB_STORE, "readwrite");
        const store = tx.objectStore(DB_STORE);
        const req = store.put(value, key);
        req.onsuccess = function(){ resolve(true); };
        req.onerror = function(){ resolve(false); };
      }catch{
        resolve(false);
      }
    });
  }

  async function idbRemove(key){
    const db = await openDB();
    if(!db) return false;

    return new Promise(function(resolve){
      try{
        const tx = db.transaction(DB_STORE, "readwrite");
        const store = tx.objectStore(DB_STORE);
        const req = store.delete(key);
        req.onsuccess = function(){ resolve(true); };
        req.onerror = function(){ resolve(false); };
      }catch{
        resolve(false);
      }
    });
  }

  function loadJSON(key, fallback){
    try{
      const raw = storageGet(key);
      return raw ? JSON.parse(raw) : fallback;
    }catch{
      return fallback;
    }
  }

  function saveJSON(key, value){
    storageSet(key, JSON.stringify(value));
  }

  const els = {
    widgetBoard: document.getElementById("widgetBoard"),

    confirmBackdrop: document.getElementById("confirmBackdrop"),
    confirmBody: document.getElementById("confirmBody"),
    confirmOk: document.getElementById("confirmOk"),
    confirmCancel: document.getElementById("confirmCancel"),

    themeBtn: document.getElementById("themeBtn"),
    bgBtn: document.getElementById("bgBtn"),
    themePanel: document.getElementById("themePanel"),
    bgPanel: document.getElementById("bgPanel"),

    boardTint: document.getElementById("boardTint"),
    bgDot: document.getElementById("bgDot"),
    themeDot: document.getElementById("themeDot"),

    tPageBg: document.getElementById("tPageBg"),
    tText: document.getElementById("tText"),
    tMuted: document.getElementById("tMuted"),
    tStroke: document.getElementById("tStroke"),
    tCard: document.getElementById("tCard"),
    tSoft: document.getElementById("tSoft"),
    themeApply: document.getElementById("themeApply"),
    resetTheme: document.getElementById("resetTheme"),

    bgColor: document.getElementById("bgColor"),
    bgStrength: document.getElementById("bgStrength"),
    bgBlur: document.getElementById("bgBlur"),
    bgImage: document.getElementById("bgImage"),
    bgRemove: document.getElementById("bgRemove"),
    bgApply: document.getElementById("bgApply"),
    bgReset: document.getElementById("bgReset"),
    bgStatus: document.getElementById("bgStatus"),

    presetName: document.getElementById("presetName"),
    presetSave: document.getElementById("presetSave"),
    presetSelect: document.getElementById("presetSelect"),
    presetApply: document.getElementById("presetApply"),
    presetDelete: document.getElementById("presetDelete"),
    presetStatus: document.getElementById("presetStatus"),

    efCurrent: document.getElementById("efCurrent"),
    efTarget: document.getElementById("efTarget"),
    saveBtn: document.getElementById("saveBtn"),
    currency: document.getElementById("currency"),
    resetBtn: document.getElementById("resetBtn"),

    labelTxt: document.getElementById("labelTxt"),
    detailTxt: document.getElementById("detailTxt"),
    pctTxt: document.getElementById("pctTxt"),
    fill: document.getElementById("fill"),
    noteTxt: document.getElementById("noteTxt")
  };

  let confirmResolver = null;
  function askConfirm(message, options){
    const opt = options || {};
    const okText = opt.okText || "Confirm";
    const cancelText = opt.cancelText || "Cancel";

    return new Promise(function(resolve){
      confirmResolver = resolve;
      els.confirmBody.innerHTML = "<div>" + escapeHtml(message) + "</div>";
      els.confirmOk.textContent = okText;
      els.confirmCancel.textContent = cancelText;
      els.confirmBackdrop.classList.add("show");
      setTimeout(function(){ els.confirmOk.focus(); }, 0);
    });
  }

  function closeConfirm(val){
    els.confirmBackdrop.classList.remove("show");
    const r = confirmResolver;
    confirmResolver = null;
    if(r) r(val);
  }

  els.confirmOk.addEventListener("click", function(){ closeConfirm(true); });
  els.confirmCancel.addEventListener("click", function(){ closeConfirm(false); });
  els.confirmBackdrop.addEventListener("click", function(e){
    if(e.target === els.confirmBackdrop) closeConfirm(false);
  });
  document.addEventListener("keydown", function(e){
    if(els.confirmBackdrop.classList.contains("show") && e.key === "Escape"){
      closeConfirm(false);
    }
  });

  function setStatus(msg){
    const text = msg || "";
    els.presetStatus.textContent = text;
    els.bgStatus.textContent = text;
  }

  const DEFAULT_THEME = {
    pageBg:"#ffffff",
    ink:"#2b2a28",
    muted:"#6a665f",
    stroke:"#e9e4dd",
    cardBase:"#ffffff",
    soft:"#f3efe9"
  };

  const DEFAULT_BG = {
    tint:"#efe7e1",
    strength:30,
    blur:2
  };

  function safeTheme(t){
    const x = Object.assign({}, DEFAULT_THEME, t || {});
    return {
      pageBg: normHex(x.pageBg, DEFAULT_THEME.pageBg),
      ink: normHex(x.ink, DEFAULT_THEME.ink),
      muted: normHex(x.muted, DEFAULT_THEME.muted),
      stroke: normHex(x.stroke, DEFAULT_THEME.stroke),
      cardBase: normHex(x.cardBase, DEFAULT_THEME.cardBase),
      soft: normHex(x.soft, DEFAULT_THEME.soft)
    };
  }

  function safeBg(bg){
    const x = Object.assign({}, DEFAULT_BG, bg || {});
    return {
      tint: normHex(x.tint, DEFAULT_BG.tint),
      strength: clamp(x.strength, 0, 70),
      blur: clamp(x.blur, 2, 20)
    };
  }

  function applyThemeToCSS(theme){
    const t = safeTheme(theme);
    document.documentElement.style.setProperty("--bg", t.pageBg);
    document.documentElement.style.setProperty("--ink", t.ink);
    document.documentElement.style.setProperty("--muted", t.muted);
    document.documentElement.style.setProperty("--soft", t.soft);
    document.documentElement.style.setProperty("--stroke", hexToRgba(t.stroke, 0.95));
    document.documentElement.style.setProperty("--card", hexToRgba(t.cardBase, 0.80));
    document.documentElement.style.setProperty("--theme-dot", t.ink);

    els.themeDot.style.background = t.ink;
    els.themeDot.style.boxShadow = "0 0 0 6px " + hexToRgba(t.stroke, 0.35);
    els.themeDot.style.borderColor = hexToRgba(t.stroke, 0.95);

    return t;
  }

  function applyBgToCSS(bg, imageDataUrl){
    const b = safeBg(bg);
    const strength = b.strength / 100;
    const tintLayer = hexToRgba(b.tint, strength);

    document.documentElement.style.setProperty("--board-tint", b.tint);
    document.documentElement.style.setProperty("--board-tint-a", String(strength));
    document.documentElement.style.setProperty("--board-image", imageDataUrl ? "url(\"" + imageDataUrl + "\")" : "none");
    document.documentElement.style.setProperty("--board-blur", b.blur + "px");
    document.documentElement.style.setProperty("--board-base-bg", tintLayer);

    els.widgetBoard.style.background = tintLayer;
    els.boardTint.style.background = tintLayer;
    els.bgDot.style.background = b.tint;
    els.bgDot.style.boxShadow = "0 0 0 6px " + hexToRgba(b.tint, Math.min(0.35, strength + 0.12));

    return b;
  }

  function syncThemeInputs(theme){
    els.tPageBg.value = theme.pageBg;
    els.tText.value = theme.ink;
    els.tMuted.value = theme.muted;
    els.tStroke.value = theme.stroke;
    els.tCard.value = theme.cardBase;
    els.tSoft.value = theme.soft;
  }

  function syncBgInputs(bg){
    els.bgColor.value = bg.tint;
    els.bgStrength.value = String(bg.strength);
    els.bgBlur.value = String(bg.blur);
  }

  function readThemeInputs(){
    return safeTheme({
      pageBg: els.tPageBg.value,
      ink: els.tText.value,
      muted: els.tMuted.value,
      stroke: els.tStroke.value,
      cardBase: els.tCard.value,
      soft: els.tSoft.value
    });
  }

  function readBgInputs(){
    return safeBg({
      tint: els.bgColor.value,
      strength: Number(els.bgStrength.value),
      blur: Number(els.bgBlur.value)
    });
  }

  async function fileToDataUrl(file){
    return new Promise(function(resolve, reject){
      const r = new FileReader();
      r.onload = function(){ resolve(String(r.result || "")); };
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  async function saveImageValue(key, imageDataUrl){
    if(!imageDataUrl){
      await idbRemove(key);
      storageRemove(key);
      return true;
    }

    let ok = await idbSet(key, imageDataUrl);
    try{
      storageSet(key, imageDataUrl);
      ok = true;
    }catch{}
    return ok;
  }

  async function loadImageValue(key){
    let image = await idbGet(key);
    if(typeof image === "string" && image) return image;

    const raw = storageGet(key);
    return (typeof raw === "string" && raw) ? raw : null;
  }

  async function removeImageValue(key){
    await idbRemove(key);
    storageRemove(key);
  }

  async function loadBackground(){
    const bg = safeBg(loadJSON(BG_KEY, DEFAULT_BG));
    const image = await loadImageValue(BG_IMAGE_KEY);
    return {
      bg: bg,
      imageDataUrl: image
    };
  }

  async function saveBackground(bg, imageDataUrl){
    saveJSON(BG_KEY, safeBg(bg));
    if(imageDataUrl){
      await saveImageValue(BG_IMAGE_KEY, imageDataUrl);
    }else{
      await removeImageValue(BG_IMAGE_KEY);
    }
    storageSet(BG_IMAGE_STAMP_KEY, String(Date.now()));
  }

  function presetImageKey(id){
    return "emergency_fund_preset_image_v2__" + id;
  }

  async function savePresetImage(id, imageDataUrl){
    if(imageDataUrl){
      await saveImageValue(presetImageKey(id), imageDataUrl);
    }else{
      await removeImageValue(presetImageKey(id));
    }
  }

  async function loadPresetImage(id){
    return loadImageValue(presetImageKey(id));
  }

  async function refreshPresetSelect(){
    const list = loadJSON(PRESETS_KEY, []);
    const current = els.presetSelect.value;
    els.presetSelect.innerHTML = "<option value=\"\">—</option>";

    if(Array.isArray(list)){
      for(let i = 0; i < list.length; i++){
        const p = list[i];
        const opt = document.createElement("option");
        opt.value = p.id;
        opt.textContent = p.name || "Untitled";
        els.presetSelect.appendChild(opt);
      }
      if(current && list.some(function(x){ return x.id === current; })){
        els.presetSelect.value = current;
      }
    }
  }

  function positionPanel(btn, panel){
    if(window.innerWidth <= 760){
      panel.style.left = "10px";
      panel.style.top = "10px";
      panel.style.width = "min(320px, calc(100vw - 20px))";
      panel.style.maxHeight = "calc(100dvh - 20px)";
      return;
    }

    const pad = 12;
    const gap = 10;

    panel.style.width = "300px";
    panel.style.left = "0px";
    panel.style.top = "0px";
    panel.style.maxHeight = "calc(100dvh - " + (pad * 2) + "px)";

    const btnRect = btn.getBoundingClientRect();
    const panelWidth = panel.offsetWidth || 300;
    const viewportW = window.innerWidth;
    const viewportH = window.innerHeight;

    let left = btnRect.right - panelWidth;
    left = Math.max(pad, Math.min(left, viewportW - panelWidth - pad));

    let top = btnRect.bottom + gap;
    let maxHeight = viewportH - top - pad;

    if(maxHeight < 220){
      top = Math.max(pad, btnRect.top - gap - Math.min(panel.scrollHeight, viewportH - pad * 2));
      maxHeight = viewportH - top - pad;
    }

    panel.style.left = Math.round(left) + "px";
    panel.style.top = Math.round(top) + "px";
    panel.style.maxHeight = Math.max(220, maxHeight) + "px";
  }

  function closeAllPanels(except){
    [els.themePanel, els.bgPanel].forEach(function(panel){
      if(panel !== except) panel.classList.remove("open");
    });
  }

  function openPanel(btn, panel){
    const isOpen = panel.classList.contains("open");
    closeAllPanels(null);
    if(isOpen) return;
    panel.classList.add("open");
    requestAnimationFrame(function(){ positionPanel(btn, panel); });
  }

  els.themeBtn.addEventListener("click", function(e){
    e.stopPropagation();
    openPanel(els.themeBtn, els.themePanel);
  });

  els.bgBtn.addEventListener("click", function(e){
    e.stopPropagation();
    openPanel(els.bgBtn, els.bgPanel);
  });

  document.addEventListener("click", function(e){
    const inside =
      e.target.closest("#themePanel") || e.target.closest("#themeBtn") ||
      e.target.closest("#bgPanel") || e.target.closest("#bgBtn");
    if(!inside) closeAllPanels(null);
  });

  window.addEventListener("resize", function(){
    if(els.themePanel.classList.contains("open")) positionPanel(els.themeBtn, els.themePanel);
    if(els.bgPanel.classList.contains("open")) positionPanel(els.bgBtn, els.bgPanel);
  });

  window.addEventListener("scroll", function(){
    if(els.themePanel.classList.contains("open")) positionPanel(els.themeBtn, els.themePanel);
    if(els.bgPanel.classList.contains("open")) positionPanel(els.bgBtn, els.bgPanel);
  }, { passive:true });

  let themeDraft = applyThemeToCSS(loadJSON(THEME_KEY, DEFAULT_THEME));
  let bgDraft = safeBg(DEFAULT_BG);
  let bgDraftImage = null;

  function defaultState(){
    return { current: 0, target: 1000 };
  }

  function loadState(){
    const raw = loadJSON(KEY, defaultState());
    return {
      current: Math.max(0, Number(raw && raw.current || 0)),
      target: Math.max(1, Number(raw && raw.target || 1000))
    };
  }

  let state = loadState();

  function saveState(){
    saveJSON(KEY, state);
  }

  function comfortLabel(r){
    if(r >= 0.9) return {label:"Safe", note:"You’re close to (or at) your target emergency fund. So proud of you!"};
    if(r >= 0.6) return {label:"Comfortable", note:"You have meaningful breathing room. Yay!"};
    if(r >= 0.3) return {label:"Okay", note:"Some cushion — keep going!"};
    return {label:"Barely", note:"It’s okay to start small. Any amount helps :)"};
  }

  const REGION_TO_CURRENCY = {
    GB:"GBP", US:"USD", CA:"CAD", AU:"AUD", NZ:"NZD",
    IE:"EUR", FR:"EUR", DE:"EUR", ES:"EUR", IT:"EUR", NL:"EUR", PT:"EUR",
    BE:"EUR", AT:"EUR", FI:"EUR", GR:"EUR", CY:"EUR", MT:"EUR",
    SK:"EUR", SI:"EUR", EE:"EUR", LV:"EUR", LT:"EUR", LU:"EUR",
    JP:"JPY", CN:"CNY", IN:"INR", NG:"NGN", ZA:"ZAR", KE:"KES",
    GH:"GHS", BR:"BRL", MX:"MXN", CH:"CHF", SE:"SEK", NO:"NOK",
    DK:"DKK", PL:"PLN", CZ:"CZK", HU:"HUF", RO:"RON", TR:"TRY"
  };

  function getRegionFromLocale(locale){
    try{
      if(typeof Intl !== "undefined" && Intl.Locale){
        const loc = new Intl.Locale(locale);
        if(loc.region) return loc.region.toUpperCase();
      }
    }catch{}
    const norm = String(locale || "").replace("_","-");
    const parts = norm.split("-");
    return (parts[1] || "").toUpperCase();
  }

  function autoCurrency(){
    const locale = Intl.NumberFormat().resolvedOptions().locale || navigator.language || "";
    const region = getRegionFromLocale(locale);
    return REGION_TO_CURRENCY[region] || "";
  }

  function money(n){
    const v = Number(n || 0);
    if(!isFinite(v)) return "0";
    const locale = Intl.NumberFormat().resolvedOptions().locale || navigator.language || undefined;
    const pref = storageGet(CUR_KEY) || "AUTO";
    const cur = (pref === "AUTO") ? autoCurrency() : pref;

    try{
      if(cur){
        return new Intl.NumberFormat(locale, { style:"currency", currency: cur }).format(v);
      }
      return new Intl.NumberFormat(locale, { minimumFractionDigits:2, maximumFractionDigits:2 }).format(v);
    }catch{
      return v.toFixed(2);
    }
  }

  function render(){
    const cur = Math.max(0, Number(state.current || 0));
    const tar = Math.max(1, Number(state.target || 1));
    const ratio = Math.min(1, cur / tar);
    const pct = Math.round(ratio * 100);
    const info = comfortLabel(ratio);

    els.efCurrent.value = String(cur);
    els.efTarget.value = String(tar);
    els.labelTxt.textContent = info.label;
    els.detailTxt.textContent = money(cur) + " of " + money(tar);
    els.pctTxt.textContent = pct + "%";
    els.fill.style.width = Math.max(2, pct) + "%";
    els.noteTxt.textContent = info.note;
  }

  function persistTheme(){
    saveJSON(THEME_KEY, safeTheme(themeDraft));
  }

  async function persistBackground(){
    await saveBackground(bgDraft, bgDraftImage);
  }

  [els.tPageBg, els.tText, els.tMuted, els.tStroke, els.tCard, els.tSoft].forEach(function(el){
    el.addEventListener("input", function(){
      themeDraft = applyThemeToCSS(readThemeInputs());
      persistTheme();
      setStatus("");
    });
  });

  [els.bgColor, els.bgStrength, els.bgBlur].forEach(function(el){
    el.addEventListener("input", function(){
      bgDraft = readBgInputs();
      applyBgToCSS(bgDraft, bgDraftImage);
      void persistBackground();
      setStatus("");
    });
  });

  els.bgImage.addEventListener("change", async function(){
    const file = els.bgImage.files && els.bgImage.files[0];
    if(!file) return;
    try{
      bgDraftImage = await fileToDataUrl(file);
      bgDraft = readBgInputs();
      applyBgToCSS(bgDraft, bgDraftImage);
      await persistBackground();
      setStatus("Background image saved.");
    }catch{
      setStatus("Could not load image.");
    }
  });

  els.bgRemove.addEventListener("click", async function(){
    bgDraftImage = null;
    els.bgImage.value = "";
    bgDraft = readBgInputs();
    applyBgToCSS(bgDraft, bgDraftImage);
    await persistBackground();
    setStatus("Background image removed.");
  });

  els.themeApply.addEventListener("click", function(){
    themeDraft = applyThemeToCSS(readThemeInputs());
    syncThemeInputs(themeDraft);
    persistTheme();
    setStatus("Theme applied.");
  });

  els.resetTheme.addEventListener("click", function(){
    themeDraft = applyThemeToCSS(DEFAULT_THEME);
    syncThemeInputs(themeDraft);
    persistTheme();
    setStatus("Theme reset.");
  });

  els.bgApply.addEventListener("click", async function(){
    bgDraft = readBgInputs();
    applyBgToCSS(bgDraft, bgDraftImage);
    syncBgInputs(bgDraft);
    await persistBackground();
    setStatus("Background applied.");
  });

  els.bgReset.addEventListener("click", async function(){
    bgDraft = safeBg(DEFAULT_BG);
    bgDraftImage = null;
    syncBgInputs(bgDraft);
    els.bgImage.value = "";
    applyBgToCSS(bgDraft, bgDraftImage);
    await persistBackground();
    setStatus("Background reset.");
  });

  els.presetSave.addEventListener("click", async function(){
    const name = (els.presetName.value || "").trim();
    if(!name){
      setStatus("Type a preset name first.");
      return;
    }

    const list = loadJSON(PRESETS_KEY, []);
    const id = uid();
    const themeToSave = readThemeInputs();
    const bgToSave = readBgInputs();

    list.unshift({
      id: id,
      name: name,
      theme: themeToSave,
      bg: bgToSave,
      hasImage: !!bgDraftImage
    });

    if(bgDraftImage){
      await savePresetImage(id, bgDraftImage);
    }

    saveJSON(PRESETS_KEY, list);
    els.presetName.value = "";
    await refreshPresetSelect();
    els.presetSelect.value = id;
    setStatus("Preset saved.");
  });

  els.presetApply.addEventListener("click", async function(){
    const id = els.presetSelect.value || "";
    if(!id){
      setStatus("Choose a preset first.");
      return;
    }

    const list = loadJSON(PRESETS_KEY, []);
    const preset = Array.isArray(list) ? list.find(function(x){ return x.id === id; }) : null;
    if(!preset){
      setStatus("Preset not found.");
      return;
    }

    themeDraft = applyThemeToCSS(preset.theme || DEFAULT_THEME);
    syncThemeInputs(themeDraft);
    persistTheme();

    bgDraft = safeBg(preset.bg || DEFAULT_BG);
    bgDraftImage = preset.hasImage ? await loadPresetImage(id) : null;
    syncBgInputs(bgDraft);
    els.bgImage.value = "";
    applyBgToCSS(bgDraft, bgDraftImage);
    await persistBackground();

    setStatus("Preset applied.");
  });

  els.presetDelete.addEventListener("click", async function(){
    const id = els.presetSelect.value || "";
    if(!id){
      setStatus("Choose a preset first.");
      return;
    }

    const list = loadJSON(PRESETS_KEY, []);
    const preset = Array.isArray(list) ? list.find(function(x){ return x.id === id; }) : null;
    if(!preset){
      setStatus("Preset not found.");
      return;
    }

    const ok = await askConfirm("Delete preset \"" + (preset.name || "Untitled") + "\"?", { okText:"Delete", cancelText:"Cancel" });
    if(!ok) return;

    const next = list.filter(function(x){ return x.id !== id; });
    saveJSON(PRESETS_KEY, next);
    await removeImageValue(presetImageKey(id));
    await refreshPresetSelect();
    els.presetSelect.value = "";
    setStatus("Preset deleted.");
  });

  els.currency.value = storageGet(CUR_KEY) || "AUTO";
  els.currency.addEventListener("change", function(){
    storageSet(CUR_KEY, els.currency.value);
    render();
  });

  els.saveBtn.addEventListener("click", function(){
    const cur = Number(els.efCurrent.value);
    const tar = Number(els.efTarget.value);

    if(!isFinite(cur) || cur < 0) return;
    if(!isFinite(tar) || tar <= 0) return;

    state.current = cur;
    state.target = tar;
    saveState();
    render();
  });

  els.resetBtn.addEventListener("click", async function(){
    const ok = await askConfirm("Reset this widget’s saved values?", { okText:"Reset", cancelText:"Cancel" });
    if(!ok) return;
    storageRemove(KEY);
    state = defaultState();
    saveState();
    render();
  });

  window.addEventListener("pagehide", function(){
    saveState();
    persistTheme();
    void persistBackground();
  });

  document.addEventListener("visibilitychange", function(){
    if(document.visibilityState === "hidden"){
      saveState();
      persistTheme();
      void persistBackground();
    }
  });

  window.addEventListener("storage", async function(e){
    if(!e.key) return;

    if(e.key === KEY){
      state = loadState();
      render();
    }

    if(e.key === CUR_KEY){
      els.currency.value = storageGet(CUR_KEY) || "AUTO";
      render();
    }

    if(e.key === THEME_KEY){
      themeDraft = applyThemeToCSS(loadJSON(THEME_KEY, DEFAULT_THEME));
      syncThemeInputs(themeDraft);
    }

    if(e.key === BG_KEY || e.key === BG_IMAGE_KEY || e.key === BG_IMAGE_STAMP_KEY){
      const savedBg = await loadBackground();
      bgDraft = savedBg.bg;
      bgDraftImage = savedBg.imageDataUrl;
      syncBgInputs(bgDraft);
      applyBgToCSS(bgDraft, bgDraftImage);
    }

    if(e.key === PRESETS_KEY){
      await refreshPresetSelect();
    }
  });

  async function init(){
    themeDraft = applyThemeToCSS(loadJSON(THEME_KEY, DEFAULT_THEME));
    syncThemeInputs(themeDraft);

    const savedBg = await loadBackground();
    bgDraft = savedBg.bg;
    bgDraftImage = savedBg.imageDataUrl;
    syncBgInputs(bgDraft);
    applyBgToCSS(bgDraft, bgDraftImage);

    await refreshPresetSelect();
    render();
  }

  init();
})();
</script>
</body>
</html>
