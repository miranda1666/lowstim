<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Subscriptions Tracker</title>
  <style>
    :root{
      --page-bg:#ffffff;
      --card:#ffffffcc;
      --stroke:#e9e4dd;
      --ink:#2b2a28;
      --muted:#6a665f;
      --soft:#f3efe9;
      --shadow:0 10px 30px rgba(30,20,10,.06);
      --r:18px;

      --item-bg:#ffffff;
      --input-bg:#ffffff;
      --accent:#cbb8ae;

      --board-tint:#efe7e1;
      --board-tint-a:0.30;
      --board-image:none;
      --board-blur:0px;
    }

    *{ box-sizing:border-box; }
    html, body{ width:100%; max-width:100%; min-height:100%; overflow-x:hidden; }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--ink);
      background: var(--page-bg);
      padding:28px 18px;
      -webkit-text-size-adjust:100%;
    }

    button, input, select, textarea{ font:inherit; }

    .wrap{max-width:900px; margin:0 auto;}
    h1{margin:0; font-size:18px}
    .sub{margin:6px 0 14px; color:var(--muted); font-size:13px}

    .widgetBoard{
      position:relative;
      border-radius: var(--r);
      overflow:hidden;
      border:1px solid var(--stroke);
      box-shadow: var(--shadow);
      background: transparent;
    }

    .widgetBoard::before{
      content:"";
      position:absolute;
      inset:0;
      background-image: var(--board-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform: scale(1.03);
      z-index:0;
      pointer-events:none;
      filter: blur(var(--board-blur)) saturate(1.02);
    }

    .widgetBoard::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:0;
      background: rgba(255,255,255,0.24);
    }

    .boardTint{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:1;
    }

    .boardContent{
      position:relative;
      z-index:2;
    }

    .card{
      background:var(--card);
      border:0;
      border-radius:0;
      box-shadow:none;
      padding:14px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .title{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .title h2{margin:0; font-size:14px; font-weight:650; letter-spacing:.2px}
    .hint{color:var(--muted); font-size:12px}

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    button, input, select{
      border:1px solid var(--stroke);
      background: var(--input-bg);
      color:var(--ink);
      border-radius:12px;
      padding:10px 12px;
      outline:none;
      -webkit-tap-highlight-color: transparent;
    }

    input:focus, select:focus{
      box-shadow: 0 0 0 3px rgba(203,184,174,0.25);
    }

    button{
      cursor:pointer;
      touch-action: manipulation;
    }

    button.soft{background:var(--soft)}
    button.primary{
      background: color-mix(in srgb, var(--accent) 45%, white);
    }
    button:active{transform:translateY(1px)}
    .divider{height:1px; background:var(--stroke); margin:12px 0}

    .kpi{
      display:flex; gap:12px; flex-wrap:wrap;
    }
    .kpi .box{
      flex:1; min-width:180px;
      background:var(--soft);
      border:1px solid var(--stroke);
      border-radius:14px;
      padding:10px;
    }
    .kpi .num{font-weight:750; font-size:16px}
    .kpi .lab{font-size:12px; color:var(--muted)}

    .list{display:flex; flex-direction:column; gap:8px}
    .item{
      display:flex; justify-content:space-between; align-items:center; gap:10px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid var(--stroke);
      background: var(--item-bg);
      flex-wrap:wrap;
    }
    .item .meta{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
    }
    .item .meta b{
      font-size:13px;
      word-break:break-word;
    }
    .item .meta span{
      font-size:12px;
      color:var(--muted);
      word-break:break-word;
    }

    .tag{
      font-size:11px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: color-mix(in srgb, var(--accent) 22%, white);
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
    }
    .tag.off{
      opacity:.70;
      background:var(--soft);
    }

    .right{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .smallbtn{
      padding:8px 10px;
      border-radius:12px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:40px;
      height:36px;
    }

    .smallbtn svg{
      width:16px;
      height:16px;
      display:block;
      flex:0 0 auto;
    }

    .danger{border-color:#efc2c2}
    .tiny{font-size:12px; color:var(--muted)}
    label.tiny{display:inline-flex; align-items:center; gap:8px}

    .tools{
      display:flex;
      gap:10px;
      align-items:center;
      margin-left:auto;
    }

    .popWrap{ position:relative; }

    .iconBtn{
      width:34px;
      height:34px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.92);
      padding:0;
      display:grid;
      place-items:center;
      box-shadow: 0 3px 12px rgba(30,20,10,.08);
      cursor:pointer;
      touch-action: manipulation;
    }

    .dot{
      width:14px; height:14px;
      border-radius:999px;
      border:1px solid rgba(233,228,221,0.95);
      background: var(--board-tint);
      box-shadow: 0 0 0 6px rgba(239,231,225,0.30);
    }

    .themeDot{
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(203,184,174,0.25);
    }

    .panel{
      position:absolute;
      top: 44px;
      right: 0;
      width: 320px;
      border-radius: 16px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.94);
      box-shadow: 0 18px 40px rgba(30,20,10,.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 12px;
      display:none;
      z-index: 50;
      max-height: min(76vh, 680px);
      overflow:auto;
    }

    .panel.open{ display:block; }

    .panelTitle{
      margin:0 0 10px 0;
      font-size:12px;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      color: rgba(43,42,40,0.72);
    }

    .pRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 7px 0;
    }

    .pRow label{ font-size:12px; color:var(--muted); }

    .pRow input[type="color"]{
      width:42px; height:32px;
      border-radius:10px;
      padding:0;
      border:1px solid var(--stroke);
      background: transparent;
      cursor:pointer;
      flex:0 0 auto;
    }

    .pRow input[type="range"]{ width: 160px; max-width:100%; }
    .pFile{ width:100%; font-size:12px; color: rgba(43,42,40,0.75); }

    .miniBtn{
      width:100%;
      border-radius:12px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.95);
      padding:10px 12px;
      font-weight:700;
      letter-spacing:.06em;
      text-transform:uppercase;
      font-size:11px;
      color: rgba(43,42,40,0.82);
      box-shadow: 0 2px 8px rgba(30,20,10,.06);
      cursor:pointer;
    }

    .miniBtn:active{ transform: translateY(1px); }
    .pDiv{ height:1px; background: var(--stroke); margin: 8px 0; }

    .presetName{
      width:100%;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.96);
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
      color: var(--ink);
      outline:none;
    }

    .presetSelect{
      width:100%;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.96);
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
      color: var(--ink);
      outline:none;
      height:38px;
    }

    .status{
      font-size:12px;
      color: var(--muted);
      margin-top: 6px;
      min-height: 16px;
    }

    @media (max-width: 760px){
      body{ padding:14px; }
      .row{ flex-direction:column; align-items:stretch; }
      .item .right{ width:100%; justify-content:flex-end; }
      .panel{
        position: fixed !important;
        top: 14px !important;
        left: 14px !important;
        right: 14px !important;
        width: auto !important;
        max-height: calc(100dvh - 28px);
      }
      input, select, textarea{ font-size:16px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Subscriptions</h1>

    <div class="widgetBoard">
      <div class="boardTint" id="boardTint"></div>
      <div class="boardContent">
        <section class="card">
          <div class="title">
            <h2>Add a subscription</h2>

            <div class="tools">
              <div class="popWrap" id="themeWrap">
                <button class="iconBtn" id="themeBtn" type="button" aria-label="Theme settings" title="Theme settings">
                  <span class="dot themeDot" id="themeDot" aria-hidden="true"></span>
                </button>

                <div class="panel" id="themePanel" role="dialog" aria-label="Theme settings">
                  <div class="panelTitle">Theme</div>

                  <button class="miniBtn" id="themeApply" type="button">Apply theme</button>
                  <button class="miniBtn" id="themeReset" type="button" style="margin-top:8px;">Reset theme</button>

                  <div class="pDiv"></div>

                  <div class="pRow"><label for="tBg">App background</label><input id="tBg" type="color" value="#ffffff"></div>
                  <div class="pRow"><label for="tInk">Text</label><input id="tInk" type="color" value="#2b2a28"></div>
                  <div class="pRow"><label for="tMuted">Muted</label><input id="tMuted" type="color" value="#6a665f"></div>
                  <div class="pRow"><label for="tAccent">Accent</label><input id="tAccent" type="color" value="#cbb8ae"></div>

                  <div class="pDiv"></div>

                  <div class="pRow"><label for="tCard">Card background</label><input id="tCard" type="color" value="#ffffff"></div>
                  <div class="pRow"><label for="tCardA">Card opacity</label><input id="tCardA" type="range" min="40" max="100" value="80"></div>

                  <div class="pDiv"></div>

                  <div class="pRow"><label for="tStroke">Borders</label><input id="tStroke" type="color" value="#e9e4dd"></div>
                  <div class="pRow"><label for="tSoft">Soft panels</label><input id="tSoft" type="color" value="#f3efe9"></div>
                  <div class="pRow"><label for="tItemBg">List item bg</label><input id="tItemBg" type="color" value="#ffffff"></div>
                  <div class="pRow"><label for="tInputBg">Input bg</label><input id="tInputBg" type="color" value="#ffffff"></div>

                  <div class="pDiv"></div>

                  <div class="pRow"><label for="tRadius">Roundness</label><input id="tRadius" type="range" min="10" max="28" value="18"></div>
                  <div class="pRow"><label for="tShadow">Shadow strength</label><input id="tShadow" type="range" min="0" max="30" value="6"></div>

                  <div class="pDiv"></div>

                  <div class="panelTitle" style="margin:0 0 10px 0;">Presets</div>

                  <input class="presetName" id="presetName" placeholder="Preset name">
                  <button class="miniBtn" id="presetSave" type="button" style="margin-top:8px;">Save current as preset</button>

                  <div class="pDiv"></div>

                  <select class="presetSelect" id="presetSelect"></select>

                  <button class="miniBtn" id="presetApply" type="button" style="margin-top:8px;">Apply preset</button>
                  <button class="miniBtn" id="presetDelete" type="button" style="margin-top:8px;">Delete preset</button>

                  <div class="status" id="presetStatus" aria-live="polite"></div>
                </div>
              </div>

              <div class="popWrap" id="bgWrap">
                <button class="iconBtn" id="bgBtn" type="button" aria-label="Background settings" title="Background settings">
                  <span class="dot" id="bgDot" aria-hidden="true"></span>
                </button>

                <div class="panel" id="bgPanel" role="dialog" aria-label="Background settings">
                  <div class="panelTitle">Background</div>

                  <button class="miniBtn" id="bgApply" type="button">Apply background</button>
                  <button class="miniBtn" id="bgReset" type="button" style="margin-top:8px;">Reset background</button>

                  <div class="pDiv"></div>

                  <div class="pRow">
                    <label for="bgColor">Tint</label>
                    <input id="bgColor" type="color" value="#efe7e1" />
                  </div>

                  <div class="pRow">
                    <label for="bgStrength">Strength</label>
                    <input id="bgStrength" type="range" min="0" max="70" value="30" />
                  </div>

                  <div class="pRow">
                    <label for="bgBlur">Image blur</label>
                    <input id="bgBlur" type="range" min="0" max="20" value="0" />
                  </div>

                  <div class="pDiv"></div>

                  <div class="pRow" style="align-items:flex-start;">
                    <label for="bgImage">Image</label>
                    <input id="bgImage" class="pFile" type="file" accept="image/*" />
                  </div>

                  <div class="pRow">
                    <button id="bgRemove" class="miniBtn" type="button">Remove image</button>
                  </div>

                  <div class="status" id="bgStatus" aria-live="polite"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="row">
            <input id="subName" placeholder="Name (e.g., Spotify)">
            <input id="subCost" type="number" step="0.01" placeholder="Monthly cost">
            <input id="subRenew" type="number" min="1" max="31" placeholder="Renew date (1–31)">

            <label class="tiny">
              Currency
              <select id="currency">
                <option value="AUTO">Auto (from locale)</option>
                <option value="GBP">GBP (£)</option>
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="NGN">NGN (₦)</option>
                <option value="CAD">CAD ($)</option>
                <option value="AUD">AUD ($)</option>
                <option value="JPY">JPY (¥)</option>
                <option value="ZAR">ZAR (R)</option>
              </select>
            </label>

            <button id="subAdd" class="primary">Add</button>
            <button class="danger" id="resetBtn" type="button">Reset</button>
          </div>

          <div class="divider"></div>

          <div class="kpi">
            <div class="box">
              <div class="num" id="kTotal">—</div>
              <div class="lab">Total monthly cost</div>
            </div>
            <div class="box">
              <div class="num" id="kCount">—</div>
              <div class="lab">Subscriptions</div>
            </div>
            <div class="box">
              <div class="num" id="kSoon">—</div>
              <div class="lab">Next renewal</div>
            </div>
          </div>

          <div class="divider"></div>

          <div class="list" id="subsList"></div>
        </section>
      </div>
    </div>
  </div>

<script>
(function(){
  "use strict";

  function canUseLocalStorage(){
    try{
      const k="__subs__"+Math.random().toString(16).slice(2);
      localStorage.setItem(k,"1");
      localStorage.removeItem(k);
      return true;
    }catch{
      return false;
    }
  }

  const hasLS = canUseLocalStorage();
  const mem = Object.create(null);

  function storageGet(key){
    try{ return hasLS ? localStorage.getItem(key) : (mem[key] ?? null); }
    catch{ return mem[key] ?? null; }
  }
  function storageSet(key, value){
    try{ if(hasLS) localStorage.setItem(key, value); else mem[key]=String(value); }
    catch{ mem[key]=String(value); }
  }
  function storageRemove(key){
    try{ if(hasLS) localStorage.removeItem(key); else delete mem[key]; }
    catch{ delete mem[key]; }
  }

  function sanitizeId(value){
    return String(value || "")
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9_-]+/g, "-")
      .replace(/^-+|-+$/g, "") || "default";
  }

  function getWidgetId(){
    try{
      const sp = new URLSearchParams(location.search);
      const wid = sanitizeId(sp.get("wid"));
      if(wid && wid !== "default") return wid;
    }catch{}
    const fromPath = sanitizeId(location.pathname.replace(/\.[^/.]+$/, ""));
    return fromPath || "default";
  }

  const WID = getWidgetId();
  const PRESETS_KEY = "subscriptions_presets_v4";
  const BC_NAME = "subscriptions-tracker-sync";
  const channel = ("BroadcastChannel" in window) ? new BroadcastChannel(BC_NAME) : null;

  function broadcast(type, payload){
    try{
      if(channel) channel.postMessage({ type, payload, wid: WID, ts: Date.now() });
    }catch{}
  }

  const DB_NAME = "subscriptions_tracker_db_v4";
  const DB_STORE = "kv";
  let dbPromise = null;

  function openDB(){
    if(dbPromise) return dbPromise;

    dbPromise = new Promise((resolve) => {
      if(!("indexedDB" in window)){
        resolve(null);
        return;
      }

      const request = indexedDB.open(DB_NAME, 1);

      request.onupgradeneeded = () => {
        const db = request.result;
        if(!db.objectStoreNames.contains(DB_STORE)){
          db.createObjectStore(DB_STORE);
        }
      };

      request.onsuccess = () => resolve(request.result);
      request.onerror = () => resolve(null);
    });

    return dbPromise;
  }

  async function idbGet(key){
    const db = await openDB();
    if(!db) return null;

    return new Promise((resolve) => {
      try{
        const tx = db.transaction(DB_STORE, "readonly");
        const store = tx.objectStore(DB_STORE);
        const req = store.get(key);
        req.onsuccess = () => resolve(req.result ?? null);
        req.onerror = () => resolve(null);
      }catch{
        resolve(null);
      }
    });
  }

  async function idbSet(key, value){
    const db = await openDB();
    if(!db) return false;

    return new Promise((resolve) => {
      try{
        const tx = db.transaction(DB_STORE, "readwrite");
        const store = tx.objectStore(DB_STORE);
        const req = store.put(value, key);
        req.onsuccess = () => resolve(true);
        req.onerror = () => resolve(false);
      }catch{
        resolve(false);
      }
    });
  }

  async function idbRemove(key){
    const db = await openDB();
    if(!db) return false;

    return new Promise((resolve) => {
      try{
        const tx = db.transaction(DB_STORE, "readwrite");
        const store = tx.objectStore(DB_STORE);
        const req = store.delete(key);
        req.onsuccess = () => resolve(true);
        req.onerror = () => resolve(false);
      }catch{
        resolve(false);
      }
    });
  }

  function hexToRgba(hex, a){
    const h = String(hex || "").replace("#","").trim();
    const full = h.length === 3 ? h.split("").map(c=>c+c).join("") : h;
    const num = parseInt(full || "efe7e1", 16);
    const r = (num >> 16) & 255;
    const g = (num >> 8) & 255;
    const b = num & 255;
    return `rgba(${r},${g},${b},${a})`;
  }

  function clamp(n,min,max){
    n = Number(n);
    if(!Number.isFinite(n)) return min;
    return Math.max(min, Math.min(max, n));
  }

  function normHex(hex, fallback){
    const s = String(hex||"").trim();
    return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : fallback;
  }

  function loadJSON(key, fallback = null){
    try{
      const raw = storageGet(key);
      return raw ? JSON.parse(raw) : fallback;
    }catch{
      return fallback;
    }
  }

  function saveJSON(key, val){
    storageSet(key, JSON.stringify(val));
  }

  function uid(){
    return Math.random().toString(16).slice(2) + Date.now().toString(16);
  }

  async function fileToDataUrl(file){
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(String(r.result || ""));
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  const KEY = "subscriptions_tracker_v4__" + WID;
  const CUR_KEY = "subscriptions_currency_pref_v4__" + WID;
  const BG_KEY = "subscriptions_bg_v4__" + WID;
  const BG_IMAGE_KEY = "subscriptions_bg_image_v4__" + WID;
  const THEME_KEY = "subscriptions_theme_v4__" + WID;

  const REGION_TO_CURRENCY = {
    GB:"GBP", US:"USD", CA:"CAD", AU:"AUD", NZ:"NZD",
    IE:"EUR", FR:"EUR", DE:"EUR", ES:"EUR", IT:"EUR", NL:"EUR", PT:"EUR",
    BE:"EUR", AT:"EUR", FI:"EUR", GR:"EUR", CY:"EUR", MT:"EUR",
    SK:"EUR", SI:"EUR", EE:"EUR", LV:"EUR", LT:"EUR", LU:"EUR",
    JP:"JPY", CN:"CNY", IN:"INR", NG:"NGN", ZA:"ZAR", KE:"KES",
    GH:"GHS", BR:"BRL", MX:"MXN", CH:"CHF", SE:"SEK", NO:"NOK",
    DK:"DKK", PL:"PLN", CZ:"CZK", HU:"HUF", RO:"RON", TR:"TRY"
  };

  function getRegionFromLocale(locale){
    try{
      if (typeof Intl !== "undefined" && Intl.Locale){
        const loc = new Intl.Locale(locale);
        if (loc.region) return loc.region.toUpperCase();
      }
    }catch{}
    const norm = String(locale || "").replace("_","-");
    const parts = norm.split("-");
    return (parts[1] || "").toUpperCase();
  }

  function autoCurrency(){
    const locale = Intl.NumberFormat().resolvedOptions().locale || navigator.language || "";
    const region = getRegionFromLocale(locale);
    return REGION_TO_CURRENCY[region] || "";
  }

  function money(n){
    const v = Number(n||0);
    if(!isFinite(v)) return "0";
    const locale = Intl.NumberFormat().resolvedOptions().locale || navigator.language || undefined;
    const pref = storageGet(CUR_KEY) || "AUTO";
    const cur = (pref === "AUTO") ? autoCurrency() : pref;

    try{
      if(cur){
        return new Intl.NumberFormat(locale, { style:"currency", currency: cur }).format(v);
      }
      return new Intl.NumberFormat(locale, { minimumFractionDigits:2, maximumFractionDigits:2 }).format(v);
    }catch{
      return v.toFixed(2);
    }
  }

  function ordinal(n){
    const s = ["th","st","nd","rd"];
    const v = n % 100;
    return n + (s[(v-20)%10] || s[v] || s[0]);
  }

  function defaultState(){
    return { subs: [] };
  }

  function sanitizeSub(sub){
    return {
      id: String(sub?.id || uid()),
      name: String(sub?.name || "").trim(),
      cost: Math.max(0, Number(sub?.cost || 0)),
      renewDay: clamp(sub?.renewDay, 1, 31),
      worthIt: sub?.worthIt !== false
    };
  }

  function sanitizeState(state){
    const src = state && typeof state === "object" ? state : {};
    return {
      subs: Array.isArray(src.subs) ? src.subs.map(sanitizeSub).filter(s => s.name && s.cost > 0) : []
    };
  }

  const DEFAULT_BG = { tint:"#efe7e1", strength:30, blur:0 };
  const DEFAULT_THEME = {
    bg:"#ffffff",
    ink:"#2b2a28",
    muted:"#6a665f",
    accent:"#cbb8ae",
    stroke:"#e9e4dd",
    soft:"#f3efe9",
    itemBg:"#ffffff",
    inputBg:"#ffffff",
    card:"#ffffff",
    cardA: 0.80,
    radius:18,
    shadow:6
  };

  const $ = (id)=>document.getElementById(id);

  const els = {
    themeBtn:$("themeBtn"),
    themePanel:$("themePanel"),
    bgBtn:$("bgBtn"),
    bgPanel:$("bgPanel"),

    themeDot:$("themeDot"),
    bgDot:$("bgDot"),
    boardTint:$("boardTint"),

    tBg:$("tBg"),
    tInk:$("tInk"),
    tMuted:$("tMuted"),
    tAccent:$("tAccent"),
    tCard:$("tCard"),
    tCardA:$("tCardA"),
    tStroke:$("tStroke"),
    tSoft:$("tSoft"),
    tItemBg:$("tItemBg"),
    tInputBg:$("tInputBg"),
    tRadius:$("tRadius"),
    tShadow:$("tShadow"),
    themeApply:$("themeApply"),
    themeReset:$("themeReset"),

    presetName:$("presetName"),
    presetSelect:$("presetSelect"),
    presetSave:$("presetSave"),
    presetApply:$("presetApply"),
    presetDelete:$("presetDelete"),
    presetStatus:$("presetStatus"),

    bgColor:$("bgColor"),
    bgStrength:$("bgStrength"),
    bgBlur:$("bgBlur"),
    bgImage:$("bgImage"),
    bgRemove:$("bgRemove"),
    bgApply:$("bgApply"),
    bgReset:$("bgReset"),
    bgStatus:$("bgStatus"),

    subName:$("subName"),
    subCost:$("subCost"),
    subRenew:$("subRenew"),
    currency:$("currency"),
    subAdd:$("subAdd"),
    resetBtn:$("resetBtn"),
    kTotal:$("kTotal"),
    kCount:$("kCount"),
    kSoon:$("kSoon"),
    subsList:$("subsList")
  };

  function setStatus(msg){
    els.presetStatus.textContent = msg || "";
    els.bgStatus.textContent = msg || "";
  }

  function safeBg(bg){
    const x = Object.assign({}, DEFAULT_BG, bg || {});
    return {
      tint: normHex(x.tint, DEFAULT_BG.tint),
      strength: clamp(x.strength, 0, 70),
      blur: clamp(x.blur, 0, 20)
    };
  }

  function safeTheme(t){
    const x = Object.assign({}, DEFAULT_THEME, t || {});
    return {
      bg: normHex(x.bg, DEFAULT_THEME.bg),
      ink: normHex(x.ink, DEFAULT_THEME.ink),
      muted: normHex(x.muted, DEFAULT_THEME.muted),
      accent: normHex(x.accent, DEFAULT_THEME.accent),
      stroke: normHex(x.stroke, DEFAULT_THEME.stroke),
      soft: normHex(x.soft, DEFAULT_THEME.soft),
      itemBg: normHex(x.itemBg, DEFAULT_THEME.itemBg),
      inputBg: normHex(x.inputBg, DEFAULT_THEME.inputBg),
      card: normHex(x.card, DEFAULT_THEME.card),
      cardA: clamp(x.cardA, 0.40, 1.00),
      radius: clamp(x.radius, 10, 28),
      shadow: clamp(x.shadow, 0, 30)
    };
  }

  function applyTheme(t){
    const x = safeTheme(t);
    const r = document.documentElement.style;

    r.setProperty("--page-bg", x.bg);
    r.setProperty("--bg", x.bg);
    r.setProperty("--ink", x.ink);
    r.setProperty("--muted", x.muted);
    r.setProperty("--accent", x.accent);
    r.setProperty("--stroke", x.stroke);
    r.setProperty("--soft", x.soft);
    r.setProperty("--item-bg", x.itemBg);
    r.setProperty("--input-bg", x.inputBg);
    r.setProperty("--card", hexToRgba(x.card, x.cardA));
    r.setProperty("--r", x.radius + "px");
    r.setProperty("--shadow", `0 10px 30px rgba(30,20,10,${(0.02 + (x.shadow / 100)).toFixed(3)})`);

    els.themeDot.style.background = x.accent;
    els.themeDot.style.boxShadow = `0 0 0 6px ${hexToRgba(x.accent, 0.25)}`;
    return x;
  }

  function syncThemeInputs(t){
    els.tBg.value = t.bg;
    els.tInk.value = t.ink;
    els.tMuted.value = t.muted;
    els.tAccent.value = t.accent;
    els.tCard.value = t.card;
    els.tCardA.value = String(Math.round(t.cardA * 100));
    els.tStroke.value = t.stroke;
    els.tSoft.value = t.soft;
    els.tItemBg.value = t.itemBg;
    els.tInputBg.value = t.inputBg;
    els.tRadius.value = String(t.radius);
    els.tShadow.value = String(t.shadow);
  }

  function readThemeInputs(){
    return safeTheme({
      bg: els.tBg.value,
      ink: els.tInk.value,
      muted: els.tMuted.value,
      accent: els.tAccent.value,
      card: els.tCard.value,
      cardA: clamp(Number(els.tCardA.value) / 100, 0.40, 1.00),
      stroke: els.tStroke.value,
      soft: els.tSoft.value,
      itemBg: els.tItemBg.value,
      inputBg: els.tInputBg.value,
      radius: Number(els.tRadius.value),
      shadow: Number(els.tShadow.value)
    });
  }

  function applyBackground(bg, imageDataUrl){
    const x = safeBg(bg);
    const strength = x.strength / 100;

    document.documentElement.style.setProperty("--board-tint", x.tint);
    document.documentElement.style.setProperty("--board-tint-a", String(strength));
    document.documentElement.style.setProperty("--board-image", imageDataUrl ? `url("${imageDataUrl}")` : "none");
    document.documentElement.style.setProperty("--board-blur", `${x.blur}px`);

    els.boardTint.style.background = hexToRgba(x.tint, strength);
    els.bgDot.style.background = x.tint;
    els.bgDot.style.boxShadow = `0 0 0 6px ${hexToRgba(x.tint, Math.min(0.35, strength + 0.12))}`;

    const overlayAlpha = clamp(strength + 0.08, 0.08, 0.55);
    let st = document.getElementById("subs_overlay_style");
    if(!st){
      st = document.createElement("style");
      st.id = "subs_overlay_style";
      document.head.appendChild(st);
    }
    st.textContent = `.widgetBoard::after{background:${hexToRgba("#ffffff", overlayAlpha)} !important;}`;
  }

  function syncBackgroundInputs(bg){
    els.bgColor.value = bg.tint;
    els.bgStrength.value = String(bg.strength);
    els.bgBlur.value = String(bg.blur);
  }

  function readBackgroundInputs(){
    return safeBg({
      tint: els.bgColor.value,
      strength: Number(els.bgStrength.value),
      blur: Number(els.bgBlur.value)
    });
  }

  async function saveBackground(bg, imageDataUrl){
    saveJSON(BG_KEY, safeBg(bg));
    if(imageDataUrl){
      await idbSet(BG_IMAGE_KEY, imageDataUrl);
    }else{
      await idbRemove(BG_IMAGE_KEY);
    }
    broadcast("background");
  }

  async function loadBackground(){
    const bg = safeBg(loadJSON(BG_KEY, DEFAULT_BG));
    const image = await idbGet(BG_IMAGE_KEY);
    return {
      bg,
      imageDataUrl: (typeof image === "string" && image) ? image : null
    };
  }

  async function saveTheme(theme){
    saveJSON(THEME_KEY, safeTheme(theme));
    broadcast("theme");
  }

  async function loadTheme(){
    return safeTheme(loadJSON(THEME_KEY, DEFAULT_THEME));
  }

  async function loadPresets(){
    const list = loadJSON(PRESETS_KEY, []);
    return Array.isArray(list) ? list : [];
  }

  async function savePresets(list){
    saveJSON(PRESETS_KEY, Array.isArray(list) ? list : []);
    broadcast("presets");
  }

  function presetImageKey(id){
    return `subscriptions_preset_image_v4__${id}`;
  }

  async function refreshPresetSelect(){
    const list = await loadPresets();
    const cur = els.presetSelect.value;
    els.presetSelect.innerHTML = `<option value="">—</option>`;
    for(const p of list){
      const opt = document.createElement("option");
      opt.value = p.id;
      opt.textContent = p.name || "Untitled";
      els.presetSelect.appendChild(opt);
    }
    if(cur && list.some(x => x.id === cur)){
      els.presetSelect.value = cur;
    }
  }

  async function getPresetById(id){
    const list = await loadPresets();
    return list.find(x => x.id === id) || null;
  }

  function daysUntilRenew(renewDay){
    const now = new Date();
    const d = now.getDate();
    let diff = renewDay - d;
    if(diff < 0) diff += 31;
    return diff;
  }

  function sortByNextRenew(subs){
    return [...subs].sort((a,b)=> daysUntilRenew(a.renewDay) - daysUntilRenew(b.renewDay));
  }

  function renderKPIs(sorted){
    const total = sorted.reduce((a,s)=>a + Number(s.cost||0), 0);
    els.kTotal.textContent = money(total);
    els.kCount.textContent = String(sorted.length);

    if(sorted.length === 0){
      els.kSoon.textContent = "—";
      return;
    }
    const next = sorted[0];
    const inDays = daysUntilRenew(next.renewDay);
    const soonTxt = inDays === 0 ? "Today" : inDays === 1 ? "Tomorrow" : `In ${inDays} days`;
    els.kSoon.textContent = `${next.name} · ${soonTxt}`;
  }

  function renderList(sorted){
    els.subsList.innerHTML = "";

    if(sorted.length === 0){
      els.subsList.innerHTML = `<div class="tiny">No subscriptions added yet.</div>`;
      return;
    }

    for(const s of sorted){
      const inDays = daysUntilRenew(s.renewDay);
      const soon = inDays === 0 ? "renews today" : inDays === 1 ? "renews tomorrow" : `renews in ${inDays} days`;
      const el = document.createElement("div");
      el.className = "item";
      el.innerHTML = `
        <div class="meta">
          <b>${s.name} · ${money(s.cost)}/mo</b>
          <span>Renews ${ordinal(s.renewDay)} · ${soon}</span>
        </div>
        <div class="right">
          <span class="tag ${s.worthIt ? "" : "off"}" data-toggle="${s.id}">
            ${s.worthIt ? "Still worth it" : "Not sure"}
          </span>
          <button class="smallbtn" data-del="${s.id}" title="Remove" type="button" aria-label="Remove subscription">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none">
              <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
            </svg>
          </button>
        </div>
      `;
      els.subsList.appendChild(el);
    }

    els.subsList.querySelectorAll("[data-toggle]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const id = btn.getAttribute("data-toggle");
        const sub = state.subs.find(x=>x.id===id);
        if(!sub) return;
        sub.worthIt = !sub.worthIt;
        saveState();
        renderAll();
      });
    });

    els.subsList.querySelectorAll("[data-del]").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const id = btn.getAttribute("data-del");
        state.subs = state.subs.filter(x=>x.id!==id);
        saveState();
        renderAll();
      });
    });
  }

  function renderAll(){
    const sorted = sortByNextRenew(state.subs);
    renderKPIs(sorted);
    renderList(sorted);
  }

  function saveState(){
    saveJSON(KEY, sanitizeState(state));
    broadcast("subscriptions");
  }

  let state = sanitizeState(loadJSON(KEY, defaultState()));
  let themeDraft = safeTheme(DEFAULT_THEME);
  let bgDraft = safeBg(DEFAULT_BG);
  let bgDraftImage = null;

  function closeAllPanels(except){
    [els.themePanel, els.bgPanel].forEach(p=>{
      if(!p) return;
      if(p !== except) p.classList.remove("open");
    });
  }

  els.themeBtn.addEventListener("click", (e)=>{
    e.stopPropagation();
    const open = !els.themePanel.classList.contains("open");
    closeAllPanels(open ? els.themePanel : null);
    els.themePanel.classList.toggle("open", open);
  });

  els.bgBtn.addEventListener("click", (e)=>{
    e.stopPropagation();
    const open = !els.bgPanel.classList.contains("open");
    closeAllPanels(open ? els.bgPanel : null);
    els.bgPanel.classList.toggle("open", open);
  });

  document.addEventListener("click",(e)=>{
    const inside =
      e.target.closest("#themePanel") || e.target.closest("#themeBtn") ||
      e.target.closest("#bgPanel") || e.target.closest("#bgBtn");
    if(!inside) closeAllPanels(null);
  });

  [els.tBg, els.tInk, els.tMuted, els.tAccent, els.tCard, els.tCardA, els.tStroke, els.tSoft, els.tItemBg, els.tInputBg, els.tRadius, els.tShadow].forEach(el=>{
    el.addEventListener("input", ()=>{
      themeDraft = applyTheme(readThemeInputs());
      setStatus("");
    });
  });

  els.themeApply.addEventListener("click", async ()=>{
    themeDraft = applyTheme(readThemeInputs());
    syncThemeInputs(themeDraft);
    await saveTheme(themeDraft);
    setStatus("Theme applied.");
  });

  els.themeReset.addEventListener("click", async ()=>{
    themeDraft = applyTheme(DEFAULT_THEME);
    syncThemeInputs(themeDraft);
    await saveTheme(themeDraft);
    setStatus("Theme reset.");
  });

  els.bgColor.addEventListener("input", ()=>{
    bgDraft = readBackgroundInputs();
    applyBackground(bgDraft, bgDraftImage);
    setStatus("");
  });

  els.bgStrength.addEventListener("input", ()=>{
    bgDraft = readBackgroundInputs();
    applyBackground(bgDraft, bgDraftImage);
    setStatus("");
  });

  els.bgBlur.addEventListener("input", ()=>{
    bgDraft = readBackgroundInputs();
    applyBackground(bgDraft, bgDraftImage);
    setStatus("");
  });

  els.bgImage.addEventListener("change", async ()=>{
    const file = els.bgImage.files && els.bgImage.files[0];
    if(!file) return;
    try{
      bgDraftImage = await fileToDataUrl(file);
      applyBackground(bgDraft, bgDraftImage);
      setStatus("");
    }catch{
      setStatus("Could not load image.");
    }
  });

  els.bgRemove.addEventListener("click", ()=>{
    bgDraftImage = null;
    els.bgImage.value = "";
    applyBackground(bgDraft, bgDraftImage);
    setStatus("");
  });

  els.bgApply.addEventListener("click", async ()=>{
    bgDraft = readBackgroundInputs();
    applyBackground(bgDraft, bgDraftImage);
    await saveBackground(bgDraft, bgDraftImage);
    setStatus("Background applied.");
  });

  els.bgReset.addEventListener("click", async ()=>{
    bgDraft = safeBg(DEFAULT_BG);
    bgDraftImage = null;
    els.bgImage.value = "";
    syncBackgroundInputs(bgDraft);
    applyBackground(bgDraft, bgDraftImage);
    await saveBackground(bgDraft, bgDraftImage);
    setStatus("Background reset.");
  });

  els.presetSave.addEventListener("click", async ()=>{
    const name = (els.presetName.value || "").trim();
    if(!name){
      setStatus("Type a preset name first.");
      return;
    }

    const list = await loadPresets();
    const id = uid();

    list.unshift({
      id,
      name,
      theme: readThemeInputs(),
      bg: readBackgroundInputs(),
      hasImage: !!bgDraftImage
    });

    if(bgDraftImage){
      await idbSet(presetImageKey(id), bgDraftImage);
    }

    await savePresets(list);
    els.presetName.value = "";
    await refreshPresetSelect();
    els.presetSelect.value = id;
    setStatus("Preset saved.");
  });

  els.presetApply.addEventListener("click", async ()=>{
    const id = els.presetSelect.value || "";
    if(!id){
      setStatus("Choose a preset first.");
      return;
    }

    const p = await getPresetById(id);
    if(!p){
      setStatus("Preset not found.");
      return;
    }

    themeDraft = applyTheme(safeTheme(p.theme || DEFAULT_THEME));
    syncThemeInputs(themeDraft);
    await saveTheme(themeDraft);

    bgDraft = safeBg(p.bg || DEFAULT_BG);
    bgDraftImage = p.hasImage ? await idbGet(presetImageKey(id)) : null;
    syncBackgroundInputs(bgDraft);
    applyBackground(bgDraft, bgDraftImage);
    await saveBackground(bgDraft, bgDraftImage);

    setStatus("Preset applied.");
  });

  els.presetDelete.addEventListener("click", async ()=>{
    const id = els.presetSelect.value || "";
    if(!id){
      setStatus("Choose a preset first.");
      return;
    }

    const list = await loadPresets();
    const next = list.filter(x=>x.id!==id);
    if(next.length === list.length){
      setStatus("Preset not found.");
      return;
    }

    await idbRemove(presetImageKey(id));
    await savePresets(next);
    await refreshPresetSelect();
    els.presetSelect.value = "";
    setStatus("Preset deleted.");
  });

  els.currency.value = storageGet(CUR_KEY) || "AUTO";
  els.currency.addEventListener("change", ()=>{
    storageSet(CUR_KEY, els.currency.value);
    renderAll();
    broadcast("currency");
  });

  els.subAdd.addEventListener("click", ()=>{
    const name = els.subName.value.trim();
    const cost = Number(els.subCost.value);
    const renewDay = Number(els.subRenew.value);

    if(!name) return alert("Name is required.");
    if(!isFinite(cost) || cost <= 0) return alert("Enter a valid monthly cost.");
    if(!Number.isFinite(renewDay) || renewDay < 1 || renewDay > 31) return alert("Renew date must be 1–31.");

    state.subs.unshift(sanitizeSub({ id: uid(), name, cost, renewDay, worthIt: true }));
    saveState();

    els.subName.value = "";
    els.subCost.value = "";
    els.subRenew.value = "";

    renderAll();
  });

  [els.subName, els.subCost, els.subRenew].forEach(el => {
    el.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        e.preventDefault();
        els.subAdd.click();
      }
    });
  });

  els.resetBtn.addEventListener("click", ()=>{
    storageRemove(KEY);
    state = defaultState();
    saveState();
    renderAll();
  });

  window.addEventListener("pagehide", () => {
    saveJSON(KEY, sanitizeState(state));
  });

  document.addEventListener("visibilitychange", () => {
    if(document.visibilityState === "hidden"){
      saveJSON(KEY, sanitizeState(state));
    }
  });

  window.addEventListener("storage", async (e) => {
    if(!e.key) return;

    if(e.key === THEME_KEY){
      themeDraft = applyTheme(await loadTheme());
      syncThemeInputs(themeDraft);
    }

    if(e.key === BG_KEY){
      const savedBg = await loadBackground();
      bgDraft = savedBg.bg;
      bgDraftImage = savedBg.imageDataUrl;
      syncBackgroundInputs(bgDraft);
      applyBackground(bgDraft, bgDraftImage);
    }

    if(e.key === PRESETS_KEY){
      await refreshPresetSelect();
    }

    if(e.key === KEY){
      state = sanitizeState(loadJSON(KEY, defaultState()));
      renderAll();
    }

    if(e.key === CUR_KEY){
      els.currency.value = storageGet(CUR_KEY) || "AUTO";
      renderAll();
    }
  });

  if(channel){
    channel.onmessage = async (event) => {
      const msg = event.data || {};
      if(!msg.type) return;

      if(msg.type === "theme"){
        themeDraft = applyTheme(await loadTheme());
        syncThemeInputs(themeDraft);
      }

      if(msg.type === "background"){
        const savedBg = await loadBackground();
        bgDraft = savedBg.bg;
        bgDraftImage = savedBg.imageDataUrl;
        syncBackgroundInputs(bgDraft);
        applyBackground(bgDraft, bgDraftImage);
      }

      if(msg.type === "presets"){
        await refreshPresetSelect();
      }

      if(msg.type === "subscriptions"){
        state = sanitizeState(loadJSON(KEY, defaultState()));
        renderAll();
      }

      if(msg.type === "currency"){
        els.currency.value = storageGet(CUR_KEY) || "AUTO";
        renderAll();
      }
    };
  }

  async function init(){
    themeDraft = applyTheme(await loadTheme());
    syncThemeInputs(themeDraft);

    const savedBg = await loadBackground();
    bgDraft = savedBg.bg;
    bgDraftImage = savedBg.imageDataUrl;
    syncBackgroundInputs(bgDraft);
    applyBackground(bgDraft, bgDraftImage);

    await refreshPresetSelect();
    renderAll();
  }

  init();
})();
</script>
</body>
</html>
