<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Library Widget</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root{
      --bg:#ffffff;
      --card: rgba(255,255,255,0.84);
      --card-a: 0.84;
      --stroke:#e9e4dd;
      --ink:#2b2a28;
      --muted:#6a665f;
      --soft:#f3efe9;
      --shadow:0 10px 30px rgba(30,20,10,.06);
      --r:18px;

      --board-tint:#efe7e1;
      --board-tint-a:0.12;
      --board-image:none;
      --board-image-a:0.92;
      --board-image-blur:0px;

      --panel-bg: rgba(255,255,255,0.88);
      --field-bg:#ffffff;
      --theme-dot: var(--ink);
    }

    *{ box-sizing:border-box; }
    html, body{ min-height:100%; }
    body{
      margin:0;
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      color:var(--ink);
      background:var(--bg);
      padding:28px 18px;
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      overflow-x:hidden;
    }
    .wrap{ max-width:1100px; margin:0 auto; }
    h1{ margin:0; font-size:18px; }

    .widgetBoard{
      position:relative;
      border-radius:var(--r);
      overflow:hidden;
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      isolation:isolate;
    }
    .widgetBoard::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:var(--board-image);
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      z-index:0;
      pointer-events:none;
      opacity:var(--board-image-a);
      filter:blur(var(--board-image-blur)) saturate(1.02) contrast(1.01) brightness(1.01);
      transform:scale(1.02);
      transform-origin:center;
    }
    .widgetBoard::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(900px 520px at 16% 22%, rgba(255,255,255,0.18), transparent 60%),
        radial-gradient(760px 520px at 84% 30%, rgba(255,255,255,0.12), transparent 62%);
      pointer-events:none;
      z-index:0;
    }

    .boardTint{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:1;
      background:rgba(0,0,0,0);
    }
    .boardContent{ position:relative; z-index:2; }

    .card{
      background:var(--card);
      border:0;
      border-radius:0;
      box-shadow:none;
      padding:14px;
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
    }

    .title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }
    .title h2{
      margin:0;
      font-size:14px;
      font-weight:650;
      letter-spacing:.2px;
      line-height:1.2;
    }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    button, input, select, textarea{
      font:inherit;
      border:1px solid var(--stroke);
      background:var(--field-bg);
      color:var(--ink);
      border-radius:12px;
      padding:10px 12px;
      outline:none;
      -webkit-tap-highlight-color:transparent;
    }
    button{
      cursor:pointer;
      user-select:none;
      touch-action:manipulation;
      line-height:1.15;
      white-space:nowrap;
    }
    button.soft{ background:var(--soft); }
    button.primary{ background:rgba(239,231,225,0.92); }
    button.danger{ border-color:#efc2c2; }
    button:active{ transform:translateY(1px); }
    .divider{ height:1px; background:var(--stroke); margin:12px 0; }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      border:1px solid var(--stroke);
      background:var(--field-bg);
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      white-space:nowrap;
      min-height:38px;
    }
    .tiny{ font-size:12px; color:var(--muted); line-height:1.35; }

    .bgWrap{
      position:relative;
      margin-left:auto;
      display:flex;
      gap:10px;
      align-items:center;
    }
    .bgBtn, .themeBtn{
      width:34px;
      height:34px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,0.92);
      padding:0;
      display:grid;
      place-items:center;
      box-shadow:0 3px 12px rgba(30,20,10,.08);
      flex:0 0 auto;
    }
    .bgDot, .themeDot{
      width:14px;
      height:14px;
      border-radius:999px;
      border:1px solid rgba(233,228,221,0.95);
      background:var(--board-tint);
      box-shadow:0 0 0 6px rgba(239,231,225,0.22);
    }
    .themeDot{
      background:var(--theme-dot);
      box-shadow:0 0 0 6px rgba(233,228,221,0.35);
    }

    .bgPanel{
      position:absolute;
      top:44px;
      right:0;
      width:min(310px, calc(100vw - 36px));
      border-radius:16px;
      border:1px solid var(--stroke);
      background:var(--panel-bg);
      box-shadow:0 18px 40px rgba(30,20,10,.12);
      padding:12px;
      display:none;
      z-index:50;
      max-height:calc(100vh - 140px);
      overflow:auto;
    }
    .bgPanel.open{ display:block; }
    .bgTitle{
      margin:0 0 10px 0;
      font-size:12px;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:rgba(43,42,40,0.72);
    }
    .bgRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:7px 0;
    }
    .bgRow label{ font-size:12px; color:var(--muted); }
    .bgRow input[type="color"]{
      width:36px;
      height:28px;
      border-radius:10px;
      padding:0;
      border:1px solid var(--stroke);
      background:transparent;
      cursor:pointer;
    }
    .bgRow input[type="range"]{ width:150px; }
    .bgFile{
      width:100%;
      font-size:12px;
      color:rgba(43,42,40,0.75);
    }
    .bgMiniBtn{
      width:100%;
      border-radius:12px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,0.97);
      padding:9px 10px;
      font-weight:700;
      letter-spacing:.06em;
      text-transform:uppercase;
      font-size:11px;
      color:rgba(43,42,40,0.82);
      box-shadow:0 2px 8px rgba(30,20,10,.06);
    }
    .bgDiv{ height:1px; background:var(--stroke); margin:8px 0; }

    .presetName{
      width:100%;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,0.97);
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
    }
    .status{
      font-size:12px;
      color:var(--muted);
      margin-top:6px;
      min-height:16px;
      line-height:1.35;
    }

    .shelfBar{
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:stretch;
    }

    .uploadGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      width:100%;
      align-items:end;
    }
    .uploadGrid .col{
      display:flex;
      flex-direction:column;
      gap:8px;
      min-width:240px;
      flex:1;
    }
    .uploadGrid label{
      font-size:12px;
      color:var(--muted);
      line-height:1.3;
    }
    .uploadGrid input[type="text"],
    .uploadGrid input[type="file"],
    .uploadGrid select{
      width:100%;
      min-height:42px;
    }

    .toolbarActions{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      width:100%;
    }
    .toolbarActions button{
      min-height:40px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .shelves{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-top:10px;
    }
    .shelf{
      border:1px solid var(--stroke);
      border-radius:16px;
      background:rgba(255,255,255,0.92);
      overflow:hidden;
    }
    .shelfHead{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      padding:10px 12px;
      background:rgba(243,239,233,0.75);
      border-bottom:1px solid var(--stroke);
      flex-wrap:wrap;
    }
    .shelfName{
      display:flex;
      gap:10px;
      align-items:center;
      min-width:0;
      flex:1;
      flex-wrap:wrap;
    }
    .shelfName input{
      border-radius:10px;
      padding:8px 10px;
      width:100%;
      min-width:180px;
      background:var(--field-bg);
      min-height:38px;
    }
    .shelfActions{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }
    .shelfActions button{
      min-height:38px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .books{
      display:flex;
      gap:12px;
      padding:12px;
      overflow:auto;
      scroll-snap-type:x mandatory;
      -webkit-overflow-scrolling:touch;
      min-height:216px;
      align-items:flex-start;
    }

    .emptyShelf{
      padding:8px 2px;
      min-height:148px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
    }

    .book{
      width:120px;
      flex:0 0 auto;
      scroll-snap-align:start;
      cursor:pointer;
      user-select:none;
    }
    .cover{
      width:120px;
      height:160px;
      border-radius:14px;
      border:1px solid var(--stroke);
      background:var(--field-bg);
      box-shadow:0 10px 18px rgba(30,20,10,.08);
      overflow:hidden;
      position:relative;
      display:grid;
      place-items:center;
    }
    .cover img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .cover .fallback{
      padding:10px;
      text-align:left;
      width:100%;
      height:100%;
      background:linear-gradient(135deg, rgba(239,231,225,0.9), rgba(255,255,255,1));
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      gap:8px;
    }
    .fallback .ftitle{
      font-weight:800;
      font-size:12px;
      line-height:1.25;
      color:rgba(43,42,40,0.9);
      overflow:hidden;
      display:-webkit-box;
      -webkit-line-clamp:4;
      -webkit-box-orient:vertical;
    }
    .fallback .fmeta{
      font-size:10px;
      color:rgba(106,102,95,0.95);
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .bookLabel{
      margin-top:8px;
      font-size:12px;
      color:rgba(43,42,40,0.9);
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      line-height:1.3;
    }
    .bookMiniRow{
      display:flex;
      gap:6px;
      margin-top:6px;
      flex-wrap:wrap;
      align-items:center;
    }
    .miniBtn{
      padding:6px 8px;
      border-radius:10px;
      font-size:11px;
      border:1px solid var(--stroke);
      background:rgba(243,239,233,0.9);
      min-height:30px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .miniBtn.danger{ border-color:#efc2c2; }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.35);
      display:none;
      z-index:200;
      padding:20px;
    }
    .modal.open{ display:flex; }
    .modalCard{
      margin:auto;
      width:min(1180px, 96vw);
      height:min(780px, 92vh);
      background:rgba(255,255,255,0.96);
      border:1px solid var(--stroke);
      border-radius:18px;
      box-shadow:0 30px 70px rgba(0,0,0,0.22);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    .modalTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 12px;
      border-bottom:1px solid var(--stroke);
      background:rgba(243,239,233,0.75);
      flex-wrap:wrap;
    }
    .modalTitle{
      font-weight:800;
      font-size:13px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      max-width:70%;
    }
    .modalBody{
      flex:1;
      background:var(--field-bg);
      min-height:0;
      position:relative;
    }

    .pdfShell{
      height:100%;
      display:flex;
      flex-direction:column;
      min-height:0;
    }
    .pdfToolbar{
      display:flex;
      align-items:center;
      gap:8px;
      padding:10px 12px;
      border-bottom:1px solid var(--stroke);
      background:rgba(243,239,233,0.55);
      flex-wrap:wrap;
    }
    .pdfToolbar .spacer{ flex:1; }
    .pdfToolbar button{
      min-height:36px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }
    .pdfInfo{
      font-size:12px;
      color:var(--muted);
      min-width:82px;
      text-align:center;
      line-height:1.35;
    }
    .pdfViewport{
      flex:1;
      overflow:auto;
      padding:16px;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      background:#f7f4ef;
      -webkit-overflow-scrolling:touch;
      min-height:0;
    }
    .pdfCanvasWrap{
      background:#fff;
      border:1px solid var(--stroke);
      border-radius:12px;
      box-shadow:0 12px 28px rgba(0,0,0,.08);
      overflow:hidden;
      max-width:100%;
      position:relative;
      line-height:1;
    }
    .pdfCanvas{
      display:block;
      max-width:100%;
      height:auto;
      position:relative;
      z-index:1;
    }

    .textLayer{
      position:absolute;
      inset:0;
      overflow:hidden;
      opacity:1;
      line-height:1;
      z-index:2;
      transform-origin:0 0;
      user-select:text;
      -webkit-user-select:text;
      color:transparent;
    }
    .textLayer span,
    .textLayer br{
      color:transparent;
      position:absolute;
      white-space:pre;
      cursor:text;
      transform-origin:0 0;
    }
    .textLayer ::selection{
      background:rgba(255,226,120,0.45);
    }
    .pdfHighlightLayer{
      position:absolute;
      inset:0;
      z-index:1.5;
      pointer-events:none;
    }
    .pdfHighlight{
      position:absolute;
      background:rgba(255,226,120,0.55);
      border-radius:3px;
      mix-blend-mode:multiply;
    }

    .readerFallback{
      width:100%;
      height:100%;
      overflow:auto;
      padding:16px;
      -webkit-overflow-scrolling:touch;
    }
    .readerFallback img{
      display:block;
      max-width:100%;
      height:auto;
      margin:0 auto;
      border-radius:12px;
    }
    .readerText{
      white-space:pre-wrap;
      word-break:break-word;
      font:14px/1.55 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      margin:0;
    }
    .readerEmpty{
      padding:16px;
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
    }

    .modalCard.moveCard{
      width:min(520px, 96vw);
      height:auto;
      max-height:92vh;
    }
    .moveBody{
      padding:14px;
      background:var(--field-bg);
    }
    .moveBody label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }
    .moveBody select{
      width:100%;
      margin-bottom:10px;
      min-height:42px;
    }

    @media (max-width: 820px){
      body{ padding:14px; }
      .uploadGrid{ grid-template-columns:1fr; }
      .book{ width:110px; }
      .cover{ width:110px; height:150px; }
      .bgWrap{ margin-left:0; }
      .modal{ padding:10px; }
      .modalCard{ width:100%; height:min(92vh, 100%); }
      .pdfToolbar{ padding:8px; }
      .pdfViewport{ padding:10px; }
      .modalTitle{ max-width:100%; }
      .books{ min-height:206px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1></h1>

    <div class="widgetBoard" id="widgetBoard" aria-label="Library board">
      <div class="boardTint" id="boardTint"></div>
      <div class="boardContent">
        <section class="card">
          <div class="title">
            <div>
              <h2>My shelves</h2>
            </div>

            <div class="bgWrap" id="bgWrap">
              <button class="bgBtn" id="bgBtn" type="button" aria-label="Background settings" title="Background settings">
                <span class="bgDot" id="bgDot" aria-hidden="true"></span>
              </button>

              <button class="themeBtn" id="themeBtn" type="button" aria-label="Theme settings" title="Theme settings">
                <span class="themeDot" id="themeDot" aria-hidden="true"></span>
              </button>

              <div class="bgPanel" id="bgPanel" role="dialog" aria-label="Background settings">
                <div class="bgTitle">Background</div>

                <div class="bgRow">
                  <label for="bgColor">Tint</label>
                  <input id="bgColor" type="color" value="#efe7e1" />
                </div>

                <div class="bgRow">
                  <label for="bgStrength">Tint strength</label>
                  <input id="bgStrength" type="range" min="0" max="70" value="12" />
                </div>

                <div class="bgRow">
                  <label for="bgImageA">Image visibility</label>
                  <input id="bgImageA" type="range" min="0" max="100" value="92" />
                </div>

                <div class="bgRow">
                  <label for="bgBlur">Image blur</label>
                  <input id="bgBlur" type="range" min="0" max="24" value="0" />
                </div>

                <div class="bgDiv"></div>

                <div class="bgRow" style="align-items:flex-start;">
                  <label for="bgImage">Image</label>
                  <input id="bgImage" class="bgFile" type="file" accept="image/*" />
                </div>

                <div class="bgRow">
                  <button id="bgRemove" class="bgMiniBtn" type="button">Remove image</button>
                </div>

                <div class="bgDiv"></div>

                <button id="bgApply" class="bgMiniBtn" type="button">Apply background</button>
                <button id="bgReset" class="bgMiniBtn" type="button" style="margin-top:8px;">Reset background</button>
              </div>

              <div class="bgPanel" id="themePanel" role="dialog" aria-label="Theme settings">
                <div class="bgTitle">Theme</div>

                <div class="bgRow">
                  <label for="tPageBg">Page bg</label>
                  <input id="tPageBg" type="color" value="#ffffff" />
                </div>

                <div class="bgRow">
                  <label for="tText">Text</label>
                  <input id="tText" type="color" value="#2b2a28" />
                </div>

                <div class="bgRow">
                  <label for="tMuted">Muted</label>
                  <input id="tMuted" type="color" value="#6a665f" />
                </div>

                <div class="bgDiv"></div>

                <div class="bgRow">
                  <label for="tStroke">Borders</label>
                  <input id="tStroke" type="color" value="#e9e4dd" />
                </div>

                <div class="bgRow">
                  <label for="tCard">Card</label>
                  <input id="tCard" type="color" value="#ffffff" />
                </div>

                <div class="bgRow">
                  <label for="tCardA">Card opacity</label>
                  <input id="tCardA" type="range" min="40" max="95" value="84" />
                </div>

                <div class="bgRow">
                  <label for="tSoft">Buttons</label>
                  <input id="tSoft" type="color" value="#f3efe9" />
                </div>

                <div class="bgDiv"></div>

                <button id="themeApply" class="bgMiniBtn" type="button">Apply theme</button>
                <button id="resetTheme" class="bgMiniBtn" type="button" style="margin-top:8px;">Reset theme</button>

                <div class="bgDiv"></div>

                <div class="bgTitle" style="margin-top:0;">Presets</div>

                <div class="bgRow" style="flex-direction:column; align-items:stretch; gap:10px;">
                  <input id="presetName" class="presetName" placeholder="Preset name" />
                  <button id="presetSave" class="bgMiniBtn" type="button">Save current as preset</button>
                </div>

                <div class="bgRow">
                  <label for="presetSelect">Choose</label>
                  <select id="presetSelect" style="width:160px;"></select>
                </div>

                <button id="presetApply" class="bgMiniBtn" type="button">Apply preset</button>
                <button id="presetDelete" class="bgMiniBtn" type="button" style="margin-top:8px;">Delete preset</button>

                <div class="status" id="presetStatus" aria-live="polite"></div>
              </div>
            </div>
          </div>

          <div class="divider"></div>

          <div class="shelfBar">
            <div class="uploadGrid" aria-label="Upload a book">
              <div class="col">
                <label for="fileInput">Book file (PDF recommended)</label>
                <input id="fileInput" type="file" accept="application/pdf,image/*,text/plain,application/epub+zip" />
              </div>

              <div class="col">
                <label for="coverInput">Optional cover image</label>
                <input id="coverInput" type="file" accept="image/*" />
              </div>

              <div class="col">
                <label for="bookTitle">Title (optional)</label>
                <input id="bookTitle" type="text" placeholder="" />
              </div>

              <div class="col">
                <label for="shelfSelect">Add to shelf</label>
                <div class="row" style="gap:8px;">
                  <select id="shelfSelect" style="min-width:220px; flex:1;"></select>
                  <button id="addBook" class="primary" type="button">Add book</button>
                </div>
              </div>
            </div>

            <div class="toolbarActions">
              <button id="addShelf" class="soft" type="button">Add shelf</button>
              <button id="resetAll" class="danger" type="button">Reset library</button>
            </div>
          </div>

(function initPdfJsWorker(){
  try{
    if(window.pdfjsLib){
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    }
  }catch(e){}
})();

(function(){
  const memoryStore = Object.create(null);

  function canUseLocalStorage(){
    try{
      const k = "__t__" + Math.random().toString(16).slice(2);
      localStorage.setItem(k, "1");
      localStorage.removeItem(k);
      return true;
    }catch{
      return false;
    }
  }

  const hasLS = canUseLocalStorage();

  function storageGet(key){
    try{
      return hasLS ? localStorage.getItem(key) : (memoryStore[key] ?? null);
    }catch{
      return memoryStore[key] ?? null;
    }
  }
  function storageSet(key, value){
    try{
      if(hasLS) localStorage.setItem(key, value);
      else memoryStore[key] = String(value);
    }catch{
      memoryStore[key] = String(value);
    }
  }
  function storageRemove(key){
    try{
      if(hasLS) localStorage.removeItem(key);
      else delete memoryStore[key];
    }catch{
      delete memoryStore[key];
    }
  }

  function hashString(str){
    let h = 2166136261;
    for(let i=0;i<str.length;i++){
      h ^= str.charCodeAt(i);
      h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
    }
    return "w" + (h >>> 0).toString(16);
  }

  function getWidgetId(){
    try{
      const sp = new URLSearchParams(location.search);
      const wid = (sp.get("wid") || "").trim();
      if(wid) return wid;
    }catch{}

    try{
      const el = document.getElementById("widgetBoard");
      const explicit = (el?.getAttribute("data-widget-id") || "").trim();
      if(explicit) return explicit;
    }catch{}

    const stableSource =
      location.origin + "|" +
      location.pathname + "|" +
      document.title + "|" +
      "library_widget";

    return hashString(stableSource);
  }

  window.__LW__ = {
    wid: getWidgetId(),
    get: storageGet,
    set: storageSet,
    remove: storageRemove
  };
})();

const WID = window.__LW__?.wid || "default";
const META_KEY = `library_widget_meta_v4__${WID}`;
const THEME_KEY = `library_widget_theme_v4__${WID}`;
const BG_KEY = `library_widget_bg_v4__${WID}`;
const PRESETS_KEY = `library_widget_presets_v4__${WID}`;

const $ = (id)=>document.getElementById(id);

function clamp(n, min, max){
  const x = Number(n);
  if(!Number.isFinite(x)) return min;
  return Math.max(min, Math.min(max, x));
}
function normHex(hex, fallback){
  const s = String(hex || "").trim();
  return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : fallback;
}
function hexToRgbTuple(hex){
  const h = normHex(hex, "#ffffff").slice(1);
  const r = parseInt(h.slice(0,2), 16);
  const g = parseInt(h.slice(2,4), 16);
  const b = parseInt(h.slice(4,6), 16);
  return [r,g,b];
}
function hexToRgba(hex, a){
  const [r,g,b] = hexToRgbTuple(hex);
  return `rgba(${r},${g},${b},${a})`;
}
function loadJSON(key){
  try{
    const raw = window.__LW__.get(key);
    return raw ? JSON.parse(raw) : null;
  }catch{
    return null;
  }
}
function saveJSON(key, value){
  try{
    window.__LW__.set(key, JSON.stringify(value));
  }catch{}
}
function uid(){
  return Math.random().toString(16).slice(2) + Date.now().toString(16);
}
function fileToDataUrl(file){
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(String(r.result));
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
function setStatus(msg){
  const el = $("presetStatus");
  if(el) el.textContent = msg || "";
}

const syncChannel = (() => {
  try{
    return ("BroadcastChannel" in window) ? new BroadcastChannel(`library_widget_sync__${WID}`) : null;
  }catch{
    return null;
  }
})();

function broadcastSync(kind){
  try{
    if(syncChannel) syncChannel.postMessage({ kind, ts: Date.now() });
  }catch{}
}

/* =========================
   Theme
========================= */
const DEFAULT_THEME = {
  pageBg:"#ffffff",
  ink:"#2b2a28",
  muted:"#6a665f",
  stroke:"#e9e4dd",
  cardBase:"#ffffff",
  cardA:84,
  soft:"#f3efe9"
};

function themeLoad(){ return loadJSON(THEME_KEY); }
function themeSave(t){
  saveJSON(THEME_KEY, t);
  broadcastSync("theme");
}
let themeDraft = Object.assign({}, DEFAULT_THEME, themeLoad() || {});

function themeApplyToCSS(t){
  const x = Object.assign({}, DEFAULT_THEME, t || {});
  const pageBg = normHex(x.pageBg, DEFAULT_THEME.pageBg);
  const ink = normHex(x.ink, DEFAULT_THEME.ink);
  const muted = normHex(x.muted, DEFAULT_THEME.muted);
  const stroke = normHex(x.stroke, DEFAULT_THEME.stroke);
  const cardBase = normHex(x.cardBase, DEFAULT_THEME.cardBase);
  const soft = normHex(x.soft, DEFAULT_THEME.soft);
  const cardA = clamp(Number(x.cardA), 40, 95) / 100;
  const panelA = Math.min(0.98, Math.max(cardA, 0.84));

  document.documentElement.style.setProperty("--bg", pageBg);
  document.documentElement.style.setProperty("--ink", ink);
  document.documentElement.style.setProperty("--muted", muted);
  document.documentElement.style.setProperty("--soft", soft);
  document.documentElement.style.setProperty("--stroke", hexToRgba(stroke, 0.95));
  document.documentElement.style.setProperty("--card-a", String(cardA));
  document.documentElement.style.setProperty("--card", hexToRgba(cardBase, cardA));
  document.documentElement.style.setProperty("--panel-bg", hexToRgba(cardBase, panelA));
  document.documentElement.style.setProperty("--field-bg", "#ffffff");
  document.documentElement.style.setProperty("--theme-dot", ink);

  const dot = $("themeDot");
  if(dot){
    dot.style.background = ink;
    dot.style.boxShadow = `0 0 0 6px ${hexToRgba(stroke, 0.35)}`;
    dot.style.borderColor = hexToRgba(stroke, 0.95);
  }
}
function themeSyncInputs(t){
  const x = Object.assign({}, DEFAULT_THEME, t || {});
  if($("tPageBg")) $("tPageBg").value = normHex(x.pageBg, DEFAULT_THEME.pageBg);
  if($("tText")) $("tText").value = normHex(x.ink, DEFAULT_THEME.ink);
  if($("tMuted")) $("tMuted").value = normHex(x.muted, DEFAULT_THEME.muted);
  if($("tStroke")) $("tStroke").value = normHex(x.stroke, DEFAULT_THEME.stroke);
  if($("tCard")) $("tCard").value = normHex(x.cardBase, DEFAULT_THEME.cardBase);
  if($("tCardA")) $("tCardA").value = String(clamp(x.cardA, 40, 95));
  if($("tSoft")) $("tSoft").value = normHex(x.soft, DEFAULT_THEME.soft);
}
function themeReadFromInputs(){
  return {
    pageBg: $("tPageBg")?.value,
    ink: $("tText")?.value,
    muted: $("tMuted")?.value,
    stroke: $("tStroke")?.value,
    cardBase: $("tCard")?.value,
    cardA: Number($("tCardA")?.value),
    soft: $("tSoft")?.value
  };
}

/* =========================
   Background
========================= */
const DEFAULT_BG = {
  tint:"#efe7e1",
  strength:12,
  imageA:92,
  blur:0,
  imageDataUrl:null
};

function bgLoad(){ return loadJSON(BG_KEY); }
function bgSave(bg){
  saveJSON(BG_KEY, bg);
  broadcastSync("background");
}
let bgDraft = Object.assign({}, DEFAULT_BG, bgLoad() || {});

function bgApplyToCSS(bg){
  const x = Object.assign({}, DEFAULT_BG, bg || {});
  const tint = normHex(x.tint, DEFAULT_BG.tint);
  const strength = clamp(Number(x.strength), 0, 70) / 100;
  const imageA = clamp(Number(x.imageA), 0, 100) / 100;
  const blurPx = clamp(Number(x.blur), 0, 24);

  document.documentElement.style.setProperty("--board-tint", tint);
  document.documentElement.style.setProperty("--board-tint-a", String(strength));
  document.documentElement.style.setProperty("--board-image", x.imageDataUrl ? `url("${x.imageDataUrl}")` : "none");
  document.documentElement.style.setProperty("--board-image-a", String(imageA));
  document.documentElement.style.setProperty("--board-image-blur", `${blurPx}px`);

  const boardTintEl = $("boardTint");
  if(boardTintEl) boardTintEl.style.background = hexToRgba(tint, strength);

  const bgDot = $("bgDot");
  if(bgDot){
    bgDot.style.background = tint;
    bgDot.style.boxShadow = `0 0 0 6px ${hexToRgba(tint, Math.min(0.28, strength + 0.10))}`;
  }
}
function bgSyncInputs(bg){
  const x = Object.assign({}, DEFAULT_BG, bg || {});
  if($("bgColor")) $("bgColor").value = normHex(x.tint, DEFAULT_BG.tint);
  if($("bgStrength")) $("bgStrength").value = String(clamp(x.strength, 0, 70));
  if($("bgImageA")) $("bgImageA").value = String(clamp(x.imageA, 0, 100));
  if($("bgBlur")) $("bgBlur").value = String(clamp(x.blur, 0, 24));
}

/* =========================
   Presets
========================= */
function loadPresets(){
  const list = loadJSON(PRESETS_KEY);
  return Array.isArray(list) ? list : [];
}
function savePresets(list){
  saveJSON(PRESETS_KEY, list);
  broadcastSync("presets");
}
function refreshPresetSelect(){
  const sel = $("presetSelect");
  if(!sel) return;
  const current = sel.value;
  const list = loadPresets();
  sel.innerHTML = `<option value="">—</option>`;
  for(const p of list){
    const opt = document.createElement("option");
    opt.value = p.id;
    opt.textContent = p.name || "Untitled";
    sel.appendChild(opt);
  }
  if(current && list.some(x => x.id === current)) sel.value = current;
}
function getThemeSnapshot(){
  return Object.assign({}, DEFAULT_THEME, themeDraft, themeReadFromInputs());
}
function getBackgroundSnapshot(){
  return Object.assign({}, DEFAULT_BG, bgDraft, {
    tint: $("bgColor")?.value || bgDraft.tint,
    strength: Number($("bgStrength")?.value ?? bgDraft.strength),
    imageA: Number($("bgImageA")?.value ?? bgDraft.imageA),
    blur: Number($("bgBlur")?.value ?? bgDraft.blur),
    imageDataUrl: bgDraft.imageDataUrl || null
  });
}

/* =========================
   UI init
========================= */
function initThemeUI(){
  const themeBtn = $("themeBtn");
  const themePanel = $("themePanel");
  const bgPanel = $("bgPanel");
  const resetTheme = $("resetTheme");
  const themeApply = $("themeApply");
  if(!themeBtn || !themePanel || !resetTheme || !themeApply) return;

  themeDraft = Object.assign({}, DEFAULT_THEME, themeLoad() || {});
  themeSyncInputs(themeDraft);
  themeApplyToCSS(themeDraft);

  ["tPageBg","tText","tMuted","tStroke","tCard","tCardA","tSoft"].forEach(id => {
    const el = $(id);
    if(!el) return;
    el.addEventListener("input", () => {
      themeDraft = Object.assign({}, themeDraft, themeReadFromInputs());
      themeApplyToCSS(themeDraft);
      setStatus("");
    });
    el.addEventListener("change", () => {
      themeDraft = Object.assign({}, themeDraft, themeReadFromInputs());
      themeApplyToCSS(themeDraft);
      setStatus("");
    });
  });

  themeApply.addEventListener("click", () => {
    themeDraft = getThemeSnapshot();
    themeApplyToCSS(themeDraft);
    themeSave(themeDraft);
    setStatus("Theme applied.");
  });

  resetTheme.addEventListener("click", () => {
    window.__LW__.remove(THEME_KEY);
    themeDraft = Object.assign({}, DEFAULT_THEME);
    themeSyncInputs(themeDraft);
    themeApplyToCSS(themeDraft);
    broadcastSync("theme");
    setStatus("Theme reset.");
  });

  themeBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    themePanel.classList.toggle("open");
    if(bgPanel) bgPanel.classList.remove("open");
  });

  document.addEventListener("click", (e) => {
    if(!themePanel.classList.contains("open")) return;
    const inside = e.target.closest("#themePanel") || e.target.closest("#themeBtn");
    if(!inside) themePanel.classList.remove("open");
  });
}

function initBackgroundUI(){
  const bgBtn = $("bgBtn");
  const bgPanel = $("bgPanel");
  const bgColor = $("bgColor");
  const bgStrength = $("bgStrength");
  const bgImageA = $("bgImageA");
  const bgBlur = $("bgBlur");
  const bgImage = $("bgImage");
  const bgRemove = $("bgRemove");
  const bgApply = $("bgApply");
  const bgReset = $("bgReset");
  const themePanel = $("themePanel");

  if(!bgBtn || !bgPanel || !bgColor || !bgStrength || !bgImageA || !bgBlur || !bgImage || !bgRemove || !bgApply || !bgReset) return;

  bgDraft = Object.assign({}, DEFAULT_BG, bgLoad() || {});
  bgSyncInputs(bgDraft);
  bgApplyToCSS(bgDraft);

  bgBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    bgPanel.classList.toggle("open");
    if(themePanel) themePanel.classList.remove("open");
  });

  document.addEventListener("click", (e) => {
    if(!bgPanel.classList.contains("open")) return;
    const inside = e.target.closest("#bgPanel") || e.target.closest("#bgBtn");
    if(!inside) bgPanel.classList.remove("open");
  });

  function updateDraftFromInputs(){
    bgDraft = Object.assign({}, bgDraft, {
      tint: bgColor.value,
      strength: Number(bgStrength.value),
      imageA: Number(bgImageA.value),
      blur: Number(bgBlur.value)
    });
    bgApplyToCSS(bgDraft);
    setStatus("");
  }

  bgColor.addEventListener("input", updateDraftFromInputs);
  bgStrength.addEventListener("input", updateDraftFromInputs);
  bgImageA.addEventListener("input", updateDraftFromInputs);
  bgBlur.addEventListener("input", updateDraftFromInputs);
  bgColor.addEventListener("change", updateDraftFromInputs);
  bgStrength.addEventListener("change", updateDraftFromInputs);
  bgImageA.addEventListener("change", updateDraftFromInputs);
  bgBlur.addEventListener("change", updateDraftFromInputs);

  bgImage.addEventListener("change", async () => {
    const file = bgImage.files && bgImage.files[0];
    if(!file) return;
    try{
      bgDraft.imageDataUrl = await fileToDataUrl(file);
      bgApplyToCSS(bgDraft);
      setStatus("");
    }catch{
      setStatus("Could not read that image.");
    }
  });

  bgRemove.addEventListener("click", () => {
    bgDraft.imageDataUrl = null;
    bgImage.value = "";
    bgApplyToCSS(bgDraft);
    setStatus("");
  });

  bgApply.addEventListener("click", () => {
    bgDraft = getBackgroundSnapshot();
    bgApplyToCSS(bgDraft);
    bgSave(bgDraft);
    setStatus("Background applied.");
  });

  bgReset.addEventListener("click", () => {
    window.__LW__.remove(BG_KEY);
    bgDraft = Object.assign({}, DEFAULT_BG);
    bgSyncInputs(bgDraft);
    bgApplyToCSS(bgDraft);
    broadcastSync("background");
    setStatus("Background reset.");
  });
}

function initPresetsUI(){
  const presetName = $("presetName");
  const presetSaveBtn = $("presetSave");
  const presetSelect = $("presetSelect");
  const presetApplyBtn = $("presetApply");
  const presetDeleteBtn = $("presetDelete");

  if(!presetName || !presetSaveBtn || !presetSelect || !presetApplyBtn || !presetDeleteBtn) return;

  refreshPresetSelect();

  presetSaveBtn.addEventListener("click", () => {
    const name = (presetName.value || "").trim();
    if(!name){
      setStatus("Type a preset name first.");
      return;
    }

    const themeSnapshot = getThemeSnapshot();
    const bgSnapshot = getBackgroundSnapshot();

    const list = loadPresets();
    const entry = {
      id: uid(),
      name,
      theme: themeSnapshot,
      bg: bgSnapshot
    };

    list.unshift(entry);
    savePresets(list);

    presetName.value = "";
    refreshPresetSelect();
    presetSelect.value = entry.id;
    setStatus("Preset saved.");
  });

  presetApplyBtn.addEventListener("click", () => {
    const id = presetSelect.value;
    if(!id){
      setStatus("Choose a preset first.");
      return;
    }

    const list = loadPresets();
    const p = list.find(x => x.id === id);
    if(!p){
      setStatus("Preset not found.");
      return;
    }

    themeDraft = Object.assign({}, DEFAULT_THEME, p.theme || {});
    bgDraft = Object.assign({}, DEFAULT_BG, p.bg || {});

    themeSyncInputs(themeDraft);
    themeApplyToCSS(themeDraft);
    bgSyncInputs(bgDraft);
    bgApplyToCSS(bgDraft);

    themeSave(themeDraft);
    bgSave(bgDraft);

    setStatus("Preset applied.");
  });

  presetDeleteBtn.addEventListener("click", () => {
    const id = presetSelect.value;
    if(!id){
      setStatus("Choose a preset first.");
      return;
    }

    const before = loadPresets();
    const next = before.filter(x => x.id !== id);

    if(next.length === before.length){
      setStatus("Preset not found.");
      return;
    }

    savePresets(next);
    refreshPresetSelect();
    presetSelect.value = "";
    setStatus("Preset deleted.");
  });
}

(function bootUI(){
  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", () => {
      initThemeUI();
      initBackgroundUI();
      initPresetsUI();
    });
  }else{
    initThemeUI();
    initBackgroundUI();
    initPresetsUI();
  }
})();

/* =========================
   Library app
========================= */
(function(){
  function safeName(name){
    return String(name || "").trim() || "Untitled";
  }
  function extFromName(name){
    const n = String(name || "");
    const m = n.match(/\.([a-z0-9]+)$/i);
    return m ? m[1].toLowerCase() : "";
  }
  function mimeLabel(mime, name){
    if(mime === "application/pdf") return "PDF";
    if(mime && mime.startsWith("image/")) return "Image";
    if(mime === "text/plain") return "Text";
    const ext = extFromName(name);
    return ext ? ext.toUpperCase() : (mime || "File");
  }
  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  const DB_NAME = "library_widget_books_v3";
  const DB_STORE = "books";

  function storageIdForBook(bookId){
    return `${WID}::${bookId}`;
  }

  function idbOpen(){
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, 2);
      req.onupgradeneeded = () => {
        const db = req.result;
        let store;
        if(!db.objectStoreNames.contains(DB_STORE)){
          store = db.createObjectStore(DB_STORE, { keyPath: "storageId" });
        }else{
          store = req.transaction.objectStore(DB_STORE);
        }
        if(store && !store.indexNames.contains("widgetId")){
          store.createIndex("widgetId", "widgetId", { unique:false });
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  async function idbPut(record){
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, "readwrite");
      tx.objectStore(DB_STORE).put(record);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  async function idbGet(bookId){
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, "readonly");
      const req = tx.objectStore(DB_STORE).get(storageIdForBook(bookId));
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  }

  async function idbDelete(bookId){
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, "readwrite");
      tx.objectStore(DB_STORE).delete(storageIdForBook(bookId));
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  async function idbClearWidgetOnly(){
    const db = await idbOpen();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, "readwrite");
      const store = tx.objectStore(DB_STORE);
      const index = store.index("widgetId");
      const req = index.openCursor(IDBKeyRange.only(WID));
      req.onsuccess = () => {
        const cursor = req.result;
        if(cursor){
          cursor.delete();
          cursor.continue();
        }
      };
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  function defaultState(){
    const s1 = uid(), s2 = uid();
    return {
      shelves: [
        { id:s1, name:"To Read" },
        { id:s2, name:"Finished" }
      ],
      books: []
    };
  }

  function normalizeReaderState(readerState){
    const x = readerState || {};
    return {
      lastPage: clamp(Number(x.lastPage || 1), 1, 999999),
      bookmarks: Array.isArray(x.bookmarks)
        ? Array.from(new Set(x.bookmarks.map(n => clamp(Number(n), 1, 999999)))).sort((a,b)=>a-b)
        : [],
      highlights: Array.isArray(x.highlights)
        ? x.highlights.filter(Boolean).map(h => ({
            id: String(h.id || uid()),
            page: clamp(Number(h.page || 1), 1, 999999),
            startIndex: clamp(Number(h.startIndex || 0), 0, 999999),
            startOffset: clamp(Number(h.startOffset || 0), 0, 999999),
            endIndex: clamp(Number(h.endIndex || 0), 0, 999999),
            endOffset: clamp(Number(h.endOffset || 0), 0, 999999)
          }))
        : []
    };
  }

  function normalizeState(parsed){
    const base = defaultState();
    base.shelves = Array.isArray(parsed?.shelves) ? parsed.shelves : base.shelves;
    base.books = Array.isArray(parsed?.books) ? parsed.books : [];
    if(!base.shelves.length) base.shelves = defaultState().shelves;

    base.shelves = base.shelves.map(s => ({
      id: String(s?.id || uid()),
      name: String(s?.name || "Shelf")
    }));

    base.books = base.books
      .filter(Boolean)
      .map(b => ({
        id: String(b.id || uid()),
        shelfId: String(b.shelfId || base.shelves[0].id),
        title: String(b.title || ""),
        fileName: String(b.fileName || "file"),
        mime: String(b.mime || "application/octet-stream"),
        coverDataUrl: b.coverDataUrl || null,
        createdAt: Number(b.createdAt || Date.now()),
        readerState: normalizeReaderState(b.readerState)
      }));

    const shelfIds = new Set(base.shelves.map(s => s.id));
    base.books.forEach(b => {
      if(!shelfIds.has(b.shelfId)) b.shelfId = base.shelves[0].id;
    });

    return base;
  }

  function loadState(){
    try{
      const raw = window.__LW__.get(META_KEY);
      if(!raw) return defaultState();
      return normalizeState(JSON.parse(raw));
    }catch{
      return defaultState();
    }
  }

  let state = loadState();

  function saveState(){
    try{
      window.__LW__.set(META_KEY, JSON.stringify(state));
      broadcastSync("library");
    }catch{}
  }

  const objectUrlById = new Map();

  async function ensureObjectUrl(bookId){
    if(objectUrlById.has(bookId)) return objectUrlById.get(bookId);
    const rec = await idbGet(bookId);
    if(!rec || !rec.blob) return null;
    const url = URL.createObjectURL(rec.blob);
    objectUrlById.set(bookId, url);
    return url;
  }

  function revokeObjectUrl(bookId){
    const url = objectUrlById.get(bookId);
    if(url){
      try{ URL.revokeObjectURL(url); }catch{}
      objectUrlById.delete(bookId);
    }
  }

  function revokeAllObjectUrls(){
    for(const [bookId, url] of objectUrlById.entries()){
      try{ URL.revokeObjectURL(url); }catch{}
      objectUrlById.delete(bookId);
    }
  }

  async function pdfFirstPageCover(blob){
    if(!window.pdfjsLib) return null;
    try{
      const ab = await blob.arrayBuffer();
      const doc = await pdfjsLib.getDocument({ data:ab }).promise;
      const page = await doc.getPage(1);
      const viewport = page.getViewport({ scale:1.2 });

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      canvas.width = Math.floor(viewport.width);
      canvas.height = Math.floor(viewport.height);

      await page.render({ canvasContext:ctx, viewport }).promise;

      const out = document.createElement("canvas");
      out.width = 300;
      out.height = 400;
      const octx = out.getContext("2d");
      octx.drawImage(canvas, 0, 0, canvas.width, canvas.height, 0, 0, out.width, out.height);

      try{ doc.destroy(); }catch{}
      return out.toDataURL("image/jpeg", 0.86);
    }catch{
      return null;
    }
  }

  function ensureBookReaderState(book){
    if(!book.readerState) book.readerState = normalizeReaderState();
    book.readerState = normalizeReaderState(book.readerState);
    return book.readerState;

  let currentPdfDoc = null;
  let currentPdfRenderTask = null;
  let currentPdfState = null;

  async function destroyPdfViewer(){
    try{
      if(currentPdfRenderTask && currentPdfRenderTask.cancel) currentPdfRenderTask.cancel();
    }catch{}
    currentPdfRenderTask = null;

    try{
      if(currentPdfDoc && currentPdfDoc.destroy) currentPdfDoc.destroy();
    }catch{}
    currentPdfDoc = null;
    currentPdfState = null;
  }

  function getReaderStateForBook(book){
    return ensureBookReaderState(book);
  }

  function updateReaderState(bookId, patch){
    const book = getBook(bookId);
    if(!book) return;
    const rs = ensureBookReaderState(book);
    Object.assign(rs, patch || {});
    book.readerState = normalizeReaderState(rs);
    saveState();
  }

  function buildHighlightLayerRects(textLayer, highlight){
    const spans = Array.from(textLayer.querySelectorAll("span[data-idx]"));
    const startIndex = Number(highlight.startIndex);
    const endIndex = Number(highlight.endIndex);
    const startOffset = Number(highlight.startOffset);
    const endOffset = Number(highlight.endOffset);

    if(!Number.isFinite(startIndex) || !Number.isFinite(endIndex)) return [];
    if(startIndex > endIndex) return [];

    const layerRect = textLayer.getBoundingClientRect();
    const rects = [];

    for(let i=startIndex;i<=endIndex;i++){
      const span = spans.find(s => Number(s.dataset.idx) === i);
      if(!span) continue;

      const text = span.textContent || "";
      const len = text.length;
      let from = 0;
      let to = len;

      if(i === startIndex) from = clamp(startOffset, 0, len);
      if(i === endIndex) to = clamp(endOffset, 0, len);
      if(to <= from) continue;

      const range = document.createRange();
      try{
        const node = span.firstChild || span;
        range.setStart(node, Math.min(from, node.textContent?.length ?? len));
        range.setEnd(node, Math.min(to, node.textContent?.length ?? len));
        const clientRects = Array.from(range.getClientRects());
        for(const r of clientRects){
          rects.push({
            left: r.left - layerRect.left,
            top: r.top - layerRect.top,
            width: r.width,
            height: r.height
          });
        }
      }catch{}
    }

    return rects;
  }

  function drawPageHighlights(textLayer, pageHighlights){
    const highlightLayer = $("pdfHighlightLayer");
    if(!highlightLayer || !textLayer) return;
    highlightLayer.innerHTML = "";

    for(const h of pageHighlights){
      const rects = buildHighlightLayerRects(textLayer, h);
      for(const r of rects){
        const el = document.createElement("div");
        el.className = "pdfHighlight";
        el.style.left = `${r.left}px`;
        el.style.top = `${r.top}px`;
        el.style.width = `${r.width}px`;
        el.style.height = `${r.height}px`;
        highlightLayer.appendChild(el);
      }
    }
  }

  function serializeSelectionInTextLayer(textLayer){
    const sel = window.getSelection();
    if(!sel || sel.rangeCount === 0 || sel.isCollapsed) return null;

    const range = sel.getRangeAt(0);
    if(!textLayer.contains(range.startContainer) || !textLayer.contains(range.endContainer)) return null;

    const spans = Array.from(textLayer.querySelectorAll("span[data-idx]"));
    if(!spans.length) return null;

    function getSpanInfo(node, offset){
      let current = node.nodeType === 3 ? node.parentElement : node;
      const span = current?.closest?.("span[data-idx]");
      if(!span) return null;

      const idx = Number(span.dataset.idx);
      if(!Number.isFinite(idx)) return null;

      let computedOffset = offset;
      if(node.nodeType !== 3){
        const textNode = span.firstChild;
        computedOffset = Math.min(offset, textNode?.textContent?.length || span.textContent.length);
      }
      return {
        idx,
        offset: Math.max(0, computedOffset)
      };
    }

    const start = getSpanInfo(range.startContainer, range.startOffset);
    const end = getSpanInfo(range.endContainer, range.endOffset);
    if(!start || !end) return null;

    let startIndex = start.idx;
    let startOffset = start.offset;
    let endIndex = end.idx;
    let endOffset = end.offset;

    if(startIndex > endIndex || (startIndex === endIndex && startOffset > endOffset)){
      [startIndex, endIndex] = [endIndex, startIndex];
      [startOffset, endOffset] = [endOffset, startOffset];
    }

    return {
      startIndex,
      startOffset,
      endIndex,
      endOffset
    };
  }

  async function openPdfReader(book, rec){
    await destroyPdfViewer();

    const rs = getReaderStateForBook(book);
    const startPage = clamp(Number(rs.lastPage || 1), 1, 999999);

    $("readerBody").innerHTML = `
      <div class="pdfShell">
        <div class="pdfToolbar">
          <button type="button" class="soft" id="pdfPrev">Prev</button>
          <div class="pdfInfo" id="pdfPageInfo">Page 1 / 1</div>
          <button type="button" class="soft" id="pdfNext">Next</button>

          <button type="button" class="soft" id="pdfSavePage">Save page</button>
          <button type="button" class="soft" id="pdfBookmark">Bookmark page</button>
          <button type="button" class="soft" id="pdfHighlightsBtn">Highlight selection</button>
          <button type="button" class="soft" id="pdfClearPageHighlights">Clear page highlights</button>

          <div class="spacer"></div>

          <label class="pdfInfo" for="pdfBookmarkJump" style="min-width:auto;">Bookmarks</label>
          <select id="pdfBookmarkJump" style="min-height:36px; min-width:90px;"></select>
          <button type="button" class="soft" id="pdfGoBookmark">Go</button>

          <button type="button" class="soft" id="pdfZoomOut">−</button>
          <div class="pdfInfo" id="pdfZoomInfo">100%</div>
          <button type="button" class="soft" id="pdfZoomIn">+</button>
        </div>

        <div class="pdfViewport" id="pdfViewport">
          <div class="pdfCanvasWrap" id="pdfCanvasWrap">
            <canvas id="pdfCanvas" class="pdfCanvas"></canvas>
            <div id="pdfHighlightLayer" class="pdfHighlightLayer"></div>
            <div id="pdfTextLayer" class="textLayer"></div>
          </div>
        </div>
      </div>
    `;

    const data = await rec.blob.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data }).promise;
    currentPdfDoc = pdf;
    currentPdfState = {
      bookId: book.id,
      page: clamp(startPage, 1, pdf.numPages),
      pages: pdf.numPages,
      scale:1.2
    };

    const canvas = $("pdfCanvas");
    const ctx = canvas.getContext("2d");
    const textLayer = $("pdfTextLayer");
    const canvasWrap = $("pdfCanvasWrap");

    function refreshBookmarksUI(){
      const bookNow = getBook(book.id);
      if(!bookNow) return;
      const stateNow = getReaderStateForBook(bookNow);
      const sel = $("pdfBookmarkJump");
      sel.innerHTML = `<option value="">—</option>`;
      for(const page of stateNow.bookmarks){
        if(page <= currentPdfState.pages){
          const opt = document.createElement("option");
          opt.value = String(page);
          opt.textContent = `Page ${page}`;
          sel.appendChild(opt);
        }
      }
    }

    async function renderPdfPage(){
      if(!currentPdfDoc || !currentPdfState) return;

      const page = await currentPdfDoc.getPage(currentPdfState.page);
      const viewport = page.getViewport({ scale: currentPdfState.scale });
      const outputScale = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = Math.floor(viewport.width * outputScale);
      canvas.height = Math.floor(viewport.height * outputScale);
      canvas.style.width = `${Math.floor(viewport.width)}px`;
      canvas.style.height = `${Math.floor(viewport.height)}px`;

      canvasWrap.style.width = `${Math.floor(viewport.width)}px`;
      canvasWrap.style.height = `${Math.floor(viewport.height)}px`;
      textLayer.style.width = `${Math.floor(viewport.width)}px`;
      textLayer.style.height = `${Math.floor(viewport.height)}px`;
      $("pdfHighlightLayer").style.width = `${Math.floor(viewport.width)}px`;
      $("pdfHighlightLayer").style.height = `${Math.floor(viewport.height)}px`;

      ctx.setTransform(outputScale, 0, 0, outputScale, 0, 0);
      currentPdfRenderTask = page.render({ canvasContext:ctx, viewport });
      try{
        await currentPdfRenderTask.promise;
      }catch(e){
        if(e?.name !== "RenderingCancelledException") throw e;
      }

      textLayer.innerHTML = "";
      const textContent = await page.getTextContent();
      const textViewport = viewport.clone({ dontFlip: true });

      let idx = 0;
      for(const item of textContent.items){
        const tx = pdfjsLib.Util.transform(textViewport.transform, item.transform);
        const angle = Math.atan2(tx[1], tx[0]);
        const fontHeight = Math.sqrt(tx[2] * tx[2] + tx[3] * tx[3]);
        const left = tx[4];
        const top = tx[5] - fontHeight;

        const span = document.createElement("span");
        span.textContent = item.str || "";
        span.dataset.idx = String(idx++);
        span.style.left = `${left}px`;
        span.style.top = `${top}px`;
        span.style.fontSize = `${fontHeight}px`;
        span.style.fontFamily = item.fontName || "sans-serif";
        span.style.transform = `rotate(${angle}rad)`;
        textLayer.appendChild(span);
      }

      const bookNow = getBook(book.id);
      if(bookNow){
        const stateNow = getReaderStateForBook(bookNow);
        updateReaderState(book.id, { lastPage: currentPdfState.page });
        const pageHighlights = stateNow.highlights.filter(h => h.page === currentPdfState.page);
        drawPageHighlights(textLayer, pageHighlights);
      }

      $("pdfPageInfo").textContent = `Page ${currentPdfState.page} / ${currentPdfState.pages}`;
      $("pdfZoomInfo").textContent = `${Math.round(currentPdfState.scale * 100)}%`;
      refreshBookmarksUI();
    }

    $("pdfPrev").addEventListener("click", async () => {
      if(!currentPdfState || currentPdfState.page <= 1) return;
      currentPdfState.page -= 1;
      await renderPdfPage();
    });

    $("pdfNext").addEventListener("click", async () => {
      if(!currentPdfState || currentPdfState.page >= currentPdfState.pages) return;
      currentPdfState.page += 1;
      await renderPdfPage();
    });

    $("pdfZoomIn").addEventListener("click", async () => {
      if(!currentPdfState) return;
      currentPdfState.scale = clamp(currentPdfState.scale + 0.2, 0.6, 3);
      await renderPdfPage();
    });

    $("pdfZoomOut").addEventListener("click", async () => {
      if(!currentPdfState) return;
      currentPdfState.scale = clamp(currentPdfState.scale - 0.2, 0.6, 3);
      await renderPdfPage();
    });

    $("pdfSavePage").addEventListener("click", () => {
      updateReaderState(book.id, { lastPage: currentPdfState.page });
    });

    $("pdfBookmark").addEventListener("click", () => {
      const bookNow = getBook(book.id);
      if(!bookNow) return;
      const rsNow = getReaderStateForBook(bookNow);
      const set = new Set(rsNow.bookmarks);
      if(set.has(currentPdfState.page)){
        set.delete(currentPdfState.page);
      }else{
        set.add(currentPdfState.page);
      }
      updateReaderState(book.id, { bookmarks: Array.from(set).sort((a,b)=>a-b) });
      refreshBookmarksUI();
    });

    $("pdfGoBookmark").addEventListener("click", async () => {
      const val = Number($("pdfBookmarkJump").value);
      if(!val) return;
      currentPdfState.page = clamp(val, 1, currentPdfState.pages);
      await renderPdfPage();
    });

    $("pdfHighlightsBtn").addEventListener("click", async () => {
      const selData = serializeSelectionInTextLayer(textLayer);
      if(!selData) return;

      const bookNow = getBook(book.id);
      if(!bookNow) return;
      const rsNow = getReaderStateForBook(bookNow);

      rsNow.highlights.push({
        id: uid(),
        page: currentPdfState.page,
        startIndex: selData.startIndex,
        startOffset: selData.startOffset,
        endIndex: selData.endIndex,
        endOffset: selData.endOffset
      });

      bookNow.readerState = normalizeReaderState(rsNow);
      saveState();

      const pageHighlights = bookNow.readerState.highlights.filter(h => h.page === currentPdfState.page);
      drawPageHighlights(textLayer, pageHighlights);

      try{
        const selection = window.getSelection();
        if(selection) selection.removeAllRanges();
      }catch{}
    });

    $("pdfClearPageHighlights").addEventListener("click", () => {
      const bookNow = getBook(book.id);
      if(!bookNow) return;
      const rsNow = getReaderStateForBook(bookNow);
      rsNow.highlights = rsNow.highlights.filter(h => h.page !== currentPdfState.page);
      bookNow.readerState = normalizeReaderState(rsNow);
      saveState();
      drawPageHighlights(textLayer, []);
    });

    await renderPdfPage();
  }

  async function openReader(bookId){
    const book = getBook(bookId);
    if(!book) return;

    const rec = await idbGet(bookId);
    if(!rec || !rec.blob){
      alert("File not found. Try re-uploading.");
      return;
    }

    $("readerTitle").textContent = book.title || book.fileName || "Untitled";
    const body = $("readerBody");
    body.innerHTML = "";

    if(book.mime === "application/pdf" && window.pdfjsLib){
      try{
        await openPdfReader(book, rec);
        $("readerModal").classList.add("open");
        return;
      }catch{
        body.innerHTML = `<div class="readerEmpty">Could not render that PDF in-page.</div>`;
        $("readerModal").classList.add("open");
        return;
      }
    }

    if(book.mime && book.mime.startsWith("image/")){
      const url = await ensureObjectUrl(bookId);
      if(!url){
        alert("File not found. Try re-uploading.");
        return;
      }
      body.innerHTML = `<div class="readerFallback"><img src="${url}" alt=""></div>`;
      $("readerModal").classList.add("open");
      return;
    }

    if(book.mime === "text/plain"){
      try{
        const text = await rec.blob.text();
        const pre = document.createElement("pre");
        pre.className = "readerFallback readerText";
        pre.textContent = text;
        body.appendChild(pre);
      }catch{
        body.innerHTML = `<div class="readerEmpty">Could not read that text file.</div>`;
      }
      $("readerModal").classList.add("open");
      return;
    }

    const url = await ensureObjectUrl(bookId);
    if(!url){
      alert("File not found. Try re-uploading.");
      return;
    }

    const iframe = document.createElement("iframe");
    iframe.src = url;
    iframe.setAttribute("title", "Reader");
    iframe.setAttribute("loading", "lazy");
    iframe.style.width = "100%";
    iframe.style.height = "100%";
    iframe.style.border = "0";
    body.appendChild(iframe);
    $("readerModal").classList.add("open");
  }

  async function closeReader(){
    $("readerModal").classList.remove("open");
    $("readerBody").innerHTML = "";
    await destroyPdfViewer();
  }

  async function addBook(){
    const file = $("fileInput").files && $("fileInput").files[0];
    if(!file){
      alert("Choose a file first.");
      return;
    }

    const shelfId = $("shelfSelect").value;
    const rawTitle = ($("bookTitle").value || "").trim();
    const title = rawTitle || safeName(file.name);
    const bookId = uid();
    const mime = file.type || "application/octet-stream";
    const fileName = file.name || "file";

    let coverDataUrl = null;
    const coverFile = $("coverInput").files && $("coverInput").files[0];

    if(coverFile){
      try{
        coverDataUrl = await fileToDataUrl(coverFile);
      }catch{}
    }else if(mime === "application/pdf"){
      coverDataUrl = await pdfFirstPageCover(file);
    }else if(mime.startsWith("image/")){
      try{
        coverDataUrl = await fileToDataUrl(file);
      }catch{}
    }

    await idbPut({
      storageId: storageIdForBook(bookId),
      widgetId: WID,
      bookId,
      blob: file,
      mime,
      fileName,
      createdAt: Date.now()
    });

    state.books.unshift({
      id: bookId,
      shelfId,
      title,
      fileName,
      mime,
      coverDataUrl,
      createdAt: Date.now(),
      readerState: normalizeReaderState()
    });

    $("fileInput").value = "";
    $("coverInput").value = "";
    $("bookTitle").value = "";

    renderAll();
  }

  async function removeBook(bookId){
    const book = getBook(bookId);
    if(!book) return;

    await idbDelete(bookId);
    state.books = state.books.filter(b => b.id !== bookId);
    revokeObjectUrl(bookId);
    renderAll();
  }

  async function promptCoverChange(bookId){
    const book = getBook(bookId);
    if(!book) return;

    const input = document.createElement("input");
    input.type = "file";
    input.accept = "image/*";
    input.style.display = "none";

    input.addEventListener("change", async () => {
      const f = input.files && input.files[0];
      if(!f) return;
      try{
        book.coverDataUrl = await fileToDataUrl(f);
        saveState();
        renderAll();
      }catch{
        alert("Couldn’t read that image.");
      }
    });

    document.body.appendChild(input);
    input.click();
    setTimeout(() => input.remove(), 0);
  }

  function addShelf(){
    state.shelves.push({ id: uid(), name: `Shelf ${state.shelves.length + 1}` });
    saveState();
    renderAll();
    $("shelfSelect").value = state.shelves[state.shelves.length - 1].id;
  }

  function showReset(){
    $("resetConfirm").style.display = "block";
    const bgPanel = $("bgPanel");
    const themePanel = $("themePanel");
    if(bgPanel) bgPanel.classList.remove("open");
    if(themePanel) themePanel.classList.remove("open");
  }
  function hideReset(){
    $("resetConfirm").style.display = "none";
  }

  async function doReset(){
    window.__LW__.remove(META_KEY);
    state = defaultState();
    saveState();
    revokeAllObjectUrls();
    await destroyPdfViewer();
    await idbClearWidgetOnly();
    hideReset();
    renderAll();
  }

  function reloadStateFromStorage(){
    state = loadState();
    renderShelfSelect();
    renderShelves();
  }

  if(syncChannel){
    syncChannel.onmessage = (event) => {
      const kind = event?.data?.kind;
      if(kind === "theme"){
        const next = Object.assign({}, DEFAULT_THEME, themeLoad() || {});
        themeDraft = next;
        themeSyncInputs(next);
        themeApplyToCSS(next);
      }
      if(kind === "background"){
        const next = Object.assign({}, DEFAULT_BG, bgLoad() || {});
        bgDraft = next;
        bgSyncInputs(next);
        bgApplyToCSS(next);
      }
      if(kind === "presets"){
        refreshPresetSelect();
      }
      if(kind === "library"){
        reloadStateFromStorage();
      }
    };
  }

  window.addEventListener("storage", (e) => {
    if(!e || !e.key) return;

    if(e.key === THEME_KEY){
      const next = Object.assign({}, DEFAULT_THEME, themeLoad() || {});
      themeDraft = next;
      themeSyncInputs(next);
      themeApplyToCSS(next);
    }
    if(e.key === BG_KEY){
      const next = Object.assign({}, DEFAULT_BG, bgLoad() || {});
      bgDraft = next;
      bgSyncInputs(next);
      bgApplyToCSS(next);
    }
    if(e.key === PRESETS_KEY){
      refreshPresetSelect();
    }
    if(e.key === META_KEY){
      reloadStateFromStorage();
    }
  });

  function init(){
    const required = [
      "fileInput","coverInput","bookTitle","shelfSelect","addBook",
      "addShelf","resetAll","resetConfirm","resetYes","resetNo",
      "shelves","readerModal","readerTitle","readerBody","readerClose",
      "moveModal","moveShelfSelect","moveConfirm","moveCancel","moveClose"
    ];
    for(const id of required){
      if(!$(id)) return;
    }

    $("addBook").addEventListener("click", addBook);
    $("addShelf").addEventListener("click", addShelf);

    $("resetAll").addEventListener("click", () => {
      $("resetConfirm").style.display === "block" ? hideReset() : showReset();
    });
    $("resetNo").addEventListener("click", hideReset);
    $("resetYes").addEventListener("click", doReset);

    $("readerClose").addEventListener("click", closeReader);
    $("readerModal").addEventListener("click", (e) => {
      if(e.target && e.target.id === "readerModal") closeReader();
    });

    $("moveClose").addEventListener("click", closeMoveModal);
    $("moveCancel").addEventListener("click", closeMoveModal);
    $("moveConfirm").addEventListener("click", confirmMove);
    $("moveModal").addEventListener("click", (e) => {
      if(e.target && e.target.id === "moveModal") closeMoveModal();
    });

    document.addEventListener("visibilitychange", () => {
      if(document.visibilityState === "hidden"){
        try{ saveState(); }catch{}
      }
    });

    window.addEventListener("beforeunload", () => {
      try{ saveState(); }catch{}
    });

    renderAll();
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", init);
  }else{
    init();
  }
})();
</script>
</body>
</html>
