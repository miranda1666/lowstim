<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Mistake Museum</title>
  <style>
    :root{
      --bg: #ffffff;
      --panel: rgba(255,255,255,.68);
      --panel2: rgba(255,255,255,.84);
      --text: #2b2b2b;
      --muted: #6f6a63;
      --line: rgba(43,43,43,.18);
      --lineStrong: rgba(43,43,43,.30);
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --shadow2: 0 16px 50px rgba(0,0,0,.14);
      --radius: 18px;
      --radius2: 14px;
      --focus: rgba(43,43,43,.22);

      --panel-bg: rgba(255,255,255,.94);
      --field-bg: rgba(255,255,255,.82);

      --board-image: none;
      --board-tint: #efe7e1;
      --board-tint-a: 0.35;
      --board-blur: 0px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin: 0;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: var(--bg);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    input, textarea, select, button{
      font: inherit;
    }

    .wrap{
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }

    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 14px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .title{
      display:grid;
      gap: 6px;
      min-width: 260px;
    }
    .title h1{
      font-size: clamp(22px, 2.6vw, 32px);
      line-height: 1.1;
      margin: 0;
      letter-spacing: -.02em;
    }
    .title p{
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      max-width: 58ch;
      line-height: 1.4;
    }

    .actions{
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn{
      appearance:none;
      border: 1px solid var(--lineStrong);
      background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,255,255,.74));
      color: var(--text);
      padding: 10px 12px;
      border-radius: 999px;
      box-shadow: 0 6px 18px rgba(0,0,0,.06);
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
      font-size: 13px;
      display:inline-flex;
      align-items:center;
      gap: 8px;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      pointer-events: auto;
    }
    .btn:hover{ transform: translateY(-1px); box-shadow: 0 10px 22px rgba(0,0,0,.08); border-color: rgba(43,43,43,.32); }
    .btn:active{ transform: translateY(0px); }
    .btn:focus-visible{ outline: 3px solid var(--focus); outline-offset: 2px; }
    .btn.primary{ border-color: var(--lineStrong); }
    .btn.danger{ border-color: rgba(160, 60, 60, .30); }

    .controls{
      display:grid;
      grid-template-columns: 1.2fr .8fr .6fr;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--lineStrong);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      position: relative;
      z-index: 2;
    }
    @media (max-width: 860px){
      .controls{ grid-template-columns: 1fr; }
      .actions{ width: 100%; justify-content: flex-start; }
    }

    .field{ position: relative; display:grid; gap: 6px; }
    label{ font-size: 12px; color: var(--muted); padding-left: 6px; }
    .input, select{
      width:100%;
      min-height: 46px;
      padding: 12px 12px 12px 40px;
      border-radius: 14px;
      border: 1px solid var(--lineStrong);
      background: var(--field-bg);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.94);
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color .12s ease, box-shadow .12s ease;
    }
    select{ padding-left: 12px; }
    .input:focus, select:focus{
      border-color: rgba(43,43,43,.30);
      box-shadow: 0 0 0 3px rgba(43,43,43,.10);
    }
    .icon{
      position:absolute;
      left: 12px;
      top: 38px;
      width: 16px;
      height: 16px;
      opacity: .65;
      pointer-events:none;
    }

    .museum{
      margin-top: 16px;
      background: var(--panel);
      border: 1px solid var(--lineStrong);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow: hidden;
      position: relative;
      z-index: 2;
    }
    .museumHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 14px 14px 12px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }
    .meta{
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }
    .pill{
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.68);
      padding: 6px 10px;
      border-radius: 999px;
      display:inline-flex;
      align-items:center;
      gap: 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.94);
    }

    .grid{
      padding: 14px;
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    @media (max-width: 980px){ .grid{ grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 620px){ .grid{ grid-template-columns: 1fr; } }

    .card{
      background: rgba(255,255,255,.82);
      border: 1px solid var(--lineStrong);
      border-radius: var(--radius2);
      box-shadow: 0 8px 22px rgba(0,0,0,.06);
      overflow: hidden;
      display:grid;
      grid-template-columns: 76px 1fr;
      min-height: 124px;
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
      position: relative;
    }
    .card:hover{
      transform: translateY(-1px);
      box-shadow: 0 14px 32px rgba(0,0,0,.10);
      border-color: rgba(43,43,43,.34);
    }

    .frame{
      display:grid;
      place-items:center;
      background:
        linear-gradient(180deg, rgba(240,236,231,.95), rgba(226,219,212,.88));
      border-right: 1px solid var(--lineStrong);
      position: relative;
      padding: 10px;
    }
    .plaque{
      width: 54px;
      height: 54px;
      border-radius: 18px;
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.78);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.92),
        0 10px 22px rgba(0,0,0,.06);
      display:grid;
      place-items:center;
      font-size: 22px;
      letter-spacing: -.02em;
      opacity: .95;
    }
    .frame::after{
      content:"";
      position:absolute;
      left: 14px;
      right: 14px;
      bottom: 12px;
      height: 1px;
      background: var(--lineStrong);
    }

    .content{
      padding: 12px 12px 10px;
      display:grid;
      gap: 8px;
    }

    .topRow{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 10px;
    }

    .name{
      margin: 0;
      font-weight: 700;
      font-size: 14px;
      line-height: 1.2;
      letter-spacing: -.01em;
    }
    .sub{
      margin: 0;
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.3;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .chips{
      display:flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
    }
    .chip{
      font-size: 11px;
      color: rgba(43,43,43,.80);
      background: rgba(255,255,255,.68);
      border: 1px solid var(--line);
      padding: 4px 8px;
      border-radius: 999px;
    }

    .cardActions{
      display:flex;
      align-items:center;
      gap: 8px;
      flex-wrap: nowrap;
    }
    .iconBtn{
      appearance:none;
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.74);
      width: 34px;
      height: 34px;
      border-radius: 999px;
      cursor: pointer;
      display:grid;
      place-items:center;
      transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.92);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      pointer-events: auto;
    }
    .iconBtn:hover{
      transform: translateY(-1px);
      border-color: rgba(43,43,43,.32);
      box-shadow: 0 10px 20px rgba(0,0,0,.08);
    }
    .iconBtn:active{ transform: translateY(0); }
    .iconBtn:focus-visible{ outline: 3px solid var(--focus); outline-offset: 2px; }
    .iconBtn svg{ width: 16px; height: 16px; opacity: .78; }

    details{
      border-top: 1px dashed rgba(43,43,43,.18);
      padding-top: 8px;
    }
    summary{
      cursor: pointer;
      list-style: none;
      color: rgba(43,43,43,.88);
      font-size: 12.5px;
      user-select: none;
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
    }
    summary::-webkit-details-marker{ display:none; }
    .chev{
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.74);
      display:grid;
      place-items:center;
      opacity: .88;
      flex: 0 0 auto;
    }
    .detailsBody{
      margin-top: 8px;
      display:grid;
      gap: 8px;
      font-size: 12.5px;
      color: rgba(43,43,43,.94);
      line-height: 1.45;
    }
    .label{
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .box{
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.74);
      border-radius: 12px;
      padding: 10px;
    }

    .empty{
      padding: 46px 18px 50px;
      display:grid;
      place-items:center;
      text-align:center;
      gap: 12px;
      color: var(--muted);
    }
    .empty .big{
      width: 56px;
      height: 56px;
      border-radius: 18px;
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.74);
      display:grid;
      place-items:center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.92), 0 12px 30px rgba(0,0,0,.06);
      font-size: 22px;
    }
    .empty h2{
      margin: 0;
      color: var(--text);
      font-size: 16px;
      letter-spacing: -.01em;
    }
    .empty p{
      margin: 0;
      max-width: 55ch;
      font-size: 13.5px;
      line-height: 1.5;
    }

    .modalBackdrop{
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(20,18,16,.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 80;
    }
    .modalBackdrop.show{ display: grid; }

    .modal{
      width: min(780px, 100%);
      background: rgba(255,255,255,.90);
      border: 1px solid var(--lineStrong);
      border-radius: 20px;
      box-shadow: var(--shadow2);
      overflow: hidden;
    }
    .modalHead{
      padding: 14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.74);
    }
    .modalHead h3{
      margin: 0;
      font-size: 15px;
      letter-spacing: -.01em;
    }
    .modalBody{
      padding: 14px 16px 16px;
      display:grid;
      gap: 12px;
    }
    .formGrid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 760px){ .formGrid{ grid-template-columns: 1fr; } }

    .input2, .textarea, .select2{
      width: 100%;
      min-height: 46px;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.82);
      font-size: 14px;
      color: var(--text);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.92);
      transition: border-color .12s ease, box-shadow .12s ease;
    }
    .textarea{ min-height: 92px; resize: vertical; }
    .input2:focus, .textarea:focus, .select2:focus{
      border-color: rgba(43,43,43,.30);
      box-shadow: 0 0 0 3px rgba(43,43,43,.10);
    }
    .help{
      font-size: 12px;
      color: var(--muted);
      margin-top: -6px;
      line-height: 1.35;
    }

    .modalFoot{
      display:flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 16px 14px;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,.72);
      flex-wrap: wrap;
    }
    .tiny{
      font-size: 12px;
      color: var(--muted);
    }
    a.link{
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(43,43,43,.22);
    }
    a.link:hover{ border-bottom-color: rgba(43,43,43,.45); }

    [data-mm-bg-board]{
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
    }

    [data-mm-bg-board]::before{
      content:"";
      position:absolute;
      inset:0;
      background-image: var(--board-image, none);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(var(--board-blur)) saturate(.98);
      transform: scale(1.03);
      pointer-events:none;
      z-index: 0;
    }

    [data-mm-bg-board]::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(900px 520px at 18% 20%, rgba(255,255,255,0.24), transparent 62%),
        radial-gradient(700px 460px at 82% 34%, rgba(255,255,255,0.16), transparent 62%),
        rgba(255,255,255,0.24);
      pointer-events:none;
      z-index: 1;
    }

    .mmBgTint{
      position:absolute;
      inset:0;
      pointer-events:none;
      mix-blend-mode: multiply;
      z-index: 1;
    }

    .mmBgModule{ position: relative; }

    .mmBgBtn{
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid var(--lineStrong);
      background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,255,255,.74));
      box-shadow: 0 6px 18px rgba(0,0,0,.06);
      display:grid;
      place-items:center;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      pointer-events: auto;
    }
    .mmBgBtn:focus-visible{ outline: 3px solid var(--focus); outline-offset: 2px; }

    .mmBgDot{
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid var(--lineStrong);
      background: var(--board-tint, #efe7e1);
      box-shadow: 0 0 0 6px rgba(239,231,225,0.35);
    }

    .mmThemeDot{
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid var(--lineStrong);
      background: var(--text);
      box-shadow: 0 0 0 6px rgba(239,231,225,0.22);
    }

    .mmBgPanel{
      position: absolute;
      top: 50px;
      right: 0;
      width: 320px;
      border-radius: 16px;
      border: 1px solid var(--lineStrong);
      background: var(--panel-bg);
      box-shadow: 0 18px 40px rgba(0,0,0,.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 12px;
      display:none;
      z-index: 60;
      max-height: calc(100vh - 140px);
      overflow:auto;
    }
    .mmBgPanel.open{ display:block; }

    .mmBgTitle{
      font-size: 13px;
      font-weight: 650;
      color: rgba(43,43,43,.88);
      margin-bottom: 10px;
    }

    .mmBgRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 8px 0;
    }
    .mmBgRowTop{ align-items:flex-start; }

    .mmBgLabel{
      font-size: 12px;
      color: var(--muted);
    }

    .mmBgColor{
      width: 34px;
      height: 26px;
      border: 1px solid var(--lineStrong);
      border-radius: 10px;
      padding: 0;
      background: transparent;
      cursor: pointer;
    }

    .mmBgRange{ width: 150px; }

    .mmBgDivider{
      height: 1px;
      background: var(--line);
      margin: 8px 0;
    }

    .mmBgFile{
      width: 100%;
      font-size: 12px;
      color: rgba(43,43,43,.75);
    }

    .mmBgMiniBtn{
      width: 100%;
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.92);
      border-radius: 12px;
      padding: 9px 10px;
      cursor: pointer;
      font-weight: 650;
      color: rgba(43,43,43,.88);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      pointer-events: auto;
    }
    .mmBgMiniBtn:focus-visible{ outline: 3px solid var(--focus); outline-offset: 2px; }

    .presetName{
      width:100%;
      border:1px solid var(--lineStrong);
      background: rgba(255,255,255,.96);
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
      color: var(--text);
      outline:none;
    }
    .presetSelect{
      width:100%;
      height:34px;
      border-radius:12px;
      border:1px solid var(--lineStrong);
      background:rgba(255,255,255,.92);
      padding:0 10px;
      color:var(--text);
      outline:none;
    }

    .savingBadge{
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      z-index: 120;
      background: rgba(20,20,20,.84);
      color: rgba(255,255,255,.96);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }
    .savingBadge.show{
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .status{
      min-height: 18px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="title">
        <h1>Mistake Museum</h1>
      </div>

      <div class="actions">
        <button class="btn primary" id="addBtn" data-action="open-add" type="button" title="Add an exhibit">
          <span aria-hidden="true">＋</span>
          Add exhibit
        </button>
        <button class="btn" id="exportBtn" type="button" title="Export exhibits to JSON">
          <span aria-hidden="true">⤓</span>
          Export
        </button>
        <button class="btn danger" id="clearBtn" type="button" title="Clear all exhibits">
          <span aria-hidden="true">✕</span>
          Clear
        </button>

        <div class="mmBgModule" data-mm-bg-module>
          <button class="mmBgBtn" type="button" aria-label="Background settings" title="Background">
            <span class="mmBgDot" aria-hidden="true"></span>
          </button>

          <div class="mmBgPanel" role="dialog" aria-label="Background settings">
            <div class="mmBgTitle">Background</div>

            <div class="mmBgRow">
              <label class="mmBgLabel">Tint</label>
              <input class="mmBgColor" type="color" value="#efe7e1" data-mm-bg-color />
            </div>

            <div class="mmBgRow">
              <label class="mmBgLabel">Strength</label>
              <input class="mmBgRange" type="range" min="0" max="70" value="35" data-mm-bg-strength />
            </div>

            <div class="mmBgRow">
              <label class="mmBgLabel">Image blur</label>
              <input class="mmBgRange" type="range" min="0" max="30" value="0" data-mm-bg-blur />
            </div>

            <div class="mmBgDivider"></div>

            <div class="mmBgRow mmBgRowTop">
              <label class="mmBgLabel">Image</label>
              <input class="mmBgFile" type="file" accept="image/*" data-mm-bg-image />
            </div>

            <button class="mmBgMiniBtn" type="button" data-mm-bg-clear>Remove image</button>

            <div class="mmBgDivider"></div>

            <button class="mmBgMiniBtn" type="button" data-mm-bg-apply>Apply background</button>
            <button class="mmBgMiniBtn" type="button" data-mm-bg-reset style="margin-top:8px;">Reset background</button>
            <div class="status" data-mm-bg-status aria-live="polite"></div>
          </div>
        </div>

        <div class="mmBgModule" data-mm-theme-module>
          <button class="mmBgBtn" type="button" aria-label="Theme settings" title="Theme">
            <span class="mmThemeDot" aria-hidden="true"></span>
          </button>

          <div class="mmBgPanel" role="dialog" aria-label="Theme settings">
            <div class="mmBgTitle">Theme</div>

            <div class="mmBgRow">
              <label class="mmBgLabel">Page bg</label>
              <input class="mmBgColor" type="color" value="#ffffff" data-mm-theme-bg />
            </div>

            <div class="mmBgRow">
              <label class="mmBgLabel">Text</label>
              <input class="mmBgColor" type="color" value="#2b2b2b" data-mm-theme-text />
            </div>

            <div class="mmBgRow">
              <label class="mmBgLabel">Muted</label>
              <input class="mmBgColor" type="color" value="#6f6a63" data-mm-theme-muted />
            </div>

            <div class="mmBgRow">
              <label class="mmBgLabel">Borders</label>
              <input class="mmBgColor" type="color" value="#2b2b2b" data-mm-theme-line />
            </div>

            <div class="mmBgRow">
              <label class="mmBgLabel">Border strength</label>
              <input class="mmBgRange" type="range" min="8" max="55" value="18" data-mm-theme-line-a />
            </div>

<script>
(function(){
  "use strict";

  const DEFAULT_THEME = {
    bg: "#ffffff",
    text: "#2b2b2b",
    muted: "#6f6a63",
    line: "#2b2b2b",
    lineA: 18,
    panelAlpha: 68
  };

  const DEFAULT_BG = {
    tint:"#efe7e1",
    strength:35,
    blur:0,
    imageDataUrl:null
  };

  const DEFAULT_STATE = {
    version: 5,
    updatedAt: new Date().toISOString(),
    items: [],
    view: { q:"", tag:"", sort:"updated_desc" },
    theme: { ...DEFAULT_THEME },
    bg: { ...DEFAULT_BG }
  };

  function stableWidgetId(){
    try{
      const sp = new URLSearchParams(location.search);
      const wid = (sp.get("wid") || "").trim();
      if(wid) return "wid:" + wid;
    }catch{}
    const base = (location.origin || "") + (location.pathname || "mistake-museum");
    return "path:" + base.replace(/[^\w:/.-]+/g, "_");
  }

  const WID = stableWidgetId();
  const DATA_KEY = "mistake_museum_state_v5__" + WID;
  const PRESETS_KEY = "mistake_museum_presets_v5";
  const PRESET_NAMESPACE = "mistake-museum";
  const DB_NAME = "mistake_museum_db_v5";
  const STORE_NAME = "kv";

  const els = {
    contentArea: document.getElementById("contentArea"),
    countPill: document.getElementById("countPill"),
    tagPill: document.getElementById("tagPill"),
    filteredMeta: document.getElementById("filteredMeta"),

    search: document.getElementById("search"),
    tagFilter: document.getElementById("tagFilter"),
    sortBy: document.getElementById("sortBy"),

    addBtn: document.getElementById("addBtn"),
    exportBtn: document.getElementById("exportBtn"),
    clearBtn: document.getElementById("clearBtn"),

    modalBackdrop: document.getElementById("modalBackdrop"),
    closeModalBtn: document.getElementById("closeModalBtn"),
    cancelBtn: document.getElementById("cancelBtn"),

    exhibitForm: document.getElementById("exhibitForm"),
    editId: document.getElementById("editId"),
    modalTitle: document.getElementById("modalTitle"),
    saveBtn: document.getElementById("saveBtn"),

    mTitle: document.getElementById("mTitle"),
    mSeverity: document.getElementById("mSeverity"),
    mContext: document.getElementById("mContext"),
    mTags: document.getElementById("mTags"),
    mWhat: document.getElementById("mWhat"),
    mLesson: document.getElementById("mLesson"),
    mFix: document.getElementById("mFix"),

    mmBgTint: document.getElementById("mmBgTint"),
    savingBadge: document.getElementById("savingBadge")
  };

  let appState = cloneSafe(DEFAULT_STATE);
  let lastFocusEl = null;
  let resizeTimer = null;
  let toastTimer = null;
  let isBooting = true;

  const Storage = {
    dbPromise: null,

    openDb(){
      if (!("indexedDB" in window)) return Promise.resolve(null);
      if (this.dbPromise) return this.dbPromise;
      this.dbPromise = new Promise((resolve) => {
        try{
          const req = indexedDB.open(DB_NAME, 1);
          req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
              db.createObjectStore(STORE_NAME);
            }
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => resolve(null);
        }catch{
          resolve(null);
        }
      });
      return this.dbPromise;
    },

    async idbGet(key){
      const db = await this.openDb();
      if (!db) return null;
      return new Promise((resolve) => {
        try{
          const tx = db.transaction(STORE_NAME, "readonly");
          const store = tx.objectStore(STORE_NAME);
          const req = store.get(key);
          req.onsuccess = () => resolve(req.result ?? null);
          req.onerror = () => resolve(null);
        }catch{
          resolve(null);
        }
      });
    },

    async idbSet(key, value){
      const db = await this.openDb();
      if (!db) return false;
      return new Promise((resolve) => {
        try{
          const tx = db.transaction(STORE_NAME, "readwrite");
          tx.objectStore(STORE_NAME).put(value, key);
          tx.oncomplete = () => resolve(true);
          tx.onerror = () => resolve(false);
        }catch{
          resolve(false);
        }
      });
    },

    lsGet(key){
      try{ return localStorage.getItem(key); }catch{ return null; }
    },

    lsSet(key, value){
      try{
        localStorage.setItem(key, value);
        return true;
      }catch{
        return false;
      }
    },

    lsRemove(key){
      try{ localStorage.removeItem(key); }catch{}
    },

    parseJSON(raw){
      if (typeof raw !== "string" || !raw) return null;
      try{ return JSON.parse(raw); }catch{ return null; }
    },

    async getJSON(key){
      const fromDbRaw = await this.idbGet(key);
      const fromDb = this.parseJSON(fromDbRaw);

      if (fromDb !== null){
        if (typeof fromDbRaw === "string") this.lsSet(key, fromDbRaw);
        return fromDb;
      }

      const fromLsRaw = this.lsGet(key);
      const fromLs = this.parseJSON(fromLsRaw);
      return fromLs;
    },

    async setJSON(key, value){
      const raw = JSON.stringify(value);
      const lsOk = this.lsSet(key, raw);
      const dbOk = await this.idbSet(key, raw);

      if (!lsOk && dbOk) {
        this.lsRemove(key);
      }
      return lsOk || dbOk;
    }
  };

  function cloneSafe(v){
    try{
      return structuredClone(v);
    }catch{
      return JSON.parse(JSON.stringify(v));
    }
  }

  function showSavedToast(msg="Saved"){
    els.savingBadge.textContent = msg;
    els.savingBadge.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => {
      els.savingBadge.classList.remove("show");
    }, 1200);
  }

  function clamp(n, min, max){
    const x = Number(n);
    if(!Number.isFinite(x)) return min;
    return Math.max(min, Math.min(max, x));
  }

  function normHex(hex, fallback){
    const s = String(hex || "").trim();
    return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : fallback;
  }

  function hexToRgb(hex){
    const h = normHex(hex, "#ffffff").slice(1);
    return {
      r: parseInt(h.slice(0,2), 16),
      g: parseInt(h.slice(2,4), 16),
      b: parseInt(h.slice(4,6), 16)
    };
  }

  function hexToRgba(hex, a){
    const { r, g, b } = hexToRgb(hex);
    return `rgba(${r},${g},${b},${a})`;
  }

  function uid(){
    try{
      if (crypto && typeof crypto.randomUUID === "function") return crypto.randomUUID();
    }catch{}
    return Math.random().toString(16).slice(2) + Date.now().toString(16);
  }

  const nowISO = () => new Date().toISOString();

  const normalizeTags = (raw) => {
    if (!raw) return [];
    const src = Array.isArray(raw) ? raw.join(",") : String(raw);
    const parts = src.split(",").map(s => s.trim().toLowerCase()).filter(Boolean);
    return [...new Set(parts)].slice(0, 14);
  };

  function sanitizeTheme(t){
    return {
      bg: normHex(t?.bg, DEFAULT_THEME.bg),
      text: normHex(t?.text, DEFAULT_THEME.text),
      muted: normHex(t?.muted, DEFAULT_THEME.muted),
      line: normHex(t?.line, DEFAULT_THEME.line),
      lineA: clamp(t?.lineA ?? DEFAULT_THEME.lineA, 8, 55),
      panelAlpha: clamp(t?.panelAlpha ?? DEFAULT_THEME.panelAlpha, 35, 98)
    };
  }

  function sanitizeBg(bg){
    return {
      tint: normHex(bg?.tint, DEFAULT_BG.tint),
      strength: clamp(bg?.strength ?? DEFAULT_BG.strength, 0, 70),
      blur: clamp(bg?.blur ?? DEFAULT_BG.blur, 0, 30),
      imageDataUrl: typeof bg?.imageDataUrl === "string" && bg.imageDataUrl ? bg.imageDataUrl : null
    };
  }

  function sanitizeItem(it){
    return {
      id: String(it?.id || uid()),
      title: String(it?.title || "").trim().slice(0, 90),
      severity: clamp(it?.severity ?? 3, 1, 5),
      context: String(it?.context || "").trim().slice(0, 70),
      tags: normalizeTags(it?.tags),
      what: String(it?.what || "").trim(),
      lesson: String(it?.lesson || "").trim(),
      fix: String(it?.fix || "").trim(),
      createdAt: it?.createdAt || nowISO(),
      updatedAt: it?.updatedAt || nowISO(),
    };
  }

  function sanitizeState(raw){
    return {
      version: 5,
      updatedAt: raw?.updatedAt || new Date().toISOString(),
      items: Array.isArray(raw?.items) ? raw.items.map(sanitizeItem) : [],
      view: {
        q: String(raw?.view?.q || ""),
        tag: String(raw?.view?.tag || ""),
        sort: ["updated_desc","created_desc","severity_desc","title_asc"].includes(String(raw?.view?.sort))
          ? String(raw.view.sort)
          : "updated_desc"
      },
      theme: sanitizeTheme(raw?.theme || DEFAULT_THEME),
      bg: sanitizeBg(raw?.bg || DEFAULT_BG)
    };
  }

  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function persistSnapshotSync(){
    try{
      appState.updatedAt = new Date().toISOString();
      localStorage.setItem(DATA_KEY, JSON.stringify(appState));
    }catch{}
  }

  async function persistState(message){
    appState.updatedAt = new Date().toISOString();
    await Storage.setJSON(DATA_KEY, appState);
    if (!isBooting) showSavedToast(message || "Saved");
  }

  async function loadState(){
    const saved = await Storage.getJSON(DATA_KEY);
    appState = sanitizeState(saved || DEFAULT_STATE);
  }

  const severityIcon = (n) => {
    const map = { 1: "·", 2: "∘", 3: "◦", 4: "◎", 5: "◉" };
    return map[n] || "◦";
  };

  async function loadPresets(){
    const result = await Storage.getJSON(PRESETS_KEY);
    return Array.isArray(result) ? result : [];
  }

  async function getPresets(){
    const list = await loadPresets();
    return Array.isArray(list) ? list : [];
  }

  async function savePresets(list){
    await Storage.setJSON(PRESETS_KEY, list);
  }

  function status(msg){
    const el = document.querySelector("[data-mm-preset-status]");
    if(el) el.textContent = msg || "";
  }

  function bgStatus(msg){
    const el = document.querySelector("[data-mm-bg-status]");
    if(el) el.textContent = msg || "";
  }

  async function refreshPresetSelect(){
    const sel = document.querySelector("[data-mm-preset-select]");
    if(!sel) return;
    const list = (await getPresets()).filter(p => p && p.ns === PRESET_NAMESPACE);
    const cur = sel.value;
    sel.innerHTML = `<option value="">—</option>`;
    for(const p of list){
      const opt = document.createElement("option");
      opt.value = p.id;
      opt.textContent = p.name || "Untitled";
      sel.appendChild(opt);
    }
    if ([...sel.options].some(o => o.value === cur)) sel.value = cur;
  }

  function themeApplyToCSS(t){
    const x = sanitizeTheme(t);

    const bg = x.bg;
    const text = x.text;
    const muted = x.muted;
    const line = x.line;
    const lineA = clamp(x.lineA / 100, 0.08, 0.55);
    const lineStrongA = clamp(lineA + 0.12, 0.16, 0.70);
    const panelA = clamp(x.panelAlpha / 100, 0.35, 0.98);

    document.documentElement.style.setProperty("--bg", bg);
    document.documentElement.style.setProperty("--text", text);
    document.documentElement.style.setProperty("--muted", muted);
    document.documentElement.style.setProperty("--line", hexToRgba(line, lineA));
    document.documentElement.style.setProperty("--lineStrong", hexToRgba(line, lineStrongA));
    document.documentElement.style.setProperty("--focus", hexToRgba(text, 0.22));
    document.documentElement.style.setProperty("--panel", `rgba(255,255,255,${panelA})`);
    document.documentElement.style.setProperty("--panel2", `rgba(255,255,255,${Math.min(0.98, panelA + 0.17)})`);
    document.documentElement.style.setProperty("--panel-bg", `rgba(255,255,255,${Math.min(0.98, panelA + 0.27)})`);
    document.documentElement.style.setProperty("--field-bg", `rgba(255,255,255,${Math.min(0.92, panelA + 0.10)})`);

    const dot = document.querySelector("[data-mm-theme-module] .mmThemeDot");
    if(dot){
      dot.style.background = text;
      dot.style.boxShadow = `0 0 0 6px ${hexToRgba(muted, 0.18)}`;
    }
  }

  function themeSyncInputs(t){
    const mod = document.querySelector("[data-mm-theme-module]");
    if(!mod) return;
    const x = sanitizeTheme(t);
    mod.querySelector("[data-mm-theme-bg]").value = x.bg;
    mod.querySelector("[data-mm-theme-text]").value = x.text;
    mod.querySelector("[data-mm-theme-muted]").value = x.muted;
    mod.querySelector("[data-mm-theme-line]").value = x.line;
    mod.querySelector("[data-mm-theme-line-a]").value = String(x.lineA);
    mod.querySelector("[data-mm-theme-panel-a]").value = String(x.panelAlpha);
  }

  function themeReadInputs(){
    const mod = document.querySelector("[data-mm-theme-module]");
    return sanitizeTheme({
      bg: mod.querySelector("[data-mm-theme-bg]").value,
      text: mod.querySelector("[data-mm-theme-text]").value,
      muted: mod.querySelector("[data-mm-theme-muted]").value,
      line: mod.querySelector("[data-mm-theme-line]").value,
      lineA: Number(mod.querySelector("[data-mm-theme-line-a]").value),
      panelAlpha: Number(mod.querySelector("[data-mm-theme-panel-a]").value)
    });
  }

  function bgApplyToCSS(bg){
    const x = sanitizeBg(bg);
    const tint = x.tint;
    const a = clamp(x.strength, 0, 70) / 100;

    document.documentElement.style.setProperty("--board-tint", tint);
    document.documentElement.style.setProperty("--board-image", x.imageDataUrl ? `url("${x.imageDataUrl}")` : "none");
    document.documentElement.style.setProperty("--board-blur", `${x.blur}px`);

    if(els.mmBgTint) {
      els.mmBgTint.style.background = hexToRgba(tint, a);
    }

    const dot = document.querySelector("[data-mm-bg-module] .mmBgDot");
    if(dot){
      dot.style.background = tint;
      dot.style.boxShadow = `0 0 0 6px ${hexToRgba(tint, Math.min(0.35, a + 0.10))}`;
    }
  }

  function bgSyncInputs(bg){
    const mod = document.querySelector("[data-mm-bg-module]");
    if(!mod) return;
    const x = sanitizeBg(bg);
    mod.querySelector("[data-mm-bg-color]").value = x.tint;
    mod.querySelector("[data-mm-bg-strength]").value = String(x.strength);
    mod.querySelector("[data-mm-bg-blur]").value = String(x.blur);
  }

  async function fileToDataUrl(file){
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(String(r.result));
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  async function loadImage(src){
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  async function processImageFile(file){
    if (!file) return null;
    const dataUrl = await fileToDataUrl(file);
    const img = await loadImage(dataUrl);

    const maxDim = 1400;
    const ratio = Math.min(1, maxDim / Math.max(img.width, img.height));
    const width = Math.max(1, Math.round(img.width * ratio));
    const height = Math.max(1, Math.round(img.height * ratio));

    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext("2d");
    if (!ctx) return dataUrl;

    ctx.drawImage(img, 0, 0, width, height);

    let out;
    try{
      out = canvas.toDataURL("image/webp", 0.82);
    }catch{
      out = canvas.toDataURL("image/jpeg", 0.82);
    }
    return out;
  }

  function initPanelToggles(){
    const bgMod = document.querySelector("[data-mm-bg-module]");
    const thMod = document.querySelector("[data-mm-theme-module]");
    if(!bgMod || !thMod) return;

    const bgBtn = bgMod.querySelector(".mmBgBtn");
    const bgPanel = bgMod.querySelector(".mmBgPanel");
    const thBtn = thMod.querySelector(".mmBgBtn");
    const thPanel = thMod.querySelector(".mmBgPanel");

    bgBtn.addEventListener("click", (e)=>{
      e.stopPropagation();
      thPanel.classList.remove("open");
      bgPanel.classList.toggle("open");
    });

    thBtn.addEventListener("click", (e)=>{
      e.stopPropagation();
      bgPanel.classList.remove("open");
      thPanel.classList.toggle("open");
    });

    document.addEventListener("click", (e)=>{
      const inBg = bgMod.contains(e.target);
      const inTh = thMod.contains(e.target);
      if(!inBg) bgPanel.classList.remove("open");
      if(!inTh) thPanel.classList.remove("open");
    });

    window.addEventListener("scroll", ()=>{
      bgPanel.classList.remove("open");
      thPanel.classList.remove("open");
    }, { passive:true });
  }

  function sanitizePresetList(parsed){
    if(!Array.isArray(parsed)) return [];
    return parsed.filter(Boolean).map(p => ({
      id: String(p.id || uid()),
      name: String(p.name || "Imported"),
      ns: String(p.ns || PRESET_NAMESPACE),
      theme: sanitizeTheme(p.theme),
      bg: sanitizeBg(p.bg)
    }));
  }

  async function applyPresetToThisWidget(p){
    const th = sanitizeTheme(p.theme || {});
    const bg = sanitizeBg(p.bg || {});

    appState.theme = { ...th };
    appState.bg = { ...bg };

    themeSyncInputs(appState.theme);
    themeApplyToCSS(appState.theme);

    bgSyncInputs(appState.bg);
    bgApplyToCSS(appState.bg);

    await persistState("Preset applied");
    status("Preset applied.");
  }

  async function initThemeBgAndPresets(){
    themeSyncInputs(appState.theme);
    themeApplyToCSS(appState.theme);

    bgSyncInputs(appState.bg);
    bgApplyToCSS(appState.bg);

    const thMod = document.querySelector("[data-mm-theme-module]");
    const bgMod = document.querySelector("[data-mm-bg-module]");
    if(!thMod || !bgMod) return;

    ["data-mm-theme-bg","data-mm-theme-text","data-mm-theme-muted","data-mm-theme-line","data-mm-theme-line-a","data-mm-theme-panel-a"].forEach(attr=>{
      const el = thMod.querySelector(`[${attr}]`);
      if (!el) return;
      el.addEventListener("input", ()=>{
        const preview = themeReadInputs();
        themeApplyToCSS(preview);
        status("");
      });
    });

    thMod.querySelector("[data-mm-theme-apply]").addEventListener("click", async ()=>{
      appState.theme = themeReadInputs();
      themeApplyToCSS(appState.theme);
      await persistState("Theme applied");
      status("Theme applied.");
    });

    thMod.querySelector("[data-mm-theme-reset]").addEventListener("click", async ()=>{
      appState.theme = { ...DEFAULT_THEME };
      themeSyncInputs(appState.theme);
      themeApplyToCSS(appState.theme);
      await persistState("Theme reset");
      status("Theme reset.");
    });

    const bgColor = bgMod.querySelector("[data-mm-bg-color]");
    const bgStrength = bgMod.querySelector("[data-mm-bg-strength]");
    const bgBlur = bgMod.querySelector("[data-mm-bg-blur]");
    const bgImage = bgMod.querySelector("[data-mm-bg-image]");
    const bgClear = bgMod.querySelector("[data-mm-bg-clear]");

    function getCommittedBg(){
      return sanitizeBg(appState.bg);
    }

    function getBgPreview(){
      return sanitizeBg({
        tint: bgColor.value,
        strength: Number(bgStrength.value),
        blur: Number(bgBlur.value),
        imageDataUrl:
          Object.prototype.hasOwnProperty.call(bgMod.dataset, "pendingImage")
            ? (bgMod.dataset.pendingImage || null)
            : getCommittedBg().imageDataUrl
      });
    }

    bgColor.addEventListener("input", ()=>{
      bgApplyToCSS(getBgPreview());
      bgStatus("");
    });

    bgStrength.addEventListener("input", ()=>{
      bgApplyToCSS(getBgPreview());
      bgStatus("");
    });

    bgBlur.addEventListener("input", ()=>{
      bgApplyToCSS(getBgPreview());
      bgStatus("");
    });

    bgImage.addEventListener("change", async ()=>{
      const f = bgImage.files && bgImage.files[0];
      if(!f) return;
      bgStatus("Processing image…");
      try{
        const dataUrl = await processImageFile(f);
        bgMod.dataset.pendingImage = dataUrl || "";
        bgApplyToCSS(getBgPreview());
        bgStatus("Image ready. Click Apply background to save it.");
      }catch{
        bgStatus("Could not process that image.");
      }
    });

    bgClear.addEventListener("click", ()=>{
      bgImage.value = "";
      bgMod.dataset.pendingImage = "";
      bgApplyToCSS(getBgPreview());
      bgStatus("Image removed from draft.");
    });

    bgMod.querySelector("[data-mm-bg-apply]").addEventListener("click", async ()=>{
      appState.bg = sanitizeBg({
        tint: bgColor.value,
        strength: Number(bgStrength.value),
        blur: Number(bgBlur.value),
        imageDataUrl:
          Object.prototype.hasOwnProperty.call(bgMod.dataset, "pendingImage")
            ? (bgMod.dataset.pendingImage || null)
            : appState.bg.imageDataUrl
      });

      bgApplyToCSS(appState.bg);
      bgSyncInputs(appState.bg);
      await persistState("Background applied");
      bgStatus("Background applied.");
      delete bgMod.dataset.pendingImage;
      bgImage.value = "";
    });

    bgMod.querySelector("[data-mm-bg-reset]").addEventListener("click", async ()=>{
      appState.bg = { ...DEFAULT_BG };
      bgSyncInputs(appState.bg);
      bgApplyToCSS(appState.bg);
      bgImage.value = "";
      delete bgMod.dataset.pendingImage;
      await persistState("Background reset");
      bgStatus("Background reset.");
    });

    await refreshPresetSelect();

    thMod.querySelector("[data-mm-preset-save]").addEventListener("click", async ()=>{
      const name = (thMod.querySelector("[data-mm-preset-name]").value || "").trim();
      if(!name){ status("Type a preset name first."); return; }

      const currentTheme = themeReadInputs();
      const currentBg = sanitizeBg({
        tint: bgColor.value,
        strength: Number(bgStrength.value),
        blur: Number(bgBlur.value),
        imageDataUrl:
          Object.prototype.hasOwnProperty.call(bgMod.dataset, "pendingImage")
            ? (bgMod.dataset.pendingImage || null)
            : appState.bg.imageDataUrl
      });

      const list = sanitizePresetList(await getPresets());
      const entry = {
        id: uid(),
        ns: PRESET_NAMESPACE,
        name,
        theme: { ...currentTheme },
        bg: { ...currentBg }
      };

      list.unshift(entry);
      await savePresets(list);

      thMod.querySelector("[data-mm-preset-name]").value = "";
      await refreshPresetSelect();
      thMod.querySelector("[data-mm-preset-select]").value = entry.id;
      status("Preset saved.");
      showSavedToast("Preset saved");
    });

    thMod.querySelector("[data-mm-preset-apply]").addEventListener("click", async ()=>{
      const id = thMod.querySelector("[data-mm-preset-select]").value;
      if(!id){ status("Choose a preset first."); return; }
      const p = sanitizePresetList(await getPresets()).find(x=>x.id===id && x.ns === PRESET_NAMESPACE);
      if(!p){ status("Preset not found."); return; }
      await applyPresetToThisWidget(p);
    });

    thMod.querySelector("[data-mm-preset-delete]").addEventListener("click", async ()=>{
      const sel = thMod.querySelector("[data-mm-preset-select]");
      const id = sel.value;
      if(!id){ status("Choose a preset first."); return; }
      const list = sanitizePresetList(await getPresets());
      const next = list.filter(x => !(x.id === id && x.ns === PRESET_NAMESPACE));
      if(next.length === list.length){ status("Preset not found."); return; }
      await savePresets(next);
      await refreshPresetSelect();
      sel.value = "";
      status("Preset deleted.");
      showSavedToast("Preset deleted");
    });
  }

  function buildTagOptions(allItems){
    const tagSet = new Set();
    allItems.forEach(it => (it.tags || []).forEach(t => tagSet.add(t)));
    const tags = [...tagSet].sort((a,b) => a.localeCompare(b));
    const selected = appState.view.tag;

    els.tagFilter.innerHTML =
      `<option value="">All tags</option>` +
      tags.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join("");

    if ([...els.tagFilter.options].some(o => o.value === selected)) {
      els.tagFilter.value = selected;
    } else {
      appState.view.tag = "";
      els.tagFilter.value = "";
    }

    els.tagPill.textContent = `${tags.length} tag${tags.length === 1 ? "" : "s"}`;
  }

  const matches = (it, q) => {
    if (!q) return true;
    const hay = [it.title, it.context, it.what, it.lesson, it.fix, ...(it.tags || [])].join(" ").toLowerCase();
    return hay.includes(q.toLowerCase());
  };

  const applyFilters = (allItems) => {
    const q = appState.view.q.trim();
    const tag = appState.view.tag;

    let out = allItems.filter(it => matches(it, q));
    if (tag) out = out.filter(it => (it.tags || []).includes(tag));

    out.sort((a,b) => {
      switch(appState.view.sort){
        case "title_asc": return (a.title || "").localeCompare(b.title || "");
        case "created_desc": return (b.createdAt || "").localeCompare(a.createdAt || "");
        case "severity_desc": return (Number(b.severity) || 0) - (Number(a.severity) || 0);
        case "updated_desc":
        default: return (b.updatedAt || "").localeCompare(a.updatedAt || "");
      }
    });

    return out;
  };

  const cardHtml = (it) => {
    const tags = (it.tags || []).slice(0, 7);
    const ctx = it.context ? it.context : "—";
    const shortLesson = it.lesson ? it.lesson : "Lesson: (add one)";

    return `
      <article class="card" aria-label="${escapeHtml(it.title)}">
        <div class="frame" aria-hidden="true">
          <div class="plaque" title="Severity ${Number(it.severity)}">${escapeHtml(severityIcon(Number(it.severity)))}</div>
        </div>

        <div class="content">
          <div class="topRow">
            <div style="min-width:0;">
              <p class="name">${escapeHtml(it.title)}</p>
              <p class="sub">${escapeHtml(ctx)} · ${escapeHtml(shortLesson)}</p>
            </div>

            <div class="cardActions">
              <button class="iconBtn" type="button" id="edit_${it.id}" aria-label="Edit" title="Edit">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M4 20h4l10.5-10.5a1.8 1.8 0 0 0 0-2.5l-1.5-1.5a1.8 1.8 0 0 0-2.5 0L4 16v4Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                  <path d="M13.5 6.5 17.5 10.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </button>
              <button class="iconBtn" type="button" id="del_${it.id}" aria-label="Delete" title="Delete">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M6 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <path d="M8 7l1 14h6l1-14" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="chips" aria-label="Tags">
            <span class="chip">severity ${escapeHtml(String(it.severity))}</span>
            ${tags.map(t => `<span class="chip">${escapeHtml(t)}</span>`).join("")}
            ${(it.tags && it.tags.length > tags.length) ? `<span class="chip">+${it.tags.length - tags.length}</span>` : ""}
          </div>

          <details>
            <summary>
              <span>Open exhibit details</span>
              <span class="chev" aria-hidden="true">⌄</span>
            </summary>

            <div class="detailsBody">
              <div>
                <div class="label">What happened</div>
                <div class="box">${escapeHtml(it.what || "—")}</div>
              </div>
              <div>
                <div class="label">Lesson learned</div>
                <div class="box">${escapeHtml(it.lesson || "—")}</div>
              </div>
              <div>
                <div class="label">Prevention routine</div>
                <div class="box">${escapeHtml(it.fix || "—")}</div>
              </div>
            </div>
          </details>
        </div>
      </article>
    `;
  };

  function render(){
    els.search.value = appState.view.q;
    els.sortBy.value = appState.view.sort;

    buildTagOptions(appState.items);
    const filtered = applyFilters(appState.items);

    els.countPill.textContent = `${appState.items.length} exhibit${appState.items.length === 1 ? "" : "s"}`;

    const parts = [];
    if (appState.view.q) parts.push(`Search: “${appState.view.q}”`);
    if (appState.view.tag) parts.push(`Tag: ${appState.view.tag}`);
    els.filteredMeta.textContent = parts.length
      ? `${filtered.length} match${filtered.length === 1 ? "" : "es"} · ` + parts.join(" · ")
      : `${filtered.length} shown`;

    if (appState.items.length === 0){
      els.contentArea.innerHTML = `
        <div class="empty">
          <div class="big" aria-hidden="true">⟡</div>
          <h2>No exhibits yet</h2>
          <button class="btn primary" type="button" id="emptyAddBtn" data-action="open-add">＋ Add your first exhibit</button>
        </div>
      `;
      return;
    }

    if (filtered.length === 0){
      els.contentArea.innerHTML = `
        <div class="empty">
          <div class="big" aria-hidden="true">⌕</div>
          <h2>No matches</h2>
          <p>Try a different search, clear the tag filter, or add a new exhibit.</p>
          <button class="btn" type="button" id="clearFiltersBtn">Clear filters</button>
        </div>
      `;
      const clearBtn = document.getElementById("clearFiltersBtn");
      if (clearBtn){
        clearBtn.addEventListener("click", async () => {
          appState.view.q = "";
          appState.view.tag = "";
          await persistState("Saved");
          render();
        });
      }
      return;
    }

    els.contentArea.innerHTML = `
      <div class="grid">
        ${filtered.map(cardHtml).join("")}
      </div>
    `;

    filtered.forEach(it => {
      const edit = document.getElementById(`edit_${it.id}`);
      const del = document.getElementById(`del_${it.id}`);
      if (edit) edit.addEventListener("click", () => openEditModal(it.id));
      if (del) del.addEventListener("click", () => deleteItem(it.id));
    });
  }

  async function upsert(payload){
    const clean = sanitizeItem(payload);
    const idx = appState.items.findIndex(x => x.id === clean.id);
    if (idx >= 0) appState.items[idx] = clean;
    else appState.items.unshift(clean);

    await persistState("Saved");
    render();
  }

  async function deleteItem(id){
    const it = appState.items.find(x => x.id === id);
    const name = it ? it.title : "this exhibit";

    const ok = await askConfirm(`Delete "${name}"?`, {
      okText: "Delete",
      cancelText: "Cancel",
      danger: true
    });
    if (!ok) return;

    appState.items = appState.items.filter(x => x.id !== id);
    await persistState("Deleted");
    render();
  }

  async function clearAll(){
    if (!appState.items.length) return;

    const ok = await askConfirm("Clear all exhibits? This cannot be undone.", {
      okText: "Yes, clear",
      cancelText: "Cancel",
      danger: true
    });
    if (!ok) return;

    appState.items = [];
    await persistState("Cleared");
    render();
  }

  function exportJson(){
    const data = JSON.stringify(appState.items, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "mistake-museum.json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  async function askConfirm(message, { okText = "Confirm", cancelText = "Cancel", danger = false } = {}){
    return new Promise((resolve) => {
      const wrap = document.createElement("div");
      wrap.style.position = "fixed";
      wrap.style.inset = "0";
      wrap.style.zIndex = "9999";
      wrap.style.display = "grid";
      wrap.style.placeItems = "center";
      wrap.style.padding = "18px";
      wrap.style.background = "rgba(20,18,16,.35)";
      wrap.style.backdropFilter = "blur(8px)";
      wrap.style.webkitBackdropFilter = "blur(8px)";

      wrap.innerHTML = `
        <div style="width:min(520px,100%);background:rgba(255,255,255,.94);border:1px solid rgba(43,43,43,.18);border-radius:20px;box-shadow:0 12px 40px rgba(0,0,0,.12);overflow:hidden;">
          <div style="padding:14px 16px;border-bottom:1px solid rgba(43,43,43,.12);font-weight:650;">Confirm</div>
          <div style="padding:14px 16px;color:rgba(43,43,43,.92);line-height:1.45;">${escapeHtml(message)}</div>
          <div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;padding:12px 16px;border-top:1px solid rgba(43,43,43,.12);">
            <button class="btn" type="button" id="cnlBtn">${escapeHtml(cancelText)}</button>
            <button class="btn ${danger ? "danger" : "primary"}" type="button" id="okBtn">${escapeHtml(okText)}</button>
          </div>
        </div>
      `;

      const cleanup = (val) => {
        document.removeEventListener("keydown", onKey);
        wrap.remove();
        resolve(val);
      };

      const onKey = (e) => { if (e.key === "Escape") cleanup(false); };

      wrap.addEventListener("click", (e) => {
        if (e.target === wrap) cleanup(false);
      });

      document.body.appendChild(wrap);
      document.addEventListener("keydown", onKey);

      wrap.querySelector("#cnlBtn").addEventListener("click", () => cleanup(false));
      const okBtn = wrap.querySelector("#okBtn");
      okBtn.addEventListener("click", () => cleanup(true));
      setTimeout(() => okBtn.focus(), 0);
    });
  }

  function resetForm(){
    els.editId.value = "";
    els.modalTitle.textContent = "Add exhibit";
    els.saveBtn.textContent = "Save";

    els.mTitle.value = "";
    els.mSeverity.value = "3";
    els.mContext.value = "";
    els.mTags.value = "";
    els.mWhat.value = "";
    els.mLesson.value = "";
    els.mFix.value = "";
  }

  function openModal(){
    lastFocusEl = document.activeElement;
    els.modalBackdrop.classList.add("show");
    setTimeout(() => els.mTitle.focus(), 0);
    document.addEventListener("keydown", onModalKeydown);
  }

  function closeModal(){
    els.modalBackdrop.classList.remove("show");
    document.removeEventListener("keydown", onModalKeydown);
    if (lastFocusEl && typeof lastFocusEl.focus === "function") lastFocusEl.focus();
    resetForm();
  }

  function onModalKeydown(e){
    if (e.key === "Escape") closeModal();

    if (e.key === "Tab"){
      const focusables = els.modalBackdrop.querySelectorAll(
        'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
      );
      const list = [...focusables].filter(x => !x.disabled && x.offsetParent !== null);
      if (!list.length) return;

      const first = list[0];
      const last = list[list.length - 1];

      if (e.shiftKey && document.activeElement === first){
        e.preventDefault(); last.focus();
      } else if (!e.shiftKey && document.activeElement === last){
        e.preventDefault(); first.focus();
      }
    }
  }

  function openAddModal(){
    resetForm();
    openModal();
  }

  function openEditModal(id){
    const it = appState.items.find(x => x.id === id);
    if (!it) return;

    els.editId.value = it.id;
    els.modalTitle.textContent = "Edit exhibit";
    els.saveBtn.textContent = "Update";

    els.mTitle.value = it.title || "";
    els.mSeverity.value = String(it.severity ?? 3);
    els.mContext.value = it.context || "";
    els.mTags.value = (it.tags || []).join(", ");
    els.mWhat.value = it.what || "";
    els.mLesson.value = it.lesson || "";
    els.mFix.value = it.fix || "";

    openModal();
  }

  async function refreshFromStorage(){
    const saved = await Storage.getJSON(DATA_KEY);
    if (!saved) return;
    const next = sanitizeState(saved);
    if (String(next.updatedAt || "") === String(appState.updatedAt || "")) return;
    appState = next;
    themeApplyToCSS(appState.theme);
    themeSyncInputs(appState.theme);
    bgApplyToCSS(appState.bg);
    bgSyncInputs(appState.bg);
    render();
  }

  function attachEvents(){
    els.addBtn.addEventListener("click", openAddModal);
    els.exportBtn.addEventListener("click", exportJson);
    els.clearBtn.addEventListener("click", clearAll);

    document.addEventListener("click", (e) => {
      const btn = e.target.closest('[data-action="open-add"]');
      if (btn) openAddModal();
    });

    els.closeModalBtn.addEventListener("click", closeModal);
    els.cancelBtn.addEventListener("click", closeModal);
    els.modalBackdrop.addEventListener("click", (e) => { if (e.target === els.modalBackdrop) closeModal(); });

    els.exhibitForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const title = els.mTitle.value.trim();
      if (!title) {
        els.mTitle.focus();
        return;
      }

      const severity = Number(els.mSeverity.value);
      const context = els.mContext.value.trim();
      const tags = normalizeTags(els.mTags.value);
      const what = els.mWhat.value.trim();
      const lesson = els.mLesson.value.trim();
      const fix = els.mFix.value.trim();

      const id = els.editId.value || uid();
      const existing = appState.items.find(x => x.id === id);

      const payload = {
        id,
        title,
        severity: Number.isFinite(severity) ? severity : 3,
        context,
        tags,
        what,
        lesson,
        fix,
        createdAt: existing ? existing.createdAt : nowISO(),
        updatedAt: nowISO(),
      };

      await upsert(payload);
      closeModal();
    });

    els.search.addEventListener("input", async () => {
      appState.view.q = els.search.value;
      await persistState("Saved");
      render();
    });

    els.tagFilter.addEventListener("change", async () => {
      appState.view.tag = els.tagFilter.value;
      await persistState("Saved");
      render();
    });

    els.sortBy.addEventListener("change", async () => {
      appState.view.sort = els.sortBy.value;
      await persistState("Saved");
      render();
    });

    document.addEventListener("keydown", (e) => {
      if (els.modalBackdrop.classList.contains("show")) return;
      if (e.key === "/" && !e.ctrlKey && !e.metaKey && !e.altKey){
        const a = document.activeElement;
        const typing = a && (a.tagName === "INPUT" || a.tagName === "TEXTAREA" || a.isContentEditable);
        if (!typing){
          e.preventDefault();
          els.search.focus();
        }
      }
    });

    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(render, 120);
    });

    window.addEventListener("storage", async (e) => {
      if (e.key === DATA_KEY || e.key === PRESETS_KEY) {
        await refreshFromStorage();
        await refreshPresetSelect();
      }
    });

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "hidden") {
        persistSnapshotSync();
      }
      if (document.visibilityState === "visible") {
        await refreshFromStorage();
      }
    });

    window.addEventListener("pagehide", () => {
      persistSnapshotSync();
    });

    window.addEventListener("beforeunload", () => {
      persistSnapshotSync();
    });

    window.addEventListener("pageshow", async () => {
      await refreshFromStorage();
    });
  }

  async function init(){
    await loadState();
    initPanelToggles();
    themeApplyToCSS(appState.theme);
    bgApplyToCSS(appState.bg);
    await initThemeBgAndPresets();
    render();
    attachEvents();
    isBooting = false;
  }

  init();
})();
</script>
</body>
</html>
