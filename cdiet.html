<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Diet Planner + Tracker</title>

  <style>
    :root{
      --page-bg:#ffffff;
      --widget-bg:#ffffff;
      --cream:#e6d8cc;
      --text:#1f1f1f;
      --muted:#6b625c;

      --border: rgba(201,190,182,0.85);
      --borderSoft: rgba(201,190,182,0.55);
      --creamSoft: rgba(230,216,204,0.20);

      --shadow: 0 10px 26px rgba(0,0,0,0.06);
      --shadowSoft: 0 3px 10px rgba(0,0,0,0.05);

      --rOuter: 18px;
      --rInner: 16px;
      --rPill: 999px;

      --fsKicker: 12px;
      --fsLabel: 11px;
      --fsBody: 13px;

      --gap: 12px;

      --board-tint: #ffffff;
      --board-tint-a: 0.30;
      --board-image: none;
      --board-blur: 0px;

      --card-bg: rgba(255,255,255,0.88);
      --field-bg: #ffffff;
    }

    *{ box-sizing:border-box; }
    html, body{ min-height:100%; }

    body{
      margin:0;
      background:var(--page-bg);
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      padding:26px;
      -webkit-text-size-adjust:100%;
    }

    button, input, select, textarea{ font: inherit; }
    input, textarea, select{ color: var(--text); }

    .wrap{ max-width:1100px; margin:0 auto; }

    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .kicker{
      font-size:var(--fsKicker);
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted);
      padding-top:4px;
    }

    .btns{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .btn,
    .mini-btn,
    .bg-btn,
    .iconBtn,
    .chip{
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .btn{
      appearance:none;
      border:1px solid var(--border);
      background:var(--field-bg);
      color:var(--text);
      border-radius:var(--rPill);
      padding:9px 14px;
      font-size:12px;
      letter-spacing:.10em;
      text-transform:uppercase;
      cursor:pointer;
      box-shadow: var(--shadowSoft);
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
      user-select:none;
      white-space:nowrap;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .btn svg{
      width:14px;
      height:14px;
      display:block;
      flex:0 0 auto;
    }

    .btn:hover{ transform:translateY(-1px); box-shadow:0 10px 18px rgba(0,0,0,0.08); }
    .btn.primary{ background:var(--cream); }
    .btn.danger{ background: rgba(230,216,204,0.30); }

    .popover{ position:relative; }

    .icon-pill{
      display:inline-flex;
      align-items:center;
      gap:10px;
      background: rgba(255,255,255,0.80);
      border: 1px solid var(--borderSoft);
      border-radius: 999px;
      padding: 6px 10px;
      box-shadow: var(--shadowSoft);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .bg-btn{
      width:34px;
      height:34px;
      border-radius:999px;
      border:1px solid var(--borderSoft);
      background: rgba(255,255,255,0.95);
      cursor:pointer;
      display:grid;
      place-items:center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: transform 140ms ease, box-shadow 140ms ease;
    }
    .bg-btn:hover{ transform: translateY(-1px); box-shadow: 0 14px 22px rgba(0,0,0,0.10); }
    .bg-btn:active{ transform: translateY(0px); }

    .bg-dot, .theme-dot{
      width:14px;
      height:14px;
      border-radius:999px;
      border:1px solid rgba(201,190,182,0.75);
      background: var(--board-tint);
      box-shadow: 0 0 0 6px rgba(230,216,204,0.30);
    }
    .theme-dot{
      background: var(--text);
      box-shadow: 0 0 0 6px rgba(201,190,182,0.25);
    }

    .panel{
      position:absolute;
      top: 46px;
      right: 0;
      width: 320px;
      border-radius: 16px;
      border: 1px solid var(--borderSoft);
      background: rgba(255,255,255,0.94);
      box-shadow: 0 18px 40px rgba(0,0,0,0.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 12px;
      display:none;
      z-index: 80;
      max-height: 76vh;
      overflow-y: auto;
    }
    .panel.open{ display:block; }

    .panel h2{
      margin: 0 0 10px 0;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(31,31,31,0.72);
    }

    .panel .rowT{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 8px 0;
    }

    .panel .rowT label{
      font-size: 12px;
      color: var(--muted);
    }

    input[type="color"]{
      width: 42px;
      height: 32px;
      border: 1px solid var(--borderSoft);
      border-radius: 10px;
      padding: 0;
      background: transparent;
      cursor: pointer;
      flex: 0 0 auto;
    }

    input[type="range"]{ width: 150px; max-width:100%; }

    .file{
      width:100%;
      font-size: 12px;
      color: rgba(31,31,31,0.75);
    }

    .mini-btn{
      width: 100%;
      border: 1px solid var(--borderSoft);
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      font-size: 11px;
      color: rgba(31,31,31,0.80);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .mini-btn:active{ transform: translateY(1px); }

    .divider{
      height: 1px;
      background: rgba(201,190,182,0.35);
      margin: 8px 0;
    }

    .hintSmall{
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.35;
    }

    .status{
      font-size:12px;
      color: var(--muted);
      margin-top:6px;
      min-height:16px;
    }

    .presetName, .select2{
      width:100%;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--borderSoft);
      background: rgba(255,255,255,0.92);
      color: var(--text);
      outline:none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .widgetBoard{
      position: relative;
      border-radius: var(--rOuter);
      overflow: hidden;
      border: 1px solid var(--borderSoft);
      box-shadow: var(--shadow);
      padding: 14px;
      background: var(--widget-bg);
    }

    .widgetBoard::before{
      content:"";
      position:absolute;
      inset:0;
      background-image: var(--board-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(var(--board-blur)) saturate(1);
      transform: scale(1.03);
      z-index:0;
      will-change: transform, filter;
    }

    .widgetBoard::after{
      content:"";
      position:absolute;
      inset:0;
      background: rgba(255,255,255,0.30);
      pointer-events: none;
      z-index:0;
    }

    .boardTint{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:1;
    }

    .grid{
      display:grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap:14px;
      align-items:start;
      position:relative;
      z-index:2;
    }

    .card{
      background: var(--card-bg);
      border:1px solid var(--border);
      border-radius:var(--rOuter);
      padding:14px;
      min-width:0;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .cardHead{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    .cardTitle{
      font-size:14px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
      margin:0;
    }

    .meta{
      font-size:12px;
      color:var(--muted);
      letter-spacing:.04em;
      white-space:nowrap;
    }

    .mealList{ display:grid; gap:12px; }

    .meal{
      border:1px solid var(--borderSoft);
      border-radius:var(--rInner);
      padding:12px;
      background: var(--creamSoft);
    }

    .mealTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .mealName{
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
      margin:0;
    }

    .pill{
      font-size:11px;
      color:var(--muted);
      border:1px solid var(--borderSoft);
      border-radius:var(--rPill);
      padding:6px 10px;
      background:var(--field-bg);
      line-height:1;
      user-select:none;
      white-space:nowrap;
    }

    .row{
      display:grid;
      grid-template-columns: 1.3fr 0.9fr 0.7fr;
      gap:10px;
      align-items:end;
    }

    .row2{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap:10px;
      margin-top:10px;
      align-items:end;
    }

    .label{
      display:block;
      font-size:var(--fsLabel);
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
      margin:0 0 6px 0;
    }

    .input, .select{
      width:100%;
      border:1px solid var(--border);
      background:var(--field-bg);
      border-radius:12px;
      padding:9px 10px;
      font-size:var(--fsBody);
      outline:none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      min-height:36px;
      color: var(--text);
    }

    .input:focus, .select:focus{
      border-color: rgba(201,190,182,1);
      box-shadow: 0 0 0 3px rgba(230,216,204,0.55);
    }

    .mini{
      font-size:12px;
      color:#7a716a;
      line-height:1.35;
      margin-top:8px;
    }

    .fullness{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .chip{
      appearance:none;
      border:1px solid var(--border);
      background:var(--field-bg);
      border-radius:var(--rPill);
      padding:8px 10px;
      font-size:12px;
      cursor:pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
      user-select:none;
      min-height:34px;
      color: var(--text);
    }

    .chip:hover{ transform:translateY(-1px); box-shadow:0 10px 18px rgba(0,0,0,0.08); }

    .chip[data-active="true"]{
      background:var(--cream);
      box-shadow: 0 10px 18px rgba(0,0,0,0.08);
      transform:translateY(-1px);
    }

    .box{
      border:1px solid var(--borderSoft);
      border-radius:var(--rInner);
      padding:12px;
      background: var(--creamSoft);
      margin-bottom:12px;
    }

    .boxTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }

    .boxLabel{
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .big{
      font-size:26px;
      font-weight:740;
      letter-spacing:-0.02em;
    }

    .bar{
      height:10px;
      border-radius:var(--rPill);
      background: rgba(201,190,182,0.30);
      border:1px solid var(--borderSoft);
      overflow:hidden;
      margin:10px 0 8px;
    }

    .bar > div{
      height:100%;
      width:0%;
      background: var(--cream);
      transition: width 220ms ease;
    }

    .hint{
      font-size:12px;
      color:#7a716a;
      line-height:1.4;
      margin:0;
    }

    .totals{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      margin-top:10px;
    }

    .miniBox{
      border:1px solid var(--borderSoft);
      border-radius:14px;
      padding:10px;
      background:var(--field-bg);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .miniLabel{
      font-size:11px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:6px;
    }

    .miniVal{
      font-size:18px;
      font-weight:720;
      letter-spacing:-0.01em;
    }

    .goals{
      display:grid;
      gap:10px;
    }

    .goalRow{
      display:grid;
      grid-template-columns: 1fr 0.55fr;
      gap:10px;
      align-items:end;
    }

    .goalList{ display:grid; gap:10px; margin-top:10px; }

    .goalItem{
      border:1px solid var(--borderSoft);
      border-radius:14px;
      padding:10px;
      background:var(--field-bg);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      display:grid;
      grid-template-columns: 1fr 0.7fr auto;
      gap:10px;
      align-items:end;
    }

    .iconBtn{
      appearance:none;
      border:1px solid var(--border);
      background:var(--field-bg);
      border-radius:12px;
      width:40px;
      height:36px;
      cursor:pointer;
      box-shadow: var(--shadowSoft);
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
      user-select:none;
      color: var(--text);
    }

    .iconBtn:hover{ transform:translateY(-1px); box-shadow:0 10px 18px rgba(0,0,0,0.08); }

    .iconBtn.danger{ background: rgba(230,216,204,0.30); }

    @media (max-width: 980px){
      body{ padding:16px; }
      .grid{ grid-template-columns: 1fr; }
      .row{ grid-template-columns: 1fr; }
      .goalRow{ grid-template-columns: 1fr; }
      .goalItem{ grid-template-columns: 1fr; }
      .totals{ grid-template-columns: 1fr; }
    }

    @media (max-width: 720px){
      body{ padding:14px; }

      .top{ gap:12px; }
      .btns{ width:100%; }

      .panel{
        position: fixed;
        top: 14px;
        left: 14px;
        right: 14px;
        width: auto;
        max-height: calc(100dvh - 28px);
        z-index: 999;
      }

      .widgetBoard{ padding:10px; }
      .card{ padding:10px; }

      .input,
      .select,
      .presetName,
      .select2{
        font-size:16px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="top">
      <div class="kicker">Diet Planner + Tracker</div>

      <div class="btns">
        <div class="popover" id="bgPopover">
          <div class="icon-pill">
            <button class="bg-btn" id="bgBtn" type="button" aria-label="Background settings" title="Background settings">
              <span class="bg-dot" id="bgDot" aria-hidden="true"></span>
            </button>
          </div>

          <div class="panel" id="bgPanel" role="dialog" aria-label="Background settings">
            <h2>Background</h2>

            <button class="mini-btn" id="bgApply" type="button">Apply background</button>
            <button class="mini-btn" id="bgReset" type="button" style="margin-top:8px;">Reset background</button>

            <div class="divider"></div>

            <div class="rowT">
              <label for="bgColor">Tint</label>
              <input id="bgColor" type="color" value="#efe7e1" />
            </div>

            <div class="rowT">
              <label for="bgStrength">Tint strength</label>
              <input id="bgStrength" type="range" min="0" max="70" value="30" />
            </div>

            <div class="rowT">
              <label for="bgBlur">Image blur</label>
              <input id="bgBlur" type="range" min="0" max="20" value="0" />
            </div>

            <div class="divider"></div>

            <div class="rowT" style="align-items:flex-start;">
              <label for="bgImage">Image</label>
              <input id="bgImage" class="file" type="file" accept="image/*" />
            </div>

            <div class="rowT">
              <button class="mini-btn" id="removeImage" type="button">Remove image</button>
            </div>
          </div>
        </div>

        <div class="popover" id="themePopover">
          <div class="icon-pill">
            <button class="bg-btn" id="themeBtn" type="button" aria-label="Theme settings" title="Theme settings">
              <span class="theme-dot" id="themeDot" aria-hidden="true"></span>
            </button>
          </div>

          <div class="panel" id="themePanel" role="dialog" aria-label="Theme settings">
            <h2>Theme</h2>

            <button class="mini-btn" id="themeApply" type="button">Apply theme</button>
            <button class="mini-btn" id="resetTheme" type="button" style="margin-top:8px;">Reset theme</button>

            <div class="divider"></div>

            <div class="rowT">
              <label for="tWidgetBg">Page bg</label>
              <input id="tWidgetBg" type="color" value="#ffffff" />
            </div>

            <div class="rowT">
              <label for="tCardBg">Card bg</label>
              <input id="tCardBg" type="color" value="#ffffff" />
            </div>

            <div class="rowT">
              <label for="tFieldBg">Fields bg</label>
              <input id="tFieldBg" type="color" value="#ffffff" />
            </div>

            <div class="divider"></div>

            <div class="rowT">
              <label for="tText">Text</label>
              <input id="tText" type="color" value="#1f1f1f" />
            </div>

            <div class="rowT">
              <label for="tMuted">Muted text</label>
              <input id="tMuted" type="color" value="#6b625c" />
            </div>

            <div class="divider"></div>

            <div class="rowT">
              <label for="tBorder">Borders</label>
              <input id="tBorder" type="color" value="#c9beb6" />
            </div>

            <div class="rowT">
              <label for="tCream">Highlight</label>
              <input id="tCream" type="color" value="#e6d8cc" />
            </div>

            <div class="rowT">
              <label for="tCreamSoft">Panels tint</label>
              <input id="tCreamSoft" type="color" value="#e6d8cc" />
            </div>

            <div class="divider"></div>

            <h2 style="margin:0 0 10px 0;">Presets</h2>

            <div class="rowT" style="align-items:flex-start; flex-direction:column; gap:8px;">
              <input id="presetName" class="presetName" placeholder="Preset name" />
              <button class="mini-btn" id="presetSave" type="button">Save current as preset</button>
            </div>

            <div class="rowT">
              <label for="presetSelect">Choose</label>
              <select id="presetSelect" class="select2">
                <option value="">—</option>
              </select>
            </div>

            <div class="rowT">
              <button class="mini-btn" id="presetApply" type="button">Apply preset</button>
            </div>

            <div class="rowT">
              <button class="mini-btn" id="presetDelete" type="button">Delete preset</button>
            </div>

            <div class="status" id="presetStatus" aria-live="polite"></div>
          </div>
        </div>

        <button id="prevDay" class="btn" type="button" aria-label="Previous day">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none">
            <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <span>Prev</span>
        </button>

        <button id="nextDay" class="btn" type="button" aria-label="Next day">
          <span>Next</span>
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none">
            <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </button>

        <button id="clearDay" class="btn primary" type="button">Clear Day</button>
      </div>
    </div>

    <div class="widgetBoard" id="widgetBoard" aria-label="Diet tracker widget board">
      <div class="boardTint" id="boardTint"></div>

      <div class="grid">
        <section class="card" aria-label="Meals">
          <div class="cardHead">
            <h2 class="cardTitle">Meals</h2>
            <div id="dayMeta" class="meta"></div>
          </div>

          <div class="mealList" id="mealList"></div>
        </section>

        <aside class="card" aria-label="Totals and goals">
          <div class="cardHead">
            <h2 class="cardTitle">Totals</h2>
          </div>

          <div class="box">
            <div class="boxTop">
              <div class="boxLabel">Calories</div>
              <div id="calTotal" class="big">0</div>
            </div>
            <div class="bar"><div id="calBar"></div></div>
            <p id="calHint" class="hint">Set a calorie goal to see progress.</p>
          </div>

          <div class="box">
            <div class="boxTop">
              <div class="boxLabel">Protein (g)</div>
              <div id="proteinTotal" class="big">0</div>
            </div>
            <div class="bar"><div id="proteinBar"></div></div>
            <p id="proteinHint" class="hint">Set a protein goal to see progress.</p>

            <div class="totals">
              <div class="miniBox">
                <div class="miniLabel">Carbs (g)</div>
                <div id="carbTotal" class="miniVal">0</div>
              </div>
              <div class="miniBox">
                <div class="miniLabel">Fiber (g)</div>
                <div id="fiberTotal" class="miniVal">0</div>
              </div>
            </div>
          </div>

          <div class="cardHead" style="margin-top:6px;">
            <h2 class="cardTitle">Goals</h2>
          </div>

          <div class="box">
            <div class="goals">
              <div class="goalRow">
                <div>
                  <label class="label" for="goalCalories">Calorie goal</label>
                  <input id="goalCalories" class="input" type="number" min="0" placeholder="e.g. 1800" />
                </div>
                <div>
                  <label class="label" for="goalProtein">Protein goal (g)</label>
                  <input id="goalProtein" class="input" type="number" min="0" placeholder="e.g. 120" />
                </div>
              </div>

              <div style="display:grid; grid-template-columns: 1fr auto; gap:10px; align-items:end;">
                <div>
                  <label class="label" for="newGoalName">Add another goal</label>
                  <input id="newGoalName" class="input" type="text" placeholder="e.g. Water (cups), Steps, etc." />
                </div>
                <button id="addGoal" class="btn primary" type="button" style="height:36px;">Add</button>
              </div>

              <div id="goalList" class="goalList"></div>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script>
    (function(){
      "use strict";

      function canUseLocalStorage(){
        try{
          const k = "__t__" + Math.random().toString(16).slice(2);
          localStorage.setItem(k, "1");
          localStorage.removeItem(k);
          return true;
        }catch{
          return false;
        }
      }

      const hasLS = canUseLocalStorage();
      const mem = Object.create(null);

      function lsGet(key){
        try{
          return hasLS ? localStorage.getItem(key) : (mem[key] ?? null);
        }catch{
          return mem[key] ?? null;
        }
      }

      function lsSet(key, value){
        try{
          if(hasLS) localStorage.setItem(key, value);
          else mem[key] = String(value);
        }catch{
          mem[key] = String(value);
        }
      }

      function lsRemove(key){
        try{
          if(hasLS) localStorage.removeItem(key);
          else delete mem[key];
        }catch{
          delete mem[key];
        }
      }

      function loadJSON(key, fallback = null){
        try{
          const raw = lsGet(key);
          return raw ? JSON.parse(raw) : fallback;
        }catch{
          return fallback;
        }
      }

      function saveJSON(key, value){
        lsSet(key, JSON.stringify(value));
      }

      function sanitizeId(value){
        return String(value || "")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9_-]+/g, "-")
          .replace(/^-+|-+$/g, "") || "default";
      }

      function getWidgetId(){
        try{
          const params = new URLSearchParams(location.search);
          const fromQuery = sanitizeId(params.get("wid"));
          if(fromQuery && fromQuery !== "default") return fromQuery;
        }catch{}

        const fromPath = sanitizeId(location.pathname.replace(/\.[^/.]+$/, ""));
        return fromPath || "default";
      }

      const WID = getWidgetId();
      const BC_NAME = "diet-tracker-sync";
      const channel = ("BroadcastChannel" in window) ? new BroadcastChannel(BC_NAME) : null;

      function broadcast(type, payload){
        try{
          if(channel) channel.postMessage({ type, payload, wid: WID, ts: Date.now() });
        }catch{}
      }

      const DB_NAME = "diet_tracker_db_v3";
      const DB_STORE = "kv";
      let dbPromise = null;

      function openDB(){
        if(dbPromise) return dbPromise;

        dbPromise = new Promise((resolve) => {
          if(!("indexedDB" in window)){
            resolve(null);
            return;
          }

          const request = indexedDB.open(DB_NAME, 1);

          request.onupgradeneeded = () => {
            const db = request.result;
            if(!db.objectStoreNames.contains(DB_STORE)){
              db.createObjectStore(DB_STORE);
            }
          };

          request.onsuccess = () => resolve(request.result);
          request.onerror = () => resolve(null);
        });

        return dbPromise;
      }

      async function idbGet(key){
        const db = await openDB();
        if(!db) return null;

        return new Promise((resolve) => {
          try{
            const tx = db.transaction(DB_STORE, "readonly");
            const store = tx.objectStore(DB_STORE);
            const req = store.get(key);
            req.onsuccess = () => resolve(req.result ?? null);
            req.onerror = () => resolve(null);
          }catch{
            resolve(null);
          }
        });
      }

      async function idbSet(key, value){
        const db = await openDB();
        if(!db) return false;

        return new Promise((resolve) => {
          try{
            const tx = db.transaction(DB_STORE, "readwrite");
            const store = tx.objectStore(DB_STORE);
            const req = store.put(value, key);
            req.onsuccess = () => resolve(true);
            req.onerror = () => resolve(false);
          }catch{
            resolve(false);
          }
        });
      }

      async function idbRemove(key){
        const db = await openDB();
        if(!db) return false;

        return new Promise((resolve) => {
          try{
            const tx = db.transaction(DB_STORE, "readwrite");
            const store = tx.objectStore(DB_STORE);
            const req = store.delete(key);
            req.onsuccess = () => resolve(true);
            req.onerror = () => resolve(false);
          }catch{
            resolve(false);
          }
        });
      }

      function clamp(n, min, max){
        const x = Number(n);
        if(!Number.isFinite(x)) return min;
        return Math.max(min, Math.min(max, x));
      }

      function normHex(hex, fallback){
        const s = String(hex || "").trim();
        return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : fallback;
      }

      function hexToRgba(hex, alpha){
        const h = normHex(hex, "#ffffff").replace("#", "");
        const num = parseInt(h, 16);
        const r = (num >> 16) & 255;
        const g = (num >> 8) & 255;
        const b = num & 255;
        return `rgba(${r},${g},${b},${alpha})`;
      }

      const pad2 = (n) => String(n).padStart(2,"0");
      const isoDay = (d) => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
      const niceDay = (d) => d.toLocaleDateString(undefined, { weekday:"short", month:"short", day:"numeric", year:"numeric" });
      const clampPct = (p) => Math.max(0, Math.min(100, p));

      function fileToDataUrl(file){
        return new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = () => resolve(String(r.result || ""));
          r.onerror = reject;
          r.readAsDataURL(file);
        });
      }

      function makeId(){
        return Math.random().toString(16).slice(2) + Date.now().toString(16);
      }

      const KEYS = {
        bg: `diet_tracker_bg_v3__${WID}`,
        bgImage: `diet_tracker_bg_image_v3__${WID}`,
        theme: `diet_tracker_theme_v3__${WID}`,
        presets: `diet_tracker_presets_v3`,
        day: (dayKey) => `diet_tracker_day_v3__${WID}__${dayKey}`
      };

      const MEALS = [
        { id:"breakfast", label:"Breakfast" },
        { id:"lunch", label:"Lunch" },
        { id:"snack", label:"Snack" },
        { id:"dinner", label:"Dinner" }
      ];

      const FULLNESS_OPTIONS = [
        { id:"hungry", label:"Hungry" },
        { id:"neutral", label:"Neutral" },
        { id:"satisfied", label:"Satisfied" },
        { id:"too_full", label:"Too full" }
      ];

      const DEFAULT_BG = {
        tint:"#efe7e1",
        strength:30,
        blur:0
      };

      const DEFAULT_THEME = {
        widgetBg: "#ffffff",
        cardBg: "#ffffff",
        fieldBg: "#ffffff",
        text: "#1f1f1f",
        muted: "#6b625c",
        borderHex: "#c9beb6",
        cream: "#e6d8cc",
        creamSoftHex: "#e6d8cc"
      };

      function defaultDayData(){
        const meals = {};
        MEALS.forEach(m => {
          meals[m.id] = {
            name: "",
            calories: 0,
            protein: 0,
            carbs: 0,
            fiber: 0,
            fullness: "",
            tag: ""
          };
        });

        return {
          goals: {
            calories: 0,
            protein: 0,
            custom: []
          },
          meals
        };
      }

      function sanitizeCustomGoal(g){
        return {
          id: String(g?.id || ("g_" + makeId())),
          name: String(g?.name || ""),
          value: Math.max(0, Number(g?.value || 0))
        };
      }

      function sanitizeMeal(src){
        return {
          name: String(src?.name || ""),
          calories: Math.max(0, Number(src?.calories || 0)),
          protein: Math.max(0, Number(src?.protein || 0)),
          carbs: Math.max(0, Number(src?.carbs || 0)),
          fiber: Math.max(0, Number(src?.fiber || 0)),
          fullness: ["hungry","neutral","satisfied","too_full",""].includes(String(src?.fullness || "")) ? String(src?.fullness || "") : "",
          tag: String(src?.tag || "")
        };
      }

      function sanitizeDayData(data){
        const base = defaultDayData();
        const src = data && typeof data === "object" ? data : {};

        base.goals.calories = Math.max(0, Number(src?.goals?.calories || 0));
        base.goals.protein = Math.max(0, Number(src?.goals?.protein || 0));
        base.goals.custom = Array.isArray(src?.goals?.custom) ? src.goals.custom.map(sanitizeCustomGoal) : [];

        MEALS.forEach(m => {
          base.meals[m.id] = sanitizeMeal(src?.meals?.[m.id]);
        });

        return base;
      }

      const els = {
        bgBtn: document.getElementById("bgBtn"),
        bgPanel: document.getElementById("bgPanel"),
        bgColor: document.getElementById("bgColor"),
        bgStrength: document.getElementById("bgStrength"),
        bgBlur: document.getElementById("bgBlur"),
        bgImage: document.getElementById("bgImage"),
        removeImage: document.getElementById("removeImage"),
        bgApply: document.getElementById("bgApply"),
        bgReset: document.getElementById("bgReset"),
        boardTintEl: document.getElementById("boardTint"),
        bgDot: document.getElementById("bgDot"),

        themeBtn: document.getElementById("themeBtn"),
        themePanel: document.getElementById("themePanel"),
        themeDot: document.getElementById("themeDot"),
        themeApply: document.getElementById("themeApply"),
        resetTheme: document.getElementById("resetTheme"),

        tWidgetBg: document.getElementById("tWidgetBg"),
        tCardBg: document.getElementById("tCardBg"),
        tFieldBg: document.getElementById("tFieldBg"),
        tText: document.getElementById("tText"),
        tMuted: document.getElementById("tMuted"),
        tBorder: document.getElementById("tBorder"),
        tCream: document.getElementById("tCream"),
        tCreamSoft: document.getElementById("tCreamSoft"),

        presetName: document.getElementById("presetName"),
        presetSave: document.getElementById("presetSave"),
        presetSelect: document.getElementById("presetSelect"),
        presetApply: document.getElementById("presetApply"),
        presetDelete: document.getElementById("presetDelete"),
        presetStatus: document.getElementById("presetStatus"),

        dayMeta: document.getElementById("dayMeta"),
        mealList: document.getElementById("mealList"),

        calTotalEl: document.getElementById("calTotal"),
        proteinTotalEl: document.getElementById("proteinTotal"),
        carbTotalEl: document.getElementById("carbTotal"),
        fiberTotalEl: document.getElementById("fiberTotal"),

        calBar: document.getElementById("calBar"),
        proteinBar: document.getElementById("proteinBar"),
        calHint: document.getElementById("calHint"),
        proteinHint: document.getElementById("proteinHint"),

        goalCalories: document.getElementById("goalCalories"),
        goalProtein: document.getElementById("goalProtein"),
        newGoalName: document.getElementById("newGoalName"),
        addGoalBtn: document.getElementById("addGoal"),
        goalList: document.getElementById("goalList"),

        prevDayBtn: document.getElementById("prevDay"),
        nextDayBtn: document.getElementById("nextDay"),
        clearDayBtn: document.getElementById("clearDay"),
      };

      function setStatus(msg){
        els.presetStatus.textContent = msg || "";
      }

      const escapeHtml = (s) =>
        String(s ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");

      const askConfirm = (message, { okText="Confirm", cancelText="Cancel", danger=false } = {}) =>
        new Promise((resolve) => {
          const wrap = document.createElement("div");
          wrap.style.position = "fixed";
          wrap.style.inset = "0";
          wrap.style.zIndex = "9999";
          wrap.style.display = "grid";
          wrap.style.placeItems = "center";
          wrap.style.padding = "18px";
          wrap.style.background = "rgba(20,18,16,.35)";
          wrap.style.backdropFilter = "blur(8px)";
          wrap.style.webkitBackdropFilter = "blur(8px)";

          wrap.innerHTML = `
            <div style="
              width:min(520px,100%);
              background:rgba(255,255,255,.92);
              border:1px solid rgba(43,43,43,.14);
              border-radius:20px;
              box-shadow:0 12px 40px rgba(0,0,0,.12);
              overflow:hidden;">
              <div style="padding:14px 16px;border-bottom:1px solid rgba(43,43,43,.10);font-weight:650;">
                Confirm
              </div>
              <div style="padding:14px 16px;line-height:1.45;color:rgba(43,43,43,.92);">
                ${escapeHtml(message)}
              </div>
              <div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;padding:12px 16px;border-top:1px solid rgba(43,43,43,.10);">
                <button class="btn" type="button" id="cnlBtn">${escapeHtml(cancelText)}</button>
                <button class="btn ${danger ? "danger" : "primary"}" type="button" id="okBtn">${escapeHtml(okText)}</button>
              </div>
            </div>
          `;

          const cleanup = (val) => {
            document.removeEventListener("keydown", onKey);
            wrap.remove();
            resolve(val);
          };

          const onKey = (e) => {
            if(e.key === "Escape") cleanup(false);
          };

          wrap.addEventListener("click", (e) => {
            if(e.target === wrap) cleanup(false);
          });

          document.body.appendChild(wrap);
          document.addEventListener("keydown", onKey);

          wrap.querySelector("#cnlBtn").addEventListener("click", () => cleanup(false));
          wrap.querySelector("#okBtn").addEventListener("click", () => cleanup(true));

          setTimeout(() => wrap.querySelector("#okBtn").focus(), 0);
        });

      function safeTheme(input){
        const theme = { ...DEFAULT_THEME, ...(input || {}) };
        return {
          widgetBg: normHex(theme.widgetBg, DEFAULT_THEME.widgetBg),
          cardBg: normHex(theme.cardBg, DEFAULT_THEME.cardBg),
          fieldBg: normHex(theme.fieldBg, DEFAULT_THEME.fieldBg),
          text: normHex(theme.text, DEFAULT_THEME.text),
          muted: normHex(theme.muted, DEFAULT_THEME.muted),
          borderHex: normHex(theme.borderHex, DEFAULT_THEME.borderHex),
          cream: normHex(theme.cream, DEFAULT_THEME.cream),
          creamSoftHex: normHex(theme.creamSoftHex, DEFAULT_THEME.creamSoftHex)
        };
      }

      function safeBg(input){
        const bg = { ...DEFAULT_BG, ...(input || {}) };
        return {
          tint: normHex(bg.tint, DEFAULT_BG.tint),
          strength: clamp(bg.strength, 0, 70),
          blur: clamp(bg.blur, 0, 20)
        };
      }

      function readThemeFromUI(){
        return safeTheme({
          widgetBg: els.tWidgetBg.value,
          cardBg: els.tCardBg.value,
          fieldBg: els.tFieldBg.value,
          text: els.tText.value,
          muted: els.tMuted.value,
          borderHex: els.tBorder.value,
          cream: els.tCream.value,
          creamSoftHex: els.tCreamSoft.value
        });
      }

      function syncThemeInputs(theme){
        els.tWidgetBg.value = theme.widgetBg;
        els.tCardBg.value = theme.cardBg;
        els.tFieldBg.value = theme.fieldBg;
        els.tText.value = theme.text;
        els.tMuted.value = theme.muted;
        els.tBorder.value = theme.borderHex;
        els.tCream.value = theme.cream;
        els.tCreamSoft.value = theme.creamSoftHex;
      }

      function readBgInputs(){
        return safeBg({
          tint: els.bgColor.value,
          strength: Number(els.bgStrength.value),
          blur: Number(els.bgBlur.value)
        });
      }

      function syncBgInputs(bg){
        els.bgColor.value = bg.tint;
        els.bgStrength.value = String(bg.strength);
        els.bgBlur.value = String(bg.blur);
      }

      function setBoardImage(dataUrlOrNull){
        document.documentElement.style.setProperty("--board-image", dataUrlOrNull ? `url("${dataUrlOrNull}")` : "none");
      }

      function applyBoardTint(colorHex, strengthPct){
        const strength = clamp(Number(strengthPct), 0, 70) / 100;
        const tint = normHex(colorHex, DEFAULT_BG.tint);

        document.documentElement.style.setProperty("--board-tint", tint);
        document.documentElement.style.setProperty("--board-tint-a", String(strength));

        if (els.bgDot){
          els.bgDot.style.background = tint;
          els.bgDot.style.boxShadow = `0 0 0 6px ${hexToRgba(tint, Math.min(0.35, strength + 0.12))}`;
          els.bgDot.style.borderColor = hexToRgba((themeDraft && themeDraft.borderHex) ? themeDraft.borderHex : "#c9beb6", 0.75);
        }
        if (els.boardTintEl){
          els.boardTintEl.style.background = hexToRgba(tint, strength);
        }
      }

      function applyBgVisual(bg, imageDataUrl){
        const b = safeBg(bg);
        document.documentElement.style.setProperty("--board-blur", `${b.blur}px`);
        applyBoardTint(b.tint, b.strength);
        setBoardImage(imageDataUrl || null);

        const overlayAlpha = clamp((b.strength / 100) + 0.08, 0.08, 0.55);
        let overlayStyle = document.getElementById("diet_overlay_style");
        if(!overlayStyle){
          overlayStyle = document.createElement("style");
          overlayStyle.id = "diet_overlay_style";
          document.head.appendChild(overlayStyle);
        }
        overlayStyle.textContent = `.widgetBoard::after{background:${hexToRgba("#ffffff", overlayAlpha)} !important;}`;
      }

      function applyTheme(theme){
        const t = safeTheme(theme);

        document.documentElement.style.setProperty("--page-bg", t.widgetBg);
        document.documentElement.style.setProperty("--widget-bg", t.widgetBg);
        document.documentElement.style.setProperty("--text", t.text);
        document.documentElement.style.setProperty("--muted", t.muted);
        document.documentElement.style.setProperty("--cream", t.cream);
        document.documentElement.style.setProperty("--border", hexToRgba(t.borderHex, 0.85));
        document.documentElement.style.setProperty("--borderSoft", hexToRgba(t.borderHex, 0.55));
        document.documentElement.style.setProperty("--creamSoft", hexToRgba(t.creamSoftHex, 0.20));
        document.documentElement.style.setProperty("--card-bg", hexToRgba(t.cardBg, 0.88));
        document.documentElement.style.setProperty("--field-bg", t.fieldBg);

        els.themeDot.style.background = t.text;
        els.themeDot.style.boxShadow = `0 0 0 6px ${hexToRgba(t.borderHex, 0.25)}`;
        els.themeDot.style.borderColor = hexToRgba(t.borderHex, 0.75);

        return t;
      }

      async function saveTheme(theme){
        saveJSON(KEYS.theme, safeTheme(theme));
        broadcast("theme");
      }

      async function loadTheme(){
        return safeTheme(loadJSON(KEYS.theme, DEFAULT_THEME));
      }

      async function saveBackground(bg, imageDataUrl){
        saveJSON(KEYS.bg, safeBg(bg));
        if(imageDataUrl){
          await idbSet(KEYS.bgImage, imageDataUrl);
        }else{
          await idbRemove(KEYS.bgImage);
        }
        broadcast("background");
      }

      async function loadBackground(){
        const bg = safeBg(loadJSON(KEYS.bg, DEFAULT_BG));
        const imageDataUrl = await idbGet(KEYS.bgImage);
        return {
          bg,
          imageDataUrl: (typeof imageDataUrl === "string" && imageDataUrl) ? imageDataUrl : null
        };
      }

      async function loadPresets(){
        const raw = loadJSON(KEYS.presets, []);
        return Array.isArray(raw) ? raw : [];
      }

      async function savePresets(list){
        saveJSON(KEYS.presets, Array.isArray(list) ? list : []);
        broadcast("presets");
      }

      function presetImageKey(id){
        return `diet_tracker_preset_image_v3__${id}`;
      }

      async function refreshPresetSelect(){
        const list = await loadPresets();
        const current = els.presetSelect.value;

        els.presetSelect.innerHTML = `<option value="">—</option>`;

          const opt = document.createElement("option");

          els.presetSelect.appendChild(opt);

          els.presetSelect.value = current;
        }
      }

      async function getPresetById(id){
        const list = await loadPresets();
        return list.find(x => x.id === id) || null;
      }

      function loadDay(date){
        return sanitizeDayData(loadJSON(KEYS.day(isoDay(date)), defaultDayData()));
      }

      function saveDay(date, data){
        saveJSON(KEYS.day(isoDay(date)), sanitizeDayData(data));
        broadcast("day", { dayKey: isoDay(date) });
      }

      let bgDraft = safeBg(DEFAULT_BG);
      let bgDraftImage = null;
      let themeDraft = safeTheme(DEFAULT_THEME);

      let current = new Date();
      current.setHours(0,0,0,0);
      let data = loadDay(current);

      function renderMeal(mealId, label){
        const item = data.meals[mealId];

        wrap.className = "meal";

        top.className = "mealTop";

        inpName.addEventListener("input", () => {

        c1.appendChild(l1);

        const c2 = document.createElement("div");
        const l2 = document.createElement("label");
        l2.className = "label";
        l2.textContent = "Nutrient tag";
        const sel = document.createElement("select");
        sel.className = "select";

        const opts = [
          { v:"", t:"Select…" },
          { v:"protein", t:"Protein" },
          { v:"fiber", t:"Fiber" },
          { v:"carbs", t:"Carbohydrates" },
          { v:"fat", t:"Fats" },
          { v:"balanced", t:"Balanced" }

        opts.forEach(o => {
          const op = document.createElement("option");

          op.textContent = o.t;
          if(o.v === item.tag) op.selected = true;
          sel.appendChild(op);
        });

        sel.addEventListener("change", () => {

          saveDay(current, data);
        });

        c2.appendChild(l2);
        c2.appendChild(sel);

        const c3 = document.createElement("div");
        const l3 = document.createElement("label");
        l3.className = "label";

        inpCal.addEventListener("input", () => {
          data.meals[mealId].calories = Number(inpCal.value || 0);
          saveDay(current, data);
          updateTotals();

        c3.appendChild(l3);
        c3.appendChild(inpCal);

        row.appendChild(c2);

        wrap.appendChild(row);

        const row2 = document.createElement("div");
        row2.className = "row2";

        row2.appendChild(macroField("Protein (g)", item.protein, (v)=>{ data.meals[mealId].protein = v; saveDay(current, data); updateTotals(); }));
        row2.appendChild(macroField("Carbs (g)", item.carbs, (v)=>{ data.meals[mealId].carbs = v; saveDay(current, data); updateTotals(); }));
        row2.appendChild(macroField("Fiber (g)", item.fiber, (v)=>{ data.meals[mealId].fiber = v; saveDay(current, data); updateTotals(); }));

        wrap.appendChild(row2);

        const full = document.createElement("div");
        full.style.marginTop = "10px";

        const lf = document.createElement("div");
        lf.className = "label";
        lf.textContent = "Fullness";
        full.appendChild(lf);

        const chips = document.createElement("div");
        chips.className = "fullness";

        FULLNESS_OPTIONS.forEach(o => {
          const b = document.createElement("button");
          b.type = "button";
          b.className = "chip";
          b.textContent = o.label;
          b.dataset.active = String(item.fullness === o.id);

          b.addEventListener("click", () => {
            const cur = data.meals[mealId].fullness;
            data.meals[mealId].fullness = (cur === o.id) ? "" : o.id;
            saveDay(current, data);

            Array.from(chips.querySelectorAll(".chip")).forEach(x => x.dataset.active = "false");
            if(data.meals[mealId].fullness === o.id) b.dataset.active = "true";
          });

          chips.appendChild(b);
        });

        full.appendChild(chips);
        wrap.appendChild(full);

        const note = document.createElement("div");
        note.className = "mini";
        wrap.appendChild(note);

        return wrap;
      }

      function macroField(labelText, value, onChange){
        const c = document.createElement("div");
        const l = document.createElement("label");
        l.className = "label";
        l.textContent = labelText;

        const inp = document.createElement("input");
        inp.className = "input";
        inp.type = "number";
        inp.min = "0";
        inp.placeholder = "0";
        inp.value = value ? String(value) : "";

        inp.addEventListener("input", () => onChange(Number(inp.value || 0)));

        c.appendChild(l);
        c.appendChild(inp);
        return c;
      }

      function renderCustomGoals(){
        els.goalList.innerHTML = "";
        const custom = data.goals.custom || [];

        if(custom.length === 0){
          const p = document.createElement("p");
          p.className = "hint";
          p.textContent = "No extra goals yet.";
          els.goalList.appendChild(p);
          return;
        }

        custom.forEach(g => {
          const row = document.createElement("div");
          row.className = "goalItem";

          const nameWrap = document.createElement("div");
          const ln = document.createElement("label");
          ln.className = "label";
          ln.textContent = "Goal";
          const name = document.createElement("input");
          name.className = "input";
          name.type = "text";
          name.value = g.name || "";
          name.addEventListener("input", () => {
            g.name = name.value;
            saveDay(current, data);
          });
          nameWrap.appendChild(ln);
          nameWrap.appendChild(name);

          const valWrap = document.createElement("div");
          const lv = document.createElement("label");
          lv.className = "label";
          lv.textContent = "Target";
          const val = document.createElement("input");
          val.className = "input";
          val.type = "number";
          val.min = "0";
          val.placeholder = "0";
          val.value = (g.value && Number(g.value) !== 0) ? String(g.value) : "";
          val.addEventListener("input", () => {
            g.value = Number(val.value || 0);
            saveDay(current, data);
          });
          valWrap.appendChild(lv);
          valWrap.appendChild(val);

          const del = document.createElement("button");
          del.type = "button";
          del.className = "iconBtn danger";
          del.title = "Remove goal";
          del.textContent = "✕";
          del.addEventListener("click", async () => {
            const ok = await askConfirm("Remove this goal?", { okText: "Remove", cancelText: "Cancel", danger: true });
            if(!ok) return;
            data.goals.custom = (data.goals.custom || []).filter(x => x.id !== g.id);
            saveDay(current, data);
            renderCustomGoals();
          });

          row.appendChild(nameWrap);
          row.appendChild(valWrap);
          row.appendChild(del);

          els.goalList.appendChild(row);
        });
      }

      function updateTotals(){
        let cal = 0, p = 0, c = 0, f = 0;
        MEALS.forEach(m => {
          const it = data.meals[m.id];
          cal += Number(it.calories || 0);
          p += Number(it.protein || 0);
          c += Number(it.carbs || 0);
          f += Number(it.fiber || 0);
        });

        els.calTotalEl.textContent = String(Math.round(cal));
        els.proteinTotalEl.textContent = String(Math.round(p));
        els.carbTotalEl.textContent = String(Math.round(c));
        els.fiberTotalEl.textContent = String(Math.round(f));

        const calGoal = Number(data.goals.calories || 0);
        const pGoal = Number(data.goals.protein || 0);

        if(calGoal > 0){
          const pct = clampPct((cal / calGoal) * 100);
          els.calBar.style.width = pct + "%";
          els.calHint.textContent = `${Math.round(cal)} / ${Math.round(calGoal)} kcal`;
        }else{
          els.calBar.style.width = "0%";
          els.calHint.textContent = "Set a calorie goal to see progress.";
        }

        if(pGoal > 0){
          const pct = clampPct((p / pGoal) * 100);
          els.proteinBar.style.width = pct + "%";
          els.proteinHint.textContent = `${Math.round(p)} / ${Math.round(pGoal)} g protein`;
        }else{
          els.proteinBar.style.width = "0%";
          els.proteinHint.textContent = "Set a protein goal to see progress.";
        }
      }

      function render(){
        els.dayMeta.textContent = niceDay(current);

        els.goalCalories.value = data.goals.calories ? String(data.goals.calories) : "";
        els.goalProtein.value = data.goals.protein ? String(data.goals.protein) : "";

        els.mealList.innerHTML = "";
        MEALS.forEach(m => els.mealList.appendChild(renderMeal(m.id, m.label)));

        renderCustomGoals();
        updateTotals();
        saveDay(current, data);
      }

      function closePanels(){
        els.bgPanel.classList.remove("open");
        els.themePanel.classList.remove("open");
      }

      async function hardReloadTheme(){
        const saved = await loadTheme();
        themeDraft = applyTheme(saved);
        syncThemeInputs(themeDraft);
      }

      async function hardReloadBackground(){
        const saved = await loadBackground();
        bgDraft = saved.bg;
        bgDraftImage = saved.imageDataUrl;
        syncBgInputs(bgDraft);
        applyBgVisual(bgDraft, bgDraftImage);
      }

      async function initSettings(){
        const savedTheme = await loadTheme();
        themeDraft = applyTheme(savedTheme);
        syncThemeInputs(themeDraft);

        const savedBg = await loadBackground();
        bgDraft = savedBg.bg;
        bgDraftImage = savedBg.imageDataUrl;
        syncBgInputs(bgDraft);
        applyBgVisual(bgDraft, bgDraftImage);

        await refreshPresetSelect();
      }

      function attachPopoverEvents(){
        els.bgBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          els.bgPanel.classList.toggle("open");
          els.themePanel.classList.remove("open");
        });

        els.themeBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          els.themePanel.classList.toggle("open");
          els.bgPanel.classList.remove("open");
        });

        document.addEventListener("click", (e) => {
          const inBg = e.target.closest("#bgPanel") || e.target.closest("#bgBtn");
          const inTheme = e.target.closest("#themePanel") || e.target.closest("#themeBtn");
          if(!inBg) els.bgPanel.classList.remove("open");
          if(!inTheme) els.themePanel.classList.remove("open");
        });

        document.addEventListener("keydown", (e) => {
          if(e.key === "Escape") closePanels();
        });
      }

      function attachBackgroundEvents(){
        els.bgColor.addEventListener("input", () => {
          bgDraft = readBgInputs();
          applyBgVisual(bgDraft, bgDraftImage);
          setStatus("");
        });

        els.bgStrength.addEventListener("input", () => {
          bgDraft = readBgInputs();
          applyBgVisual(bgDraft, bgDraftImage);
          setStatus("");
        });

        els.bgBlur.addEventListener("input", () => {
          bgDraft = readBgInputs();
          applyBgVisual(bgDraft, bgDraftImage);
          setStatus("");
        });

        els.bgImage.addEventListener("change", async () => {
          const file = els.bgImage.files && els.bgImage.files[0];
          if(!file) return;
          try{
            bgDraftImage = await fileToDataUrl(file);
            applyBgVisual(bgDraft, bgDraftImage);
            setStatus("");
          }catch{
            setStatus("Could not load image.");
          }
        });

        els.removeImage.addEventListener("click", () => {
          bgDraftImage = null;
          els.bgImage.value = "";
          applyBgVisual(bgDraft, bgDraftImage);
          setStatus("");
        });

        els.bgApply.addEventListener("click", async () => {
          bgDraft = readBgInputs();
          applyBgVisual(bgDraft, bgDraftImage);
          await saveBackground(bgDraft, bgDraftImage);
          setStatus("Background applied.");
        });

        els.bgReset.addEventListener("click", async () => {
          bgDraft = safeBg(DEFAULT_BG);
          bgDraftImage = null;
          els.bgImage.value = "";
          syncBgInputs(bgDraft);
          applyBgVisual(bgDraft, bgDraftImage);
          await saveBackground(bgDraft, bgDraftImage);
          setStatus("Background reset.");
        });
      }

      function attachThemeEvents(){
        [
          els.tWidgetBg,
          els.tCardBg,
          els.tFieldBg,
          els.tText,
          els.tMuted,
          els.tBorder,
          els.tCream,
          els.tCreamSoft
        ].forEach(el => {
          el.addEventListener("input", () => {
            themeDraft = applyTheme(readThemeFromUI());
            setStatus("");
          });
        });

        els.themeApply.addEventListener("click", async () => {
          themeDraft = applyTheme(readThemeFromUI());
          await saveTheme(themeDraft);
          syncThemeInputs(themeDraft);
          setStatus("Theme applied.");
        });

        els.resetTheme.addEventListener("click", async () => {
          themeDraft = applyTheme(DEFAULT_THEME);
          syncThemeInputs(themeDraft);
          await saveTheme(themeDraft);
          setStatus("Theme reset.");
        });
      }

      function attachPresetEvents(){
        els.presetSave.addEventListener("click", async () => {
          const name = String(els.presetName.value || "").trim();
          if(!name){
            setStatus("Type a preset name first.");
            return;
          }

          const list = await loadPresets();
          const id = makeId();

          list.unshift({
            id,
            name,
            theme: readThemeFromUI(),
            bg: readBgInputs(),
            hasImage: !!bgDraftImage
          });

          if(bgDraftImage){
            await idbSet(presetImageKey(id), bgDraftImage);
          }

          await savePresets(list);
          els.presetName.value = "";
          await refreshPresetSelect();
          els.presetSelect.value = id;
          setStatus("Preset saved.");
        });

        els.presetApply.addEventListener("click", async () => {
          const id = String(els.presetSelect.value || "");
          if(!id){
            setStatus("Choose a preset first.");
            return;
          }

          const p = await getPresetById(id);
          if(!p){
            setStatus("Preset not found.");
            return;
          }

          const newTheme = safeTheme(p.theme || DEFAULT_THEME);
          const newBg = safeBg(p.bg || DEFAULT_BG);
          const presetImage = p.hasImage ? await idbGet(presetImageKey(id)) : null;

          themeDraft = applyTheme(newTheme);
          syncThemeInputs(themeDraft);
          await saveTheme(themeDraft);

          bgDraft = newBg;
          bgDraftImage = (typeof presetImage === "string" && presetImage) ? presetImage : null;
          syncBgInputs(bgDraft);
          applyBgVisual(bgDraft, bgDraftImage);
          await saveBackground(bgDraft, bgDraftImage);

          setStatus("Preset applied.");
        });

        els.presetDelete.addEventListener("click", async () => {
          const id = String(els.presetSelect.value || "");
          if(!id){
            setStatus("Choose a preset first.");
            return;
          }

          const ok = await askConfirm("Delete this preset?", { okText: "Delete", cancelText: "Cancel", danger: true });
          if(!ok) return;

          const list = await loadPresets();
          const next = list.filter(x => x.id !== id);
          await idbRemove(presetImageKey(id));
          await savePresets(next);
          await refreshPresetSelect();
          els.presetSelect.value = "";
          setStatus("Preset deleted.");
        });
      }

      function attachAppEvents(){
        els.goalCalories.addEventListener("input", () => {
          data.goals.calories = Number(els.goalCalories.value || 0);
          saveDay(current, data);
          updateTotals();
        });

        els.goalProtein.addEventListener("input", () => {
          data.goals.protein = Number(els.goalProtein.value || 0);
          saveDay(current, data);
          updateTotals();
        });

        els.addGoalBtn.addEventListener("click", () => {
          const name = String(els.newGoalName.value || "").trim();
          if(!name) return;

          data.goals.custom = data.goals.custom || [];
          data.goals.custom.push(sanitizeCustomGoal({ id: "g_" + makeId(), name, value: 0 }));

          els.newGoalName.value = "";
          saveDay(current, data);
          renderCustomGoals();
        });

        els.newGoalName.addEventListener("keydown", (e) => {
          if(e.key === "Enter"){
            e.preventDefault();
            els.addGoalBtn.click();
          }
        });

        function go(deltaDays){
          current = new Date(current.getTime() + deltaDays * 86400000);
          current.setHours(0,0,0,0);
          data = loadDay(current);
          render();
        }

        els.prevDayBtn.addEventListener("click", () => go(-1));
        els.nextDayBtn.addEventListener("click", () => go(1));

        els.clearDayBtn.addEventListener("click", async () => {
          const ok = await askConfirm("Clear this day?", { okText: "Clear", cancelText: "Cancel", danger: true });
          if(!ok) return;

          lsRemove(KEYS.day(isoDay(current)));
          data = loadDay(current);
          render();
          broadcast("day", { dayKey: isoDay(current) });
        });

        window.addEventListener("pagehide", () => {
          saveDay(current, data);
        });

        document.addEventListener("visibilitychange", () => {
          if(document.visibilityState === "hidden"){
            saveDay(current, data);
          }
        });
      }

      function attachSyncEvents(){
        window.addEventListener("storage", async (e) => {
          if(!e.key) return;

          if(e.key === KEYS.theme){
            await hardReloadTheme();
          }
          if(e.key === KEYS.bg){
            await hardReloadBackground();
          }
          if(e.key === KEYS.presets){
            await refreshPresetSelect();
          }
          if(e.key === KEYS.day(isoDay(current))){
            data = loadDay(current);
            render();
          }
        });

        if(channel){
          channel.onmessage = async (event) => {
            const msg = event.data || {};
            if(!msg.type) return;

            if(msg.type === "theme"){
              await hardReloadTheme();
            }
            if(msg.type === "background"){
              await hardReloadBackground();
            }
            if(msg.type === "presets"){
              await refreshPresetSelect();
            }
            if(msg.type === "day"){
              const dayKey = msg.payload && msg.payload.dayKey;
              if(dayKey === isoDay(current)){
                data = loadDay(current);
                render();
              }
            }
          };
        }
      }

      async function init(){
        attachPopoverEvents();
        attachBackgroundEvents();
        attachThemeEvents();
        attachPresetEvents();
        attachAppEvents();
        attachSyncEvents();

        await initSettings();
        data = loadDay(current);
        render();
      }

      init();
    })();
  </script>
</body>
</html>
