<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Monthly Planner</title>
  <style>
    :root{
      --app-bg: #ffffff;

      --ink: #2b2b2b;
      --muted: #7a7a7a;

      --border-rgb: 30,30,30;
      --border-a: 0.10;
      --border: rgba(var(--border-rgb), var(--border-a));
      --shadow: 0 10px 26px rgba(20, 20, 20, 0.08);

      --surface-a: 0.75;

      --panel-a: 0.92;
      --calendar-a: 0.60;
      --card-a: 0.92;
      --daycell-a: 0.92;
      --dow-a: 0.55;
      --input-a: 0.95;

      --btn-a: 0.90;
      --btn-border-a: 0.10;
      --btn-ink: rgba(43,43,43,0.70);

      --board-radius: 24px;
      --board-tint: #efe7e1;
      --board-tint-a: 0.35;
      --board-image: none;
      --bg-blur: 0px;
    }

    *{ box-sizing: border-box; }

    html, body{
      width:100%;
      min-height:100%;
    }

    body{
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background: var(--app-bg);
      -webkit-text-size-adjust:100%;
      text-size-adjust:100%;
      overflow-x:hidden;
    }

    .wrap{
      max-width: 1760px;
      margin: 22px auto;
      padding: 16px;
    }

    .titlebar{
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    h1{
      margin: 0;
      font-size: 18px;
      font-weight: 650;
      letter-spacing: 0.2px;
    }

    .controls{
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .icon-pill{
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(var(--surface-bg-rgb, 255,255,255), var(--surface-a));
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      box-shadow: 0 6px 18px rgba(20,20,20,0.06);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .bg-btn, .nav-btn, .theme-btn{
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid rgba(var(--border-rgb), var(--btn-border-a));
      background: rgba(var(--btn-bg-rgb, 255,255,255), var(--btn-a));
      cursor: pointer;
      display: grid;
      place-items: center;
      -webkit-tap-highlight-color: transparent;
      color: var(--btn-ink);
      font-weight: 800;
      line-height: 1;
      touch-action: manipulation;
      user-select: none;
    }

    .bg-btn:active, .nav-btn:active, .theme-btn:active,
    .mini-btn:active, .gbtn:active, .add-goal:active{
      transform: translateY(1px);
    }

    .bg-dot, .theme-dot{
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid rgba(var(--border-rgb), 0.14);
      background: var(--board-tint);
      box-shadow: 0 0 0 6px rgba(239,231,225,0.35);
    }

    .theme-dot{
      background: var(--ink);
      box-shadow: 0 0 0 6px rgba(43,43,43,0.12);
    }

    .popover{ position: relative; }

    .panel{
      position: absolute;
      top: 44px;
      right: 0;
      width: min(330px, calc(100vw - 36px));
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(var(--panel-bg-rgb, 255,255,255), var(--panel-a));
      box-shadow: 0 18px 40px rgba(20,20,20,0.10);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 12px 12px 20px;
      display: none;
      z-index: 9999;
      max-height: calc(100dvh - 140px);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .panel.open{ display: block; }

    @supports not (height: 100dvh){
      .panel{ max-height: calc(100vh - 140px); }
    }

    .panelTitle{
      margin: 0 0 10px 0;
      font-size: 12px;
      font-weight: 750;
      letter-spacing: .10em;
      text-transform: uppercase;
      color: rgba(43,43,43,0.70);
    }

    .row{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 0;
      flex-wrap: wrap;
    }

    .row label{
      font-size: 12px;
      color: var(--muted);
    }

    input[type="color"]{
      width: 34px;
      height: 26px;
      border: 1px solid rgba(var(--border-rgb), 0.12);
      border-radius: 10px;
      padding: 0;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    input[type="range"]{
      width: 150px;
      max-width:46vw;
      touch-action:pan-y;
    }

    .file{
      width: 100%;
      font-size: 12px;
      color: rgba(43,43,43,0.75);
    }

    .mini-btn{
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.90);
      border-radius: 12px;
      padding: 9px 10px;
      cursor: pointer;
      font-weight: 650;
      color: rgba(43,43,43,0.85);
      -webkit-tap-highlight-color: transparent;
      margin-top: 8px;
      user-select: none;
      touch-action: manipulation;
    }

    .divider{
      height: 1px;
      background: rgba(var(--border-rgb), 0.08);
      margin: 8px 0;
    }

    .presetName, .presetSelect{
      width: 100%;
      border: 1px solid rgba(var(--border-rgb), 0.10);
      border-radius: 12px;
      padding: 9px 10px;
      background: rgba(255,255,255,0.90);
      color: var(--ink);
      font: inherit;
      font-size: 12px;
      outline: none;
      box-shadow: 0 2px 8px rgba(20,20,20,0.05);
    }

    .presetSelect{ height: 36px; }

    .status{
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      min-height: 14px;
    }

    .month-pill{
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(var(--surface-bg-rgb,255,255,255), var(--surface-a));
      box-shadow: 0 6px 18px rgba(20,20,20,0.06);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .month-label{
      font-size: 12px;
      color: rgba(43,43,43,0.78);
      min-width: 170px;
      text-align: center;
      user-select: none;
    }

    .board{
      border: 1px solid var(--border);
      border-radius: var(--board-radius);
      box-shadow: var(--shadow);
      overflow: visible;
      position: relative;
      background: none;
      isolation:isolate;
    }

    .board::before,
    .board::after,
    .board-tint{
      border-radius: inherit;
    }

    .board::before{
      content: "";
      position: absolute;
      inset: 0;
      background-image: var(--board-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(var(--bg-blur)) saturate(0.95);
      transform: translateZ(0);
      will-change: filter;
    }

    .board::after{
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.38);
      pointer-events: none;
    }

    .board-tint{
      position: absolute;
      inset: 0;
      pointer-events: none;
      mix-blend-mode: multiply;
    }

    .board-content{
      position: relative;
      z-index: 2;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .layout{
      display: grid;
      grid-template-columns: 1.9fr 0.45fr;
      gap: 16px;
      padding: 14px;
    }

    @media (max-width: 980px){
      .layout{ grid-template-columns: 1fr; }
    }

    .calendar{
      background: rgba(var(--calendar-bg-rgb,255,255,255), var(--calendar-a));
      border: 1px solid rgba(var(--border-rgb), 0.10);
      border-radius: 20px;
      padding: 12px;
      box-shadow: 0 10px 24px rgba(20,20,20,0.06);
      overflow: hidden;
    }

    .dow{
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 12px;
      padding: 2px 2px 10px;
      color: var(--muted);
      font-size: 11px;
    }

    .dow div{
      text-align: center;
      padding: 8px 0;
      border-radius: 12px;
      background: rgba(var(--dow-bg-rgb,255,255,255), var(--dow-a));
      border: 1px solid rgba(var(--border-rgb), 0.06);
    }

    .cal-grid{
      display: grid;
      grid-template-columns: repeat(7, minmax(160px, 1fr));
      gap: 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
      touch-action: pan-x pan-y;
    }

    @media (min-width: 1400px){
      .cal-grid{ overflow-x: visible; }
    }

    .daycell{
      background: rgba(var(--daycell-bg-rgb,255,255,255), var(--daycell-a));
      border: 1px solid rgba(var(--border-rgb), 0.08);
      border-radius: 16px;
      min-height: 190px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 8px 18px rgba(20,20,20,0.05);
      min-width: 160px;
    }

    .daycell.outside{ opacity: 0.55; }

    .daytop{
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
    }

    .daynum{
      font-size: 12px;
      font-weight: 700;
      color: rgba(43,43,43,0.80);
    }

    .daynote{
      width: 100%;
      border: 1px solid rgba(var(--border-rgb), 0.10);
      border-radius: 12px;
      padding: 9px 10px;
      outline: none;
      background: rgba(var(--input-bg-rgb,255,255,255), var(--input-a));
      color: var(--ink);
      font-size: 12px;
      resize: none;
      min-height: 64px;
      line-height: 1.25;
      -webkit-appearance:none;
      appearance:none;
    }

    .daynote:focus{
      border-color: rgba(var(--border-rgb), 0.18);
      box-shadow: 0 0 0 4px rgba(43,43,43,0.10);
    }

    .goals-wrap{ display: flex; flex-direction: column; gap: 8px; }

    .goal-chip{
      position: relative;
      display: grid;
      grid-template-columns: 1fr 26px 26px;
      gap: 8px;
      align-items: start;
      padding: 8px 8px;
      border-radius: 14px;
      border: 1px solid rgba(var(--border-rgb), 0.08);
      background: rgba(203,184,174,0.22);
      min-width: 0;
    }

    .goalText{
      width: 100%;
      border: none;
      background: transparent;
      outline: none;
      color: var(--ink);
      font-size: 12px;
      padding: 4px 2px;
      min-width: 0;
      resize: none;
      min-height: 44px;
      line-height: 1.25;
      word-break: break-word;
      overflow-wrap: anywhere;
      -webkit-appearance:none;
      appearance:none;
    }

    .gbtn{
      width: 26px;
      height: 26px;
      border-radius: 10px;
      border: 1px solid rgba(var(--border-rgb), 0.10);
      background: rgba(255,255,255,0.75);
      cursor: pointer;
      display: grid;
      place-items: center;
      color: rgba(43,43,43,0.72);
      -webkit-tap-highlight-color: transparent;
      font-weight: 900;
      line-height: 1;
      user-select: none;
      padding: 0;
      touch-action: manipulation;
    }

    .goalColorLabel{ position: relative; overflow: hidden; }

    .goalColorPicker{
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
      border: 0;
      padding: 0;
      margin: 0;
      -webkit-appearance: none;
      appearance: none;
    }

    .add-goal{
      width: 100%;
      border: 1px solid rgba(var(--border-rgb), 0.10);
      background: rgba(255,255,255,0.85);
      border-radius: 12px;
      padding: 8px 8px;
      cursor: pointer;
      color: rgba(43,43,43,0.78);
      font-weight: 650;
      font-size: 12px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select:none;
    }

    .side{ display: flex; flex-direction: column; gap: 12px; }

    .card{
      background: rgba(var(--card-bg-rgb,255,255,255), var(--card-a));
      border: 1px solid rgba(var(--border-rgb), 0.10);
      border-radius: 20px;
      padding: 12px;
      box-shadow: 0 10px 24px rgba(20,20,20,0.06);
    }

    .card-title{
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .card-title h2{
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      color: rgba(43,43,43,0.85);
    }

    .small{ font-size: 12px; color: var(--muted); }

    @media (max-width: 860px){
      .panel{
        position: fixed;
        top: auto;
        right: 18px;
        left: 18px;
        bottom: max(16px, env(safe-area-inset-bottom));
        width: auto;
        max-height: min(78vh, 700px);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="titlebar">
      <div class="title"></div>

      <div class="controls">
        <div class="month-pill" aria-label="Month navigation">
          <button class="nav-btn" id="prevMonth" type="button" aria-label="Previous month" title="Previous month">‹</button>
          <div class="month-label" id="monthLabel">Month</div>
          <button class="nav-btn" id="nextMonth" type="button" aria-label="Next month" title="Next month">›</button>
        </div>

        <div class="popover" id="themePopover">
          <div class="icon-pill">
            <button class="theme-btn" id="themeBtn" type="button" aria-label="Theme settings" title="Theme settings">
              <span class="theme-dot" id="themeDot" aria-hidden="true"></span>
            </button>
          </div>

          <div class="panel" id="themePanel" role="dialog" aria-label="Theme settings">
            <div class="panelTitle">Theme</div>

            <button class="mini-btn" id="themeApply" type="button">Apply theme</button>
            <button class="mini-btn" id="themeReset" type="button">Reset theme</button>

            <div class="divider"></div>

            <div class="row"><label for="tAppBg">App background</label><input id="tAppBg" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tInk">Text</label><input id="tInk" type="color" value="#2b2b2b" /></div>
            <div class="row"><label for="tMuted">Muted</label><input id="tMuted" type="color" value="#7a7a7a" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tBorderColor">Border color</label><input id="tBorderColor" type="color" value="#1e1e1e" /></div>
            <div class="row"><label for="tBorderA">Border strength</label><input id="tBorderA" type="range" min="4" max="30" value="10" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tSurfaceColor">Pills bg</label><input id="tSurfaceColor" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tSurfaceA">Pills opacity</label><input id="tSurfaceA" type="range" min="40" max="98" value="75" /></div>

            <div class="row"><label for="tPanelColor">Panel bg</label><input id="tPanelColor" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tPanelA">Panel opacity</label><input id="tPanelA" type="range" min="60" max="98" value="92" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tCalendarColor">Calendar bg</label><input id="tCalendarColor" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tCalendarA">Calendar opacity</label><input id="tCalendarA" type="range" min="35" max="95" value="60" /></div>

            <div class="row"><label for="tDaycellColor">Daycell bg</label><input id="tDaycellColor" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tDaycellA">Daycell opacity</label><input id="tDaycellA" type="range" min="45" max="98" value="92" /></div>

            <div class="row"><label for="tDowColor">DOW bg</label><input id="tDowColor" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tDowA">DOW opacity</label><input id="tDowA" type="range" min="25" max="95" value="55" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tInputColor">Inputs bg</label><input id="tInputColor" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tInputA">Inputs opacity</label><input id="tInputA" type="range" min="55" max="100" value="95" /></div>

            <div class="row"><label for="tCardColor">Side cards bg</label><input id="tCardColor" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tCardA">Side cards opacity</label><input id="tCardA" type="range" min="55" max="100" value="92" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tBtnColor">Buttons bg</label><input id="tBtnColor" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tBtnA">Buttons opacity</label><input id="tBtnA" type="range" min="55" max="100" value="90" /></div>
            <div class="row"><label for="tBtnBorderA">Btn border</label><input id="tBtnBorderA" type="range" min="0" max="30" value="10" /></div>
            <div class="row"><label for="tBtnInk">Btn icon/text</label><input id="tBtnInk" type="color" value="#2b2b2b" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tOverlayBase">Overlay color</label><input id="tOverlayBase" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tOverlayA">Overlay strength</label><input id="tOverlayA" type="range" min="0" max="70" value="38" /></div>

            <div class="divider"></div>

            <div class="panelTitle" style="margin-top: 4px;">Presets</div>

            <input class="presetName" id="presetName" placeholder="Preset name">

            <button class="mini-btn" id="presetSave" type="button">Save current as preset</button>

            <div class="divider"></div>

            <select class="presetSelect" id="presetSelect"></select>

            <button class="mini-btn" id="presetApply" type="button">Apply preset</button>
            <button class="mini-btn" id="presetDelete" type="button">Delete preset</button>

            <div class="status" id="presetStatus" aria-live="polite"></div>

            <div class="divider"></div>

            <button class="mini-btn" id="exportSettings" type="button">Export settings JSON</button>
            <button class="mini-btn" id="importSettings" type="button">Import settings JSON</button>
            <input id="importFile" type="file" accept="application/json" style="display:none" />
          </div>
        </div>

        <div class="popover" id="bgPopover">
          <div class="icon-pill">
            <button class="bg-btn" id="bgBtn" type="button" aria-label="Background settings" title="Background settings">
              <span class="bg-dot" id="bgDot" aria-hidden="true"></span>
            </button>
          </div>

          <div class="panel" id="bgPanel" role="dialog" aria-label="Background settings">
            <div class="panelTitle">Background</div>

            <button class="mini-btn" id="bgApply" type="button">Apply background</button>
            <button class="mini-btn" id="bgReset" type="button">Reset background</button>

            <div class="divider"></div>

            <div class="row">
              <label for="bgColor">Tint</label>
              <input id="bgColor" type="color" value="#efe7e1" />
            </div>

            <div class="row">
              <label for="bgStrength">Tint strength</label>
              <input id="bgStrength" type="range" min="0" max="70" value="35" />
            </div>

            <div class="row">
              <label for="bgBlur">Image blur</label>
              <input id="bgBlur" type="range" min="0" max="24" value="0" />
            </div>

            <div class="divider"></div>

            <div class="row" style="align-items:flex-start;">
              <label for="bgImage">Image</label>
              <input id="bgImage" class="file" type="file" accept="image/*" />
            </div>

            <div class="row">
              <button class="mini-btn" id="removeImage" type="button">Remove image</button>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="board" id="board">
      <div class="board-tint" id="boardTint"></div>

      <div class="board-content">
        <div class="layout">
          <section class="calendar" aria-label="Monthly calendar">
            <div class="dow" aria-hidden="true">
              <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
            </div>
            <div class="cal-grid" id="calGrid"></div>
          </section>

          <aside class="side" aria-label="Notes">
            <div class="card">
              <div class="card-title">
                <h2>Notes</h2>
                <div class="small">Monthly</div>
              </div>
              <textarea id="monthNotes" class="daynote"></textarea>
            </div>
          </aside>
        </div>
      </div>
    </div>
  </div>

  <script>
    (async function(){
      "use strict";

      const DEFAULT_THEME = {
        appBg: "#ffffff",
        ink: "#2b2b2b",
        muted: "#7a7a7a",

        borderColor: "#1e1e1e",
        borderA: 0.10,

        surfaceColor: "#ffffff",
        surfaceA: 0.75,

        panelColor: "#ffffff",
        panelA: 0.92,

        calendarColor: "#ffffff",
        calendarA: 0.60,

        daycellColor: "#ffffff",
        daycellA: 0.92,

        dowColor: "#ffffff",
        dowA: 0.55,

        inputColor: "#ffffff",
        inputA: 0.95,

        cardColor: "#ffffff",
        cardA: 0.92,

        btnColor: "#ffffff",
        btnA: 0.90,
        btnBorderA: 0.10,
        btnInk: "#2b2b2b",

        overlayBase: "#ffffff",
        overlayA: 0.38
      };

      const DEFAULT_BG = {
        tint: "#efe7e1",
        strength: 35,
        blur: 0,
        imageDataUrl: null
      };

      const APP_VERSION = 9;
      const STORAGE_NS = "monthly_planner_v9";
      const PRESET_NAMESPACE = "monthlyplanner";
      const CHANNEL_NAME = "monthly-planner-sync-v9";

      const $ = (id)=>document.getElementById(id);

      function clamp(n, min, max){
        const x = Number(n);
        if(!Number.isFinite(x)) return min;
        return Math.max(min, Math.min(max, x));
      }

      function deepClone(obj){
        return JSON.parse(JSON.stringify(obj));
      }

      function uid(){
        return Math.random().toString(16).slice(2) + Date.now().toString(16);
      }

      function stableWidgetId(){
        try{
          const sp = new URLSearchParams(location.search);
          const wid = (sp.get("wid") || "").trim();
          if (wid) return wid;
        }catch{}
        const pathPart = (location.pathname || "monthly-planner").replace(/[^a-zA-Z0-9_-]+/g, "_");
        return pathPart || "monthly-planner";
      }

      const WID = stableWidgetId();

      function safeJSONParse(s){
        try{ return JSON.parse(s); }catch{ return null; }
      }

      function normHex(hex, fallback){
        const s = String(hex || "").trim();
        return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : fallback;
      }

      function hexToRgbTuple(hex){
        const h = normHex(hex, "#ffffff").slice(1);
        const r = parseInt(h.slice(0,2), 16);
        const g = parseInt(h.slice(2,4), 16);
        const b = parseInt(h.slice(4,6), 16);
        return `${r},${g},${b}`;
      }

      function hexToRgba(hex, a){
        const [r,g,b] = hexToRgbTuple(hex).split(",").map(Number);
        return `rgba(${r},${g},${b},${a})`;
      }

      function pad2(n){ return String(n).padStart(2,"0"); }

      function monthIdFromDate(d){
        const x = new Date(d);
        return `${x.getFullYear()}-${pad2(x.getMonth()+1)}`;
      }

      function addMonths(date, delta){
        const d = new Date(date);
        const day = d.getDate();
        d.setDate(1);
        d.setMonth(d.getMonth() + delta);
        const last = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
        d.setDate(Math.min(day, last));
        return d;
      }

      function prettyMonthLabel(monthId){
        const [y,m] = monthId.split("-").map(Number);
        const d = new Date(y, m-1, 1);
        return d.toLocaleDateString(undefined, { month: "long", year: "numeric" });
      }

      function startOfCalendarGrid(year, monthIndex){
        const first = new Date(year, monthIndex, 1);
        const day = first.getDay();
        const mondayIndex = (day === 0) ? 6 : day - 1;
        const start = new Date(year, monthIndex, 1 - mondayIndex);
        start.setHours(0,0,0,0);
        return start;
      }

      function dayKey(d){
        const y = d.getFullYear();
        const m = pad2(d.getMonth()+1);
        const day = pad2(d.getDate());
        return `${y}-${m}-${day}`;
      }

      function autoGrow(el){
        if (!el) return;
        el.style.height = "auto";
        el.style.height = Math.min(el.scrollHeight, 260) + "px";
      }

      function chipBg(color){
        return `linear-gradient(180deg, ${hexToRgba(color, 0.22)}, ${hexToRgba(color, 0.18)})`;
      }

      function downloadJSON(filename, obj){
        const blob = new Blob([JSON.stringify(obj, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }

      function debounce(fn, delay){
        let t = null;
        return function(...args){
          clearTimeout(t);
          t = setTimeout(() => fn.apply(this, args), delay);
        };
      }

      function setStatus(msg=""){
        const el = $("presetStatus");
        if(el) el.textContent = msg;
      }

      const storage = {
        db: null,
        hasIDB: false,
        key: `${STORAGE_NS}__${WID}`,

        async init(){
          if (!("indexedDB" in window)) {
            this.hasIDB = false;
            return;
          }
          try{
            this.db = await new Promise((resolve, reject) => {
              const req = indexedDB.open(`${STORAGE_NS}_db`, 1);
              req.onupgradeneeded = () => {
                const db = req.result;
                if (!db.objectStoreNames.contains("state")) db.createObjectStore("state");
              };
              req.onsuccess = () => resolve(req.result);
              req.onerror = () => reject(req.error);
            });
            this.hasIDB = true;
          }catch{
            this.hasIDB = false;
            this.db = null;
          }
        },

        async get(){
          if (this.hasIDB && this.db){
            try{
              const result = await new Promise((resolve, reject) => {
                const tx = this.db.transaction("state", "readonly");
                const store = tx.objectStore("state");
                const req = store.get(this.key);
                req.onsuccess = () => resolve(req.result ?? null);
                req.onerror = () => reject(req.error);
              });
              if (result) return result;
            }catch{}
          }

          try{
            const raw = localStorage.getItem(this.key);
            return raw ? JSON.parse(raw) : null;
          }catch{
            return null;
          }
        },

        async set(value){
          try{
            localStorage.setItem(this.key, JSON.stringify(value));
          }catch{}

          if (this.hasIDB && this.db){
            try{
              await new Promise((resolve, reject) => {
                const tx = this.db.transaction("state", "readwrite");
                const store = tx.objectStore("state");
                const req = store.put(value, this.key);
                req.onsuccess = () => resolve();
                req.onerror = () => reject(req.error);
              });
            }catch{}
          }
        }
      };

      function defaultMonthData(){
        return {
          days: {},
          notes: "",
          background: deepClone(DEFAULT_BG)
        };
      }

      function normalizeTheme(obj){
        const theme = Object.assign({}, DEFAULT_THEME, obj || {});
        return {
          appBg: normHex(theme.appBg, DEFAULT_THEME.appBg),
          ink: normHex(theme.ink, DEFAULT_THEME.ink),
          muted: normHex(theme.muted, DEFAULT_THEME.muted),

          borderColor: normHex(theme.borderColor, DEFAULT_THEME.borderColor),
          borderA: clamp(theme.borderA, 0.04, 0.30),

          surfaceColor: normHex(theme.surfaceColor, DEFAULT_THEME.surfaceColor),
          surfaceA: clamp(theme.surfaceA, 0.40, 0.98),

          panelColor: normHex(theme.panelColor, DEFAULT_THEME.panelColor),
          panelA: clamp(theme.panelA, 0.60, 0.98),

          calendarColor: normHex(theme.calendarColor, DEFAULT_THEME.calendarColor),
          calendarA: clamp(theme.calendarA, 0.35, 0.95),

          daycellColor: normHex(theme.daycellColor, DEFAULT_THEME.daycellColor),
          daycellA: clamp(theme.daycellA, 0.45, 0.98),

          dowColor: normHex(theme.dowColor, DEFAULT_THEME.dowColor),
          dowA: clamp(theme.dowA, 0.25, 0.95),

          inputColor: normHex(theme.inputColor, DEFAULT_THEME.inputColor),
          inputA: clamp(theme.inputA, 0.55, 1.00),

          cardColor: normHex(theme.cardColor, DEFAULT_THEME.cardColor),
          cardA: clamp(theme.cardA, 0.55, 1.00),

          btnColor: normHex(theme.btnColor, DEFAULT_THEME.btnColor),
          btnA: clamp(theme.btnA, 0.55, 1.00),
          btnBorderA: clamp(theme.btnBorderA, 0.00, 0.30),
          btnInk: normHex(theme.btnInk, DEFAULT_THEME.btnInk),

          overlayBase: normHex(theme.overlayBase, DEFAULT_THEME.overlayBase),
          overlayA: clamp(theme.overlayA, 0.00, 0.70)
        };
      }

      function normalizeBackground(obj){
        const bg = Object.assign({}, DEFAULT_BG, obj || {});
        return {
          tint: normHex(bg.tint, DEFAULT_BG.tint),
          strength: clamp(bg.strength, 0, 70),
          blur: clamp(bg.blur, 0, 24),
          imageDataUrl: typeof bg.imageDataUrl === "string" && bg.imageDataUrl ? bg.imageDataUrl : null
        };
      }

      function normalizeGoal(goal){
        return {
          text: String(goal?.text ?? ""),
          color: normHex(goal?.color, "#cbb8ae")
        };
      }

      function normalizeDayData(day){
        return {
          note: String(day?.note ?? ""),
          goals: Array.isArray(day?.goals) ? day.goals.map(normalizeGoal) : []
        };
      }

      function normalizeMonthData(month){
        const base = defaultMonthData();
        if (!month || typeof month !== "object") return base;

        base.notes = String(month.notes ?? "");
        base.background = normalizeBackground(month.background);

        const days = month.days && typeof month.days === "object" ? month.days : {};
        base.days = {};
        for (const [k, v] of Object.entries(days)){
          base.days[k] = normalizeDayData(v);
        }
        return base;
      }

      function normalizePresets(list){
        if (!Array.isArray(list)) return [];
        return list
          .filter(Boolean)
          .map(p => ({
            id: String(p.id || uid()),
            ns: String(p.ns || PRESET_NAMESPACE),
            name: String(p.name || "Untitled"),
            theme: normalizeTheme(p.theme),
            bg: normalizeBackground(p.bg)
          }))
          .filter(p => p.ns === PRESET_NAMESPACE);
      }

      function normalizeStore(store){
        const safe = {
          version: APP_VERSION,
          wid: WID,
          lastUpdated: Number(store?.lastUpdated || 0) || 0,
          theme: normalizeTheme(store?.theme),
          presets: normalizePresets(store?.presets),
          months: {}
        };

        const months = store?.months && typeof store.months === "object" ? store.months : {};
        for (const [monthId, monthData] of Object.entries(months)){
          safe.months[monthId] = normalizeMonthData(monthData);
        }

        return safe;
      }

      let store = normalizeStore(null);
      let activeMonthId = monthIdFromDate(new Date());
      let themeDraft = normalizeTheme(DEFAULT_THEME);
      let bgDraft = normalizeBackground(DEFAULT_BG);

      const calGrid = $("calGrid");
      const monthNotes = $("monthNotes");
      const boardTint = $("boardTint");
      const bgDot = $("bgDot");

      const bc = "BroadcastChannel" in window ? new BroadcastChannel(CHANNEL_NAME) : null;

      function touchStore(){
        store.lastUpdated = Date.now();
      }

      async function saveStoreNow(){
        touchStore();
        await storage.set(store);
        if (bc){
          try{
            bc.postMessage({ type: "state-updated", wid: WID, lastUpdated: store.lastUpdated });
          }catch{}
        }
      }

      const debouncedSave = debounce(() => { saveStoreNow(); }, 120);

      async function flushSave(){
        await saveStoreNow();
      }

      function ensureMonthData(monthId){
        if (!store.months[monthId]) {
          store.months[monthId] = defaultMonthData();
        } else {
          store.months[monthId] = normalizeMonthData(store.months[monthId]);
        }
        return store.months[monthId];
      }

      function ensureDayData(monthData, key){
        if (!monthData.days[key]) {
          monthData.days[key] = normalizeDayData(null);
        } else {
          monthData.days[key] = normalizeDayData(monthData.days[key]);
        }
        return monthData.days[key];
      }

      function closePanels(except){
        if (except !== "theme") $("themePanel")?.classList.remove("open");
        if (except !== "bg") $("bgPanel")?.classList.remove("open");
      }

      function initPanels(){
        $("themeBtn").addEventListener("click", (e) => {
          e.stopPropagation();
          const open = !$("themePanel").classList.contains("open");
          closePanels(open ? "theme" : null);
          $("themePanel").classList.toggle("open", open);
        });

        $("bgBtn").addEventListener("click", (e) => {
          e.stopPropagation();
          const open = !$("bgPanel").classList.contains("open");
          closePanels(open ? "bg" : null);
          $("bgPanel").classList.toggle("open", open);
        });

        document.addEventListener("click", (e) => {
          const inside =
            e.target.closest("#themePanel") || e.target.closest("#themeBtn") ||
            e.target.closest("#bgPanel") || e.target.closest("#bgBtn");
          if (!inside) closePanels(null);
        });
      }

      function applyTheme(theme){
        const t = normalizeTheme(theme);
        const r = document.documentElement.style;

        r.setProperty("--app-bg", t.appBg);
        r.setProperty("--ink", t.ink);
        r.setProperty("--muted", t.muted);

        r.setProperty("--border-rgb", hexToRgbTuple(t.borderColor));
        r.setProperty("--border-a", String(t.borderA));

        r.setProperty("--surface-bg-rgb", hexToRgbTuple(t.surfaceColor));
        r.setProperty("--surface-a", String(t.surfaceA));

        r.setProperty("--panel-bg-rgb", hexToRgbTuple(t.panelColor));
        r.setProperty("--panel-a", String(t.panelA));

        r.setProperty("--calendar-bg-rgb", hexToRgbTuple(t.calendarColor));
        r.setProperty("--calendar-a", String(t.calendarA));

        r.setProperty("--daycell-bg-rgb", hexToRgbTuple(t.daycellColor));
        r.setProperty("--daycell-a", String(t.daycellA));

        r.setProperty("--dow-bg-rgb", hexToRgbTuple(t.dowColor));
        r.setProperty("--dow-a", String(t.dowA));

        r.setProperty("--input-bg-rgb", hexToRgbTuple(t.inputColor));
        r.setProperty("--input-a", String(t.inputA));

        r.setProperty("--card-bg-rgb", hexToRgbTuple(t.cardColor));
        r.setProperty("--card-a", String(t.cardA));

        r.setProperty("--btn-bg-rgb", hexToRgbTuple(t.btnColor));
        r.setProperty("--btn-a", String(t.btnA));
        r.setProperty("--btn-border-a", String(t.btnBorderA));
        r.setProperty("--btn-ink", hexToRgba(t.btnInk, 0.70));

        const dot = $("themeDot");
        if(dot){
          dot.style.background = t.ink;
          dot.style.boxShadow = `0 0 0 6px ${hexToRgba(t.ink, 0.12)}`;
        }

        let st = $("overlayStyle");
        if(!st){
          st = document.createElement("style");
          st.id = "overlayStyle";
          document.head.appendChild(st);
        }
        st.textContent = `.board::after{ background: ${hexToRgba(t.overlayBase, t.overlayA)} !important; }`;
      }

      function themeSyncInputs(theme){
        const t = normalizeTheme(theme);
        const set = (id, val) => { const el = $(id); if(el) el.value = String(val); };

        set("tAppBg", t.appBg);
        set("tInk", t.ink);
        set("tMuted", t.muted);

        set("tBorderColor", t.borderColor);
        set("tBorderA", Math.round(t.borderA * 100));

        set("tSurfaceColor", t.surfaceColor);
        set("tSurfaceA", Math.round(t.surfaceA * 100));

        set("tPanelColor", t.panelColor);
        set("tPanelA", Math.round(t.panelA * 100));

        set("tCalendarColor", t.calendarColor);
        set("tCalendarA", Math.round(t.calendarA * 100));

        set("tDaycellColor", t.daycellColor);
        set("tDaycellA", Math.round(t.daycellA * 100));

        set("tDowColor", t.dowColor);
        set("tDowA", Math.round(t.dowA * 100));

        set("tInputColor", t.inputColor);
        set("tInputA", Math.round(t.inputA * 100));

        set("tCardColor", t.cardColor);
        set("tCardA", Math.round(t.cardA * 100));

        set("tBtnColor", t.btnColor);
        set("tBtnA", Math.round(t.btnA * 100));
        set("tBtnBorderA", Math.round(t.btnBorderA * 100));
        set("tBtnInk", t.btnInk);

        set("tOverlayBase", t.overlayBase);
        set("tOverlayA", Math.round(t.overlayA * 100));
      }

      function themeReadFromInputs(){
        const g = (id)=>$(id);
        return normalizeTheme({
          appBg: g("tAppBg")?.value,
          ink: g("tInk")?.value,
          muted: g("tMuted")?.value,

          borderColor: g("tBorderColor")?.value,
          borderA: Number(g("tBorderA")?.value) / 100,

          surfaceColor: g("tSurfaceColor")?.value,
          surfaceA: Number(g("tSurfaceA")?.value) / 100,

          panelColor: g("tPanelColor")?.value,
          panelA: Number(g("tPanelA")?.value) / 100,

          calendarColor: g("tCalendarColor")?.value,
          calendarA: Number(g("tCalendarA")?.value) / 100,

          daycellColor: g("tDaycellColor")?.value,
          daycellA: Number(g("tDaycellA")?.value) / 100,

          dowColor: g("tDowColor")?.value,
          dowA: Number(g("tDowA")?.value) / 100,

          inputColor: g("tInputColor")?.value,
          inputA: Number(g("tInputA")?.value) / 100,

          cardColor: g("tCardColor")?.value,
          cardA: Number(g("tCardA")?.value) / 100,

          btnColor: g("tBtnColor")?.value,
          btnA: Number(g("tBtnA")?.value) / 100,
          btnBorderA: Number(g("tBtnBorderA")?.value) / 100,
          btnInk: g("tBtnInk")?.value,

          overlayBase: g("tOverlayBase")?.value,
          overlayA: Number(g("tOverlayA")?.value) / 100
        });
      }

      function applyBackground(bg){
        const safe = normalizeBackground(bg);

        document.documentElement.style.setProperty("--board-tint", safe.tint);
        document.documentElement.style.setProperty("--board-tint-a", String(safe.strength / 100));
        document.documentElement.style.setProperty("--board-image", safe.imageDataUrl ? `url("${safe.imageDataUrl}")` : "none");
        document.documentElement.style.setProperty("--bg-blur", `${safe.blur}px`);

        if (boardTint){
          boardTint.style.background = hexToRgba(safe.tint, safe.strength / 100);
        }

        if (bgDot){
          bgDot.style.background = safe.tint;
          bgDot.style.boxShadow = `0 0 0 6px ${hexToRgba(safe.tint, Math.min(0.35, (safe.strength / 100) + 0.10))}`;
        }
      }

      function syncBgInputs(bg){
        const safe = normalizeBackground(bg);
        $("bgColor").value = safe.tint;
        $("bgStrength").value = String(safe.strength);
        $("bgBlur").value = String(safe.blur);
        $("bgImage").value = "";
      }

      function readBgInputs(){
        return normalizeBackground({
          tint: $("bgColor")?.value,
          strength: Number($("bgStrength")?.value),
          blur: Number($("bgBlur")?.value),
          imageDataUrl: bgDraft.imageDataUrl
        });
      }

      function goalChipHTML(goal){
        const g = normalizeGoal(goal);
        const text = String(g.text)
          .replaceAll("&","&amp;")
          .replaceAll("<","&lt;")
          .replaceAll(">","&gt;");

        return `
          <div class="goal-chip" data-kind="goal" style="background:${chipBg(g.color)};">
            <textarea class="goalText" placeholder="Goal…">${text}</textarea>

            <label class="gbtn goalColorLabel" title="Color">
              •
              <input class="goalColorPicker" type="color" value="${g.color}" aria-label="Goal color" />
            </label>

            <button class="gbtn removeGoalBtn" type="button" aria-label="Remove goal" title="Remove">×</button>
          </div>
        `;
      }

      function buildMonth(monthId){
        activeMonthId = monthId;
        const monthData = ensureMonthData(monthId);

        $("monthLabel").textContent = prettyMonthLabel(monthId);

        bgDraft = normalizeBackground(monthData.background);
        syncBgInputs(bgDraft);
        applyBackground(bgDraft);

        monthNotes.value = monthData.notes || "";
        autoGrow(monthNotes);

        const [year, monthNum] = monthId.split("-").map(Number);
        const monthIndex = monthNum - 1;

        const start = startOfCalendarGrid(year, monthIndex);
        const daysInView = 42;

        calGrid.innerHTML = "";

        for (let i = 0; i < daysInView; i++){
          const d = new Date(start);
          d.setDate(start.getDate() + i);

          const key = dayKey(d);
          const inMonth = d.getMonth() === monthIndex;

          const dayData = ensureDayData(monthData, key);
          const note = dayData.note ?? "";
          const goals = dayData.goals ?? [];

          const cell = document.createElement("div");
          cell.className = "daycell" + (inMonth ? "" : " outside");
          cell.dataset.dateKey = key;

          const goalsHtml = goals.map(g => goalChipHTML(g)).join("");

          cell.innerHTML = `
            <div class="daytop">
              <div class="daynum">${d.getDate()}</div>
            </div>

            <div class="goals-wrap">
              <div class="goalsListInDay" data-goals="1">
                ${goalsHtml}
              </div>
              <button class="add-goal" type="button">+ goal</button>
            </div>

            <textarea class="daynote dayNoteInput" placeholder="Note…">${String(note ?? "")
              .replaceAll("&","&amp;")
              .replaceAll("<","&lt;")
              .replaceAll(">","&gt;")}</textarea>
          `;

          calGrid.appendChild(cell);
        }

        calGrid.querySelectorAll("textarea").forEach(autoGrow);
      }

      function snapshotMonthToStore(){
        const monthData = ensureMonthData(activeMonthId);
        monthData.notes = monthNotes.value ?? "";
        monthData.background = normalizeBackground(bgDraft);

        document.querySelectorAll(".daycell").forEach(cell => {
          const key = cell.dataset.dateKey;
          const noteVal = cell.querySelector(".dayNoteInput")?.value ?? "";

          const goals = [];
          cell.querySelectorAll(".goal-chip").forEach(chip => {
            const text = chip.querySelector(".goalText")?.value ?? "";
            const picker = chip.querySelector(".goalColorPicker");
            const color = picker?.value ?? "#cbb8ae";
            goals.push(normalizeGoal({ text, color }));
          });

          monthData.days[key] = {
            note: noteVal,
            goals
          };
        });

        store.months[activeMonthId] = normalizeMonthData(monthData);
      }

      function persistMonthSoon(){
        snapshotMonthToStore();
        debouncedSave();
      }

      async function persistMonthNow(){
        snapshotMonthToStore();
        await flushSave();
      }

      function currentPresetPayload(){
        return {
          id: uid(),
          ns: PRESET_NAMESPACE,
          name: ($("presetName").value || "").trim() || "Untitled",
          theme: normalizeTheme(themeDraft),
          bg: normalizeBackground(bgDraft)
        };
      }

      function refreshPresetSelect(){
        const sel = $("presetSelect");
        const cur = sel.value;
        sel.innerHTML = `<option value="">—</option>`;
        const list = normalizePresets(store.presets);
        for (const p of list){
          const opt = document.createElement("option");
          opt.value = p.id;
          opt.textContent = p.name || "Untitled";
          sel.appendChild(opt);
        }
        if (list.some(p => p.id === cur)) sel.value = cur;
      }

      function initThemeUI(){
        themeDraft = normalizeTheme(store.theme);
        applyTheme(themeDraft);
        themeSyncInputs(themeDraft);

        const ids = [
          "tAppBg","tInk","tMuted",
          "tBorderColor","tBorderA",
          "tSurfaceColor","tSurfaceA",
          "tPanelColor","tPanelA",
          "tCalendarColor","tCalendarA",
          "tDaycellColor","tDaycellA",
          "tDowColor","tDowA",
          "tInputColor","tInputA",
          "tCardColor","tCardA",
          "tBtnColor","tBtnA","tBtnBorderA","tBtnInk",
          "tOverlayBase","tOverlayA"
        ];

        ids.forEach(id => {
          const el = $(id);
          if(!el) return;
          el.addEventListener("input", () => {
            themeDraft = themeReadFromInputs();
            applyTheme(themeDraft);
            setStatus("");
          });
        });

        $("themeApply").addEventListener("click", async () => {
          themeDraft = themeReadFromInputs();
          store.theme = normalizeTheme(themeDraft);
          applyTheme(store.theme);
          await flushSave();
          setStatus("Theme applied.");
        });

        $("themeReset").addEventListener("click", async () => {
          themeDraft = normalizeTheme(DEFAULT_THEME);
          store.theme = normalizeTheme(DEFAULT_THEME);
          applyTheme(themeDraft);
          themeSyncInputs(themeDraft);
          await flushSave();
          setStatus("Theme reset.");
        });
      }

      function initBackgroundUI(){
        const previewBg = () => {
          bgDraft = readBgInputs();
          applyBackground(bgDraft);
          setStatus("");
        };

        $("bgColor").addEventListener("input", previewBg);
        $("bgStrength").addEventListener("input", previewBg);
        $("bgBlur").addEventListener("input", previewBg);

        $("bgImage").addEventListener("change", async () => {
          const file = $("bgImage").files && $("bgImage").files[0];
          if (!file) return;
          try{
            const dataUrl = await new Promise((resolve, reject) => {
              const r = new FileReader();
              r.onload = () => resolve(String(r.result));
              r.onerror = reject;
              r.readAsDataURL(file);
            });
            bgDraft.imageDataUrl = dataUrl;
            bgDraft = normalizeBackground(bgDraft);
            applyBackground(bgDraft);
            setStatus("");
          }catch{
            setStatus("Could not read that image.");
          }
        });

        $("removeImage").addEventListener("click", () => {
          bgDraft.imageDataUrl = null;
          $("bgImage").value = "";
          bgDraft = normalizeBackground(bgDraft);
          applyBackground(bgDraft);
          setStatus("");
        });

        $("bgApply").addEventListener("click", async () => {
          bgDraft = readBgInputs();
          const monthData = ensureMonthData(activeMonthId);
          monthData.background = normalizeBackground(bgDraft);
          store.months[activeMonthId] = monthData;
          applyBackground(monthData.background);
          await flushSave();
          setStatus("Background applied for this month.");
        });

        $("bgReset").addEventListener("click", async () => {
          bgDraft = normalizeBackground(DEFAULT_BG);
          const monthData = ensureMonthData(activeMonthId);
          monthData.background = normalizeBackground(DEFAULT_BG);
          store.months[activeMonthId] = monthData;
          syncBgInputs(bgDraft);
          applyBackground(bgDraft);
          await flushSave();
          setStatus("Background reset for this month.");
        });
      }

      function initPresetUI(){
        refreshPresetSelect();

        $("presetSave").addEventListener("click", async () => {
          const name = ($("presetName").value || "").trim();
          if(!name){ setStatus("Type a preset name first."); return; }

          const payload = currentPresetPayload();
          payload.name = name;

          store.presets = [payload, ...normalizePresets(store.presets).filter(p => p.id !== payload.id)];
          $("presetName").value = "";
          refreshPresetSelect();
          $("presetSelect").value = payload.id;
          await flushSave();
          setStatus("Preset saved.");
        });

        $("presetApply").addEventListener("click", async () => {
          const id = $("presetSelect").value || "";
          if(!id){ setStatus("Choose a preset first."); return; }

          const preset = normalizePresets(store.presets).find(p => p.id === id);
          if(!preset){ setStatus("Preset not found."); return; }

          themeDraft = normalizeTheme(preset.theme);
          store.theme = normalizeTheme(preset.theme);
          applyTheme(themeDraft);
          themeSyncInputs(themeDraft);

          bgDraft = normalizeBackground(preset.bg);
          const monthData = ensureMonthData(activeMonthId);
          monthData.background = normalizeBackground(preset.bg);
          store.months[activeMonthId] = monthData;
          syncBgInputs(bgDraft);
          applyBackground(bgDraft);

          await flushSave();
          setStatus("Preset applied.");
        });

        $("presetDelete").addEventListener("click", async () => {
          const id = $("presetSelect").value || "";
          if(!id){ setStatus("Choose a preset first."); return; }

          const before = normalizePresets(store.presets);
          const after = before.filter(p => p.id !== id);

          if(after.length === before.length){ setStatus("Preset not found."); return; }

          store.presets = after;
          refreshPresetSelect();
          $("presetSelect").value = "";
          await flushSave();
          setStatus("Preset deleted.");
        });
      }

      function buildSettingsBundle(){
        snapshotMonthToStore();
        return {
          version: 1,
          theme: normalizeTheme(store.theme),
          data: {
            monthlyPlanner: {
              months: deepClone(store.months)
            }
          }
        };
      }

      function applySettingsBundle(obj){
        if(!obj || typeof obj !== "object") return false;

        if(obj.theme && typeof obj.theme === "object"){
          const incomingTheme = normalizeTheme(obj.theme);
          store.theme = incomingTheme;
          themeDraft = incomingTheme;
          applyTheme(incomingTheme);
          themeSyncInputs(incomingTheme);
        }

        const mp = obj?.data?.monthlyPlanner;
        if(mp && typeof mp === "object" && mp.months && typeof mp.months === "object"){
          const safeMonths = {};
          for (const [k, v] of Object.entries(mp.months)){
            safeMonths[k] = normalizeMonthData(v);
          }
          store.months = safeMonths;

          const months = Object.keys(store.months);
          if(months.length){
            if(!store.months[activeMonthId]) activeMonthId = months.sort().reverse()[0];
          }else{
            activeMonthId = monthIdFromDate(new Date());
          }

          buildMonth(activeMonthId);
        }

        return true;
      }

      function initPlannerInteractions(){
        $("prevMonth").addEventListener("click", async () => {
          await persistMonthNow();
          const [y, m] = activeMonthId.split("-").map(Number);
          const d = new Date(y, m-1, 15);
          buildMonth(monthIdFromDate(addMonths(d, -1)));
        });

        $("nextMonth").addEventListener("click", async () => {
          await persistMonthNow();
          const [y, m] = activeMonthId.split("-").map(Number);
          const d = new Date(y, m-1, 15);
          buildMonth(monthIdFromDate(addMonths(d, 1)));
        });

        calGrid.addEventListener("click", (e) => {
          const cell = e.target.closest(".daycell");
          if (!cell) return;

          const add = e.target.closest(".add-goal");
          if (add){
            const list = cell.querySelector(".goalsListInDay");
            const wrap = document.createElement("div");
            wrap.innerHTML = goalChipHTML({ text: "", color: "#cbb8ae" });
            const chip = wrap.firstElementChild;
            list.appendChild(chip);
            const ta = chip.querySelector(".goalText");
            if (ta){
              autoGrow(ta);
              requestAnimationFrame(() => ta.focus({ preventScroll: false }));
            }
            persistMonthSoon();
            return;
          }

          const rm = e.target.closest(".removeGoalBtn");
          if (rm){
            rm.closest(".goal-chip")?.remove();
            persistMonthSoon();
            return;
          }
        });

        calGrid.addEventListener("input", (e) => {
          if (e.target.classList.contains("dayNoteInput")){
            autoGrow(e.target);
            persistMonthSoon();
            return;
          }

          if (e.target.classList.contains("goalText")){
            autoGrow(e.target);
            persistMonthSoon();
            return;
          }

          if (e.target.classList.contains("goalColorPicker")){
            const chip = e.target.closest(".goal-chip");
            const color = e.target.value;
            if (chip) chip.style.background = chipBg(color);
            persistMonthSoon();
          }
        });

        calGrid.addEventListener("change", (e) => {
          if (e.target.classList.contains("goalColorPicker") || e.target.classList.contains("dayNoteInput") || e.target.classList.contains("goalText")){
            persistMonthSoon();
          }
        });

        calGrid.addEventListener("focusout", (e) => {
          if (e.target.classList && (e.target.classList.contains("dayNoteInput") || e.target.classList.contains("goalText"))){
            persistMonthSoon();
          }
        }, true);

        monthNotes.addEventListener("input", () => {
          autoGrow(monthNotes);
          persistMonthSoon();
        });

        monthNotes.addEventListener("change", persistMonthSoon);
        monthNotes.addEventListener("blur", persistMonthSoon);
      }

      if (bc){
        bc.onmessage = async (event) => {
          const msg = event.data;
          if (!msg || msg.type !== "state-updated" || msg.wid !== WID) return;

          const incoming = await storage.get();
          if (!incoming) return;

          if ((incoming.lastUpdated || 0) > (store.lastUpdated || 0)){
            store = normalizeStore(incoming);
            themeDraft = normalizeTheme(store.theme);
            applyTheme(themeDraft);
            themeSyncInputs(themeDraft);
            buildMonth(activeMonthId);
            refreshPresetSelect();
          }
        };
      }

      window.addEventListener("storage", async (e) => {
        if (e.key !== storage.key || !e.newValue) return;
        try{
          const incoming = normalizeStore(JSON.parse(e.newValue));
          if ((incoming.lastUpdated || 0) > (store.lastUpdated || 0)){
            store = incoming;
            themeDraft = normalizeTheme(store.theme);
            applyTheme(themeDraft);
            themeSyncInputs(themeDraft);
            buildMonth(activeMonthId);
            refreshPresetSelect();
          }
        }catch{}
      });

      async function emergencySave(){
        try{
          snapshotMonthToStore();
          await flushSave();
        }catch{}
      }

      window.addEventListener("beforeunload", emergencySave);
      window.addEventListener("pagehide", emergencySave);
      window.addEventListener("blur", emergencySave);

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden"){
          emergencySave();
        }
      });

      await storage.init();

      const loaded = await storage.get();
      store = normalizeStore(loaded);

      themeDraft = normalizeTheme(store.theme);

      initPanels();
      initThemeUI();
      initBackgroundUI();
      initPresetUI();
      initPlannerInteractions();

      applyTheme(themeDraft);
      themeSyncInputs(themeDraft);

      buildMonth(activeMonthId);
      refreshPresetSelect();

      $("exportSettings").addEventListener("click", () => {
        const bundle = buildSettingsBundle();
        downloadJSON("monthly-planner-settings.json", bundle);
        setStatus("Exported settings JSON.");
      });

      const importFile = $("importFile");
      $("importSettings").addEventListener("click", () => importFile.click());

      importFile.addEventListener("change", async () => {
        const f = importFile.files && importFile.files[0];
        if(!f) return;
        const text = await f.text();
        const obj = safeJSONParse(text);
        if(!obj || typeof obj !== "object"){
          alert("That file isn't valid JSON.");
          importFile.value = "";
          return;
        }
        const ok = applySettingsBundle(obj);
        if(!ok){
          alert("Settings JSON was missing required fields.");
          importFile.value = "";
          return;
        }
        await flushSave();
        importFile.value = "";
        setStatus("Imported settings JSON.");
      });
    })();
  </script>
</body>
</html>
