<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Quick Links</title>

<style>
  :root{
    --bg: transparent;
    --card: rgba(247,245,240,0.92);
    --stroke:#e2dfd8;
    --ink:#2f2f2f;
    --muted:#7a7a7a;
    --shadow: 0 10px 30px rgba(30,20,10,.06);
    --r:14px;

    --board-tint:#efe7e1;
    --board-tint-a:0.12;
    --board-image:none;
    --board-image-a:0.92;
    --board-image-blur:0px;

    --chip: rgba(255,255,255,0.62);
    --chip-hover: rgba(255,255,255,0.78);
    --focus: rgba(47,47,47,0.10);
  }

  *{ box-sizing:border-box; }
  html, body{
    overflow: visible;
    -webkit-text-size-adjust: 100%;
  }

  body{
    margin:0;
    padding:18px;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    background: var(--bg);
    color: var(--ink);
    touch-action: manipulation;
  }

  input, select, textarea, button{
    font: inherit;
  }

  .widgetShell{
    position: relative;
    width: 100%;
    max-width: 380px;
    overflow: visible;
  }

  .boardClip{
    position:relative;
    border-radius: var(--r);
    overflow:hidden;
    border:1px solid var(--stroke);
    box-shadow: var(--shadow);
  }

  .boardClip::before{
    content:"";
    position:absolute;
    inset:0;
    background-image: var(--board-image);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index:0;
    pointer-events:none;
    filter: blur(var(--board-image-blur));
    opacity: var(--board-image-a);
  }

  .boardTint{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:1;
    background: rgba(0,0,0,0);
  }

  .boardContent{
    position:relative;
    z-index:2;
  }

  .card{
    background: var(--card);
    border:0;
    border-radius:0;
    padding: 20px;
    color: var(--ink);
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
  }

  .topRow{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:10px;
    margin-bottom: 10px;
  }

  .rightControls{
    display:flex;
    gap:10px;
    align-items:flex-start;
    flex-shrink: 0;
  }

  .label{
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin: 0;
    line-height: 1.2;
  }

  .subtle{
    font-size: 12px;
    color: rgba(47,47,47,0.70);
    margin: 6px 0 0;
    line-height: 1.3;
  }

  .settingsWrap{ position:relative; }

  .settingsBtn{
    width:34px;
    height:34px;
    border-radius:999px;
    border:1px solid var(--stroke);
    background: rgba(255,255,255,0.92);
    padding:0;
    display:grid;
    place-items:center;
    box-shadow: 0 3px 12px rgba(30,20,10,.08);
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .settingsBtn:active{ transform: translateY(1px); }
  .settingsBtn:focus{
    outline:none;
    box-shadow: 0 0 0 4px var(--focus), 0 3px 12px rgba(30,20,10,.08);
  }

  .bgDot,
  .themeDot{
    width:14px;
    height:14px;
    border-radius:999px;
    border:1px solid rgba(233,228,221,0.95);
  }

  .bgDot{
    background: var(--board-tint);
    box-shadow: 0 0 0 6px rgba(239,231,225,0.22);
  }

  .themeDot{
    background: var(--ink);
    box-shadow: 0 0 0 6px rgba(243,239,233,0.22);
  }

  .manageDot{
    width:14px;
    height:14px;
    border-radius:6px;
    border:1px solid rgba(233,228,221,0.95);
    background: rgba(47,47,47,0.14);
    box-shadow: 0 0 0 6px rgba(243,239,233,0.22);
  }

  .panel{
    position:absolute;
    width:320px;
    border-radius:16px;
    border:1px solid var(--stroke);
    background: rgba(255,255,255,0.94);
    box-shadow: 0 18px 40px rgba(30,20,10,.12);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding:12px;
    display:none;
    z-index:9999;
    max-height:min(74vh, 620px);
    overflow:auto;
    overscroll-behavior: contain;
  }

  .panel.open{ display:block; }

  .panelTitle{
    margin:0 0 10px 0;
    font-size:12px;
    font-weight:700;
    letter-spacing:.12em;
    text-transform:uppercase;
    color: rgba(43,42,40,0.72);
  }

  .pRow{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding: 7px 0;
  }

  .pRow label{
    font-size:12px;
    color: rgba(106,102,95,1);
  }

  .pRow input[type="color"]{
    width:36px;
    height:28px;
    border-radius:10px;
    padding:0;
    border:1px solid var(--stroke);
    background: transparent;
    cursor:pointer;
  }

  .pRow input[type="range"]{
    width:160px;
  }

  .pFile{
    width:100%;
    font-size:12px;
    color: rgba(43,42,40,0.75);
  }

  .miniBtn{
    width:100%;
    border-radius:12px;
    border:1px solid var(--stroke);
    background: rgba(255,255,255,0.90);
    padding:9px 10px;
    font-weight:700;
    letter-spacing:.06em;
    text-transform:uppercase;
    font-size:11px;
    color: rgba(43,42,40,0.82);
    box-shadow: 0 2px 8px rgba(30,20,10,.06);
    cursor:pointer;
    touch-action: manipulation;
  }

  .miniBtn:active{ transform: translateY(1px); }

  .miniBtn.danger{
    border-color: rgba(205,88,88,0.35);
    color: rgba(140,42,42,0.88);
  }

  .pDiv{
    height:1px;
    background: var(--stroke);
    margin: 8px 0;
  }

  .status{
    font-size:12px;
    color: rgba(106,102,95,1);
    margin-top:6px;
    min-height:16px;
    line-height: 1.35;
  }

  .textInput,
  .selectInput,
  .presetName,
  .presetSelect{
    width:100%;
    border:1px solid var(--stroke);
    background: rgba(255,255,255,0.96);
    border-radius:12px;
    padding:10px 12px;
    font-size:12px;
    color: var(--ink);
    outline:none;
    min-height: 40px;
  }

  .selectInput,
  .presetSelect{
    height:40px;
    padding: 8px 12px;
  }

  .groups{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:8px;
  }

  .groupHead{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:10px;
    margin-bottom:6px;
  }

  .groupTitle{
    font-size:13px;
    font-weight:650;
    color: rgba(47,47,47,0.90);
    margin:0;
  }

  .groupCount{
    font-size:11px;
    color: rgba(122,122,122,0.92);
    margin:0;
    letter-spacing:.06em;
    text-transform: uppercase;
  }

  .linkGrid{
    display:grid;
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .linkItem{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 10px;
    border-radius:12px;
    border: 1px solid rgba(226,223,216,0.85);
    background: var(--chip);
    text-decoration:none;
    color: var(--ink);
    transition: transform .08s ease, background .12s ease;
  }

  .linkItem:hover{ background: var(--chip-hover); }
  .linkItem:active{ transform: translateY(1px); }
  .linkItem:focus{ outline:none; box-shadow: 0 0 0 4px var(--focus); }

  .iconWrap{
    width:26px;
    height:26px;
    border-radius:9px;
    border:1px solid rgba(226,223,216,0.95);
    background: rgba(255,255,255,0.80);
    display:grid;
    place-items:center;
    flex:0 0 auto;
    overflow:hidden;
  }

  .iconEmoji{
    font-size:15px;
    line-height:1;
    transform: translateY(0.5px);
  }

  .iconImg{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .linkText{
    display:flex;
    flex-direction:column;
    gap:2px;
    min-width:0;
  }

  .linkTitle{
    font-size:13px;
    font-weight:600;
    margin:0;
    line-height:1.15;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    color: rgba(47,47,47,0.92);
  }

  .linkUrl{
    font-size:11px;
    margin:0;
    color: rgba(122,122,122,0.92);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .emptyState{
    margin-top:10px;
    border: 1px dashed rgba(226,223,216,0.95);
    border-radius:12px;
    padding:12px;
    color: rgba(106,102,95,0.90);
    font-size:12px;
    line-height:1.4;
    background: rgba(255,255,255,0.55);
  }

  .twoCol{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
  }

  .manageBlock{
    border:1px solid var(--stroke);
    background: rgba(255,255,255,0.92);
    border-radius:12px;
    overflow:hidden;
    margin-top:8px;
  }

  .manageGroupHead{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:10px 10px;
    border-bottom:1px solid rgba(226,223,216,0.70);
    background: rgba(247,245,240,0.70);
  }

  .manageGroupName{
    font-size:12px;
    font-weight:800;
    letter-spacing:.10em;
    text-transform: uppercase;
    color: rgba(106,102,95,0.92);
    margin:0;
  }

  .rowBtns{
    display:flex;
    gap:8px;
    align-items:center;
    flex:0 0 auto;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .tinyBtn{
    border-radius:10px;
    border:1px solid rgba(226,223,216,0.95);
    background: rgba(255,255,255,0.92);
    padding:7px 8px;
    font-size:11px;
    font-weight:700;
    letter-spacing:.06em;
    text-transform: uppercase;
    cursor:pointer;
    color: rgba(43,42,40,0.78);
    box-shadow: 0 2px 8px rgba(30,20,10,.05);
    touch-action: manipulation;
  }

  .tinyBtn:active{ transform: translateY(1px); }

  .tinyBtn.danger{
    border-color: rgba(205,88,88,0.35);
    color: rgba(140,42,42,0.86);
  }

  .manageLinks{
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .manageLinkRow{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    border:1px solid rgba(226,223,216,0.75);
    background: rgba(255,255,255,0.85);
    border-radius:12px;
    padding:8px 8px;
  }

  .manageLinkMeta{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
  }

  .manageLinkTxt{
    min-width:0;
  }

  .manageLinkTxt .t1{
    font-size:12px;
    font-weight:650;
    color: rgba(47,47,47,0.90);
    margin:0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:160px;
  }

  .manageLinkTxt .t2{
    font-size:11px;
    color: rgba(122,122,122,0.92);
    margin:2px 0 0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:160px;
  }

  .inlineModal{
    border:1px solid var(--stroke);
    background: rgba(255,255,255,0.92);
    border-radius:12px;
    padding:10px;
  }

  .saveBadge{
    font-size:11px;
    color: rgba(106,102,95,0.9);
    margin-top: 6px;
  }

  @media (max-width: 640px){
    body{
      padding:12px;
    }

    .widgetShell{
      max-width:100%;
    }

    .panel{
      position:fixed;
      left:12px !important;
      right:12px !important;
      top: max(12px, env(safe-area-inset-top)) !important;
      width:auto;
      max-height: calc(100vh - 24px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      border-radius:18px;
    }

    .twoCol{
      grid-template-columns: 1fr;
    }

    .manageLinkRow,
    .manageGroupHead{
      align-items:flex-start;
      flex-direction:column;
    }

    .rowBtns{
      width:100%;
      justify-content:flex-start;
    }

    .manageLinkTxt .t1,
    .manageLinkTxt .t2{
      max-width: none;
    }
  }
</style>
</head>

<body>
  <div class="widgetShell" id="widgetShell" aria-label="Quick Links shell">

    <div class="panel" id="bgPanel" role="dialog" aria-label="Background settings">
      <div class="panelTitle">Background</div>

      <div class="pRow">
        <label for="bgColor">Tint</label>
        <input id="bgColor" type="color" value="#efe7e1" />
      </div>

      <div class="pRow">
        <label for="bgStrength">Tint strength</label>
        <input id="bgStrength" type="range" min="0" max="85" value="12" />
      </div>

      <div class="pRow">
        <label for="bgImageA">Image visibility</label>
        <input id="bgImageA" type="range" min="0" max="100" value="92" />
      </div>

      <div class="pRow">
        <label for="bgBlur">Blur</label>
        <input id="bgBlur" type="range" min="0" max="24" value="0" />
      </div>

      <div class="pDiv"></div>

      <div class="pRow" style="align-items:flex-start;">
        <label for="bgImage">Image</label>
        <input id="bgImage" class="pFile" type="file" accept="image/*" />
      </div>

      <div class="pRow">
        <button id="bgRemove" class="miniBtn" type="button">Remove image</button>
      </div>

      <div class="pDiv"></div>

      <button class="miniBtn" id="bgApply" type="button">Apply background</button>
      <button class="miniBtn" id="bgReset" type="button" style="margin-top:8px;">Reset background</button>

      <div class="status" id="uiStatus" aria-live="polite"></div>
    </div>

    <div class="panel" id="themePanel" role="dialog" aria-label="Theme settings">
      <div class="panelTitle">Theme</div>

      <div class="pRow">
        <label for="tBg">Page bg</label>
        <input id="tBg" type="color" value="#ffffff" />
      </div>

      <div class="pRow">
        <label for="tInk">Text</label>
        <input id="tInk" type="color" value="#2f2f2f" />
      </div>

      <div class="pRow">
        <label for="tMuted">Muted</label>
        <input id="tMuted" type="color" value="#7a7a7a" />
      </div>

      <div class="pRow">
        <label for="tStroke">Borders</label>
        <input id="tStroke" type="color" value="#e2dfd8" />
      </div>

      <div class="pRow">
        <label for="tCardA">Card opacity</label>
        <input id="tCardA" type="range" min="35" max="100" value="92" />
      </div>

      <div class="pRow">
        <label for="tChipA">Link opacity</label>
        <input id="tChipA" type="range" min="35" max="100" value="62" />
      </div>

      <div class="pDiv"></div>

      <button id="tApply" class="miniBtn" type="button">Apply theme</button>
      <button id="tReset" class="miniBtn" type="button" style="margin-top:8px;">Reset theme</button>

      <div class="pDiv"></div>

      <div class="panelTitle" style="margin:0 0 10px 0;">Presets</div>

      <input class="presetName" id="presetName" placeholder="Preset name" />
      <button class="miniBtn" id="presetSave" type="button" style="margin-top:8px;">Save current as preset</button>

      <div class="pDiv"></div>

      <select class="presetSelect" id="presetSelect"></select>
      <button class="miniBtn" id="presetApply" type="button" style="margin-top:8px;">Apply preset</button>
      <button class="miniBtn" id="presetDelete" type="button" style="margin-top:8px;">Delete preset</button>

      <div class="status" id="presetStatus" aria-live="polite"></div>
    </div>

    <div class="panel" id="managePanel" role="dialog" aria-label="Manage quick links">
      <div class="panelTitle">Quick Links</div>

      <div class="panelTitle" style="margin:0 0 10px 0;">Groups</div>

      <div class="pRow" style="align-items:flex-start;">
        <div style="flex:1;">
          <label for="newGroupName" style="display:block; font-size:12px; color: rgba(106,102,95,1); margin-bottom:6px;">New group</label>
          <input id="newGroupName" class="textInput" placeholder="e.g. Work" />
        </div>
      </div>

      <button id="addGroupBtn" class="miniBtn" type="button">Add group</button>

      <div class="pDiv"></div>

      <div class="panelTitle" style="margin:0 0 10px 0;">Add / edit link</div>

      <div class="pRow" style="align-items:flex-start;">
        <div style="flex:1;">
          <label for="linkGroup" style="display:block; font-size:12px; color: rgba(106,102,95,1); margin-bottom:6px;">Group</label>
          <select id="linkGroup" class="selectInput"></select>
        </div>
      </div>

      <div class="twoCol">
        <div>
          <label for="linkTitle" style="display:block; font-size:12px; color: rgba(106,102,95,1); margin-bottom:6px;">Title</label>
          <input id="linkTitle" class="textInput" placeholder="e.g. Gmail" />
        </div>
        <div>
          <label for="linkEmoji" style="display:block; font-size:12px; color: rgba(106,102,95,1); margin-bottom:6px;">Icon (emoji)</label>
          <input id="linkEmoji" class="textInput" placeholder="" maxlength="6" />
        </div>
      </div>

      <div style="margin-top:10px;">
        <label for="linkUrl" style="display:block; font-size:12px; color: rgba(106,102,95,1); margin-bottom:6px;">URL</label>
        <input id="linkUrl" class="textInput" placeholder="https://example.com" />
      </div>

      <div style="margin-top:10px;">
        <label for="linkIconFile" style="display:block; font-size:12px; color: rgba(106,102,95,1); margin-bottom:6px;">Icon (image)</label>
        <input id="linkIconFile" class="pFile" type="file" accept="image/*" />
      </div>

      <button id="saveLinkBtn" class="miniBtn" type="button" style="margin-top:10px;">Save link</button>
      <button id="clearLinkFormBtn" class="miniBtn" type="button" style="margin-top:8px;">Clear form</button>

      <div class="pDiv"></div>

      <div id="inlineModal" class="inlineModal" style="display:none;">
        <div class="panelTitle" id="inlineModalTitle" style="margin:0 0 10px 0;">Edit</div>
        <input id="inlineModalInput" class="textInput" placeholder="Type here…" />
        <div class="twoCol" style="margin-top:10px;">
          <button id="inlineModalOk" class="miniBtn" type="button">OK</button>
          <button id="inlineModalCancel" class="miniBtn danger" type="button">Cancel</button>
        </div>
        <div class="status" id="inlineModalHint" aria-live="polite"></div>
      </div>

      <div class="pDiv"></div>

      <div class="panelTitle" style="margin:0 0 10px 0;">Your setup</div>
      <div id="manageList"></div>

      <div class="pDiv"></div>

      <button id="resetLinksBtn" class="miniBtn danger" type="button" style="margin-top:8px;">Reset links</button>

      <div class="status" id="manageStatus" aria-live="polite"></div>
    </div>

    <div class="boardClip" id="boardClip" aria-label="Quick Links board">
      <div class="boardTint" id="boardTint"></div>
      <div class="boardContent">
        <div class="card">
          <div class="topRow">
            <div>
              <p class="label">Quick Links</p>
              <p class="subtle" id="subtitle">Your shortcuts, neatly grouped.</p>
            </div>

            <div class="rightControls">
              <div class="settingsWrap">
                <button class="settingsBtn" id="manageBtn" type="button" aria-label="Manage links" title="Manage links">
                  <span class="manageDot" aria-hidden="true"></span>
                </button>
              </div>
              <div class="settingsWrap">
                <button class="settingsBtn" id="bgBtn" type="button" aria-label="Background settings" title="Background settings">
                  <span class="bgDot" id="bgDot" aria-hidden="true"></span>
                </button>
              </div>
              <div class="settingsWrap">
                <button class="settingsBtn" id="themeBtn" type="button" aria-label="Theme settings" title="Theme settings">
                  <span class="themeDot" id="themeDot" aria-hidden="true"></span>
                </button>
              </div>
            </div>
          </div>

          <div id="groups" class="groups" aria-label="Groups list"></div>

          <div id="emptyState" class="emptyState" style="display:none;">
            No links yet. Click the <b>first</b> button in the top-right to add groups and links.
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
(function(){
  function clamp(n, min, max){
    n = Number(n);
    if(!Number.isFinite(n)) return min;
    return Math.max(min, Math.min(max, n));
  }

  function normHex(hex, fallback){
    const s = String(hex || "").trim();
    return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : fallback;
  }

  function hexToRgba(hex, a){
    const h = String(hex || "").replace("#","").trim();
    const full = h.length === 3 ? h.split("").map(c => c + c).join("") : h;
    const num = parseInt(full || "efe7e1", 16);
    const r = (num >> 16) & 255;
    const g = (num >> 8) & 255;
    const b = num & 255;
    return "rgba(" + r + "," + g + "," + b + "," + a + ")";
  }

  function uid(){
    return Math.random().toString(16).slice(2) + Date.now().toString(16);
  }

  function safeUrl(u){
    const s = String(u || "").trim();
    if(!s) return "";
    if(/^https?:\/\//i.test(s)) return s;
    if(/^mailto:/i.test(s)) return s;
    if(/^[a-z0-9.-]+\.[a-z]{2,}([\/?#].*)?$/i.test(s)) return "https://" + s;
    return s;
  }

  function hostFromUrl(u){
    try{
      const url = new URL(u);
      return url.host.replace(/^www\./, "");
    }catch{
      return String(u || "")
        .replace(/^https?:\/\//i, "")
        .replace(/^www\./, "")
        .split("/")[0] || "";
    }
  }

  async function fileToDataUrl(file, opts){
    const maxSide = (opts && opts.maxSide) || 1600;
    const quality = (opts && opts.quality) || 0.9;

    if(!file) return null;

    const rawDataUrl = await new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(String(r.result));
      r.onerror = reject;
      r.readAsDataURL(file);
    });

    if(!/^image\//i.test(file.type || "")) return rawDataUrl;

    try{
      const img = await new Promise((resolve, reject) => {
        const el = new Image();
        el.onload = () => resolve(el);
        el.onerror = reject;
        el.src = rawDataUrl;
      });

      const w = img.naturalWidth || img.width;
      const h = img.naturalHeight || img.height;
      if(!w || !h) return rawDataUrl;

      const scale = Math.min(1, maxSide / Math.max(w, h));
      const tw = Math.max(1, Math.round(w * scale));
      const th = Math.max(1, Math.round(h * scale));

      const canvas = document.createElement("canvas");
      canvas.width = tw;
      canvas.height = th;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, tw, th);

      const type = /png/i.test(file.type) ? "image/png" : "image/jpeg";
      return canvas.toDataURL(type, quality);
    }catch{
      return rawDataUrl;
    }
  }

  window.__qlUtils = {
    clamp,
    normHex,
    hexToRgba,
    uid,
    safeUrl,
    hostFromUrl,
    fileToDataUrl
  };
})();

(function(){
  const DB_NAME = "quick_links_widget_db_v4";
  const STORE_NAME = "app";
  const STATE_KEY = "quick_links_state_v4";
  const LS_MIRROR_KEY = STATE_KEY + "_mirror";

  function canUseLocalStorage(){
    try{
      const k = "__ql_test_" + Math.random().toString(16).slice(2);
      localStorage.setItem(k, "1");
      localStorage.removeItem(k);
      return true;
    }catch{
      return false;
    }
  }

  function openDb(){
    return new Promise((resolve, reject) => {
      if(!("indexedDB" in window)){
        reject(new Error("IndexedDB unavailable"));
        return;
      }
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = function(){
        const db = req.result;
        if(!db.objectStoreNames.contains(STORE_NAME)){
          db.createObjectStore(STORE_NAME);
        }
      };
      req.onsuccess = function(){ resolve(req.result); };
      req.onerror = function(){ reject(req.error || new Error("IndexedDB open failed")); };
    });
  }

  async function idbGet(key){
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readonly");
      const store = tx.objectStore(STORE_NAME);
      const req = store.get(key);
      req.onsuccess = function(){ resolve(req.result ?? null); };
      req.onerror = function(){ reject(req.error || new Error("IndexedDB read failed")); };
    });
  }

  async function idbSet(key, value){
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, "readwrite");
      const store = tx.objectStore(STORE_NAME);
      const req = store.put(value, key);
      req.onsuccess = function(){ resolve(true); };
      req.onerror = function(){ reject(req.error || new Error("IndexedDB write failed")); };
    });
  }

  const hasLS = canUseLocalStorage();
  const channel = ("BroadcastChannel" in window) ? new BroadcastChannel("quick_links_widget_sync_v4") : null;
  const subscribers = [];

  function emit(state, source){
    subscribers.forEach(fn => {
      try{ fn(state, source); }catch{}
    });
  }

  const Store = {
    async load(){
      let fromIdb = null;
      try{
        fromIdb = await idbGet(STATE_KEY);
      }catch{}

      if(fromIdb && typeof fromIdb === "object") return fromIdb;

      if(hasLS){
        try{
          const raw = localStorage.getItem(LS_MIRROR_KEY);
          if(raw) return JSON.parse(raw);
        }catch{}
      }
      return null;
    },

    async save(state, source){
      const payload = JSON.parse(JSON.stringify(state));
      try{ await idbSet(STATE_KEY, payload); }catch{}
      if(hasLS){
        try{ localStorage.setItem(LS_MIRROR_KEY, JSON.stringify(payload)); }catch{}
      }
      if(channel){
        try{ channel.postMessage({ type:"state", source: source || "self", state: payload }); }catch{}
      }
      emit(payload, source || "self");
      return true;
    },

    subscribe(fn){
      if(typeof fn === "function") subscribers.push(fn);
    }
  };

  if(channel){
    channel.onmessage = function(ev){
      const data = ev && ev.data;
      if(!data || data.type !== "state" || !data.state) return;
      emit(data.state, data.source || "broadcast");
    };
  }

  if(hasLS){
    window.addEventListener("storage", function(e){
      if(e.key !== LS_MIRROR_KEY || !e.newValue) return;
      try{
        const parsed = JSON.parse(e.newValue);
        emit(parsed, "storage");
      }catch{}
    });
  }

  window.__QL_STORE__ = Store;
})();

      ink: tInk.value,
      muted: tMuted.value,
      stroke: tStroke.value,
      cardA: Number(tCardA.value),
      chipA: Number(tChipA.value)
    };
  }

  function readBackgroundDraftFromInputs(){
    backgroundDraft.tint = bgColor.value;
    backgroundDraft.strength = Number(bgStrength.value);
    backgroundDraft.imageA = Number(bgImageA.value);
    backgroundDraft.blur = Number(bgBlur.value);
  }

  function bindPanelDrafts(){
    [tBg, tInk, tMuted, tStroke, tCardA, tChipA].forEach(el => {
      el.addEventListener("input", function(){
        readThemeDraftFromInputs();
        applyTheme(themeDraft);
        setStatus("presetStatus", "");
      });
    });

    [bgColor, bgStrength, bgImageA, bgBlur].forEach(el => {
      el.addEventListener("input", function(){
        readBackgroundDraftFromInputs();
        applyBackground(backgroundDraft);
        setStatus("uiStatus", "");
      });
    });

    bgImage.addEventListener("change", async function(){
      const file = bgImage.files && bgImage.files[0];
      if(!file) return;
      try{
        backgroundDraft.imageDataUrl = await fileToDataUrl(file, { maxSide: 1600, quality: 0.9 });
        applyBackground(backgroundDraft);
        setStatus("uiStatus", "Image loaded. Click Apply background to save permanently.");
      }catch{
        setStatus("uiStatus", "Could not read that image.");
      }
    });

    bgRemove.addEventListener("click", function(){
      backgroundDraft.imageDataUrl = null;
      bgImage.value = "";
      applyBackground(backgroundDraft);
      setStatus("uiStatus", "Image removed. Click Apply background to save permanently.");
    });

    bgApply.addEventListener("click", async function(){
      readBackgroundDraftFromInputs();
      state.background = deepClone(backgroundDraft);
      await saveState("apply-background");
      setStatus("uiStatus", "Background applied.");
    });

    bgReset.addEventListener("click", async function(){
      backgroundDraft = deepClone(DEFAULTS.background);
      state.background = deepClone(DEFAULTS.background);
      renderBackgroundDraftToInputs();
      applyBackground(backgroundDraft);
      await saveState("reset-background");
      setStatus("uiStatus", "Background reset.");
    });

    tApply.addEventListener("click", async function(){
      readThemeDraftFromInputs();
      state.theme = deepClone(themeDraft);
      await saveState("apply-theme");
      setStatus("presetStatus", "Theme applied.");
    });

    tReset.addEventListener("click", async function(){
      themeDraft = deepClone(DEFAULTS.theme);
      state.theme = deepClone(DEFAULTS.theme);
      renderThemeDraftToInputs();
      applyTheme(themeDraft);
      await saveState("reset-theme");
      setStatus("presetStatus", "Theme reset.");
    });

    presetSave.addEventListener("click", async function(){
      const name = String(presetName.value || "").trim();
      if(!name){
        setStatus("presetStatus", "Type a preset name first.");
        return;
      }

      readThemeDraftFromInputs();
      readBackgroundDraftFromInputs();

      const entry = {
        id: uid(),
        name: name,
        theme: deepClone(themeDraft),
        background: deepClone(backgroundDraft)
      };

      state.presets.unshift(entry);
      await saveState("save-preset");
      refreshPresetSelect();
      presetSelect.value = entry.id;
      presetName.value = "";
      setStatus("presetStatus", "Preset saved.");
    });

    presetApply.addEventListener("click", async function(){
      const id = presetSelect.value || "";
      if(!id){
        setStatus("presetStatus", "Choose a preset first.");
        return;
      }

      const p = state.presets.find(x => x.id === id);
      if(!p){
        setStatus("presetStatus", "Preset not found.");
        return;
      }

      state.theme = deepClone(p.theme);
      state.background = deepClone(p.background);
      themeDraft = deepClone(p.theme);
      backgroundDraft = deepClone(p.background);

      syncUI();
      await saveState("apply-preset");
      setStatus("presetStatus", "Preset applied.");
      setStatus("uiStatus", "Background applied from preset.");
    });

    presetDelete.addEventListener("click", async function(){
      const id = presetSelect.value || "";
      if(!id){
        setStatus("presetStatus", "Choose a preset first.");
        return;
      }
      const before = state.presets.length;
      state.presets = state.presets.filter(x => x.id !== id);
      if(state.presets.length === before){
        setStatus("presetStatus", "Preset not found.");
        return;
      }
      await saveState("delete-preset");
      refreshPresetSelect();
      presetSelect.value = "";
      setStatus("presetStatus", "Preset deleted.");
    });

    addGroupBtn.addEventListener("click", async function(){
      const name = String(newGroupName.value || "").trim();
      if(!name){
        setStatus("manageStatus", "Type a group name first.");
        return;
      }
      state.data.groups.unshift({ id: uid(), name: name, links: [] });
      newGroupName.value = "";
      await saveState("add-group");
      syncUI();
      setStatus("manageStatus", "Group added.");
    });

    clearLinkFormBtn.addEventListener("click", function(){
      clearForm();
    });

    saveLinkBtn.addEventListener("click", async function(){
      if(state.data.groups.length === 0){
        setStatus("manageStatus", "Create a group first.");
        return;
      }

      const groupId = linkGroup.value || "";
      const g = state.data.groups.find(x => x.id === groupId);
      if(!g){
        setStatus("manageStatus", "Select a valid group.");
        return;
      }

      const title = String(linkTitle.value || "").trim();
      const emoji = String(linkEmoji.value || "").trim();
      const url = safeUrl(linkUrl.value || "");

      if(!url){
        setStatus("manageStatus", "Please enter a URL.");
        return;
      }

      let iconImageDataUrl = null;
      const file = linkIconFile.files && linkIconFile.files[0];
      if(file){
        try{
          iconImageDataUrl = await fileToDataUrl(file, { maxSide: 512, quality: 0.9 });
        }catch{}
      }

      if(editing.linkId){
        let movedTarget = null;

        state.data.groups.forEach(group => {
          const idx = (group.links || []).findIndex(x => x.id === editing.linkId);
          if(idx !== -1){
            movedTarget = group.links[idx];
            group.links.splice(idx, 1);
          }
        });

        if(!movedTarget){
          setStatus("manageStatus", "Could not find link to update.");
          editing.linkId = null;
          return;
        }

        movedTarget.title = title;
        movedTarget.emoji = emoji;
        movedTarget.url = url;
        if(iconImageDataUrl){
          movedTarget.iconImageDataUrl = iconImageDataUrl;
        }
        g.links.unshift(movedTarget);

        await saveState("update-link");
        syncUI();
        clearForm();
        setStatus("manageStatus", "Link updated.");
        return;
      }

      g.links.unshift({
        id: uid(),
        title: title,
        emoji: emoji,
        url: url,
        iconImageDataUrl: iconImageDataUrl || null
      });

      await saveState("add-link");
      syncUI();
      clearForm();
      setStatus("manageStatus", "Link saved.");
    });

    resetLinksBtn.addEventListener("click", async function(){
      const typed = await askInline({
        title: "Type RESET to clear all groups and links",
        placeholder: "RESET",
        okText: "Reset",
        hint: "This cannot be undone."
      });
      if(String(typed).trim().toUpperCase() !== "RESET") return;

      state.data = deepClone(DEFAULTS.data);
      clearForm();
      await saveState("reset-links");
      syncUI();
      setStatus("manageStatus", "Links reset.");
    });
  }

  function setupPanels(){
    const shell = $("widgetShell");
    const bgBtn = $("bgBtn");
    const themeBtn = $("themeBtn");
    const manageBtn = $("manageBtn");

    [bgPanel, themePanel, managePanel].forEach(p => {
      p.addEventListener("click", e => e.stopPropagation());
      p.addEventListener("pointerdown", e => e.stopPropagation());
    });

    function closeAll(except){
      [bgPanel, themePanel, managePanel].forEach(p => {
        if(p !== except) p.classList.remove("open");
      });
      document.body.style.paddingBottom = "";
    }

    function placePanel(btn, panel){
      if(window.innerWidth <= 640) return;

      const shellRect = shell.getBoundingClientRect();
      const r = btn.getBoundingClientRect();
      const pad = 10;

      let top = (r.bottom - shellRect.top) + pad;
      let left = (r.right - shellRect.left) - panel.offsetWidth;

      left = Math.max(pad, Math.min(shell.clientWidth - panel.offsetWidth - pad, left));
      panel.style.left = left + "px";
      panel.style.top = top + "px";

      requestAnimationFrame(() => {
        const panelRect = panel.getBoundingClientRect();
        const need = Math.ceil(panelRect.bottom + 24);
        document.body.style.paddingBottom = Math.max(24, need - window.innerHeight + 24) + "px";
      });
    }

    function openPanel(btn, panel){
      const isOpen = panel.classList.contains("open");
      closeAll(null);
      if(isOpen) return;
      panel.classList.add("open");
      requestAnimationFrame(() => placePanel(btn, panel));
    }

    bgBtn.addEventListener("click", function(e){
      e.stopPropagation();
      openPanel(bgBtn, bgPanel);
    });

    themeBtn.addEventListener("click", function(e){
      e.stopPropagation();
      openPanel(themeBtn, themePanel);
    });

    manageBtn.addEventListener("click", function(e){
      e.stopPropagation();
      openPanel(manageBtn, managePanel);
    });

    window.addEventListener("resize", function(){
      if(bgPanel.classList.contains("open")) placePanel(bgBtn, bgPanel);
      if(themePanel.classList.contains("open")) placePanel(themeBtn, themePanel);
      if(managePanel.classList.contains("open")) placePanel(manageBtn, managePanel);
    });

    document.addEventListener("click", function(e){
      const inside =
        e.target.closest("#bgPanel") || e.target.closest("#bgBtn") ||
        e.target.closest("#themePanel") || e.target.closest("#themeBtn") ||
        e.target.closest("#managePanel") || e.target.closest("#manageBtn");

      if(!inside) closeAll(null);
    });
  }

  async function init(){
    const loaded = await Store.load();
    state = sanitizeState(loaded || DEFAULTS);
    themeDraft = deepClone(state.theme);
    backgroundDraft = deepClone(state.background);

    syncUI();
    bindPanelDrafts();
    setupPanels();

    Store.subscribe(function(nextState, source){
      if(!nextState || applyingRemoteState) return;

      const sanitized = sanitizeState(nextState);
      if((sanitized.updatedAt || 0) <= (state.updatedAt || 0)) return;

      applyingRemoteState = true;
      state = sanitized;
      themeDraft = deepClone(state.theme);
      backgroundDraft = deepClone(state.background);
      syncUI();
      applyingRemoteState = false;

      if(source === "storage" || source === "broadcast"){
        setStatus("manageStatus", "Synced from another tab/window.");
      }
    });

    document.addEventListener("visibilitychange", async function(){
      if(document.visibilityState !== "visible") return;
      const fresh = await Store.load();
      if(!fresh) return;
      const incoming = sanitizeState(fresh);
      if((incoming.updatedAt || 0) > (state.updatedAt || 0)){
        state = incoming;
        themeDraft = deepClone(state.theme);
        backgroundDraft = deepClone(state.background);
        syncUI();
      }
    });
  }

  init();
})();
</script>
