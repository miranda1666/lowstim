<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Notion Habit Builder / Tracker</title>

  <!-- Optional Firebase for real cross-device sync.
       Leave as-is if you only want same-device saving. -->
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>

  <style>
    :root{
      --app-bg: #ffffff;

      --ink: #2b2b2b;
      --muted: #7a7a7a;

      --border-rgb: 30,30,30;
      --border-a: 0.18;
      --border: rgba(var(--border-rgb), var(--border-a));
      --shadow: 0 14px 34px rgba(20, 20, 20, 0.09);

      --surface-a: 0.78;
      --panel-a: 0.94;

      --btn-a: 0.94;
      --btn-border-a: 0.16;
      --btn-ink: rgba(43,43,43,0.78);

      --accent: #cbb8ae;

      --overlay-base: #ffffff;
      --overlay-a: 0.34;

      --board-tint: #efe7e1;
      --board-tint-a: 0.30;
      --board-image: none;
      --board-blur: 0px;

      --day-bg: #ffffff;
      --day-bg-a: 0.95;

      --block-bg: #ffffff;
      --block-bg-a: 0.78;

      --input-bg: #ffffff;
      --input-bg-a: 0.97;

      --board-radius: 26px;
      --radius: 20px;

      --page-max: 1320px;
      --gap: 16px;
      --pad: 18px;

      --h1: 20px;
      --sub: 14px;

      --label: 12px;
      --text: 15px;

      --input-pad: 12px 12px;
      --input-radius: 14px;

      --row-radius: 16px;
      --header-pad: 14px 16px;
      --chip-pad: 8px 12px;

      --box: 28px;
      --box-gap: 10px;
      --box-radius: 10px;
    }

    *{ box-sizing:border-box; }

    html, body{
      width: 100%;
      max-width: 100%;
      overflow-x: hidden !important;
      -webkit-text-size-adjust: 100%;
    }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color: var(--ink);
      background: var(--app-bg);
      touch-action: manipulation;
    }

    button, input, textarea, select{
      font: inherit;
    }

    .wrap{
      max-width: var(--page-max);
      margin: 26px auto;
      padding: 18px;
    }

    .titlebar{
      display:flex;
      gap:14px;
      align-items:center;
      justify-content:space-between;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .title{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:260px;
    }

    h1{
      margin:0;
      font-size: var(--h1);
      font-weight: 750;
      letter-spacing:0.2px;
    }

    .sync-badge{
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .controls{
      display:flex;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .icon-pill{
      display:inline-flex;
      align-items:center;
      gap:10px;
      background: rgba(255,255,255, var(--surface-a));
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: var(--chip-pad);
      box-shadow: 0 8px 22px rgba(20,20,20,0.06);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .bg-btn, .theme-btn{
      width:40px;
      height:40px;
      border-radius:999px;
      border:1px solid rgba(var(--border-rgb), var(--btn-border-a));
      background: rgba(255,255,255, var(--btn-a));
      cursor:pointer;
      display:grid;
      place-items:center;
      -webkit-tap-highlight-color: transparent;
      color: var(--btn-ink);
      font-weight:900;
      line-height:1;
      appearance: none;
    }
    .bg-btn:active, .theme-btn:active{ transform: translateY(1px); }

    .bg-dot, .theme-dot{
      width:16px;
      height:16px;
      border-radius:999px;
      border:1px solid rgba(var(--border-rgb), 0.18);
      background: var(--board-tint);
      box-shadow: 0 0 0 7px rgba(239,231,225,0.30);
    }
    .theme-dot{
      background: var(--accent);
      box-shadow: 0 0 0 7px rgba(203,184,174,0.22);
    }

    .popover{ position:relative; }

    .panel{
      position:absolute;
      top:48px;
      right:0;
      width:360px;
      max-width: min(360px, calc(100vw - 24px));
      border-radius:18px;
      border:1px solid var(--border);
      background: rgba(255,255,255, var(--panel-a));
      box-shadow: 0 22px 50px rgba(20,20,20,0.12);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding:14px;
      display:none;
      z-index:50;
      max-height: calc(100vh - 120px);
      overflow:auto;
    }
    .panel.open{ display:block; }

    .panelTitle{
      margin:0 0 10px 0;
      font-size:12px;
      font-weight:800;
      letter-spacing:.10em;
      text-transform:uppercase;
      color: rgba(43,43,43,0.70);
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:9px 0;
    }

    .row label{
      font-size:12px;
      color: var(--muted);
      flex: 1 1 auto;
      min-width: 0;
    }

    .row > input[type="range"]{
      flex: 0 0 170px;
    }

    input[type="color"]{
      width:38px;
      min-width:38px;
      height:30px;
      border:1px solid rgba(var(--border-rgb), 0.16);
      border-radius:10px;
      padding:0;
      background:transparent;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      appearance: none;
    }

    input[type="range"]{ width:170px; }

    .file{
      width:100%;
      font-size:12px;
      color: rgba(43,43,43,0.75);
    }

    .mini-btn{
      width:100%;
      border:1px solid var(--border);
      background: rgba(255,255,255,0.94);
      border-radius:14px;
      padding:11px 12px;
      cursor:pointer;
      font-weight:750;
      color: rgba(43,43,43,0.88);
      -webkit-tap-highlight-color: transparent;
      appearance: none;
    }
    .mini-btn:active{ transform: translateY(1px); }

    .divider{
      height:1px;
      background: rgba(var(--border-rgb), 0.10);
      margin:10px 0;
    }

    .presetName{
      width:100%;
      border:1.5px solid rgba(var(--border-rgb), 0.14);
      border-radius:14px;
      padding: 11px 12px;
      background: rgba(255,255,255,0.94);
      color: var(--ink);
      font-size: 13px;
      outline:none;
      appearance: none;
    }

    .presetSelect{
      width: 100%;
      border:1.5px solid rgba(var(--border-rgb),0.14);
      border-radius:14px;
      padding:10px 12px;
      background: rgba(255,255,255,0.94);
      color: var(--ink);
      outline:none;
      appearance: none;
    }

    .status{
      font-size:12px;
      color: var(--muted);
      margin-top: 6px;
      min-height: 16px;
    }

    .board{
      border:1.5px solid var(--border);
      border-radius: var(--board-radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
      background:none;
      isolation: isolate;
    }

    .board::before{
      content:"";
      position:absolute;
      inset:0;
      background-image: var(--board-image);
      background-size: cover;
      background-position:center;
      background-repeat:no-repeat;
      filter: blur(var(--board-blur)) saturate(1.02) contrast(1.02);
      transform: scale(1.02);
    }

    .board::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background: rgba(255,255,255,0.34);
    }

    .board-tint{
      position:absolute;
      inset:0;
      pointer-events:none;
      mix-blend-mode:multiply;
    }

    .board-content{
      position:relative;
      z-index:2;
    }

    .content{
      padding: var(--pad);
      display:grid;
      gap: var(--gap);
      grid-template-columns: 380px 1fr;
      align-items:start;
      min-height: 520px;
    }

    .card{
      background: rgba(255,255,255, var(--day-bg-a));
      border:1.5px solid var(--border);
      border-radius: var(--radius);
      overflow:hidden;
      box-shadow: 0 10px 26px rgba(20,20,20,0.06);
    }

    .card-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: var(--header-pad);
      border-bottom:1px solid rgba(var(--border-rgb), 0.12);
      background: linear-gradient(180deg, rgba(255,255,255,1), rgba(255,255,255,0.92));
      gap:12px;
    }

    .card-title{
      font-weight:800;
      font-size:15px;
      letter-spacing:0.15px;
    }

    .card-sub{
      font-size:13px;
      color: var(--muted);
      font-weight:650;
      line-height: 1.25;
    }

    .card-body{
      padding: 14px 14px 16px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .block{
      border-radius:16px;
      padding:14px;
      border:1.5px dashed rgba(var(--border-rgb), 0.18);
      background: rgba(255,255,255, var(--block-bg-a));
    }

    .block .label{
      font-size: var(--label);
      color: var(--muted);
      margin-bottom:10px;
      font-weight:700;
      letter-spacing:.02em;
      text-transform:uppercase;
    }

    input[type="text"], input[type="number"]{
      width:100%;
      border:1.5px solid rgba(var(--border-rgb), 0.14);
      border-radius: var(--input-radius);
      padding: var(--input-pad);
      outline:none;
      background: rgba(255,255,255, var(--input-bg-a));
      color: var(--ink);
      font-size: var(--text);
      line-height:1.35;
      appearance: none;
    }

    input[type="text"]:focus, input[type="number"]:focus,
    .presetName:focus, .presetSelect:focus{
      border-color: rgba(var(--border-rgb), 0.22);
      box-shadow: 0 0 0 5px rgba(203,184,174,0.18);
    }

    .two-col{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
    }

    .hint{
      font-size:13px;
      color: var(--muted);
      line-height:1.35;
    }

    .add-btn{
      width:100%;
      border:1.5px solid rgba(var(--border-rgb), 0.14);
      background: rgba(255,255,255,0.92);
      border-radius:16px;
      padding:12px 12px;
      cursor:pointer;
      color: rgba(43,43,43,0.88);
      font-weight:800;
      -webkit-tap-highlight-color: transparent;
      font-size:14px;
      letter-spacing:0.1px;
      appearance: none;
    }
    .add-btn:active{ transform: translateY(1px); }

    .ghost-btn{
      border:1.5px solid rgba(var(--border-rgb), 0.14);
      background: rgba(255,255,255,0.82);
      border-radius:14px;
      padding:10px 12px;
      cursor:pointer;
      color: rgba(43,43,43,0.86);
      font-weight:800;
      -webkit-tap-highlight-color: transparent;
      font-size:13px;
      letter-spacing:0.1px;
      white-space: nowrap;
      appearance: none;
    }
    .ghost-btn:active{ transform: translateY(1px); }

    .habits{
      display:flex;
      flex-direction:column;
      gap: var(--gap);
      min-width:0;
      max-height: calc(100vh - 260px);
      overflow:auto;
      padding-right: 6px;
    }

    .habit{
      position:relative;
      overflow:hidden;
      cursor:pointer;
      user-select:none;
    }

    .habit-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      padding: var(--header-pad);
      border-bottom:1px solid rgba(var(--border-rgb), 0.12);
      background: linear-gradient(180deg, rgba(255,255,255,1), rgba(255,255,255,0.92));
    }

    .habit-meta{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
    }

    .habit-name{
      font-weight:850;
      font-size:16px;
      letter-spacing:0.15px;
      word-break: break-word;
    }

    .habit-progress{
      font-size:13px;
      color: var(--muted);
      font-weight:650;
    }

    .habit-actions{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .icon-btn{
      width:38px;
      height:38px;
      border-radius:12px;
      border:1.5px solid rgba(var(--border-rgb), 0.14);
      background: rgba(255,255,255,0.76);
      cursor:pointer;
      display:grid;
      place-items:center;
      color: rgba(43,43,43,0.78);
      -webkit-tap-highlight-color: transparent;
      font-weight:900;
      font-size:18px;
      line-height:1;
      user-select:none;
      appearance: none;
    }
    .icon-btn:active{ transform: translateY(1px); }

    .habit-body{
      padding: 14px 14px 16px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .boxes{
      display:flex;
      flex-wrap:wrap;
      gap: var(--box-gap);
      align-items:center;
    }

    .box{
      width: var(--box);
      height: var(--box);
      border-radius: var(--box-radius);
      border: 1.5px solid rgba(var(--border-rgb), 0.16);
      background: var(--empty, rgba(255,255,255,0.7));
      box-shadow: 0 8px 18px rgba(20,20,20,0.06);
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 90ms ease, filter 120ms ease;
      user-select:none;
      flex: 0 0 auto;
    }
    .box:active{ transform: translateY(1px) scale(0.98); }

    .box.done{
      background: var(--filled, var(--accent));
      filter: saturate(1.03) contrast(1.02);
    }

    .habit.collapsed .habit-body{ display:none; }
    .habit.collapsed .habit-head{ border-bottom:none; }

    #confetti{
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      display: none;
    }

    @media (max-width: 980px){
      .content{ grid-template-columns: 1fr; }
      .habits{ max-height:none; overflow:visible; padding-right:0; }
      .controls{
        width: 100%;
        justify-content: flex-start;
      }
    }

    @media (max-width: 680px){
      .wrap{
        margin: 14px auto;
        padding: 10px;
      }

      .titlebar{
        align-items: stretch;
      }

      .title{
        min-width: 0;
      }

      .controls{
        gap: 10px;
      }

      .panel{
        position: fixed;
        left: 12px;
        right: 12px;
        top: auto;
        bottom: 12px;
        width: auto;
        max-width: none;
        max-height: 78vh;
        border-radius: 18px;
      }

      .row > input[type="range"]{
        flex: 0 0 140px;
      }

      .two-col{
        grid-template-columns: 1fr;
      }

      .habit-head{
        flex-direction: column;
        align-items: stretch;
      }

      .habit-actions{
        justify-content: flex-start;
      }

      .box{
        width: 30px;
        height: 30px;
      }
    }
  </style>
</head>

<body>
  <canvas id="confetti"></canvas>

  <div class="wrap">
    <div class="titlebar">
      <div class="title">
        <h1>Habit Builder</h1>
        <div class="sync-badge" id="syncBadge">Saving locally on this device.</div>
      </div>

      <div class="controls">
        <!-- THEME -->
        <div class="popover">
          <div class="icon-pill">
            <button class="theme-btn" id="themeBtn" type="button" aria-label="Theme settings" title="Theme settings">
              <span class="theme-dot" id="themeDot" aria-hidden="true"></span>
            </button>
          </div>

          <div class="panel" id="themePanel" role="dialog" aria-label="Theme settings">
            <div class="panelTitle">Theme</div>

            <div class="row"><label for="tAppBg">App background</label><input id="tAppBg" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tInk">Text</label><input id="tInk" type="color" value="#2b2b2b" /></div>
            <div class="row"><label for="tMuted">Muted text</label><input id="tMuted" type="color" value="#7a7a7a" /></div>
            <div class="row"><label for="tAccent">Accent</label><input id="tAccent" type="color" value="#cbb8ae" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tBorderColor">Border color</label><input id="tBorderColor" type="color" value="#1e1e1e" /></div>
            <div class="row"><label for="tBorderA">Border strength</label><input id="tBorderA" type="range" min="8" max="55" value="18" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tSurfaceA">Pills opacity</label><input id="tSurfaceA" type="range" min="40" max="98" value="78" /></div>
            <div class="row"><label for="tPanelA">Panel opacity</label><input id="tPanelA" type="range" min="65" max="99" value="94" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tBtnA">Buttons opacity</label><input id="tBtnA" type="range" min="55" max="100" value="94" /></div>
            <div class="row"><label for="tBtnBorderA">Button border</label><input id="tBtnBorderA" type="range" min="4" max="40" value="16" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tOverlayBase">Overlay color</label><input id="tOverlayBase" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tOverlayA">Overlay strength</label><input id="tOverlayA" type="range" min="0" max="70" value="34" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tDayBg">Card background</label><input id="tDayBg" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tDayBgA">Card opacity</label><input id="tDayBgA" type="range" min="70" max="100" value="95" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tBlockBg">Block background</label><input id="tBlockBg" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tBlockBgA">Block opacity</label><input id="tBlockBgA" type="range" min="55" max="100" value="78" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tInputBg">Input background</label><input id="tInputBg" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tInputBgA">Input opacity</label><input id="tInputBgA" type="range" min="60" max="100" value="97" /></div>

            <div class="divider"></div>

            <button class="mini-btn" id="themeApply" type="button">Apply theme</button>
            <button class="mini-btn" id="themeReset" type="button" style="margin-top:10px;">Reset theme</button>

            <div class="divider"></div>

            <div class="panelTitle" style="margin-top:2px;">Presets</div>

            <div class="row" style="flex-direction:column; align-items:stretch; gap:10px;">
              <input id="presetName" class="presetName" placeholder="Preset name" />
              <button class="mini-btn" id="presetSave" type="button">Save current as preset</button>
            </div>

            <div class="divider"></div>

            <select id="presetSelect" class="presetSelect">
              <option value="">—</option>
            </select>

            <button class="mini-btn" id="presetApply" type="button" style="margin-top:10px;">Apply preset</button>
            <button class="mini-btn" id="presetDelete" type="button" style="margin-top:10px;">Delete preset</button>

            <div class="status" id="presetStatus" aria-live="polite"></div>
          </div>
        </div>

        <!-- BACKGROUND -->
        <div class="popover">
          <div class="icon-pill">
            <button class="bg-btn" id="bgBtn" type="button" aria-label="Background settings" title="Background settings">
              <span class="bg-dot" id="bgDot" aria-hidden="true"></span>
            </button>
          </div>

          <div class="panel" id="bgPanel" role="dialog" aria-label="Background settings">
            <div class="panelTitle">Background</div>

            <div class="row">
              <label for="bgColor">Tint color</label>
              <input id="bgColor" type="color" value="#efe7e1" />
            </div>

            <div class="row">
              <label for="bgStrength">Tint strength</label>
              <input id="bgStrength" type="range" min="0" max="70" value="30" />
            </div>

            <div class="row">
              <label for="bgBlur">Image blur</label>
              <input id="bgBlur" type="range" min="0" max="24" value="0" />
            </div>

            <div class="divider"></div>

            <div class="row" style="align-items:flex-start;">
              <label for="bgImage">Image</label>
              <input id="bgImage" class="file" type="file" accept="image/*" />
            </div>

            <div class="row">
              <button class="mini-btn" id="removeImage" type="button">Remove image</button>
            </div>

            <div class="divider"></div>

            <button class="mini-btn" id="bgApply" type="button">Apply background</button>
            <button class="mini-btn" id="bgReset" type="button" style="margin-top:10px;">Reset background</button>
          </div>
        </div>
      </div>
    </div>

    <div class="board" id="board">
      <div class="board-tint" id="boardTint"></div>

      <div class="board-content">
        <div class="content">
          <div class="card" id="addCard">
            <div class="card-header">
              <div style="display:flex; flex-direction:column; gap:4px; min-width:0;">
                <div class="card-title">Add a habit</div>
              </div>
              <button class="ghost-btn" id="clearAll" type="button" title="Clear everything">Clear all</button>
            </div>

            <div class="card-body">
              <div class="block">
                <div class="label">Habit name</div>
                <input id="habitName" type="text" placeholder="e.g. Read 10 pages" maxlength="80" />
              </div>

              <div class="block">
                <div class="label">Target days (boxes)</div>
                <input id="habitDays" type="number" min="1" max="365" value="30" />
                <div class="hint" style="margin-top:10px;">Choose how many boxes this habit should have.</div>
              </div>

              <div class="block">
                <div class="label">Habit colors (per habit)</div>

                <div class="two-col">
                  <div>
                    <div class="hint" style="margin-bottom:8px;">Card background</div>
                    <input id="cHabitBg" type="color" value="#ffffff" />
                  </div>
                  <div>
                    <div class="hint" style="margin-bottom:8px;">Text</div>
                    <input id="cHabitInk" type="color" value="#2b2b2b" />
                  </div>
                </div>

                <div class="divider"></div>

                <div class="two-col">
                  <div>
                    <div class="hint" style="margin-bottom:8px;">Box border</div>
                    <input id="cBoxBorder" type="color" value="#1e1e1e" />
                  </div>
                  <div>
                    <div class="hint" style="margin-bottom:8px;">Boxes (empty)</div>
                    <input id="cBoxEmpty" type="color" value="#eae6e2" />
                  </div>
                </div>

                <div class="divider"></div>

                <div class="two-col">
                  <div>
                    <div class="hint" style="margin-bottom:8px;">Boxes (filled)</div>
                    <input id="cBoxFilled" type="color" value="#cbb8ae" />
                  </div>
                  <div></div>
                </div>
              </div>

              <button class="add-btn" id="addHabitBtn" type="button">+ Add habit</button>
            </div>
          </div>

          <div class="habits" id="habits" aria-label="Habits list"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SYNC_CONFIG = {
      enabled: false,
      firebaseConfig: {
        apiKey: "",
        authDomain: "",
        databaseURL: "",
        projectId: "",
        storageBucket: "",
        messagingSenderId: "",
        appId: ""
      },
      namespace: "habit-builder"
    };

    (function(){
      const mem = Object.create(null);

      function canUseLocalStorage(){
        try{
          const k = "__t__" + Math.random().toString(16).slice(2);
          localStorage.setItem(k, "1");
          localStorage.removeItem(k);
          return true;
        }catch{
          return false;
        }
      }

      const hasLS = canUseLocalStorage();

      function storageGet(key){
        try{ return hasLS ? localStorage.getItem(key) : (mem[key] ?? null); }
        catch{ return mem[key] ?? null; }
      }

      function storageSet(key, value){
        try{
          if(hasLS) localStorage.setItem(key, value);
          else mem[key] = String(value);
        }catch{
          mem[key] = String(value);
        }
      }

      function storageRemove(key){
        try{
          if(hasLS) localStorage.removeItem(key);
          else delete mem[key];
        }catch{
          delete mem[key];
        }
      }

      function uid(){ return Math.random().toString(16).slice(2) + Date.now().toString(16); }

      function getWidgetId(){
        try{
          const sp = new URLSearchParams(location.search);
          const wid = (sp.get("wid") || "").trim();
          if(wid) return wid;
        }catch{}

        const key = "habit_builder_fallback_wid__" + location.pathname;
        const existing = storageGet(key);
        if(existing) return existing;

        const fresh = uid();
        storageSet(key, fresh);
        return fresh;
      }

      window.__HB__ = {
        wid: getWidgetId(),
        get: storageGet,
        set: storageSet,
        remove: storageRemove
      };
    })();

    const WID = window.__HB__?.wid || "default";

    const APP_KEY   = "notion_habit_builder_v9__" + WID;
    const THEME_KEY = "habit_builder_theme_v9__" + WID;
    const BG_KEY    = "habit_builder_bg_v9__" + WID;
    const PRESETS_KEY = "habit_builder_presets_v9__" + WID;
    const META_KEY = "habit_builder_meta_v9__" + WID;
    const BG_IMAGE_IDB_KEY = "habit_builder_bg_image_v9__" + WID;

    const $ = (sel, root=document) => root.querySelector(sel);
    const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));

    function clamp(n, min, max){
      const x = Number(n);
      if(!Number.isFinite(x)) return min;
      return Math.max(min, Math.min(max, x));
    }

    function normHex(hex, fallback){
      const s = String(hex || "").trim();
      return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : fallback;
    }

    function hexToRgbTuple(hex){
      const h = normHex(hex, "#ffffff").slice(1);
      const r = parseInt(h.slice(0,2), 16);
      const g = parseInt(h.slice(2,4), 16);
      const b = parseInt(h.slice(4,6), 16);
      return `${r},${g},${b}`;
    }

    function hexToRgba(hex, a){
      const [r,g,b] = hexToRgbTuple(hex).split(",").map(Number);
      return `rgba(${r},${g},${b},${a})`;
    }

    function uid(){
      return Math.random().toString(16).slice(2) + "-" + Date.now().toString(16);
    }

    function deepCopy(obj){
      return JSON.parse(JSON.stringify(obj));
    }

    function debounce(fn, wait=250){
      let t = null;
      return function(...args){
        clearTimeout(t);
        t = setTimeout(() => fn.apply(this, args), wait);
      };
    }

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function loadJSON(key){
      try{
        const raw = window.__HB__.get(key);
        return raw ? JSON.parse(raw) : null;
      }catch{
        return null;
      }
    }

    function saveJSON(key, val){
      try{
        window.__HB__.set(key, JSON.stringify(val));
      }catch{}
    }

    function removeJSON(key){
      try{
        window.__HB__.remove(key);
      }catch{}
    }

    function setStatus(msg){
      const el = document.getElementById("presetStatus");
      if(el) el.textContent = msg || "";
    }

    function setSyncBadge(msg){
      const el = document.getElementById("syncBadge");
      if(el) el.textContent = msg;
    }

    function fileToDataUrl(file){
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(String(r.result));
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }

    const IDB_NAME = "habit_builder_db_v1";
    const IDB_STORE = "kv";

    function openDB(){
      return new Promise((resolve, reject) => {
        if(!window.indexedDB){
          reject(new Error("IndexedDB unavailable"));
          return;
        }
        const req = indexedDB.open(IDB_NAME, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if(!db.objectStoreNames.contains(IDB_STORE)){
            db.createObjectStore(IDB_STORE);
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error || new Error("IndexedDB open failed"));
      });
    }

    async function idbGet(key){
      try{
        const db = await openDB();
        return await new Promise((resolve, reject) => {
          const tx = db.transaction(IDB_STORE, "readonly");
          const store = tx.objectStore(IDB_STORE);
          const req = store.get(key);
          req.onsuccess = () => resolve(req.result ?? null);
          req.onerror = () => reject(req.error);
        });
      }catch{
        return null;
      }
    }

    async function idbSet(key, value){
      try{
        const db = await openDB();
        await new Promise((resolve, reject) => {
          const tx = db.transaction(IDB_STORE, "readwrite");
          const store = tx.objectStore(IDB_STORE);
          const req = store.put(value, key);
          req.onsuccess = () => resolve();
          req.onerror = () => reject(req.error);
        });
      }catch{}
    }

    async function idbRemove(key){
      try{
        const db = await openDB();
        await new Promise((resolve, reject) => {
          const tx = db.transaction(IDB_STORE, "readwrite");
          const store = tx.objectStore(IDB_STORE);
          const req = store.delete(key);
          req.onsuccess = () => resolve();
          req.onerror = () => reject(req.error);
        });
      }catch{}
    }

    let remoteReady = false;
    let remoteRef = null;
    let applyingRemote = false;
    let lastRemoteUpdatedAt = 0;
    let bootFinished = false;

    function hasFirebaseConfig(){
      const c = SYNC_CONFIG.firebaseConfig || {};
      return !!(
        SYNC_CONFIG.enabled &&
        c.apiKey && c.authDomain && c.databaseURL &&
        c.projectId && c.appId
      );
    }

    function buildStatePayload(){
      return {
        version: 1,
        wid: WID,
        updatedAt: Date.now(),
        theme: deepCopy(themeCommitted),
        bg: deepCopy(bgCommitted),
        app: deepCopy(app),
        selectedHabitId
      };
    }

    async function applyFullState(payload, source="local"){
      if(!payload || typeof payload !== "object") return;

      if(payload.theme && typeof payload.theme === "object"){
        themeCommitted = Object.assign({}, DEFAULT_THEME, payload.theme);
        themeDraft = deepCopy(themeCommitted);
        saveJSON(THEME_KEY, themeCommitted);
        themeApplyToCSS(themeCommitted);
        themeSyncInputs(themeDraft);
      }

      if(payload.bg && typeof payload.bg === "object"){
        bgCommitted = Object.assign({}, DEFAULT_BG, payload.bg);
        bgDraft = deepCopy(bgCommitted);
        await persistBackgroundCommitted(bgCommitted);
        bgApplyToCSS(bgDraft);
        bgSyncInputs(bgDraft);
      }

      if(payload.app && typeof payload.app === "object"){
        app = normalizeApp(payload.app);
        saveJSON(APP_KEY, app);
      }

      if(typeof payload.selectedHabitId === "string" || payload.selectedHabitId === null){
        selectedHabitId = payload.selectedHabitId;
      }

      if(bootFinished){
        renderHabits();
      }

      if(source === "remote"){
        setStatus("Synced from cloud.");
      }
    }

    async function initRemoteSync(){
      if(!hasFirebaseConfig() || !window.firebase || !firebase.apps){
        setSyncBadge("Saving locally on this device.");
        return;
      }

      try{
        const appFb = firebase.apps.length
          ? firebase.app()
          : firebase.initializeApp(SYNC_CONFIG.firebaseConfig);

        const db = firebase.database(appFb);
        const path = `${SYNC_CONFIG.namespace}/${encodeURIComponent(WID)}`;
        remoteRef = db.ref(path);
        remoteReady = true;
        setSyncBadge("Cloud sync enabled.");

        const snap = await remoteRef.get();
        const remoteVal = snap.exists() ? snap.val() : null;
        const meta = loadJSON(META_KEY) || {};
        const localUpdated = Number(meta.lastSavedAt || 0);
        const remoteUpdated = Number(remoteVal?.updatedAt || 0);

        if(remoteVal && remoteUpdated > localUpdated){
          applyingRemote = true;
          lastRemoteUpdatedAt = remoteUpdated;
          await applyFullState(remoteVal, "remote");
          applyingRemote = false;
        }else{
          await pushRemoteState(true);
        }

        remoteRef.on("value", async (snapshot) => {
          if(!snapshot.exists()) return;
          const incoming = snapshot.val();
          const incomingTs = Number(incoming?.updatedAt || 0);
          const metaNow = loadJSON(META_KEY) || {};
          const localTs = Number(metaNow.lastSavedAt || 0);

          if(applyingRemote) return;
          if(incomingTs <= Math.max(localTs, lastRemoteUpdatedAt)) return;

          applyingRemote = true;
          lastRemoteUpdatedAt = incomingTs;
          await applyFullState(incoming, "remote");
          applyingRemote = false;
        });
      }catch{
        remoteReady = false;
        setSyncBadge("Local save only. Cloud sync not connected.");
      }
    }

    async function pushRemoteState(force=false){
      if(!remoteReady || !remoteRef || applyingRemote) return;
      try{
        const payload = buildStatePayload();
        const meta = loadJSON(META_KEY) || {};
        const lastLocal = Number(meta.lastSavedAt || 0);
        if(!force && payload.updatedAt <= lastLocal) return;
        lastRemoteUpdatedAt = payload.updatedAt;
        await remoteRef.set(payload);
      }catch{}
    }

    const debouncedPushRemote = debounce(() => { pushRemoteState(false); }, 400);

    const DEFAULT_THEME = {
      appBg: "#ffffff",
      ink: "#2b2b2b",
      muted: "#7a7a7a",
      accent: "#cbb8ae",

      borderColor: "#1e1e1e",
      borderA: 0.18,

      surfaceA: 0.78,
      panelA: 0.94,

      btnA: 0.94,
      btnBorderA: 0.16,

      overlayBase: "#ffffff",
      overlayA: 0.34,

      dayBg: "#ffffff",
      dayBgA: 0.95,

      blockBg: "#ffffff",
      blockBgA: 0.78,

      inputBg: "#ffffff",
      inputBgA: 0.97
    };

    function themeApplyToCSS(t){
      const theme = Object.assign({}, DEFAULT_THEME, t || {});
      const r = document.documentElement.style;

      r.setProperty("--app-bg", normHex(theme.appBg, DEFAULT_THEME.appBg));
      r.setProperty("--ink", normHex(theme.ink, DEFAULT_THEME.ink));
      r.setProperty("--muted", normHex(theme.muted, DEFAULT_THEME.muted));
      r.setProperty("--accent", normHex(theme.accent, DEFAULT_THEME.accent));

      r.setProperty("--border-rgb", hexToRgbTuple(theme.borderColor));
      r.setProperty("--border-a", String(clamp(theme.borderA, 0.08, 0.55)));

      r.setProperty("--surface-a", String(clamp(theme.surfaceA, 0.40, 0.98)));
      r.setProperty("--panel-a", String(clamp(theme.panelA, 0.65, 0.99)));

      r.setProperty("--btn-a", String(clamp(theme.btnA, 0.55, 1.00)));
      r.setProperty("--btn-border-a", String(clamp(theme.btnBorderA, 0.04, 0.40)));

      const dot = $("#themeDot");
      if(dot){
        const accent = normHex(theme.accent, DEFAULT_THEME.accent);
        dot.style.background = accent;
        dot.style.boxShadow = `0 0 0 7px ${hexToRgba(accent, 0.22)}`;
      }

      const overlayBase = normHex(theme.overlayBase, DEFAULT_THEME.overlayBase);
      const overlayA = clamp(theme.overlayA, 0.00, 0.70);
      const css = hexToRgba(overlayBase, overlayA);

      let st = document.getElementById("overlayStyle");
      if(!st){
        st = document.createElement("style");
        st.id = "overlayStyle";
        document.head.appendChild(st);
      }
      st.textContent = `.board::after{ background: ${css} !important; }`;

      let st2 = document.getElementById("surfaceStyle");
      if(!st2){
        st2 = document.createElement("style");
        st2.id = "surfaceStyle";
        document.head.appendChild(st2);
      }
      st2.textContent = `
        body{ background: ${normHex(theme.appBg, "#ffffff")} !important; color: ${normHex(theme.ink, "#2b2b2b")} !important; }
        .card, .habit{ background: ${hexToRgba(normHex(theme.dayBg, "#ffffff"), clamp(theme.dayBgA,0.70,1.00))} !important; }
        .block{ background: ${hexToRgba(normHex(theme.blockBg, "#ffffff"), clamp(theme.blockBgA,0.55,1.00))} !important; }
        input[type="text"], input[type="number"], .presetName, .presetSelect{
          background: ${hexToRgba(normHex(theme.inputBg, "#ffffff"), clamp(theme.inputBgA,0.60,1.00))} !important;
          color: ${normHex(theme.ink, "#2b2b2b")} !important;
        }
      `;
    }

    function themeSyncInputs(t){
      const theme = Object.assign({}, DEFAULT_THEME, t || {});
      const set = (id, val) => { const el = document.getElementById(id); if(el) el.value = String(val); };

      set("tAppBg", theme.appBg);
      set("tInk", theme.ink);
      set("tMuted", theme.muted);
      set("tAccent", theme.accent);

      set("tBorderColor", theme.borderColor);
      set("tBorderA", Math.round(clamp(theme.borderA, 0.08, 0.55) * 100));

      set("tSurfaceA", Math.round(clamp(theme.surfaceA, 0.40, 0.98) * 100));
      set("tPanelA", Math.round(clamp(theme.panelA, 0.65, 0.99) * 100));

      set("tBtnA", Math.round(clamp(theme.btnA, 0.55, 1.00) * 100));
      set("tBtnBorderA", Math.round(clamp(theme.btnBorderA, 0.04, 0.40) * 100));

      set("tOverlayBase", theme.overlayBase);
      set("tOverlayA", Math.round(clamp(theme.overlayA, 0.00, 0.70) * 100));

      set("tDayBg", theme.dayBg);
      set("tDayBgA", Math.round(clamp(theme.dayBgA, 0.70, 1.00) * 100));

      set("tBlockBg", theme.blockBg);
      set("tBlockBgA", Math.round(clamp(theme.blockBgA, 0.55, 1.00) * 100));

      set("tInputBg", theme.inputBg);
      set("tInputBgA", Math.round(clamp(theme.inputBgA, 0.60, 1.00) * 100));
    }

    function themeReadFromInputs(){
      const g = (id)=>document.getElementById(id);
      return {
        appBg: g("tAppBg")?.value,
        ink: g("tInk")?.value,
        muted: g("tMuted")?.value,
        accent: g("tAccent")?.value,

        borderColor: g("tBorderColor")?.value,
        borderA: clamp(Number(g("tBorderA")?.value)/100, 0.08, 0.55),

        surfaceA: clamp(Number(g("tSurfaceA")?.value)/100, 0.40, 0.98),
        panelA: clamp(Number(g("tPanelA")?.value)/100, 0.65, 0.99),

        btnA: clamp(Number(g("tBtnA")?.value)/100, 0.55, 1.00),
        btnBorderA: clamp(Number(g("tBtnBorderA")?.value)/100, 0.04, 0.40),

        overlayBase: g("tOverlayBase")?.value,
        overlayA: clamp(Number(g("tOverlayA")?.value)/100, 0.00, 0.70),

        dayBg: g("tDayBg")?.value,
        dayBgA: clamp(Number(g("tDayBgA")?.value)/100, 0.70, 1.00),

        blockBg: g("tBlockBg")?.value,
        blockBgA: clamp(Number(g("tBlockBgA")?.value)/100, 0.55, 1.00),

        inputBg: g("tInputBg")?.value,
        inputBgA: clamp(Number(g("tInputBgA")?.value)/100, 0.60, 1.00),
      };
    }

    let themeCommitted = Object.assign({}, DEFAULT_THEME, loadJSON(THEME_KEY) || {});
    let themeDraft = deepCopy(themeCommitted);

    async function persistTheme(){
      saveJSON(THEME_KEY, themeCommitted);
      const meta = loadJSON(META_KEY) || {};
      meta.lastSavedAt = Date.now();
      saveJSON(META_KEY, meta);
      debouncedPushRemote();
    }

    function initThemeUI(){
      themeApplyToCSS(themeCommitted);
      themeSyncInputs(themeDraft);

      const ids = [
        "tAppBg","tInk","tMuted","tAccent",
        "tBorderColor","tBorderA",
        "tSurfaceA","tPanelA",
        "tBtnA","tBtnBorderA",
        "tOverlayBase","tOverlayA",
        "tDayBg","tDayBgA",
        "tBlockBg","tBlockBgA",
        "tInputBg","tInputBgA"
      ];

      ids.forEach(id => {
        const el = document.getElementById(id);
        if(!el) return;
        el.addEventListener("input", () => {
          themeDraft = Object.assign({}, themeDraft, themeReadFromInputs());
          themeApplyToCSS(themeDraft);
          setStatus("");
        });
      });

      $("#themeApply").addEventListener("click", async () => {
        themeDraft = Object.assign({}, themeDraft, themeReadFromInputs());
        themeCommitted = deepCopy(themeDraft);
        themeApplyToCSS(themeCommitted);
        await persistTheme();
        setStatus("Theme applied.");
      });

      $("#themeReset").addEventListener("click", async () => {
        removeJSON(THEME_KEY);
        themeCommitted = deepCopy(DEFAULT_THEME);
        themeDraft = deepCopy(DEFAULT_THEME);
        themeApplyToCSS(themeCommitted);
        themeSyncInputs(themeDraft);
        await persistTheme();
        setStatus("Theme reset.");
      });
    }

    const DEFAULT_BG = {
      tint: "#efe7e1",
      strength: 30,
      blur: 0,
      imageDataUrl: null
    };

    function setBoardImage(dataUrlOrNull){
      document.documentElement.style.setProperty("--board-image", dataUrlOrNull ? `url("${dataUrlOrNull}")` : "none");
    }

    function setBoardBlur(px){
      document.documentElement.style.setProperty("--board-blur", `${clamp(px, 0, 24)}px`);
    }

    function applyBoardTint(colorHex, strengthPct){
      const tint = normHex(colorHex, DEFAULT_BG.tint);
      const strength = clamp(Number(strengthPct)/100, 0, 0.70);

      document.documentElement.style.setProperty("--board-tint", tint);
      document.documentElement.style.setProperty("--board-tint-a", String(strength));

      const bgDot = $("#bgDot");
      if(bgDot){
        bgDot.style.background = tint;
        bgDot.style.boxShadow = `0 0 0 7px ${hexToRgba(tint, Math.min(0.30, strength + 0.10))}`;
      }

      const boardTint = $("#boardTint");
      if(boardTint) boardTint.style.background = hexToRgba(tint, strength);
    }

    function bgApplyToCSS(bg){
      const x = Object.assign({}, DEFAULT_BG, bg || {});
      applyBoardTint(x.tint, x.strength);
      setBoardBlur(x.blur);
      setBoardImage(x.imageDataUrl || null);
    }

    function bgSyncInputs(bg){
      const x = Object.assign({}, DEFAULT_BG, bg || {});
      if($("#bgColor")) $("#bgColor").value = x.tint;
      if($("#bgStrength")) $("#bgStrength").value = String(x.strength);
      if($("#bgBlur")) $("#bgBlur").value = String(x.blur);
    }

    let bgCommitted = Object.assign({}, DEFAULT_BG, loadJSON(BG_KEY) || {});
    let bgDraft = deepCopy(bgCommitted);

    async function hydrateBackgroundFromIDB(){
      if(!bgCommitted.imageDataUrl){
        const fromDb = await idbGet(BG_IMAGE_IDB_KEY);
        if(typeof fromDb === "string" && fromDb.startsWith("data:image/")){
          bgCommitted.imageDataUrl = fromDb;
          bgDraft.imageDataUrl = fromDb;
        }
      }
    }

    async function persistBackgroundCommitted(bg){
      bgCommitted = Object.assign({}, DEFAULT_BG, bg || {});
      saveJSON(BG_KEY, bgCommitted);

      if(bgCommitted.imageDataUrl){
        await idbSet(BG_IMAGE_IDB_KEY, bgCommitted.imageDataUrl);
      }else{
        await idbRemove(BG_IMAGE_IDB_KEY);
      }

      const meta = loadJSON(META_KEY) || {};
      meta.lastSavedAt = Date.now();
      saveJSON(META_KEY, meta);
      debouncedPushRemote();
    }

    function initBackgroundUI(){
      bgSyncInputs(bgDraft);
      bgApplyToCSS(bgDraft);

      $("#bgColor").addEventListener("input", () => {
        bgDraft.tint = $("#bgColor").value;
        bgApplyToCSS(bgDraft);
        setStatus("");
      });

      $("#bgStrength").addEventListener("input", () => {
        bgDraft.strength = Number($("#bgStrength").value);
        bgApplyToCSS(bgDraft);
        setStatus("");
      });

      $("#bgBlur").addEventListener("input", () => {
        bgDraft.blur = Number($("#bgBlur").value);
        bgApplyToCSS(bgDraft);
        setStatus("");
      });

      $("#bgImage").addEventListener("change", async () => {
        const file = $("#bgImage").files && $("#bgImage").files[0];
        if(!file) return;
        try{
          const dataUrl = await fileToDataUrl(file);
          bgDraft.imageDataUrl = dataUrl;
          bgApplyToCSS(bgDraft);
          setStatus("Image preview updated. Click Apply background to save it.");
        }catch{
          setStatus("Could not read image.");
        }
      });

      $("#removeImage").addEventListener("click", () => {
        bgDraft.imageDataUrl = null;
        $("#bgImage").value = "";
        bgApplyToCSS(bgDraft);
        setStatus("Image removed from preview. Click Apply background to save.");
      });

      $("#bgApply").addEventListener("click", async () => {
        bgCommitted = deepCopy(bgDraft);
        await persistBackgroundCommitted(bgCommitted);
        bgApplyToCSS(bgCommitted);
        setStatus("Background applied.");
      });

      $("#bgReset").addEventListener("click", async () => {
        removeJSON(BG_KEY);
        bgCommitted = deepCopy(DEFAULT_BG);
        bgDraft = deepCopy(DEFAULT_BG);
        $("#bgImage").value = "";
        bgSyncInputs(bgCommitted);
        bgApplyToCSS(bgCommitted);
        await persistBackgroundCommitted(bgCommitted);
        setStatus("Background reset.");
      });
    }

    function loadPresets(){
      const list = loadJSON(PRESETS_KEY);
      return Array.isArray(list) ? list : [];
    }

    function savePresets(list){
      saveJSON(PRESETS_KEY, list);
    }

    function refreshPresetSelect(){
      const sel = document.getElementById("presetSelect");
      if(!sel) return;
      const list = loadPresets();
      const current = sel.value;
      sel.innerHTML = `<option value="">—</option>`;
      for(const p of list){
        const opt = document.createElement("option");
        opt.value = p.id;
        opt.textContent = p.name || "Untitled";
        sel.appendChild(opt);
      }
      if(current) sel.value = current;
    }

    async function applyPresetToThisWidget(p){
      const nextTheme = Object.assign({}, DEFAULT_THEME, p?.theme || {});
      const nextBg = Object.assign({}, DEFAULT_BG, p?.bg || {});

      themeCommitted = deepCopy(nextTheme);
      themeDraft = deepCopy(nextTheme);
      themeApplyToCSS(themeCommitted);
      themeSyncInputs(themeDraft);
      await persistTheme();

      bgCommitted = deepCopy(nextBg);
      bgDraft = deepCopy(nextBg);
      bgApplyToCSS(bgCommitted);
      bgSyncInputs(bgDraft);
      await persistBackgroundCommitted(bgCommitted);

      setStatus("Preset applied.");
    }

    function initPresetsUI(){
      const presetName = document.getElementById("presetName");
      const presetSaveBtn = document.getElementById("presetSave");
      const presetSelect = document.getElementById("presetSelect");
      const presetApplyBtn = document.getElementById("presetApply");
      const presetDeleteBtn = document.getElementById("presetDelete");

      if(!presetName || !presetSaveBtn || !presetSelect || !presetApplyBtn || !presetDeleteBtn) return;

      refreshPresetSelect();

      presetSaveBtn.addEventListener("click", () => {
        const name = (presetName.value || "").trim();
        if(!name){
          setStatus("Type a preset name first.");
          return;
        }

        const entry = {
          id: uid(),
          name,
          theme: deepCopy(themeCommitted),
          bg: deepCopy(bgCommitted)
        };

        const list = loadPresets();
        list.unshift(entry);
        savePresets(list);

        presetName.value = "";
        refreshPresetSelect();
        presetSelect.value = entry.id;
        setStatus("Preset saved.");
      });

      presetApplyBtn.addEventListener("click", async () => {
        const id = presetSelect.value;
        if(!id){
          setStatus("Choose a preset first.");
          return;
        }

        const list = loadPresets();
        const p = list.find(x => x.id === id);
        if(!p){
          setStatus("Preset not found.");
          return;
        }

        await applyPresetToThisWidget(p);
      });

      presetDeleteBtn.addEventListener("click", () => {
        const id = presetSelect.value;
        if(!id){
          setStatus("Choose a preset first.");
          return;
        }

        let list = loadPresets();
        const before = list.length;
        list = list.filter(x => x.id !== id);
        if(list.length === before){
          setStatus("Preset not found.");
          return;
        }

        savePresets(list);
        refreshPresetSelect();
        presetSelect.value = "";
        setStatus("Preset deleted.");
      });
    }

    function normalizeHabit(h){
      const days = clamp(h?.days, 1, 365);
      const done = Array.isArray(h?.done) ? h.done.slice(0, days).map(Boolean) : new Array(days).fill(false);
      while(done.length < days) done.push(false);

      return {
        id: String(h?.id || uid()),
        name: String(h?.name || "New habit"),
        days,
        done,
        collapsed: !!h?.collapsed,
        habitBg: normHex(h?.habitBg, "#ffffff"),
        habitInk: normHex(h?.habitInk, "#2b2b2b"),
        boxBorder: normHex(h?.boxBorder, "#1e1e1e"),
        boxEmpty: normHex(h?.boxEmpty, "#eae6e2"),
        boxFilled: normHex(h?.boxFilled, "#cbb8ae")
      };
    }

    function normalizeApp(input){
      const out = { habits: [] };
      const src = (input && typeof input === "object") ? input : {};
      const habits = Array.isArray(src.habits) ? src.habits : [];
      out.habits = habits.map(normalizeHabit);
      return out;
    }

    function loadApp(){
      try{
        const raw = window.__HB__.get(APP_KEY);
        return raw ? normalizeApp(JSON.parse(raw)) : { habits: [] };
      }catch{
        return { habits: [] };
      }
    }

    function saveApp(data){
      window.__HB__.set(APP_KEY, JSON.stringify(data));
    }

    let app = normalizeApp(loadApp());
    let selectedHabitId = null;
    const habitsEl = $("#habits");

    async function persistApp(){
      saveApp(app);
      const meta = loadJSON(META_KEY) || {};
      meta.lastSavedAt = Date.now();
      saveJSON(META_KEY, meta);
      debouncedPushRemote();
    }

    function countDone(h){
      return (h.done || []).filter(Boolean).length;
    }

    function isComplete(h){
      const total = clamp(h.days, 1, 365);
      return countDone(h) >= total;
    }

    function ensureDoneArray(h){
      const total = clamp(h.days, 1, 365);
      h.done = Array.isArray(h.done) ? h.done.slice(0, total) : new Array(total).fill(false);
      while(h.done.length < total) h.done.push(false);
      return total;
    }

    function renderHabits(){
      habitsEl.innerHTML = "";

      if(!app.habits.length){
        const empty = document.createElement("div");
        empty.className = "card";
        empty.innerHTML = `
          <div class="card-header">
            <div style="display:flex; flex-direction:column; gap:4px;">
              <div class="card-title">No habits yet</div>
              <div class="card-sub">Add one on the left to get started.</div>
            </div>
          </div>
          <div class="card-body"></div>
        `;
        habitsEl.appendChild(empty);
        return;
      }

      app.habits.forEach(h => {
        const total = ensureDoneArray(h);
        const doneN = countDone(h);
        const pct = Math.round((doneN / total) * 100);

        const habitBg   = normHex(h.habitBg, "#ffffff");
        const habitInk  = normHex(h.habitInk, "#2b2b2b");
        const emptyC    = normHex(h.boxEmpty, "#eae6e2");
        const filledC   = normHex(h.boxFilled, "#cbb8ae");
        const borderC   = normHex(h.boxBorder, "#1e1e1e");

        const habit = document.createElement("section");
        habit.className = "habit card" + (h.collapsed ? " collapsed" : "");
        habit.dataset.id = h.id;
        habit.style.background = habitBg;
        habit.style.color = habitInk;

        habit.innerHTML = `
          <div class="habit-head">
            <div class="habit-meta">
              <div class="habit-name">${escapeHtml(h.name)}</div>
              <div class="habit-progress">${doneN}/${total} days • ${pct}%</div>
            </div>

            <div class="habit-actions" aria-label="Habit controls">
              <button class="icon-btn" data-action="collapse" type="button" title="${h.collapsed ? "Expand boxes" : "Collapse boxes"}" aria-label="Collapse or expand">
                ${h.collapsed ? "▾" : "▴"}
              </button>
              <button class="icon-btn" data-action="reset" type="button" title="Reset boxes" aria-label="Reset boxes">↺</button>
              <button class="icon-btn" data-action="delete" type="button" title="Delete habit" aria-label="Delete habit">×</button>
            </div>
          </div>

          <div class="habit-body">
            <div class="boxes" style="--empty:${emptyC}; --filled:${filledC};" aria-label="Habit boxes"></div>
          </div>
        `;

        habitsEl.appendChild(habit);

        if(!h.collapsed){
          const boxesWrap = habit.querySelector(".boxes");
          for(let i=0;i<total;i++){
            const b = document.createElement("button");
            b.className = "box" + (h.done[i] ? " done" : "");
            b.dataset.idx = String(i);
            b.type = "button";
            b.title = `Day ${i+1}`;
            b.style.borderColor = hexToRgba(borderC, 0.24);
            boxesWrap.appendChild(b);
          }
        }
      });
    }

    async function removeHabit(id){
      app.habits = app.habits.filter(h => h.id !== id);
      if(selectedHabitId === id) selectedHabitId = null;
      await persistApp();
      renderHabits();
    }

    async function toggleBox(habitId, idx){
      const h = app.habits.find(x => x.id === habitId);
      if(!h) return;

      const total = ensureDoneArray(h);
      if(idx < 0 || idx >= total) return;

      h.done[idx] = !h.done[idx];
      await persistApp();
      renderHabits();

      if(isComplete(h)) confettiBurst();
    }

    async function resetHabitBoxes(habitId){
      const h = app.habits.find(x => x.id === habitId);
      if(!h) return;
      const total = ensureDoneArray(h);
      h.done = new Array(total).fill(false);
      await persistApp();
      renderHabits();
    }

    async function toggleCollapsed(habitId){
      const h = app.habits.find(x => x.id === habitId);
      if(!h) return;
      h.collapsed = !h.collapsed;
      await persistApp();
      renderHabits();
    }

    const habitName = $("#habitName");
    const habitDays = $("#habitDays");
    const addHabitBtn = $("#addHabitBtn");

    const cHabitBg   = $("#cHabitBg");
    const cHabitInk  = $("#cHabitInk");
    const cBoxBorder = $("#cBoxBorder");
    const cBoxEmpty  = $("#cBoxEmpty");
    const cBoxFilled = $("#cBoxFilled");

    async function addHabit(){
      const name = (habitName.value || "").trim();
      if(!name){
        habitName.focus();
        return;
      }

      const days = clamp(habitDays.value, 1, 365);

      const h = normalizeHabit({
        id: uid(),
        name,
        days,
        done: new Array(days).fill(false),
        collapsed: false,
        habitBg: normHex(cHabitBg.value, "#ffffff"),
        habitInk: normHex(cHabitInk.value, "#2b2b2b"),
        boxBorder: normHex(cBoxBorder.value, "#1e1e1e"),
        boxEmpty: normHex(cBoxEmpty.value, "#eae6e2"),
        boxFilled: normHex(cBoxFilled.value, "#cbb8ae")
      });

      app.habits.unshift(h);
      selectedHabitId = h.id;
      await persistApp();
      renderHabits();

      habitName.value = "";
      habitName.focus();
    }

    addHabitBtn.addEventListener("click", addHabit);
    habitName.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        e.preventDefault();
        addHabit();
      }
    });
    habitDays.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        e.preventDefault();
        addHabit();
      }
    });

    $("#clearAll").addEventListener("click", async () => {
      removeJSON(APP_KEY);
      app = { habits: [] };
      selectedHabitId = null;
      await persistApp();
      renderHabits();
    });

    habitsEl.addEventListener("click", async (e) => {
      const habit = e.target.closest(".habit");
      if(!habit) return;
      const id = habit.dataset.id;

      const box = e.target.closest(".box");
      if(box){
        const idx = Number(box.dataset.idx);
        if(Number.isFinite(idx)) await toggleBox(id, idx);
        return;
      }

      const btn = e.target.closest("button[data-action]");
      if(btn){
        const action = btn.dataset.action;
        if(action === "delete") await removeHabit(id);
        if(action === "reset") await resetHabitBoxes(id);
        if(action === "collapse") await toggleCollapsed(id);
        return;
      }
    });

    function closePanels(exceptId){
      ["themePanel","bgPanel"].forEach(id => {
        if(id !== exceptId) document.getElementById(id)?.classList.remove("open");
      });
    }

    function initPopovers(){
      $("#themeBtn").addEventListener("click", (e) => {
        e.stopPropagation();
        const panel = $("#themePanel");
        const open = !panel.classList.contains("open");
        closePanels(open ? "themePanel" : null);
        panel.classList.toggle("open", open);
      });

      $("#bgBtn").addEventListener("click", (e) => {
        e.stopPropagation();
        const panel = $("#bgPanel");
        const open = !panel.classList.contains("open");
        closePanels(open ? "bgPanel" : null);
        panel.classList.toggle("open", open);
      });

      document.addEventListener("click", (e) => {
        const inside =
          e.target.closest("#themePanel") || e.target.closest("#themeBtn") ||
          e.target.closest("#bgPanel") || e.target.closest("#bgBtn");
        if(!inside) closePanels(null);
      });

      document.addEventListener("keydown", (e) => {
        if(e.key === "Escape") closePanels(null);
      });
    }

    const confettiCanvas = document.getElementById("confetti");
    const ctx = confettiCanvas.getContext("2d");
    let confettiActive = false;

    function resizeConfetti(){
      const ratio = Math.max(1, window.devicePixelRatio || 1);
      confettiCanvas.width = Math.floor(window.innerWidth * ratio);
      confettiCanvas.height = Math.floor(window.innerHeight * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    window.addEventListener("resize", resizeConfetti);

    function confettiBurst(){
      if(confettiActive) return;
      confettiActive = true;

      resizeConfetti();
      confettiCanvas.style.display = "block";

      const accent = getComputedStyle(document.documentElement).getPropertyValue("--accent").trim() || "#cbb8ae";
      const palette = [
        accent, "#e3d4d2", "#cdd5d0", "#c9d7dd", "#d1cde2", "#d9c6bd", "#d6d0c8"
      ].map(c => normHex(c, "#cbb8ae"));

      const W = window.innerWidth;
      const H = window.innerHeight;
      const particles = [];
      const N = 140;

      for(let i=0;i<N;i++){
        particles.push({
          x: W * 0.5 + (Math.random()-0.5)*40,
          y: H * 0.18 + (Math.random()-0.5)*20,
          vx: (Math.random()-0.5) * 10,
          vy: (Math.random()*-8) - 4,
          g: 0.18 + Math.random()*0.18,
          r: 3 + Math.random()*4,
          a: 1,
          rot: Math.random()*Math.PI,
          vr: (Math.random()-0.5) * 0.25,
          color: palette[(Math.random()*palette.length)|0],
        });
      }

      const start = performance.now();
      const duration = 1200;

      function tick(now){
        const t = now - start;
        ctx.clearRect(0,0,W,H);

        particles.forEach(p => {
          p.vy += p.g;
          p.x += p.vx;
          p.y += p.vy;
          p.rot += p.vr;
          const life = 1 - (t / duration);
          p.a = Math.max(0, life);

          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.globalAlpha = p.a;
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.r, -p.r, p.r*2.2, p.r*1.4);
          ctx.restore();
        });

        if(t < duration){
          requestAnimationFrame(tick);
        }else{
          ctx.clearRect(0,0,W,H);
          confettiCanvas.style.display = "none";
          confettiActive = false;
        }
      }

      requestAnimationFrame(tick);
    }

    async function flushAllNow(){
      try{
        saveJSON(THEME_KEY, themeCommitted);
        saveJSON(BG_KEY, bgCommitted);
        saveJSON(APP_KEY, app);
        saveJSON(META_KEY, { lastSavedAt: Date.now() });
        if(bgCommitted?.imageDataUrl){
          await idbSet(BG_IMAGE_IDB_KEY, bgCommitted.imageDataUrl);
        }
        await pushRemoteState(true);
      }catch{}
    }

    window.addEventListener("pagehide", () => { flushAllNow(); });
    window.addEventListener("beforeunload", () => { flushAllNow(); });
    document.addEventListener("visibilitychange", () => {
      if(document.visibilityState === "hidden"){
        flushAllNow();
      }
    });

    async function boot(){
      await hydrateBackgroundFromIDB();

      initPopovers();
      initThemeUI();
      initBackgroundUI();
      initPresetsUI();

      themeApplyToCSS(themeCommitted);
      bgApplyToCSS(bgCommitted);
      renderHabits();

      bootFinished = true;
      await initRemoteSync();
      await flushAllNow();
    }

    boot();
  </script>
</body>
</html>
