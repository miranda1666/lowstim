<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Energy-Based Task Picker</title>
  <style>
    :root{
      --bg:#ffffff;

      --card: rgba(255,255,255,0.58);

      --stroke:#e9e4dd;
      --ink:#2b2a28;
      --muted:#6a665f;
      --soft:#f3efe9;
      --shadow:0 10px 30px rgba(30,20,10,.06);
      --r:18px;

      --board-tint:#efe7e1;
      --board-tint-a:0.12;
      --board-image:none;
      --bg-blur: 0px;
    }

    *{ box-sizing:border-box; }

    html, body{
      width:100%;
      min-height:100%;
    }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color:var(--ink);
      background: var(--bg);
      padding:28px 18px;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overflow-x:hidden;
    }

    .wrap{ max-width:980px; margin:0 auto; }
    h1{ margin:0; font-size:18px; }
    .sub{ margin:6px 0 14px; color:var(--muted); font-size:13px; line-height:1.35; }

    .widgetBoard{
      position:relative;
      border-radius: var(--r);
      overflow:hidden;
      border:1px solid var(--stroke);
      box-shadow: var(--shadow);
      isolation:isolate;
    }

    .widgetBoard::before{
      content:"";
      position:absolute;
      inset:0;
      background-image: var(--board-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform: translateZ(0);
      z-index:0;
      pointer-events:none;
      filter: blur(var(--bg-blur)) saturate(1.25) contrast(1.15) brightness(1.05);
      will-change: filter;
    }

    .boardTint{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:1;
      background: rgba(0,0,0,0);
    }

    .boardContent{ position:relative; z-index:2; }

    .card{
      background:var(--card);
      border:0;
      border-radius:0;
      box-shadow:none;
      padding:14px;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .title{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .title h2{ margin:0; font-size:14px; font-weight:650; letter-spacing:.2px; }
    .hint{ color:var(--muted); font-size:12px; line-height:1.35; }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    button, input, select{
      font:inherit;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.78);
      color:var(--ink);
      border-radius:12px;
      padding:10px 12px;
      outline:none;
      -webkit-tap-highlight-color: transparent;
    }

    button{
      cursor:pointer;
      user-select:none;
      touch-action:manipulation;
    }

    button.soft{ background: rgba(243,239,233,0.72); }
    button.primary{ background: rgba(239,231,225,0.80); }
    button:active{ transform:translateY(1px); }

    .divider{ height:1px; background:var(--stroke); margin:12px 0; }

    .kpi{ display:flex; gap:12px; flex-wrap:wrap; }
    .kpi .box{
      flex:1; min-width:200px;
      background: rgba(255,255,255,0.70);
      border:1px solid var(--stroke);
      border-radius:14px;
      padding:10px;
    }
    .kpi .num{ font-weight:750; font-size:16px; }
    .kpi .lab{ font-size:12px; color:var(--muted); }

    .pill{
      display:inline-flex; align-items:center; gap:8px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.72);
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      white-space:nowrap;
    }

    .tiny{ font-size:12px; color:var(--muted); }

    .list{ display:flex; flex-direction:column; gap:8px; }

    .item{
      display:grid;
      grid-template-columns: 1fr auto;
      gap:10px;
      align-items:center;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.72);
    }

    .meta{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
    }

    .meta b{
      font-size:13px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .meta span{ font-size:12px; color:var(--muted); }

    .right{
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:flex-end;
      flex-wrap:wrap;
    }

    .tag{
      font-size:11px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(243,239,233,0.72);
      user-select:none;
      white-space:nowrap;
    }

    .smallbtn{ padding:8px 10px; border-radius:12px; }
    .danger{ border-color:#efc2c2; }

    .bgWrap{ position:relative; }

    .bgBtn{
      width:34px;
      height:34px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.92);
      padding:0;
      display:grid;
      place-items:center;
      box-shadow: 0 3px 12px rgba(30,20,10,.08);
      cursor:pointer;
    }

    .bgDot{
      width:14px;
      height:14px;
      border-radius:999px;
      border:1px solid rgba(233,228,221,0.95);
      background: var(--board-tint);
      box-shadow: 0 0 0 6px rgba(239,231,225,0.22);
    }

    .themeDot{
      width:14px;
      height:14px;
      border-radius:999px;
      border:1px solid rgba(233,228,221,0.95);
      background: var(--ink);
      box-shadow: 0 0 0 6px rgba(243,239,233,0.22);
    }

    .panel{
      position:absolute;
      top: 44px;
      right: 0;
      width: min(320px, calc(100vw - 36px));
      border-radius: 16px;
      border: 1px solid var(--stroke);
      background: rgba(255,255,255,0.90);
      box-shadow: 0 18px 40px rgba(30,20,10,.12);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 12px;
      display:none;
      z-index: 50;
      max-height: min(70vh, 560px);
      overflow:auto;
      overscroll-behavior:contain;
    }

    .panel.open{ display:block; }

    .panelTitle{
      margin:0 0 10px 0;
      font-size:12px;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      color: rgba(43,42,40,0.72);
    }

    .pRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 7px 0;
    }

    .pRow label{ font-size:12px; color:var(--muted); }

    .pRow input[type="color"]{
      width:36px;
      height:28px;
      border-radius:10px;
      padding:0;
      border:1px solid var(--stroke);
      background: transparent;
      cursor:pointer;
    }

    .pRow input[type="range"]{
      width: 160px;
      max-width: 46vw;
      touch-action:pan-y;
    }

    .pFile{
      width:100%;
      font-size:12px;
      color: rgba(43,42,40,0.75);
    }

    .miniBtn{
      width:100%;
      border-radius:12px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.90);
      padding:9px 10px;
      font-weight:700;
      letter-spacing:.06em;
      text-transform:uppercase;
      font-size:11px;
      color: rgba(43,42,40,0.82);
      box-shadow: 0 2px 8px rgba(30,20,10,.06);
      cursor:pointer;
    }

    .miniBtn:active{ transform: translateY(1px); }

    .pDiv{ height:1px; background: var(--stroke); margin: 8px 0; }
    .pHint{ font-size:11px; color:var(--muted); line-height:1.35; margin-top:8px; }

    .presetName,
    .presetSelect{
      width:100%;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.96);
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
      color: var(--ink);
      outline:none;
    }

    .presetSelect{
      height:38px;
    }

    .status{
      font-size:12px;
      color: var(--muted);
      margin-top: 6px;
      min-height: 16px;
    }

    .picker{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

    .picked{
      margin-top:10px;
      border:1px solid var(--stroke);
      border-radius:14px;
      padding:12px;
      background: rgba(255,255,255,0.72);
    }

    .pickedTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:6px;
    }

    .pickedTitle{
      font-weight:750;
      font-size:14px;
      margin:0;
      line-height:1.25;
    }

    .confirm{
      margin-top:10px;
      border:1px solid var(--stroke);
      border-radius:14px;
      padding:12px;
      background: rgba(255,255,255,0.72);
    }

    .confirmTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }

    .confirmTitle{
      margin:0;
      font-weight:750;
      font-size:13px;
      line-height:1.25;
    }

    @media (max-width: 720px){
      .kpi .box{ min-width:160px; }

      .panel{
        position:fixed;
        top:auto;
        right:18px;
        left:18px;
        bottom:max(16px, env(safe-area-inset-bottom));
        width:auto;
        max-height:min(76vh, 640px);
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Energy Task Picker</h1>

    <div class="widgetBoard" id="widgetBoard" aria-label="Energy task picker board">
      <div class="boardTint" id="boardTint"></div>
      <div class="boardContent">
        <section class="card">
          <div class="title">
            <div>
              <h2 style="margin:0;"></h2>
            </div>

            <div class="row" style="justify-content:flex-end; gap:10px;">
              <div class="bgWrap" id="bgWrap">
                <button class="bgBtn" id="bgBtn" type="button" aria-label="Background settings" title="Background settings">
                  <span class="bgDot" id="bgDot" aria-hidden="true"></span>
                </button>

                <div class="panel" id="bgPanel" role="dialog" aria-label="Background settings">
                  <div class="panelTitle">Background</div>

                  <div class="pRow">
                    <label for="bgColor">Tint</label>
                    <input id="bgColor" type="color" value="#efe7e1" />
                  </div>

                  <div class="pRow">
                    <label for="bgStrength">Strength</label>
                    <input id="bgStrength" type="range" min="0" max="70" value="12" />
                  </div>

                  <div class="pRow">
                    <label for="bgBlur">Image blur</label>
                    <input id="bgBlur" type="range" min="0" max="24" value="0" />
                  </div>

                  <div class="pDiv"></div>

                  <div class="pRow" style="align-items:flex-start;">
                    <label for="bgImage">Image</label>
                    <input id="bgImage" class="pFile" type="file" accept="image/*" />
                  </div>

                  <div class="pRow">
                    <button id="bgRemove" class="miniBtn" type="button">Remove image</button>
                  </div>

                  <div class="pDiv"></div>

                  <button class="miniBtn" id="bgApply" type="button">Apply background</button>
                  <button class="miniBtn" id="bgReset" type="button" style="margin-top:8px;">Reset background</button>
                </div>
              </div>

              <div class="bgWrap" id="themeWrap">
                <button class="bgBtn" id="themeBtn" type="button" aria-label="Theme settings" title="Theme settings">
                  <span class="themeDot" id="themeDot" aria-hidden="true"></span>
                </button>

                <div class="panel" id="themePanel" role="dialog" aria-label="Theme settings">
                  <div class="panelTitle">Theme</div>

                  <div class="pRow">
                    <label for="tBg">Page bg</label>
                    <input id="tBg" type="color" value="#ffffff" />
                  </div>

                  <div class="pRow">
                    <label for="tInk">Text</label>
                    <input id="tInk" type="color" value="#2b2a28" />
                  </div>

                  <div class="pRow">
                    <label for="tMuted">Muted</label>
                    <input id="tMuted" type="color" value="#6a665f" />
                  </div>

                  <div class="pRow">
                    <label for="tStroke">Borders</label>
                    <input id="tStroke" type="color" value="#e9e4dd" />
                  </div>

                  <div class="pRow">
                    <label for="tCardA">Card opacity</label>
                    <input id="tCardA" type="range" min="35" max="95" value="58" />
                  </div>

                  <div class="pDiv"></div>

                  <button id="tApply" class="miniBtn" type="button">Apply theme</button>
                  <button id="tReset" class="miniBtn" type="button" style="margin-top:8px;">Reset theme</button>

                  <div class="pDiv"></div>

                  <div class="panelTitle" style="margin:0 0 10px 0;">Presets</div>

                  <input class="presetName" id="presetName" placeholder="Preset name">

                  <button class="miniBtn" id="presetSave" type="button" style="margin-top:8px;">Save current as preset</button>

                  <div class="pDiv"></div>

                  <select class="presetSelect" id="presetSelect"></select>

                  <button class="miniBtn" id="presetApply" type="button" style="margin-top:8px;">Apply preset</button>
                  <button class="miniBtn" id="presetDelete" type="button" style="margin-top:8px;">Delete preset</button>

                  <div class="status" id="presetStatus" aria-live="polite"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="divider"></div>

          <div class="row" aria-label="Add task">
            <input id="taskText" style="flex:1; min-width:220px;" placeholder="Add a task…" />
            <span class="pill">
              Energy
              <select id="taskEnergy">
                <option value="low">Low</option>
                <option value="mid" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </span>
            <button id="addTask" class="primary" type="button">Add</button>
            <button id="clearDone" class="soft" type="button">Clear done</button>
          </div>

          <div class="divider"></div>

          <div class="picker" aria-label="Energy picker">
            <span class="pill">
              My energy is
              <select id="currentEnergy">
                <option value="low">Low</option>
                <option value="mid" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </span>

            <button id="pickOne" type="button">Pick one for me</button>
            <button id="shuffle" class="soft" type="button">Surprise me</button>
            <button id="resetAll" class="danger" type="button">Reset</button>
          </div>

          <div id="resetConfirm" class="confirm" style="display:none;">
            <div class="confirmTop">
              <p class="confirmTitle">Reset all tasks?</p>
              <span class="tiny">This can’t be undone.</span>
            </div>
            <div class="row">
              <button id="resetYes" class="danger" type="button">Yes, reset</button>
              <button id="resetNo" class="soft" type="button">Cancel</button>
            </div>
          </div>

          <div id="pickedBox" class="picked" style="display:none;">
            <div class="pickedTop">
              <p id="pickedTitle" class="pickedTitle"></p>
              <span id="pickedTag" class="tag"></span>
            </div>
            <div class="row">
              <button id="markDone" class="primary" type="button">Mark done</button>
              <button id="pickAnother" class="soft" type="button">Pick another</button>
            </div>
          </div>

          <div class="divider"></div>

          <div class="kpi" aria-label="Summary">
            <div class="box">
              <div class="num" id="kTotal">—</div>
              <div class="lab">Total tasks</div>
            </div>
            <div class="box">
              <div class="num" id="kTodo">—</div>
              <div class="lab">Remaining</div>
            </div>
            <div class="box">
              <div class="num" id="kDone">—</div>
              <div class="lab">Done</div>
            </div>
          </div>

          <div class="divider"></div>

          <div class="row" style="justify-content:space-between; align-items:flex-end;">
            <div class="tiny">Tasks</div>
            <span class="pill">
              View
              <select id="viewFilter">
                <option value="all" selected>All</option>
                <option value="todo">To do</option>
                <option value="done">Done</option>
              </select>
            </span>
          </div>

          <div style="height:10px;"></div>
          <div class="list" id="taskList"></div>

          <div class="divider"></div>
        </section>
      </div>
    </div>
  </div>

<script>
(async function(){
  "use strict";

  const DEFAULT_THEME = {
    bg: "#ffffff",
    ink: "#2b2a28",
    muted: "#6a665f",
    stroke: "#e9e4dd",
    cardA: 58
  };

  const DEFAULT_BG = {
    tint: "#efe7e1",
    strength: 12,
    blur: 0,
    imageDataUrl: null
  };

  const APP_VERSION = 9;
  const STORAGE_NS = "energy_task_picker_v9";
  const PRESET_NAMESPACE = "energytaskpicker";
  const CHANNEL_NAME = "energy-task-picker-sync-v9";

  const $ = (id)=>document.getElementById(id);

  function clamp(n,min,max){
    n = Number(n);
    if(!Number.isFinite(n)) return min;
    return Math.max(min, Math.min(max, n));
  }

  function deepClone(obj){
    return JSON.parse(JSON.stringify(obj));
  }

  function uid(){
    return Math.random().toString(16).slice(2) + Date.now().toString(16);
  }

  function stableWidgetId(){
    try{
      const sp = new URLSearchParams(location.search);
      const wid = (sp.get("wid") || "").trim();
      if (wid) return wid;
    }catch{}
    const pathPart = (location.pathname || "energy-task-picker").replace(/[^a-zA-Z0-9_-]+/g, "_");
    return pathPart || "energy-task-picker";
  }

  const WID = stableWidgetId();

  function normHex(hex, fallback){
    const s = String(hex || "").trim();
    return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : fallback;
  }

  function hexToRgb(hex){
    const h = normHex(hex, "#ffffff").slice(1);
    const r = parseInt(h.slice(0,2), 16);
    const g = parseInt(h.slice(2,4), 16);
    const b = parseInt(h.slice(4,6), 16);
    return [r,g,b];
  }

  function hexToRgba(hex, a){
    const [r,g,b] = hexToRgb(hex);
    return `rgba(${r},${g},${b},${a})`;
  }

  function setStatus(msg=""){
    const el = $("presetStatus");
    if(el) el.textContent = msg;
  }

  function debounce(fn, delay){
    let t = null;
    return function(...args){
      clearTimeout(t);
      t = setTimeout(() => fn.apply(this, args), delay);
    };
  }

  const storage = {
    db: null,
    hasIDB: false,
    key: `${STORAGE_NS}__${WID}`,

    async init(){
      if (!("indexedDB" in window)) {
        this.hasIDB = false;
        return;
      }
      try{
        this.db = await new Promise((resolve, reject) => {
          const req = indexedDB.open(`${STORAGE_NS}_db`, 1);
          req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains("state")) db.createObjectStore("state");
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
        this.hasIDB = true;
      }catch{
        this.hasIDB = false;
        this.db = null;
      }
    },

    async get(){
      if (this.hasIDB && this.db){
        try{
          const result = await new Promise((resolve, reject) => {
            const tx = this.db.transaction("state", "readonly");
            const store = tx.objectStore("state");
            const req = store.get(this.key);
            req.onsuccess = () => resolve(req.result ?? null);
            req.onerror = () => reject(req.error);
          });
          if (result) return result;
        }catch{}
      }

      try{
        const raw = localStorage.getItem(this.key);
        return raw ? JSON.parse(raw) : null;
      }catch{
        return null;
      }
    },

    async set(value){
      try{
        localStorage.setItem(this.key, JSON.stringify(value));
      }catch{}

      if (this.hasIDB && this.db){
        try{
          await new Promise((resolve, reject) => {
            const tx = this.db.transaction("state", "readwrite");
            const store = tx.objectStore("state");
            const req = store.put(value, this.key);
            req.onsuccess = () => resolve();
            req.onerror = () => reject(req.error);
          });
        }catch{}
      }
    }
  };

  function defaultTaskState(){
    return {
      tasks: [],
      ui: { energy: "mid", view: "all" },
      pickedId: null
    };
  }

  function normalizeTheme(obj){
    const t = Object.assign({}, DEFAULT_THEME, obj || {});
    return {
      bg: normHex(t.bg, DEFAULT_THEME.bg),
      ink: normHex(t.ink, DEFAULT_THEME.ink),
      muted: normHex(t.muted, DEFAULT_THEME.muted),
      stroke: normHex(t.stroke, DEFAULT_THEME.stroke),
      cardA: clamp(t.cardA, 35, 95)
    };
  }

  function normalizeBackground(obj){
    const bg = Object.assign({}, DEFAULT_BG, obj || {});
    return {
      tint: normHex(bg.tint, DEFAULT_BG.tint),
      strength: clamp(bg.strength, 0, 70),
      blur: clamp(bg.blur, 0, 24),
      imageDataUrl: typeof bg.imageDataUrl === "string" && bg.imageDataUrl ? bg.imageDataUrl : null
    };
  }

  function normalizeTaskState(obj){
    const base = defaultTaskState();
    const incoming = obj && typeof obj === "object" ? obj : {};
    base.tasks = Array.isArray(incoming.tasks)
      ? incoming.tasks.map(t => ({
          id: String(t?.id || uid()),
          text: String(t?.text || ""),
          energy: ["low","mid","high"].includes(t?.energy) ? t.energy : "mid",
          done: !!t?.done,
          createdAt: Number(t?.createdAt || Date.now()) || Date.now()
        })).filter(t => t.text.trim())
      : [];
    base.ui = {
      energy: ["low","mid","high"].includes(incoming?.ui?.energy) ? incoming.ui.energy : "mid",
      view: ["all","todo","done"].includes(incoming?.ui?.view) ? incoming.ui.view : "all"
    };
    base.pickedId = typeof incoming?.pickedId === "string" ? incoming.pickedId : null;
    return base;
  }

  function normalizePresets(list){
    if (!Array.isArray(list)) return [];
    return list
      .filter(Boolean)
      .map(p => ({
        id: String(p.id || uid()),
        ns: String(p.ns || PRESET_NAMESPACE),
        name: String(p.name || "Untitled"),
        theme: normalizeTheme(p.theme),
        bg: normalizeBackground(p.bg)
      }))
      .filter(p => p.ns === PRESET_NAMESPACE);
  }

  function normalizeState(raw){
    return {
      version: APP_VERSION,
      wid: WID,
      lastUpdated: Number(raw?.lastUpdated || 0) || 0,
      theme: normalizeTheme(raw?.theme),
      background: normalizeBackground(raw?.background),
      presets: normalizePresets(raw?.presets),
      picker: normalizeTaskState(raw?.picker)
    };
  }

  let state = normalizeState(null);
  let themeDraft = normalizeTheme(DEFAULT_THEME);
  let bgDraft = normalizeBackground(DEFAULT_BG);

  const bc = "BroadcastChannel" in window ? new BroadcastChannel(CHANNEL_NAME) : null;

  function touchState(){
    state.lastUpdated = Date.now();
  }

  async function saveState(){
    touchState();
    await storage.set(state);
    if (bc){
      try{
        bc.postMessage({ type: "state-updated", wid: WID, lastUpdated: state.lastUpdated });
      }catch{}
    }
  }

  const debouncedSave = debounce(() => { saveState(); }, 120);

  async function flushSave(){
    await saveState();
  }

  function closePanels(except){
    if (except !== "theme") $("themePanel")?.classList.remove("open");
    if (except !== "bg") $("bgPanel")?.classList.remove("open");
  }

  function initPanels(){
    $("themeBtn")?.addEventListener("click", (e) => {
      e.stopPropagation();
      const open = !$("themePanel").classList.contains("open");
      closePanels(open ? "theme" : null);
      $("themePanel").classList.toggle("open", open);
    });

    $("bgBtn")?.addEventListener("click", (e) => {
      e.stopPropagation();
      const open = !$("bgPanel").classList.contains("open");
      closePanels(open ? "bg" : null);
      $("bgPanel").classList.toggle("open", open);
    });

    document.addEventListener("click", (e) => {
      const inside =
        e.target.closest("#themePanel") || e.target.closest("#themeBtn") ||
        e.target.closest("#bgPanel") || e.target.closest("#bgBtn");
      if (!inside) closePanels(null);
    });
  }

  function applyTheme(theme){
    const t = normalizeTheme(theme);
    document.documentElement.style.setProperty("--bg", t.bg);
    document.documentElement.style.setProperty("--ink", t.ink);
    document.documentElement.style.setProperty("--muted", t.muted);
    document.documentElement.style.setProperty("--stroke", t.stroke);
    document.documentElement.style.setProperty("--card", `rgba(255,255,255,${t.cardA / 100})`);

    const themeDot = $("themeDot");
    if (themeDot){
      themeDot.style.background = t.ink;
      themeDot.style.boxShadow = `0 0 0 6px rgba(243,239,233,${Math.min(0.32, 0.10 + (t.cardA/300))})`;
    }
  }

  function syncThemeInputs(theme){
    const t = normalizeTheme(theme);
    $("tBg").value = t.bg;
    $("tInk").value = t.ink;
    $("tMuted").value = t.muted;
    $("tStroke").value = t.stroke;
    $("tCardA").value = String(t.cardA);
  }

  function readThemeInputs(){
    return normalizeTheme({
      bg: $("tBg")?.value,
      ink: $("tInk")?.value,
      muted: $("tMuted")?.value,
      stroke: $("tStroke")?.value,
      cardA: Number($("tCardA")?.value)
    });
  }

  function applyBackground(bg){
    const safe = normalizeBackground(bg);
    document.documentElement.style.setProperty("--board-tint", safe.tint);
    document.documentElement.style.setProperty("--board-tint-a", String(safe.strength / 100));
    document.documentElement.style.setProperty("--board-image", safe.imageDataUrl ? `url("${safe.imageDataUrl}")` : "none");
    document.documentElement.style.setProperty("--bg-blur", `${safe.blur}px`);

    const boardTintEl = $("boardTint");
    if (boardTintEl){
      boardTintEl.style.background = hexToRgba(safe.tint, safe.strength / 100);
    }

    const bgDot = $("bgDot");
    if (bgDot){
      bgDot.style.background = safe.tint;
      bgDot.style.boxShadow = `0 0 0 6px ${hexToRgba(safe.tint, Math.min(0.28, (safe.strength / 100) + 0.10))}`;
    }
  }

  function syncBgInputs(bg){
    const safe = normalizeBackground(bg);
    $("bgColor").value = safe.tint;
    $("bgStrength").value = String(safe.strength);
    $("bgBlur").value = String(safe.blur);
    $("bgImage").value = "";
  }

  function readBgInputs(){
    return normalizeBackground({
      tint: $("bgColor")?.value,
      strength: Number($("bgStrength")?.value),
      blur: Number($("bgBlur")?.value),
      imageDataUrl: bgDraft.imageDataUrl
    });
  }

  function refreshPresetSelect(){
    const sel = $("presetSelect");
    const cur = sel.value;
    sel.innerHTML = `<option value="">—</option>`;
    const list = normalizePresets(state.presets);
    for (const p of list){
      const opt = document.createElement("option");
      opt.value = p.id;
      opt.textContent = p.name || "Untitled";
      sel.appendChild(opt);
    }
    if (list.some(p => p.id === cur)) sel.value = cur;
  }

  function currentPresetPayload(){
    return {
      id: uid(),
      ns: PRESET_NAMESPACE,
      name: ($("presetName")?.value || "").trim() || "Untitled",
      theme: normalizeTheme(themeDraft),
      bg: normalizeBackground(bgDraft)
    };
  }

  function energyLabel(e){
    if(e === "low") return "Low";
    if(e === "high") return "High";
    return "Medium";
  }

  function pickFrom(list){
    if(!list.length) return null;
    return list[Math.floor(Math.random() * list.length)];
  }

  function filteredTasks(){
    let list = [...state.picker.tasks];

    if(state.picker.ui.view === "todo") list = list.filter(t => !t.done);
    if(state.picker.ui.view === "done") list = list.filter(t => t.done);

    const order = { low: 0, mid: 1, high: 2 };
    list.sort((a,b) => {
      if(a.done !== b.done) return a.done ? 1 : -1;
      if(a.energy !== b.energy) return (order[a.energy] ?? 9) - (order[b.energy] ?? 9);
      return (b.createdAt||0) - (a.createdAt||0);
    });

    return list;
  }

  function renderKPIs(){
    const total = state.picker.tasks.length;
    const done = state.picker.tasks.filter(t => t.done).length;
    const todo = total - done;

    $("kTotal").textContent = String(total);
    $("kTodo").textContent  = String(todo);
    $("kDone").textContent  = String(done);
  }

  function renderPicked(){
    const box = $("pickedBox");
    const title = $("pickedTitle");
    const tag = $("pickedTag");
    const picked = state.picker.tasks.find(t => t.id === state.picker.pickedId) || null;

    if(!picked){
      box.style.display = "none";
      return;
    }

    box.style.display = "block";
    title.textContent = picked.text + (picked.done ? " (done)" : "");
    tag.textContent = energyLabel(picked.energy);
    tag.className = "tag";
  }

  function renderList(){
    const root = $("taskList");
    const list = filteredTasks();
    root.innerHTML = "";

    if(list.length === 0){
      root.innerHTML = `<div class="tiny">No tasks yet. Add one above.</div>`;
      return;
    }

    for(const t of list){
      const el = document.createElement("div");
      el.className = "item";

      const meta = document.createElement("div");
      meta.className = "meta";

      const b = document.createElement("b");
      b.textContent = t.text;
      if(t.done){
        b.style.textDecoration = "line-through";
        b.style.opacity = "0.72";
      }

      const s = document.createElement("span");
      s.textContent = `${energyLabel(t.energy)} energy · ${t.done ? "done" : "to do"}`;

      meta.appendChild(b);
      meta.appendChild(s);

      const right = document.createElement("div");
      right.className = "right";

      const energyTag = document.createElement("span");
      energyTag.className = "tag";
      energyTag.textContent = energyLabel(t.energy);

      const doneBtn = document.createElement("button");
      doneBtn.type = "button";
      doneBtn.className = "smallbtn";
      doneBtn.textContent = t.done ? "Undo" : "Done";
      doneBtn.addEventListener("click", async () => {
        t.done = !t.done;
        await flushSave();
        renderAll();
      });

      const delBtn = document.createElement("button");
      delBtn.type = "button";
      delBtn.className = "smallbtn danger";
      delBtn.textContent = "✕";
      delBtn.title = "Remove";
      delBtn.addEventListener("click", async () => {
        state.picker.tasks = state.picker.tasks.filter(x => x.id !== t.id);
        if(state.picker.pickedId === t.id) state.picker.pickedId = null;
        await flushSave();
        renderAll();
      });

      right.appendChild(energyTag);
      right.appendChild(doneBtn);
      right.appendChild(delBtn);

      el.appendChild(meta);
      el.appendChild(right);
      root.appendChild(el);
    }
  }

  function renderAll(){
    $("currentEnergy").value = state.picker.ui.energy;
    $("viewFilter").value = state.picker.ui.view;
    renderKPIs();
    renderPicked();
    renderList();
    debouncedSave();
  }

  async function addTask(){
    const text = ($("taskText").value || "").trim();
    if(!text) return;

    const energy = $("taskEnergy").value || "mid";
    state.picker.tasks.unshift({
      id: uid(),
      text,
      energy,
      done:false,
      createdAt: Date.now()
    });

    $("taskText").value = "";
    $("taskText").focus();
    await flushSave();
    renderAll();
  }

  function pickOne(forcedEnergy){
    const energy = forcedEnergy || state.picker.ui.energy;
    const candidates = state.picker.tasks.filter(t => !t.done && t.energy === energy);
    const fallback = state.picker.tasks.filter(t => !t.done);
    const chosen = pickFrom(candidates.length ? candidates : fallback);
    state.picker.pickedId = chosen ? chosen.id : null;
    renderAll();
  }

  function initThemeUI(){
    themeDraft = normalizeTheme(state.theme);
    syncThemeInputs(themeDraft);
    applyTheme(themeDraft);

    ["tBg","tInk","tMuted","tStroke","tCardA"].forEach(id=>{
      const el = $(id);
      el?.addEventListener("input", ()=>{
        themeDraft = readThemeInputs();
        applyTheme(themeDraft);
        setStatus("");
      });
    });

    $("tApply")?.addEventListener("click", async ()=>{
      themeDraft = readThemeInputs();
      state.theme = normalizeTheme(themeDraft);
      applyTheme(state.theme);
      await flushSave();
      setStatus("Theme applied.");
    });

    $("tReset")?.addEventListener("click", async ()=>{
      themeDraft = normalizeTheme(DEFAULT_THEME);
      state.theme = normalizeTheme(DEFAULT_THEME);
      applyTheme(themeDraft);
      syncThemeInputs(themeDraft);
      await flushSave();
      setStatus("Theme reset.");
    });
  }

  function initBackgroundUI(){
    const preview = ()=>{
      bgDraft = readBgInputs();
      applyBackground(bgDraft);
      setStatus("");
    };

    $("bgColor")?.addEventListener("input", preview);
    $("bgStrength")?.addEventListener("input", preview);
    $("bgBlur")?.addEventListener("input", preview);

    $("bgImage")?.addEventListener("change", async ()=>{
      const file = $("bgImage").files && $("bgImage").files[0];
      if(!file) return;
      try{
        const dataUrl = await new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = () => resolve(String(r.result));
          r.onerror = reject;
          r.readAsDataURL(file);
        });
        bgDraft.imageDataUrl = dataUrl;
        bgDraft = normalizeBackground(bgDraft);
        applyBackground(bgDraft);
        setStatus("");
      }catch{
        setStatus("Could not read that image.");
      }
    });

    $("bgRemove")?.addEventListener("click", ()=>{
      bgDraft.imageDataUrl = null;
      $("bgImage").value = "";
      bgDraft = normalizeBackground(bgDraft);
      applyBackground(bgDraft);
      setStatus("");
    });

    $("bgApply")?.addEventListener("click", async ()=>{
      bgDraft = readBgInputs();
      state.background = normalizeBackground(bgDraft);
      applyBackground(state.background);
      await flushSave();
      setStatus("Background applied.");
    });

    $("bgReset")?.addEventListener("click", async ()=>{
      bgDraft = normalizeBackground(DEFAULT_BG);
      state.background = normalizeBackground(DEFAULT_BG);
      syncBgInputs(bgDraft);
      applyBackground(bgDraft);
      await flushSave();
      setStatus("Background reset.");
    });
  }

  function initPresetUI(){
    refreshPresetSelect();

    $("presetSave")?.addEventListener("click", async ()=>{
      const name = ($("presetName").value || "").trim();
      if(!name){ setStatus("Type a preset name first."); return; }

      const payload = currentPresetPayload();
      payload.name = name;

      state.presets = [payload, ...normalizePresets(state.presets).filter(p => p.id !== payload.id)];
      $("presetName").value = "";
      refreshPresetSelect();
      $("presetSelect").value = payload.id;
      await flushSave();
      setStatus("Preset saved.");
    });

    $("presetApply")?.addEventListener("click", async ()=>{
      const id = $("presetSelect").value || "";
      if(!id){ setStatus("Choose a preset first."); return; }

      const preset = normalizePresets(state.presets).find(p=>p.id===id);
      if(!preset){ setStatus("Preset not found."); return; }

      themeDraft = normalizeTheme(preset.theme);
      state.theme = normalizeTheme(preset.theme);
      syncThemeInputs(themeDraft);
      applyTheme(themeDraft);

      bgDraft = normalizeBackground(preset.bg);
      state.background = normalizeBackground(preset.bg);
      syncBgInputs(bgDraft);
      applyBackground(bgDraft);

      await flushSave();
      setStatus("Preset applied.");
    });

    $("presetDelete")?.addEventListener("click", async ()=>{
      const id = $("presetSelect").value || "";
      if(!id){ setStatus("Choose a preset first."); return; }

      const before = normalizePresets(state.presets);
      const after = before.filter(p=>p.id!==id);

      if(after.length === before.length){
        setStatus("Preset not found.");
        return;
      }

      state.presets = after;
      refreshPresetSelect();
      $("presetSelect").value = "";
      await flushSave();
      setStatus("Preset deleted.");
    });
  }

  function initPickerUI(){
    const resetConfirm = $("resetConfirm");

    function hideResetConfirm(){
      resetConfirm.style.display = "none";
    }

    function showResetConfirm(){
      resetConfirm.style.display = "block";
      closePanels(null);
    }

    $("addTask")?.addEventListener("click", addTask);

    $("taskText")?.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        e.preventDefault();
        addTask();
      }
    });

    $("taskText")?.addEventListener("input", debouncedSave);
    $("taskText")?.addEventListener("change", debouncedSave);
    $("taskText")?.addEventListener("blur", debouncedSave);

    $("taskEnergy")?.addEventListener("change", debouncedSave);

    $("currentEnergy")?.addEventListener("change", ()=>{
      state.picker.ui.energy = $("currentEnergy").value;
      renderAll();
    });

    $("viewFilter")?.addEventListener("change", ()=>{
      state.picker.ui.view = $("viewFilter").value;
      renderAll();
    });

    $("pickOne")?.addEventListener("click", ()=> pickOne());

    $("shuffle")?.addEventListener("click", ()=>{
      const energies = ["low","mid","high"];
      const forced = energies[Math.floor(Math.random()*energies.length)];
      state.picker.ui.energy = forced;
      pickOne(forced);
    });

    $("pickAnother")?.addEventListener("click", ()=> pickOne());

    $("markDone")?.addEventListener("click", async ()=>{
      const picked = state.picker.tasks.find(t => t.id === state.picker.pickedId);
      if(!picked) return;
      picked.done = true;
      const e = picked.energy;
      state.picker.pickedId = null;
      await flushSave();
      renderAll();
      pickOne(e);
    });

    $("clearDone")?.addEventListener("click", async ()=>{
      state.picker.tasks = state.picker.tasks.filter(t => !t.done);
      if(state.picker.pickedId && !state.picker.tasks.find(t => t.id === state.picker.pickedId)) {
        state.picker.pickedId = null;
      }
      await flushSave();
      renderAll();
    });

    $("resetAll")?.addEventListener("click", ()=>{
      if(resetConfirm.style.display === "block"){
        hideResetConfirm();
      }else{
        showResetConfirm();
      }
    });

    $("resetNo")?.addEventListener("click", hideResetConfirm);

    $("resetYes")?.addEventListener("click", async ()=>{
      state.picker = defaultTaskState();
      hideResetConfirm();
      await flushSave();
      renderAll();
    });
  }

  if (bc){
    bc.onmessage = async (event) => {
      const msg = event.data;
      if (!msg || msg.type !== "state-updated" || msg.wid !== WID) return;

      const incoming = await storage.get();
      if (!incoming) return;

      if ((incoming.lastUpdated || 0) > (state.lastUpdated || 0)){
        state = normalizeState(incoming);
        themeDraft = normalizeTheme(state.theme);
        bgDraft = normalizeBackground(state.background);
        applyTheme(themeDraft);
        syncThemeInputs(themeDraft);
        applyBackground(bgDraft);
        syncBgInputs(bgDraft);
        refreshPresetSelect();
        renderAll();
      }
    };
  }

  window.addEventListener("storage", async (e) => {
    if (e.key !== storage.key || !e.newValue) return;
    try{
      const incoming = normalizeState(JSON.parse(e.newValue));
      if ((incoming.lastUpdated || 0) > (state.lastUpdated || 0)){
        state = incoming;
        themeDraft = normalizeTheme(state.theme);
        bgDraft = normalizeBackground(state.background);
        applyTheme(themeDraft);
        syncThemeInputs(themeDraft);
        applyBackground(bgDraft);
        syncBgInputs(bgDraft);
        refreshPresetSelect();
        renderAll();
      }
    }catch{}
  });

  async function emergencySave(){
    try{
      await flushSave();
    }catch{}
  }

  window.addEventListener("beforeunload", emergencySave);
  window.addEventListener("pagehide", emergencySave);
  window.addEventListener("blur", emergencySave);

  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden"){
      emergencySave();
    }
  });

  await storage.init();

  const loaded = await storage.get();
  state = normalizeState(loaded);

  themeDraft = normalizeTheme(state.theme);
  bgDraft = normalizeBackground(state.background);

  initPanels();
  initThemeUI();
  initBackgroundUI();
  initPresetUI();
  initPickerUI();

  applyTheme(themeDraft);
  syncThemeInputs(themeDraft);

  applyBackground(bgDraft);
  syncBgInputs(bgDraft);

  $("currentEnergy").value = state.picker.ui.energy;
  $("viewFilter").value = state.picker.ui.view;

  renderAll();
})();
</script>
</body>
</html>
