<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Purchase Log</title>
  <style>
    :root{
      --page-bg:#ffffff;
      --card:#ffffffcc;
      --stroke:#e9e4dd;
      --ink:#2b2a28;
      --muted:#6a665f;
      --soft:#f3efe9;
      --shadow:0 10px 30px rgba(30,20,10,.06);
      --r:18px;

      --board-tint:#ffffff;
      --board-tint-a:0.30;
      --board-image:none;
      --board-blur:0px;

      --panel-bg: rgba(255,255,255,0.94);
      --field-bg: #ffffff;

      --theme-dot: var(--ink);
    }

    *{ box-sizing:border-box; }
    html, body{ min-height:100%; }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      color:var(--ink);
      background: var(--page-bg);
      padding:28px 18px;
      -webkit-text-size-adjust:100%;
    }

    button, input, select, textarea{ font:inherit; }

    .wrap{ max-width:980px; margin:0 auto; }
    h1{ margin:0; font-size:18px; }
    .sub{ margin:6px 0 14px; color:var(--muted); font-size:13px; }

    .widgetBoard{
      position:relative;
      border-radius: var(--r);
      overflow:hidden;
      border:1px solid var(--stroke);
      box-shadow: var(--shadow);
      background: transparent;
    }

    .widgetBoard::before{
      content:"";
      position:absolute;
      inset:0;
      background-image: var(--board-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform: scale(1.03);
      z-index:0;
      pointer-events:none;
      filter: blur(var(--board-blur)) saturate(1.05);
    }

    .widgetBoard::after{
      content:"";
      position:absolute;
      inset:0;
      background: rgba(255,255,255,0.24);
      pointer-events:none;
      z-index:0;
    }

    .boardTint{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:1;
      background: rgba(0,0,0,0);
    }

    .boardContent{ position:relative; z-index:2; }

    .card{
      background:var(--card);
      border:0;
      border-radius:0;
      box-shadow:none;
      padding:14px;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }

    .title{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .title h2{ margin:0; font-size:14px; font-weight:650; letter-spacing:.2px; }
    .hint{ color:var(--muted); font-size:12px; }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    button, input, select, textarea{
      border:1px solid var(--stroke);
      background:var(--field-bg);
      color:var(--ink);
      border-radius:12px;
      padding:10px 12px;
      outline:none;
      -webkit-tap-highlight-color: transparent;
    }

    button{ cursor:pointer; }

    button.soft{ background:var(--soft); }
    button:active{ transform:translateY(1px); }

    .divider{ height:1px; background:var(--stroke); margin:12px 0; }

    .kpi{ display:flex; gap:12px; flex-wrap:wrap; }
    .kpi .box{
      flex:1; min-width:160px;
      background:var(--soft);
      border:1px solid var(--stroke);
      border-radius:14px;
      padding:10px;
    }
    .kpi .num{ font-weight:750; font-size:16px; }
    .kpi .lab{ font-size:12px; color:var(--muted); }

    .list{ display:flex; flex-direction:column; gap:8px; }

    .item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid var(--stroke);
      background:var(--field-bg);
      flex-wrap:wrap;
    }

    .item .meta{ display:flex; flex-direction:column; gap:2px; min-width:0; }
    .item .meta b{ font-size:13px; word-break:break-word; }
    .item .meta span{ font-size:12px; color:var(--muted); word-break:break-word; }

    .tag{
      font-size:11px;
      padding:5px 9px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:var(--soft);
      white-space:nowrap;
    }

    .right{ display:flex; gap:8px; align-items:center; }
    .smallbtn{ padding:8px 10px; border-radius:12px; }
    .danger{ border-color:#efc2c2; }
    .tiny{ font-size:12px; color:var(--muted); }
    .foot{ margin-top:12px; display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; }
    label.tiny{ display:inline-flex; align-items:center; gap:8px; }

    .controlsWrap{ position:relative; display:flex; gap:10px; align-items:center; }

    .bgBtn, .themeBtn{
      width:34px; height:34px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.92);
      padding:0;
      display:grid;
      place-items:center;
      box-shadow: 0 3px 12px rgba(30,20,10,.08);
    }

    .bgDot{
      width:14px; height:14px;
      border-radius:999px;
      border:1px solid rgba(233,228,221,0.95);
      background: var(--board-tint);
      box-shadow: 0 0 0 6px rgba(239,231,225,0.30);
    }

    .themeDot{
      width:14px; height:14px;
      border-radius:999px;
      border:1px solid rgba(233,228,221,0.95);
      background: var(--theme-dot);
      box-shadow: 0 0 0 6px rgba(233,228,221,0.35);
    }

    .panel{
      position:absolute;
      width:320px;
      border-radius:16px;
      border:1px solid var(--stroke);
      background: var(--panel-bg);
      box-shadow: 0 18px 40px rgba(30,20,10,.12);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding:12px;
      display:none;
      z-index:99999;
      max-height:min(76vh, 680px);
      overflow:auto;
      overscroll-behavior:contain;
    }

    .panel.open{ display:block; }

    .bgTitle{
      margin:0 0 10px 0;
      font-size:12px;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      color: rgba(43,42,40,0.72);
    }

    .bgRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:7px 0;
    }

    .bgRow label{ font-size:12px; color:var(--muted); }

    .bgRow input[type="color"]{
      width:42px; height:32px;
      border-radius:10px;
      padding:0;
      border:1px solid var(--stroke);
      background: transparent;
      cursor:pointer;
      flex:0 0 auto;
    }

    .bgRow input[type="range"]{ width:160px; max-width:100%; }
    .bgFile{ width:100%; font-size:12px; color: rgba(43,42,40,0.75); }

    .bgMiniBtn{
      width:100%;
      border-radius:12px;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.95);
      padding:10px 12px;
      font-weight:700;
      letter-spacing:.06em;
      text-transform:uppercase;
      font-size:11px;
      color: rgba(43,42,40,0.82);
      box-shadow: 0 2px 8px rgba(30,20,10,.06);
    }

    .bgDiv{ height:1px; background: var(--stroke); margin:8px 0; }

    .status{
      font-size:12px;
      color: var(--muted);
      margin-top:6px;
      min-height:16px;
    }

    .presetName{
      width:100%;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.96);
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
      color:var(--ink);
      outline:none;
    }

    .presetSelect{
      width:100%;
      border:1px solid var(--stroke);
      background: rgba(255,255,255,0.96);
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
      color:var(--ink);
      outline:none;
      height:38px;
    }

    @media (max-width: 760px){
      body{ padding:14px; }
      .row{ flex-direction:column; align-items:stretch; }
      .item .right{ width:100%; justify-content:flex-end; }
      .panel{
        position: fixed !important;
        top: 14px !important;
        left: 14px !important;
        right: 14px !important;
        width: auto !important;
        max-height: calc(100dvh - 28px);
      }
      input, select, textarea{ font-size:16px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Purchase Log</h1>

    <div class="widgetBoard" id="widgetBoard" aria-label="Purchase log widget board">
      <div class="boardTint" id="boardTint"></div>
      <div class="boardContent">
        <section class="card">
          <div class="title">
            <h2>Log a purchase</h2>

            <div class="controlsWrap" id="controlsWrap">
              <button class="bgBtn" id="bgBtn" type="button" aria-label="Background settings" title="Background settings">
                <span class="bgDot" id="bgDot" aria-hidden="true"></span>
              </button>

              <button class="themeBtn" id="themeBtn" type="button" aria-label="Theme settings" title="Theme settings">
                <span class="themeDot" id="themeDot" aria-hidden="true"></span>
              </button>
            </div>
          </div>

          <div class="row">
            <input type="date" id="pDate">

            <label class="tiny">
              Currency
              <select id="currency">
                <option value="AUTO">Auto (from locale)</option>
                <option value="GBP">GBP (£)</option>
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="NGN">NGN (₦)</option>
                <option value="CAD">CAD ($)</option>
                <option value="AUD">AUD ($)</option>
                <option value="JPY">JPY (¥)</option>
                <option value="ZAR">ZAR (R)</option>
              </select>
            </label>

            <input type="number" id="pAmt" step="0.01" placeholder="Amount">
            <select id="pCat">
              <option>Food</option><option>Transport</option><option>Fun</option><option>Essentials</option><option>Bills</option><option>Other</option>
            </select>
            <select id="pType">
              <option value="planned">Planned</option>
              <option value="impulse">Impulse</option>
            </select>
            <button id="pAdd">Add</button>
          </div>

          <div class="divider"></div>

          <div class="kpi" id="kpis"></div>

          <div class="divider"></div>

          <div class="list" id="purchaseList"></div>

          <div class="foot"></div>
        </section>
      </div>
    </div>
  </div>

  <div class="panel" id="bgPanel" role="dialog" aria-label="Background settings">
    <div class="bgTitle">Background</div>

    <div class="bgRow">
      <label for="bgColor">Tint</label>
      <input id="bgColor" type="color" value="#ffffff" />
    </div>

    <div class="bgRow">
      <label for="bgStrength">Tint strength</label>
      <input id="bgStrength" type="range" min="0" max="70" value="30" />
    </div>

    <div class="bgRow">
      <label for="bgBlur">Image blur</label>
      <input id="bgBlur" type="range" min="0" max="20" value="0" />
    </div>

    <div class="bgDiv"></div>

    <div class="bgRow" style="align-items:flex-start;">
      <label for="bgImage">Image</label>
      <input id="bgImage" class="bgFile" type="file" accept="image/*" />
    </div>

    <div class="bgRow">
      <button id="bgRemove" class="bgMiniBtn" type="button">Remove image</button>
    </div>

    <div class="bgDiv"></div>

    <button class="bgMiniBtn" id="bgApply" type="button">Apply background</button>
    <button class="bgMiniBtn" id="bgReset" type="button" style="margin-top:8px;">Reset background</button>

    <div class="status" id="uiStatus" aria-live="polite"></div>
  </div>

  <div class="panel" id="themePanel" role="dialog" aria-label="Theme settings">
    <div class="bgTitle">Theme</div>

    <div class="bgRow">
      <label for="tPageBg">Page bg</label>
      <input id="tPageBg" type="color" value="#ffffff" />
    </div>

    <div class="bgRow">
      <label for="tText">Text</label>
      <input id="tText" type="color" value="#2b2a28" />
    </div>

    <div class="bgRow">
      <label for="tMuted">Muted</label>
      <input id="tMuted" type="color" value="#6a665f" />
    </div>

    <div class="bgRow">
      <label for="tStroke">Borders</label>
      <input id="tStroke" type="color" value="#e9e4dd" />
    </div>

    <div class="bgRow">
      <label for="tCard">Card</label>
      <input id="tCard" type="color" value="#ffffff" />
    </div>

    <div class="bgRow">
      <label for="tCardA">Card opacity</label>
      <input id="tCardA" type="range" min="20" max="95" value="80" />
    </div>

    <div class="bgRow">
      <label for="tSoft">Secondary</label>
      <input id="tSoft" type="color" value="#f3efe9" />
    </div>

    <div class="bgDiv"></div>

    <button id="themeApply" class="bgMiniBtn" type="button">Apply theme</button>
    <button id="resetTheme" class="bgMiniBtn" type="button" style="margin-top:8px;">Reset theme</button>

    <div class="bgDiv"></div>

    <div class="bgTitle" style="margin:0 0 10px 0;">Presets</div>

    <input class="presetName" id="presetName" placeholder="Preset name">
    <button class="bgMiniBtn" id="presetSave" type="button" style="margin-top:8px;">Save current as preset</button>

    <div class="bgDiv"></div>

    <select class="presetSelect" id="presetSelect"></select>

    <button class="bgMiniBtn" id="presetApply" type="button" style="margin-top:8px;">Apply preset</button>
    <button class="bgMiniBtn" id="presetDelete" type="button" style="margin-top:8px;">Delete preset</button>

    <div class="status" id="presetStatus" aria-live="polite"></div>
  </div>

<script>
(function(){
  "use strict";

  function canUseLocalStorage(){
    try{
      const k = "__t__" + Math.random().toString(16).slice(2);
      localStorage.setItem(k, "1");
      localStorage.removeItem(k);
      return true;
    }catch{
      return false;
    }
  }

  const hasLS = canUseLocalStorage();
  const mem = Object.create(null);

  function lsGet(key){
    try{
      return hasLS ? localStorage.getItem(key) : (mem[key] ?? null);
    }catch{
      return mem[key] ?? null;
    }
  }

  function lsSet(key, value){
    try{
      if(hasLS) localStorage.setItem(key, value);
      else mem[key] = String(value);
    }catch{
      mem[key] = String(value);
    }
  }

  function lsRemove(key){
    try{
      if(hasLS) localStorage.removeItem(key);
      else delete mem[key];
    }catch{
      delete mem[key];
    }
  }

  function loadJSON(key, fallback = null){
    try{
      const raw = lsGet(key);
      return raw ? JSON.parse(raw) : fallback;
    }catch{
      return fallback;
    }
  }

  function saveJSON(key, value){
    lsSet(key, JSON.stringify(value));
  }

  function sanitizeId(value){
    return String(value || "")
      .trim()
      .toLowerCase()
      .replace(/[^a-z0-9_-]+/g, "-")
      .replace(/^-+|-+$/g, "") || "default";
  }

  function getWidgetId(){
    try{
      const params = new URLSearchParams(location.search);
      const fromQuery = sanitizeId(params.get("wid"));
      if(fromQuery && fromQuery !== "default") return fromQuery;
    }catch{}
    const fromPath = sanitizeId(location.pathname.replace(/\.[^/.]+$/, ""));
    return fromPath || "default";
  }

  const WID = getWidgetId();
  const BC_NAME = "purchase-log-sync";
  const channel = ("BroadcastChannel" in window) ? new BroadcastChannel(BC_NAME) : null;

  function broadcast(type, payload){
    try{
      if(channel) channel.postMessage({ type, payload, wid: WID, ts: Date.now() });
    }catch{}
  }

  const DB_NAME = "purchase_log_db_v3";
  const DB_STORE = "kv";
  let dbPromise = null;

  function openDB(){
    if(dbPromise) return dbPromise;

    dbPromise = new Promise((resolve) => {
      if(!("indexedDB" in window)){
        resolve(null);
        return;
      }

      const request = indexedDB.open(DB_NAME, 1);

      request.onupgradeneeded = () => {
        const db = request.result;
        if(!db.objectStoreNames.contains(DB_STORE)){
          db.createObjectStore(DB_STORE);
        }
      };

      request.onsuccess = () => resolve(request.result);
      request.onerror = () => resolve(null);
    });

    return dbPromise;
  }

  async function idbGet(key){
    const db = await openDB();
    if(!db) return null;

    return new Promise((resolve) => {
      try{
        const tx = db.transaction(DB_STORE, "readonly");
        const store = tx.objectStore(DB_STORE);
        const req = store.get(key);
        req.onsuccess = () => resolve(req.result ?? null);
        req.onerror = () => resolve(null);
      }catch{
        resolve(null);
      }
    });
  }

  async function idbSet(key, value){
    const db = await openDB();
    if(!db) return false;

    return new Promise((resolve) => {
      try{
        const tx = db.transaction(DB_STORE, "readwrite");
        const store = tx.objectStore(DB_STORE);
        const req = store.put(value, key);
        req.onsuccess = () => resolve(true);
        req.onerror = () => resolve(false);
      }catch{
        resolve(false);
      }
    });
  }

  async function idbRemove(key){
    const db = await openDB();
    if(!db) return false;

    return new Promise((resolve) => {
      try{
        const tx = db.transaction(DB_STORE, "readwrite");
        const store = tx.objectStore(DB_STORE);
        const req = store.delete(key);
        req.onsuccess = () => resolve(true);
        req.onerror = () => resolve(false);
      }catch{
        resolve(false);
      }
    });
  }

  function hexToRgba(hex, a){
    const h = String(hex || "").replace("#","").trim();
    const full = h.length === 3 ? h.split("").map(c=>c+c).join("") : h;
    const num = parseInt(full || "ffffff", 16);
    const r = (num >> 16) & 255;
    const g = (num >> 8) & 255;
    const b = num & 255;
    return `rgba(${r},${g},${b},${a})`;
  }

  function clamp(n, min, max){
    n = Number(n);
    if(!Number.isFinite(n)) return min;
    return Math.max(min, Math.min(max, n));
  }

  function normHex(hex, fallback){
    const s = String(hex || "").trim();
    return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : fallback;
  }

  function uid(){
    return Math.random().toString(16).slice(2) + Date.now().toString(16);
  }

  async function copyText(text){
    try{
      if(navigator.clipboard && navigator.clipboard.writeText){
        await navigator.clipboard.writeText(text);
        return true;
      }
    }catch{}
    try{
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      return !!ok;
    }catch{
      return false;
    }
  }

  function fileToDataUrl(file){
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(String(r.result || ""));
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  const els = {
    widgetBoard: document.getElementById("widgetBoard"),
    boardTint: document.getElementById("boardTint"),

    bgBtn: document.getElementById("bgBtn"),
    themeBtn: document.getElementById("themeBtn"),
    bgPanel: document.getElementById("bgPanel"),
    themePanel: document.getElementById("themePanel"),

    bgColor: document.getElementById("bgColor"),
    bgStrength: document.getElementById("bgStrength"),
    bgBlur: document.getElementById("bgBlur"),
    bgImage: document.getElementById("bgImage"),
    bgRemove: document.getElementById("bgRemove"),
    bgApply: document.getElementById("bgApply"),
    bgReset: document.getElementById("bgReset"),
    bgDot: document.getElementById("bgDot"),
    uiStatus: document.getElementById("uiStatus"),

    tPageBg: document.getElementById("tPageBg"),
    tText: document.getElementById("tText"),
    tMuted: document.getElementById("tMuted"),
    tStroke: document.getElementById("tStroke"),
    tCard: document.getElementById("tCard"),
    tCardA: document.getElementById("tCardA"),
    tSoft: document.getElementById("tSoft"),
    themeApply: document.getElementById("themeApply"),
    resetTheme: document.getElementById("resetTheme"),
    themeDot: document.getElementById("themeDot"),

    presetName: document.getElementById("presetName"),
    presetSelect: document.getElementById("presetSelect"),
    presetSave: document.getElementById("presetSave"),
    presetApply: document.getElementById("presetApply"),
    presetDelete: document.getElementById("presetDelete"),
    presetStatus: document.getElementById("presetStatus"),

    pDate: document.getElementById("pDate"),
    currency: document.getElementById("currency"),
    pAmt: document.getElementById("pAmt"),
    pCat: document.getElementById("pCat"),
    pType: document.getElementById("pType"),
    pAdd: document.getElementById("pAdd"),
    kpis: document.getElementById("kpis"),
    purchaseList: document.getElementById("purchaseList")
  };

  function setStatus(msg){
    els.uiStatus.textContent = msg || "";
    if(msg) els.presetStatus.textContent = msg;
  }

  const KEYS = {
    bg: `purchase_log_bg_v4__${WID}`,
    bgImage: `purchase_log_bg_image_v4__${WID}`,
    theme: `purchase_log_theme_v4__${WID}`,
    presets: `purchase_log_presets_v4`,
    app: `purchase_log_app_v4__${WID}`,
    currency: `purchase_log_currency_pref_v4__${WID}`
  };

  const DEFAULT_BG = {
    tint:"#ffffff",
    strength:30,
    blur:0
  };

  const DEFAULT_THEME = {
    pageBg:"#ffffff",
    ink:"#2b2a28",
    muted:"#6a665f",
    stroke:"#e9e4dd",
    cardBase:"#ffffff",
    cardA:80,
    soft:"#f3efe9"
  };

  function safeBg(input){
    const bg = { ...DEFAULT_BG, ...(input || {}) };
    return {
      tint: normHex(bg.tint, DEFAULT_BG.tint),
      strength: clamp(bg.strength, 0, 70),
      blur: clamp(bg.blur, 0, 20)
    };
  }

  function safeTheme(input){
    const t = { ...DEFAULT_THEME, ...(input || {}) };
    return {
      pageBg: normHex(t.pageBg, DEFAULT_THEME.pageBg),
      ink: normHex(t.ink, DEFAULT_THEME.ink),
      muted: normHex(t.muted, DEFAULT_THEME.muted),
      stroke: normHex(t.stroke, DEFAULT_THEME.stroke),
      cardBase: normHex(t.cardBase, DEFAULT_THEME.cardBase),
      cardA: clamp(t.cardA, 20, 95),
      soft: normHex(t.soft, DEFAULT_THEME.soft)
    };
  }

  function applyBgVisual(bg, imageDataUrl){
    const b = safeBg(bg);

    document.documentElement.style.setProperty("--board-tint", b.tint);
    document.documentElement.style.setProperty("--board-tint-a", String(b.strength / 100));
    document.documentElement.style.setProperty("--board-blur", `${b.blur}px`);
    document.documentElement.style.setProperty("--board-image", imageDataUrl ? `url("${imageDataUrl}")` : "none");

    els.boardTint.style.background = hexToRgba(b.tint, b.strength / 100);

    els.bgDot.style.background = b.tint;
    els.bgDot.style.boxShadow = `0 0 0 6px ${hexToRgba(b.tint, Math.min(0.35, (b.strength / 100) + 0.12))}`;

    const overlayAlpha = clamp((b.strength / 100) + 0.08, 0.08, 0.55);
    let overlayStyle = document.getElementById("purchase_log_overlay_style");
    if(!overlayStyle){
      overlayStyle = document.createElement("style");
      overlayStyle.id = "purchase_log_overlay_style";
      document.head.appendChild(overlayStyle);
    }
    overlayStyle.textContent = `.widgetBoard::after{background:${hexToRgba("#ffffff", overlayAlpha)} !important;}`;
  }

  function syncBgInputs(bg){
    els.bgColor.value = bg.tint;
    els.bgStrength.value = String(bg.strength);
    els.bgBlur.value = String(bg.blur);
  }

  function readBgInputs(){
    return safeBg({
      tint: els.bgColor.value,
      strength: Number(els.bgStrength.value),
      blur: Number(els.bgBlur.value)
    });
  }

  function applyTheme(t){
    const theme = safeTheme(t);

    document.documentElement.style.setProperty("--page-bg", theme.pageBg);
    document.documentElement.style.setProperty("--ink", theme.ink);
    document.documentElement.style.setProperty("--muted", theme.muted);
    document.documentElement.style.setProperty("--soft", theme.soft);
    document.documentElement.style.setProperty("--stroke", theme.stroke);
    document.documentElement.style.setProperty("--card", hexToRgba(theme.cardBase, theme.cardA / 100));
    document.documentElement.style.setProperty("--field-bg", "#ffffff");
    document.documentElement.style.setProperty("--theme-dot", theme.ink);

    els.themeDot.style.background = theme.ink;
    els.themeDot.style.boxShadow = `0 0 0 6px ${hexToRgba(theme.stroke, 0.35)}`;
    els.themeDot.style.borderColor = hexToRgba(theme.stroke, 0.95);

    return theme;
  }

  function syncThemeInputs(t){
    els.tPageBg.value = t.pageBg;
    els.tText.value = t.ink;
    els.tMuted.value = t.muted;
    els.tStroke.value = t.stroke;
    els.tCard.value = t.cardBase;
    els.tCardA.value = String(t.cardA);
    els.tSoft.value = t.soft;
  }

  function readThemeInputs(){
    return safeTheme({
      pageBg: els.tPageBg.value,
      ink: els.tText.value,
      muted: els.tMuted.value,
      stroke: els.tStroke.value,
      cardBase: els.tCard.value,
      cardA: Number(els.tCardA.value),
      soft: els.tSoft.value
    });
  }

  async function saveBg(bg, imageDataUrl){
    saveJSON(KEYS.bg, safeBg(bg));
    if(imageDataUrl){
      await idbSet(KEYS.bgImage, imageDataUrl);
    }else{
      await idbRemove(KEYS.bgImage);
    }
    broadcast("background");
  }

  async function loadBg(){
    const bg = safeBg(loadJSON(KEYS.bg, DEFAULT_BG));
    const imageDataUrl = await idbGet(KEYS.bgImage);
    return {
      bg,
      imageDataUrl: (typeof imageDataUrl === "string" && imageDataUrl) ? imageDataUrl : null
    };
  }

  async function saveTheme(theme){
    saveJSON(KEYS.theme, safeTheme(theme));
    broadcast("theme");
  }

  async function loadTheme(){
    return safeTheme(loadJSON(KEYS.theme, DEFAULT_THEME));
  }

  async function loadPresets(){
    const raw = loadJSON(KEYS.presets, []);
    return Array.isArray(raw) ? raw : [];
  }

  async function savePresets(list){
    saveJSON(KEYS.presets, Array.isArray(list) ? list : []);
    broadcast("presets");
  }

  function presetImageKey(id){
    return `purchase_log_preset_image_v4__${id}`;
  }

  async function refreshPresetSelect(){
    const list = await loadPresets();
    const cur = els.presetSelect.value;
    els.presetSelect.innerHTML = `<option value="">—</option>`;
    for(const p of list){
      const opt = document.createElement("option");
      opt.value = p.id;
      opt.textContent = p.name || "Untitled";
      els.presetSelect.appendChild(opt);
    }
    if(cur && list.some(x => x.id === cur)){
      els.presetSelect.value = cur;
    }
  }

  async function getPresetById(id){
    const list = await loadPresets();
    return list.find(x => x.id === id) || null;
  }

  let bgDraft = safeBg(DEFAULT_BG);
  let bgDraftImage = null;
  let themeDraft = safeTheme(DEFAULT_THEME);

  function closePanels(){
    els.bgPanel.classList.remove("open");
    els.themePanel.classList.remove("open");
  }

  function placePanel(btn, panel){
    if(window.innerWidth <= 760) return;

    const r = btn.getBoundingClientRect();
    const pad = 10;

    panel.style.top = `${window.scrollY + r.bottom + pad}px`;
    let left = window.scrollX + r.right - panel.offsetWidth;
    left = Math.max(window.scrollX + pad, Math.min(window.scrollX + window.innerWidth - panel.offsetWidth - pad, left));
    panel.style.left = `${left}px`;
  }

  function togglePanel(btn, panel, other){
    const willOpen = !panel.classList.contains("open");
    other.classList.remove("open");
    panel.classList.toggle("open", willOpen);
    if(willOpen) requestAnimationFrame(() => placePanel(btn, panel));
  }

  els.bgBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    togglePanel(els.bgBtn, els.bgPanel, els.themePanel);
  });

  els.themeBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    togglePanel(els.themeBtn, els.themePanel, els.bgPanel);
  });

  document.addEventListener("click", (e) => {
    const inside = e.target.closest("#bgBtn") || e.target.closest("#bgPanel") || e.target.closest("#themeBtn") || e.target.closest("#themePanel");
    if(!inside) closePanels();
  });

  window.addEventListener("resize", () => {
    if(els.bgPanel.classList.contains("open")) placePanel(els.bgBtn, els.bgPanel);
    if(els.themePanel.classList.contains("open")) placePanel(els.themeBtn, els.themePanel);
  });

  document.addEventListener("keydown", (e) => {
    if(e.key === "Escape") closePanels();
  });

  els.bgColor.addEventListener("input", () => {
    bgDraft = readBgInputs();
    applyBgVisual(bgDraft, bgDraftImage);
    setStatus("");
  });

  els.bgStrength.addEventListener("input", () => {
    bgDraft = readBgInputs();
    applyBgVisual(bgDraft, bgDraftImage);
    setStatus("");
  });

  els.bgBlur.addEventListener("input", () => {
    bgDraft = readBgInputs();
    applyBgVisual(bgDraft, bgDraftImage);
    setStatus("");
  });

  els.bgImage.addEventListener("change", async () => {
    const file = els.bgImage.files && els.bgImage.files[0];
    if(!file) return;
    try{
      bgDraftImage = await fileToDataUrl(file);
      applyBgVisual(bgDraft, bgDraftImage);
      setStatus("");
    }catch{
      setStatus("Could not load image.");
    }
  });

  els.bgRemove.addEventListener("click", () => {
    bgDraftImage = null;
    els.bgImage.value = "";
    applyBgVisual(bgDraft, bgDraftImage);
    setStatus("");
  });

  els.bgApply.addEventListener("click", async () => {
    bgDraft = readBgInputs();
    applyBgVisual(bgDraft, bgDraftImage);
    await saveBg(bgDraft, bgDraftImage);
    setStatus("Background applied.");
  });

  els.bgReset.addEventListener("click", async () => {
    bgDraft = safeBg(DEFAULT_BG);
    bgDraftImage = null;
    els.bgImage.value = "";
    syncBgInputs(bgDraft);
    applyBgVisual(bgDraft, bgDraftImage);
    await saveBg(bgDraft, bgDraftImage);
    setStatus("Background reset.");
  });

  [els.tPageBg, els.tText, els.tMuted, els.tStroke, els.tCard, els.tCardA, els.tSoft].forEach(el => {
    el.addEventListener("input", () => {
      themeDraft = applyTheme(readThemeInputs());
      setStatus("");
    });
  });

  els.themeApply.addEventListener("click", async () => {
    themeDraft = applyTheme(readThemeInputs());
    syncThemeInputs(themeDraft);
    await saveTheme(themeDraft);
    setStatus("Theme applied.");
  });

  els.resetTheme.addEventListener("click", async () => {
    themeDraft = applyTheme(DEFAULT_THEME);
    syncThemeInputs(themeDraft);
    await saveTheme(themeDraft);
    setStatus("Theme reset.");
  });

  els.presetSave.addEventListener("click", async () => {
    const name = String(els.presetName.value || "").trim();
    if(!name){
      els.presetStatus.textContent = "Type a preset name first.";
      return;
    }

    const list = await loadPresets();
    const id = uid();

    list.unshift({
      id,
      name,
      theme: readThemeInputs(),
      bg: readBgInputs(),
      hasImage: !!bgDraftImage
    });

    if(bgDraftImage){
      await idbSet(presetImageKey(id), bgDraftImage);
    }

    await savePresets(list);
    els.presetName.value = "";
    await refreshPresetSelect();
    els.presetSelect.value = id;
    els.presetStatus.textContent = "Preset saved.";
  });

  els.presetApply.addEventListener("click", async () => {
    const id = String(els.presetSelect.value || "");
    if(!id){
      els.presetStatus.textContent = "Choose a preset first.";
      return;
    }

    const p = await getPresetById(id);
    if(!p){
      els.presetStatus.textContent = "Preset not found.";
      return;
    }

    const presetTheme = safeTheme(p.theme || DEFAULT_THEME);
    const presetBg = safeBg(p.bg || DEFAULT_BG);
    const presetImage = p.hasImage ? await idbGet(presetImageKey(id)) : null;

    themeDraft = applyTheme(presetTheme);
    syncThemeInputs(themeDraft);
    await saveTheme(themeDraft);

    bgDraft = presetBg;
    bgDraftImage = (typeof presetImage === "string" && presetImage) ? presetImage : null;
    syncBgInputs(bgDraft);
    applyBgVisual(bgDraft, bgDraftImage);
    await saveBg(bgDraft, bgDraftImage);

    els.presetStatus.textContent = "Preset applied.";
  });

  els.presetDelete.addEventListener("click", async () => {
    const id = String(els.presetSelect.value || "");
    if(!id){
      els.presetStatus.textContent = "Choose a preset first.";
      return;
    }

    const list = await loadPresets();
    const next = list.filter(x => x.id !== id);
    if(next.length === list.length){
      els.presetStatus.textContent = "Preset not found.";
      return;
    }

    await idbRemove(presetImageKey(id));
    await savePresets(next);
    await refreshPresetSelect();
    els.presetSelect.value = "";
    els.presetStatus.textContent = "Preset deleted.";
  });

  function todayISO(){
    return new Date().toISOString().slice(0,10);
  }

  function monthKey(dIso){
    return String(dIso || "").slice(0,7);
  }

  const REGION_TO_CURRENCY = {
    GB:"GBP", US:"USD", CA:"CAD", AU:"AUD", NZ:"NZD",
    IE:"EUR", FR:"EUR", DE:"EUR", ES:"EUR", IT:"EUR", NL:"EUR", PT:"EUR",
    BE:"EUR", AT:"EUR", FI:"EUR", GR:"EUR", CY:"EUR", MT:"EUR",
    SK:"EUR", SI:"EUR", EE:"EUR", LV:"EUR", LT:"EUR", LU:"EUR",
    JP:"JPY", CN:"CNY", IN:"INR", NG:"NGN", ZA:"ZAR", KE:"KES",
    GH:"GHS", BR:"BRL", MX:"MXN", CH:"CHF", SE:"SEK", NO:"NOK",
    DK:"DKK", PL:"PLN", CZ:"CZK", HU:"HUF", RO:"RON", TR:"TRY"
  };

  function getRegionFromLocale(locale){
    try{
      if(typeof Intl !== "undefined" && Intl.Locale){
        const loc = new Intl.Locale(locale);
        if(loc.region) return loc.region.toUpperCase();
      }
    }catch{}
    const norm = String(locale || "").replace("_","-");
    const parts = norm.split("-");
    return (parts[1] || "").toUpperCase();
  }

  function autoCurrency(){
    const locale = Intl.NumberFormat().resolvedOptions().locale || navigator.language || "";
    const region = getRegionFromLocale(locale);
    return REGION_TO_CURRENCY[region] || "";
  }

  function moneyLocal(n){
    const v = Number(n || 0);
    if(!isFinite(v)) return "0";
    const locale = Intl.NumberFormat().resolvedOptions().locale || navigator.language || undefined;
    const pref = loadJSON(KEYS.currency, "AUTO") || "AUTO";
    const cur = (pref === "AUTO") ? autoCurrency() : pref;

    try{
      if(cur){
        return new Intl.NumberFormat(locale, { style:"currency", currency: cur }).format(v);
      }
      return new Intl.NumberFormat(locale, { minimumFractionDigits:2, maximumFractionDigits:2 }).format(v);
    }catch{
      return v.toFixed(2);
    }
  }

  function defaultState(){
    return {
      selectedDate: todayISO(),
      byDate: {},
      monthlyTotals: {}
    };
  }

  function sanitizeEntry(entry){
    return {
      id: String(entry?.id || uid()),
      amount: Math.max(0, Number(entry?.amount || 0)),
      category: String(entry?.category || "Other"),
      type: entry?.type === "impulse" ? "impulse" : "planned",
      createdAt: String(entry?.createdAt || new Date().toISOString())
    };
  }

  function sanitizeState(s){
    const base = defaultState();
    const src = s && typeof s === "object" ? s : {};
    const byDate = {};

    for(const [date, list] of Object.entries(src.byDate || {})){
      if(/^\d{4}-\d{2}-\d{2}$/.test(date)){
        byDate[date] = Array.isArray(list) ? list.map(sanitizeEntry).filter(x => x.amount > 0) : [];
      }
    }

    const monthlyTotals = {};
    for(const [mk, val] of Object.entries(src.monthlyTotals || {})){
      if(/^\d{4}-\d{2}$/.test(mk)){
        monthlyTotals[mk] = Math.max(0, Number(val || 0));
      }
    }

    return {
      selectedDate: /^\d{4}-\d{2}-\d{2}$/.test(src.selectedDate || "") ? src.selectedDate : base.selectedDate,
      byDate,
      monthlyTotals
    };
  }

  let state = sanitizeState(loadJSON(KEYS.app, defaultState()));

  function saveAppState(){
    saveJSON(KEYS.app, state);
    broadcast("app", { selectedDate: state.selectedDate });
  }

  function getDayList(date){
    if(!state.byDate[date]) state.byDate[date] = [];
    return state.byDate[date];
  }

  function computeMonthTotal(mk){
    let total = 0;
    for(const [d, list] of Object.entries(state.byDate)){
      if(d.startsWith(mk)){
        total += (list || []).reduce((a,p)=>a + Number(p.amount || 0), 0);
      }
    }
    return total;
  }

  function ensureMonthSnapshotExists(mk){
    if(state.monthlyTotals[mk] == null){
      state.monthlyTotals[mk] = computeMonthTotal(mk);
    }
  }

  function setSelectedDate(date){
    state.selectedDate = date || todayISO();
    ensureMonthSnapshotExists(monthKey(state.selectedDate));
    saveAppState();
    renderAll();
  }

  function removePurchase(date, id){
    const list = getDayList(date).filter(p => p.id !== id);
    state.byDate[date] = list;

    const mk = monthKey(date);
    ensureMonthSnapshotExists(mk);
    state.monthlyTotals[mk] = computeMonthTotal(mk);

    saveAppState();
    renderAll();
  }

  function renderKPIs(){
    const date = state.selectedDate;
    const list = getDayList(date);

    const totalDay = list.reduce((a,p)=>a + Number(p.amount || 0), 0);
    const impulse = list.filter(p=>p.type==="impulse").reduce((a,p)=>a + Number(p.amount || 0), 0);
    const planned = list.filter(p=>p.type==="planned").reduce((a,p)=>a + Number(p.amount || 0), 0);
    const impulseShare = totalDay > 0 ? Math.round((impulse / totalDay) * 100) : 0;

    const mk = monthKey(date);
    ensureMonthSnapshotExists(mk);
    const monthTotal = computeMonthTotal(mk);
    state.monthlyTotals[mk] = monthTotal;

    els.kpis.innerHTML = `
      <div class="box"><div class="num">${moneyLocal(totalDay)}</div><div class="lab">Total for ${date}</div></div>
      <div class="box"><div class="num">${moneyLocal(monthTotal)}</div><div class="lab">Monthly total (${mk})</div></div>
      <div class="box"><div class="num">${moneyLocal(planned)}</div><div class="lab">Planned</div></div>
      <div class="box"><div class="num">${moneyLocal(impulse)}</div><div class="lab">Impulse (${impulseShare}%)</div></div>
    `;
  }

  function renderList(){
    const date = state.selectedDate;
    const list = getDayList(date);
    els.purchaseList.innerHTML = "";

    if(list.length === 0){
      els.purchaseList.innerHTML = `<div class="tiny">No purchases saved for <b>${date}</b>. Add one above.</div>`;
      return;
    }

    for(const p of list){
      const el = document.createElement("div");
      el.className = "item";
      el.innerHTML = `
        <div class="meta">
          <b>${p.category} · ${moneyLocal(p.amount)}</b>
          <span>${p.type} · added ${new Date(p.createdAt).toLocaleString()}</span>
        </div>
        <div class="right">
          <span class="tag">${p.type}</span>
          <button class="smallbtn" title="Remove" type="button">✕</button>
        </div>
      `;
      el.querySelector("button").addEventListener("click", ()=>removePurchase(date, p.id));
      els.purchaseList.appendChild(el);
    }
  }

  function renderAll(){
    els.pDate.value = state.selectedDate;
    renderKPIs();
    renderList();
    saveJSON(KEYS.app, state);
  }

  els.currency.value = loadJSON(KEYS.currency, "AUTO") || "AUTO";
  els.currency.addEventListener("change", () => {
    saveJSON(KEYS.currency, els.currency.value);
    renderAll();
    broadcast("currency");
  });

  els.pDate.value = state.selectedDate;
  ensureMonthSnapshotExists(monthKey(state.selectedDate));

  els.pDate.addEventListener("change", (e) => setSelectedDate(e.target.value));

  els.pAdd.addEventListener("click", () => {
    const date = els.pDate.value || todayISO();
    const amount = Number(els.pAmt.value);
    const category = els.pCat.value;
    const type = els.pType.value;

    if(!isFinite(amount) || amount <= 0) return;

    const entry = sanitizeEntry({
      id: uid(),
      amount,
      category,
      type,
      createdAt: new Date().toISOString()
    });

    const list = getDayList(date);
    list.unshift(entry);

    state.byDate[date] = list;
    state.selectedDate = date;

    const mk = monthKey(date);
    ensureMonthSnapshotExists(mk);
    state.monthlyTotals[mk] = computeMonthTotal(mk);

    saveAppState();
    els.pAmt.value = "";
    renderAll();
  });

  els.pAmt.addEventListener("keydown", (e) => {
    if(e.key === "Enter"){
      e.preventDefault();
      els.pAdd.click();
    }
  });

  async function init(){
    const savedTheme = await loadTheme();
    themeDraft = applyTheme(savedTheme);
    syncThemeInputs(themeDraft);

    const savedBg = await loadBg();
    bgDraft = savedBg.bg;
    bgDraftImage = savedBg.imageDataUrl;
    syncBgInputs(bgDraft);
    applyBgVisual(bgDraft, bgDraftImage);

    await refreshPresetSelect();

    renderAll();
  }

  window.addEventListener("pagehide", () => {
    saveJSON(KEYS.app, state);
  });

  document.addEventListener("visibilitychange", () => {
    if(document.visibilityState === "hidden"){
      saveJSON(KEYS.app, state);
    }
  });

  window.addEventListener("storage", async (e) => {
    if(!e.key) return;

    if(e.key === KEYS.theme){
      const savedTheme = await loadTheme();
      themeDraft = applyTheme(savedTheme);
      syncThemeInputs(themeDraft);
    }

    if(e.key === KEYS.bg){
      const savedBg = await loadBg();
      bgDraft = savedBg.bg;
      bgDraftImage = savedBg.imageDataUrl;
      syncBgInputs(bgDraft);
      applyBgVisual(bgDraft, bgDraftImage);
    }

    if(e.key === KEYS.presets){
      await refreshPresetSelect();
    }

    if(e.key === KEYS.app){
      state = sanitizeState(loadJSON(KEYS.app, defaultState()));
      renderAll();
    }

    if(e.key === KEYS.currency){
      els.currency.value = loadJSON(KEYS.currency, "AUTO") || "AUTO";
      renderAll();
    }
  });

  if(channel){
    channel.onmessage = async (event) => {
      const msg = event.data || {};
      if(!msg.type) return;

      if(msg.type === "theme"){
        const savedTheme = await loadTheme();
        themeDraft = applyTheme(savedTheme);
        syncThemeInputs(themeDraft);
      }

      if(msg.type === "background"){
        const savedBg = await loadBg();
        bgDraft = savedBg.bg;
        bgDraftImage = savedBg.imageDataUrl;
        syncBgInputs(bgDraft);
        applyBgVisual(bgDraft, bgDraftImage);
      }

      if(msg.type === "presets"){
        await refreshPresetSelect();
      }

      if(msg.type === "app"){
        state = sanitizeState(loadJSON(KEYS.app, defaultState()));
        renderAll();
      }

      if(msg.type === "currency"){
        els.currency.value = loadJSON(KEYS.currency, "AUTO") || "AUTO";
        renderAll();
      }
    };
  }

  init();
})();
</script>
</body>
</html>
