<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Deadline Horizon</title>
  <style>
    :root{
      --bg: #ffffff;
      --panel: rgba(255,255,255,.68);
      --text: #2b2b2b;
      --muted: #6f6a63;
      --line: rgba(43,43,43,.18);
      --lineStrong: rgba(43,43,43,.30);
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --shadow2: 0 16px 50px rgba(0,0,0,.14);
      --radius: 18px;
      --radius2: 14px;
      --focus: rgba(43,43,43,.22);
      --horizon: rgba(43,43,43,.24);
      --dot: rgba(43,43,43,.78);
      --dotSoft: rgba(43,43,43,.48);

      --board-tint: #ffffff;
      --board-tint-a: 0.35;
      --board-image: none;
      --board-blur: 0px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin: 0;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: var(--bg);
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    input, textarea, select, button{
      font: inherit;
    }

    .wrap{
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }

    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 14px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .title{
      display:grid;
      gap: 6px;
      min-width: 260px;
    }
    .title h1{
      font-size: clamp(22px, 2.6vw, 32px);
      line-height: 1.1;
      margin: 0;
      letter-spacing: -.02em;
    }
    .title p{
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      max-width: 62ch;
      line-height: 1.4;
    }

    .actions{
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn{
      appearance:none;
      border: 1px solid var(--lineStrong);
      background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,255,255,.74));
      color: var(--text);
      padding: 10px 12px;
      border-radius: 999px;
      box-shadow: 0 6px 18px rgba(0,0,0,.06);
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
      font-size: 13px;
      display:inline-flex;
      align-items:center;
      gap: 8px;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn:hover{ transform: translateY(-1px); box-shadow: 0 10px 22px rgba(0,0,0,.08); border-color: rgba(43,43,43,.32); }
    .btn:active{ transform: translateY(0px); }
    .btn:focus-visible{ outline: 3px solid var(--focus); outline-offset: 2px; }
    .btn.primary{ border-color: var(--lineStrong); }
    .btn.danger{ border-color: rgba(160, 60, 60, .30); }

    .popover{ position: relative; }
    .bgBtn, .themeBtn{
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid var(--lineStrong);
      background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,255,255,.74));
      box-shadow: 0 6px 18px rgba(0,0,0,.06);
      display:grid;
      place-items:center;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .bgBtn:active, .themeBtn:active{ transform: translateY(1px); }

    .bgDot, .themeDot{
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 1px solid var(--lineStrong);
      background: var(--board-tint);
      box-shadow: 0 0 0 6px rgba(239,231,225,0.35);
    }
    .themeDot{
      background: var(--text);
      box-shadow: 0 0 0 6px rgba(43,43,43,0.10);
    }

    .bgPanel, .themePanel{
      position: absolute;
      top: 50px;
      right: 0;
      width: 320px;
      border-radius: 16px;
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.94);
      box-shadow: 0 18px 40px rgba(0,0,0,.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 12px;
      display:none;
      z-index: 60;
      max-height: min(72vh, 620px);
      overflow:auto;
    }
    .bgPanel.open, .themePanel.open{ display:block; }
    .bgPanel h3, .themePanel h3{
      margin: 0 0 10px 0;
      font-size: 13px;
      font-weight: 650;
      color: rgba(43,43,43,.88);
    }
    .bgRow, .themeRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 8px 0;
    }
    .bgRow label, .themeRow label{
      font-size: 12px;
      color: var(--muted);
      padding-left: 0;
    }
    input[type="color"].bgColor,
    input[type="color"].themeColor{
      width: 34px;
      height: 26px;
      border: 1px solid var(--lineStrong);
      border-radius: 10px;
      padding: 0;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    input[type="range"].bgStrength,
    input[type="range"].themeRange{ width: 150px; }
    .bgFile{
      width: 100%;
      font-size: 12px;
      color: rgba(43,43,43,.75);
    }
    .bgMiniBtn, .themeMiniBtn{
      width: 100%;
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.92);
      border-radius: 12px;
      padding: 9px 10px;
      cursor: pointer;
      font-weight: 650;
      color: rgba(43,43,43,.88);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .bgMiniBtn:active, .themeMiniBtn:active{ transform: translateY(1px); }
    .bgDivider, .themeDivider{
      height: 1px;
      background: var(--line);
      margin: 8px 0;
    }

    .presetName{
      width:100%;
      border:1px solid var(--lineStrong);
      background: rgba(255,255,255,.96);
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
      color: var(--text);
      outline:none;
    }
    .presetSelect{
      width:100%;
      border:1px solid var(--lineStrong);
      background: rgba(255,255,255,.96);
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
      color: var(--text);
      outline:none;
      height:40px;
    }
    .status{
      font-size:12px;
      color: var(--muted);
      margin-top:6px;
      min-height: 16px;
    }

    .widgetBoard{
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
    }
    .widgetBoard::before{
      content:"";
      position:absolute;
      inset:0;
      background-image: var(--board-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(var(--board-blur)) saturate(.98);
      transform: scale(1.03);
      pointer-events:none;
    }
    .widgetBoard::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(900px 520px at 18% 20%, rgba(255,255,255,0.24), transparent 62%),
        radial-gradient(700px 460px at 82% 34%, rgba(255,255,255,0.16), transparent 62%),
        rgba(255,255,255,0.24);
      background-blend-mode: screen;
      pointer-events:none;
    }
    .boardTint{
      position:absolute;
      inset:0;
      pointer-events:none;
      mix-blend-mode: multiply;
    }
    .boardContent{
      position: relative;
      z-index: 2;
    }

    .controls{
      display:grid;
      grid-template-columns: 1.2fr .8fr .6fr;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--lineStrong);
      border-radius: var(--radius);
      padding: 12px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    @media (max-width: 860px){
      .controls{ grid-template-columns: 1fr; }
      .actions{ width: 100%; justify-content: flex-start; }
      .bgPanel, .themePanel{ width: min(92vw, 340px); }
    }
    @media (max-width: 620px){
      .wrap{ padding: 18px 12px 28px; }
      .btn{ min-height: 42px; }
    }

    .field{ position: relative; display:grid; gap: 6px; }
    label{ font-size: 12px; color: var(--muted); padding-left: 6px; }
    .input, select{
      width:100%;
      min-height: 46px;
      padding: 12px 12px 12px 40px;
      border-radius: 14px;
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.80);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.94);
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color .12s ease, box-shadow .12s ease;
    }
    select{ padding-left: 12px; }
    .input:focus, select:focus{
      border-color: rgba(43,43,43,.30);
      box-shadow: 0 0 0 3px rgba(43,43,43,.10);
    }
    .icon{
      position:absolute;
      left: 12px;
      top: 38px;
      width: 16px;
      height: 16px;
      opacity: .65;
      pointer-events:none;
    }

    .panel{
      margin-top: 16px;
      background: var(--panel);
      border: 1px solid var(--lineStrong);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow: hidden;
    }
    .panelHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 14px 14px 12px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }
    .meta{
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }
    .pill{
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.68);
      padding: 6px 10px;
      border-radius: 999px;
      display:inline-flex;
      align-items:center;
      gap: 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.94);
    }

    .vizWrap{ padding: 14px; }
    .viz{
      width: 100%;
      height: 260px;
      border-radius: var(--radius2);
      border: 1px solid var(--lineStrong);
      background:
        radial-gradient(500px 220px at 50% 35%, rgba(255,255,255,.65) 0%, rgba(255,255,255,0) 70%),
        linear-gradient(180deg, rgba(255,255,255,.55) 0%, rgba(255,255,255,.30) 60%, rgba(255,255,255,.50) 100%);
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.88);
    }
    .viz::before{
      content:"";
      position:absolute;
      left: 8%;
      right: 8%;
      top: 62%;
      height: 2px;
      background: var(--horizon);
      opacity: .92;
    }
    .viz::after{
      content:"";
      position:absolute;
      left: 0;
      right: 0;
      top: 52%;
      height: 32%;
      background: linear-gradient(180deg, rgba(246,244,241,0), rgba(246,244,241,.55));
      pointer-events:none;
    }

    .dot{
      position: absolute;
      top: 0;
      left: 0;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      background: var(--dot);
      box-shadow:
        0 10px 24px rgba(0,0,0,.10),
        0 0 0 4px rgba(43,43,43,.08);
      opacity: 0;
      animation: fadeIn .35s ease forwards;
      cursor: pointer;
      border: 1.5px solid rgba(255,255,255,.65);
      touch-action: manipulation;
    }
    .dot.soft{
      background: var(--dotSoft);
      box-shadow:
        0 8px 18px rgba(0,0,0,.08),
        0 0 0 3px rgba(43,43,43,.06);
    }
    .dot.urgent{
      width: 18px;
      height: 18px;
      box-shadow:
        0 12px 28px rgba(0,0,0,.12),
        0 0 0 6px rgba(43,43,43,.10);
    }
    .dot:focus-visible{
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }
    @keyframes fadeIn{
      from{ opacity: 0; transform: translate(-50%, -50%) scale(.92); }
      to{ opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    .tooltip{
      position:absolute;
      min-width: 210px;
      max-width: 320px;
      background: rgba(255,255,255,.90);
      border: 1px solid var(--lineStrong);
      border-radius: 14px;
      box-shadow: var(--shadow2);
      padding: 10px 10px 9px;
      transform: translate(-50%, -110%);
      pointer-events:none;
      opacity: 0;
      transition: opacity .12s ease, transform .12s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 10;
    }
    .tooltip.show{
      opacity: 1;
      transform: translate(-50%, -118%);
    }
    .ttTitle{
      margin: 0;
      font-size: 13px;
      font-weight: 750;
      letter-spacing: -.01em;
      line-height: 1.2;
    }
    .ttSub{
      margin: 4px 0 0;
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.35;
    }
    .ttChips{
      display:flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .chip{
      font-size: 11px;
      color: rgba(43,43,43,.80);
      background: rgba(255,255,255,.68);
      border: 1px solid var(--line);
      padding: 4px 8px;
      border-radius: 999px;
    }

    .list{
      padding: 0 14px 14px;
      display:grid;
      gap: 10px;
    }
    .row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
      padding: 12px;
      border-radius: var(--radius2);
      background: rgba(255,255,255,.80);
      border: 1px solid var(--lineStrong);
      box-shadow: 0 8px 22px rgba(0,0,0,.06);
    }
    .rowLeft{ min-width: 0; display:grid; gap: 4px; }
    .rowTitle{
      margin: 0;
      font-size: 13.5px;
      font-weight: 720;
      line-height: 1.2;
      letter-spacing: -.01em;
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 64ch;
    }
    .rowMeta{
      margin: 0;
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.35;
      display:flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .smallPill{
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.68);
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      color: rgba(43,43,43,.82);
    }
    .rowActions{
      display:flex;
      gap: 8px;
      flex: 0 0 auto;
    }
    .iconBtn{
      appearance:none;
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.74);
      width: 34px;
      height: 34px;
      border-radius: 999px;
      cursor: pointer;
      display:grid;
      place-items:center;
      transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.92);
      touch-action: manipulation;
    }
    .iconBtn:hover{
      transform: translateY(-1px);
      border-color: rgba(43,43,43,.32);
      box-shadow: 0 10px 20px rgba(0,0,0,.08);
    }
    .iconBtn:active{ transform: translateY(0); }
    .iconBtn:focus-visible{ outline: 3px solid var(--focus); outline-offset: 2px; }
    .iconBtn svg{ width: 16px; height: 16px; opacity: .78; }

    .empty{
      padding: 40px 18px 44px;
      display:grid;
      place-items:center;
      text-align:center;
      gap: 12px;
      color: var(--muted);
    }
    .empty .big{
      width: 56px;
      height: 56px;
      border-radius: 18px;
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.74);
      display:grid;
      place-items:center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.92), 0 12px 30px rgba(0,0,0,.06);
      font-size: 22px;
    }
    .empty h2{ margin: 0; color: var(--text); font-size: 16px; letter-spacing: -.01em; }
    .empty p{
      margin: 0;
      max-width: 60ch;
      font-size: 13.5px;
      line-height: 1.5;
    }

    .modalBackdrop{
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(20,18,16,.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 80;
    }
    .modalBackdrop.show{ display: grid; }

    .modal{
      width: min(760px, 100%);
      background: rgba(255,255,255,.90);
      border: 1px solid var(--lineStrong);
      border-radius: 20px;
      box-shadow: var(--shadow2);
      overflow: hidden;
    }
    .modalHead{
      padding: 14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.74);
    }
    .modalHead h3{ margin: 0; font-size: 15px; letter-spacing: -.01em; }
    .modalBody{
      padding: 14px 16px 16px;
      display:grid;
      gap: 12px;
    }
    .formGrid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 740px){ .formGrid{ grid-template-columns: 1fr; } }

    .input2, .textarea, .select2{
      width:100%;
      min-height: 46px;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid var(--lineStrong);
      background: rgba(255,255,255,.82);
      font-size: 14px;
      color: var(--text);
      outline:none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.92);
      transition: border-color .12s ease, box-shadow .12s ease;
    }
    .textarea{ min-height: 88px; resize: vertical; }
    .input2:focus, .textarea:focus, .select2:focus{
      border-color: rgba(43,43,43,.30);
      box-shadow: 0 0 0 3px rgba(43,43,43,.10);
    }
    .help{
      font-size: 12px;
      color: var(--muted);
      margin-top: -6px;
      line-height: 1.35;
    }

    .modalFoot{
      display:flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 16px 14px;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,.72);
      flex-wrap: wrap;
    }

    .savingBadge{
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      z-index: 120;
      background: rgba(20,20,20,.84);
      color: rgba(255,255,255,.96);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }
    .savingBadge.show{
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title">
        <h1>Deadline Horizon</h1>
      </div>

      <div class="actions">
        <button class="btn primary" id="addBtn" type="button" title="Add a deadline">
          <span aria-hidden="true">＋</span>
          Add deadline
        </button>
        <button class="btn" id="exportBtn" type="button" title="Export deadlines to JSON">
          <span aria-hidden="true">⤓</span>
          Export
        </button>
        <button class="btn danger" id="clearBtn" type="button" title="Clear all deadlines">
          <span aria-hidden="true">✕</span>
          Clear
        </button>

        <div class="popover" id="bgPopover">
          <button class="bgBtn" id="bgBtn" type="button" aria-label="Background settings" title="Background settings">
            <span class="bgDot" id="bgDot" aria-hidden="true"></span>
          </button>

          <div class="bgPanel" id="bgPanel" role="dialog" aria-label="Background settings">
            <h3>Background</h3>

            <div class="bgRow">
              <label for="bgColor">Tint</label>
              <input class="bgColor" id="bgColor" type="color" value="#efe7e1" />
            </div>

            <div class="bgRow">
              <label for="bgStrength">Tint strength</label>
              <input class="bgStrength" id="bgStrength" type="range" min="0" max="70" value="35" />
            </div>

            <div class="bgRow">
              <label for="bgBlur">Image blur</label>
              <input class="bgStrength" id="bgBlur" type="range" min="0" max="30" value="0" />
            </div>

            <div class="bgDivider"></div>

            <div class="bgRow" style="align-items:flex-start;">
              <label for="bgImage">Image</label>
              <input class="bgFile" id="bgImage" type="file" accept="image/*" />
            </div>

            <div class="bgRow">
              <button class="bgMiniBtn" id="removeImage" type="button">Remove image</button>
            </div>

            <div class="bgDivider"></div>

            <button class="bgMiniBtn" id="bgApply" type="button">Apply background</button>
            <button class="bgMiniBtn" id="bgReset" type="button" style="margin-top:8px;">Reset background</button>
          </div>
        </div>

        <div class="popover" id="themePopover">
          <button class="themeBtn" id="themeBtn" type="button" aria-label="Theme settings" title="Theme settings">
            <span class="themeDot" id="themeDot" aria-hidden="true"></span>
          </button>

          <div class="themePanel" id="themePanel" role="dialog" aria-label="Theme settings">
            <h3>Theme</h3>

            <div class="themeRow">
              <label for="tBg">Page background</label>
              <input class="themeColor" id="tBg" type="color" value="#ffffff" />
            </div>

            <div class="themeRow">
              <label for="tText">Text</label>
              <input class="themeColor" id="tText" type="color" value="#2b2b2b" />
            </div>

            <div class="themeRow">
              <label for="tMuted">Muted text</label>
              <input class="themeColor" id="tMuted" type="color" value="#6f6a63" />
            </div>

            <div class="themeDivider"></div>

            <div class="themeRow">
              <label for="tPanelHex">Panels</label>

<script>
(function(){
  "use strict";

  const nowISO = () => new Date().toISOString();

  const DAY_MS = 24 * 60 * 60 * 1000;

  const DEFAULT_THEME = {
    bg: "#ffffff",
    text: "#2b2b2b",
    muted: "#6f6a63",
    panelHex: "#ffffff",
    panelA: 68,
    lineHex: "#2b2b2b",
    lineA: 18,
    horizonHex: "#2b2b2b",
    horizonA: 24,
    dotHex: "#2b2b2b",
    dotA: 78,
    dotSoftA: 48
  };

  const DEFAULT_BG = {
    tint: "#efe7e1",
    strength: 35,
    blur: 0,
    imageDataUrl: null
  };

  const DEFAULT_VIEW = {
    q: "",
    tag: "",
    rangeDays: 30
  };

  const DEFAULT_STATE = {
    version: 4,
    updatedAt: nowISO(),
    items: [],
    theme: { ...DEFAULT_THEME },
    background: { ...DEFAULT_BG },
    view: { ...DEFAULT_VIEW }
  };

  function stableWidgetId(){
    try{
      const sp = new URLSearchParams(location.search);
      const wid = (sp.get("wid") || "").trim();
      if (wid) return "wid:" + wid;
    }catch{}
    const base = (location.origin || "") + (location.pathname || "deadline-horizon");
    return "path:" + base.replace(/[^\w:/.-]+/g, "_");
  }

  const WID = stableWidgetId();
  const STORAGE_KEY = "deadline_horizon_state_v4__" + WID;
  const PRESETS_KEY = "deadline_horizon_presets_v4";
  const PRESET_NAMESPACE = "deadline-horizon";
  const DB_NAME = "deadline_horizon_db_v4";
  const STORE_NAME = "kv";

  const els = {
    viz: document.getElementById("viz"),
    tooltip: document.getElementById("tooltip"),
    ttTitle: document.getElementById("ttTitle"),
    ttSub: document.getElementById("ttSub"),
    ttChips: document.getElementById("ttChips"),

    listArea: document.getElementById("listArea"),

    countPill: document.getElementById("countPill"),
    tagPill: document.getElementById("tagPill"),
    filteredMeta: document.getElementById("filteredMeta"),

    search: document.getElementById("search"),
    tagFilter: document.getElementById("tagFilter"),
    range: document.getElementById("range"),

    addBtn: document.getElementById("addBtn"),
    exportBtn: document.getElementById("exportBtn"),
    clearBtn: document.getElementById("clearBtn"),

    modalBackdrop: document.getElementById("modalBackdrop"),
    closeModalBtn: document.getElementById("closeModalBtn"),
    cancelBtn: document.getElementById("cancelBtn"),

    deadlineForm: document.getElementById("deadlineForm"),
    editId: document.getElementById("editId"),
    modalTitle: document.getElementById("modalTitle"),
    saveBtn: document.getElementById("saveBtn"),

    dTitle: document.getElementById("dTitle"),
    dDue: document.getElementById("dDue"),
    dCourse: document.getElementById("dCourse"),
    dTags: document.getElementById("dTags"),
    dNotes: document.getElementById("dNotes"),

    boardTint: document.getElementById("boardTint"),

    bgBtn: document.getElementById("bgBtn"),
    bgPanel: document.getElementById("bgPanel"),
    bgColor: document.getElementById("bgColor"),
    bgStrength: document.getElementById("bgStrength"),
    bgBlur: document.getElementById("bgBlur"),
    bgImage: document.getElementById("bgImage"),
    removeImage: document.getElementById("removeImage"),
    bgDot: document.getElementById("bgDot"),
    bgPopover: document.getElementById("bgPopover"),
    bgApply: document.getElementById("bgApply"),
    bgReset: document.getElementById("bgReset"),

    themeBtn: document.getElementById("themeBtn"),
    themePanel: document.getElementById("themePanel"),
    themeDot: document.getElementById("themeDot"),
    themePopover: document.getElementById("themePopover"),

    tBg: document.getElementById("tBg"),
    tText: document.getElementById("tText"),
    tMuted: document.getElementById("tMuted"),
    tPanelHex: document.getElementById("tPanelHex"),
    tPanelA: document.getElementById("tPanelA"),
    tLineHex: document.getElementById("tLineHex"),
    tLineA: document.getElementById("tLineA"),
    tHorizonHex: document.getElementById("tHorizonHex"),
    tHorizonA: document.getElementById("tHorizonA"),
    tDotHex: document.getElementById("tDotHex"),
    tDotA: document.getElementById("tDotA"),
    tDotSoftA: document.getElementById("tDotSoftA"),
    resetTheme: document.getElementById("resetTheme"),
    themeApply: document.getElementById("themeApply"),

    presetName: document.getElementById("presetName"),
    presetSave: document.getElementById("presetSave"),
    presetSelect: document.getElementById("presetSelect"),
    presetApply: document.getElementById("presetApply"),
    presetDelete: document.getElementById("presetDelete"),
    presetStatus: document.getElementById("presetStatus"),

    savingBadge: document.getElementById("savingBadge")
  };

  let appState = cloneSafe(DEFAULT_STATE);
  let themeDraft = { ...DEFAULT_THEME };
  let bgDraft = { ...DEFAULT_BG };
  let lastFocusEl = null;
  let renderResizeTimer = null;
  let saveToastTimer = null;
  let isBooting = true;

  const Storage = {
    dbPromise: null,

    openDb(){
      if (!("indexedDB" in window)) return Promise.resolve(null);
      if (this.dbPromise) return this.dbPromise;
      this.dbPromise = new Promise((resolve) => {
        try{
          const req = indexedDB.open(DB_NAME, 1);
          req.onupgradeneeded = () => {
            const db = req.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
              db.createObjectStore(STORE_NAME);
            }
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => resolve(null);
        }catch{
          resolve(null);
        }
      });
      return this.dbPromise;
    },

    async idbGet(key){
      const db = await this.openDb();
      if (!db) return null;
      return new Promise((resolve) => {
        try{
          const tx = db.transaction(STORE_NAME, "readonly");
          const store = tx.objectStore(STORE_NAME);
          const req = store.get(key);
          req.onsuccess = () => resolve(req.result ?? null);
          req.onerror = () => resolve(null);
        }catch{
          resolve(null);
        }
      });
    },

    async idbSet(key, value){
      const db = await this.openDb();
      if (!db) return false;
      return new Promise((resolve) => {
        try{
          const tx = db.transaction(STORE_NAME, "readwrite");
          tx.objectStore(STORE_NAME).put(value, key);
          tx.oncomplete = () => resolve(true);
          tx.onerror = () => resolve(false);
        }catch{
          resolve(false);
        }
      });
    },

    async idbRemove(key){
      const db = await this.openDb();
      if (!db) return false;
      return new Promise((resolve) => {
        try{
          const tx = db.transaction(STORE_NAME, "readwrite");
          tx.objectStore(STORE_NAME).delete(key);
          tx.oncomplete = () => resolve(true);
          tx.onerror = () => resolve(false);
        }catch{
          resolve(false);
        }
      });
    },

    lsGet(key){
      try{ return localStorage.getItem(key); }catch{ return null; }
    },

    lsSet(key, value){
      try{
        localStorage.setItem(key, value);
        return true;
      }catch{
        return false;
      }
    },

    lsRemove(key){
      try{
        localStorage.removeItem(key);
        return true;
      }catch{
        return false;
      }
    },

    async getJSON(key){
      const fromLs = this.lsGet(key);
      if (fromLs) {
        try{ return JSON.parse(fromLs); }catch{}
      }
      const fromDb = await this.idbGet(key);
      if (fromDb && typeof fromDb === "string") {
        try{
          const parsed = JSON.parse(fromDb);
          this.lsSet(key, fromDb);
          return parsed;
        }catch{}
      }
      return null;
    },

    async setJSON(key, value){
      const raw = JSON.stringify(value);
      this.lsSet(key, raw);
      await this.idbSet(key, raw);
      return true;
    },

    async remove(key){
      this.lsRemove(key);
      await this.idbRemove(key);
    }
  };

  function cloneSafe(v){
    try{
      return structuredClone(v);
    }catch{
      return JSON.parse(JSON.stringify(v));
    }
  }

  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function clamp(n, a, b){
    return Math.max(a, Math.min(b, n));
  }

  function uid(){
    try{
      if (crypto && crypto.randomUUID) return crypto.randomUUID();
    }catch{}
    return Math.random().toString(16).slice(2) + Date.now().toString(16);
  }

  function normalizeHex(hex, fallback="#ffffff"){
    const s = String(hex || "").trim();
    return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : fallback;
  }

  function hexToRgb(hex){
    const h = normalizeHex(hex).slice(1);
    return {
      r: parseInt(h.slice(0,2), 16),
      g: parseInt(h.slice(2,4), 16),
      b: parseInt(h.slice(4,6), 16),
    };
  }

  function hexToRgba(hex, a){
    const { r, g, b } = hexToRgb(hex);
    return `rgba(${r},${g},${b},${a})`;
  }

  function startOfToday(){
    const d = new Date();
    d.setHours(0,0,0,0);
    return d;
  }

  function daysBetween(a, b){
    return Math.round((b.getTime() - a.getTime()) / DAY_MS);
  }

  function parseDate(yyyyMmDd){
    const [y,m,d] = String(yyyyMmDd || "").split("-").map(Number);
    if (!y || !m || !d) return null;
    const dt = new Date(y, m-1, d);
    dt.setHours(0,0,0,0);
    return dt;
  }

  function formatDate(dt){
    return dt.toLocaleDateString(undefined, { month: "short", day: "numeric" });
  }

  function normalizeTags(raw){
    if (!raw) return [];
    const src = Array.isArray(raw) ? raw.join(",") : String(raw);
    const parts = src.split(",").map(s => s.trim().toLowerCase()).filter(Boolean);
    return [...new Set(parts)].slice(0, 14);
  }

  function sanitizeTheme(theme){
    return {
      bg: normalizeHex(theme?.bg, DEFAULT_THEME.bg),
      text: normalizeHex(theme?.text, DEFAULT_THEME.text),
      muted: normalizeHex(theme?.muted, DEFAULT_THEME.muted),
      panelHex: normalizeHex(theme?.panelHex, DEFAULT_THEME.panelHex),
      panelA: clamp(Number(theme?.panelA ?? DEFAULT_THEME.panelA), 40, 95),
      lineHex: normalizeHex(theme?.lineHex, DEFAULT_THEME.lineHex),
      lineA: clamp(Number(theme?.lineA ?? DEFAULT_THEME.lineA), 8, 55),
      horizonHex: normalizeHex(theme?.horizonHex, DEFAULT_THEME.horizonHex),
      horizonA: clamp(Number(theme?.horizonA ?? DEFAULT_THEME.horizonA), 8, 70),
      dotHex: normalizeHex(theme?.dotHex, DEFAULT_THEME.dotHex),
      dotA: clamp(Number(theme?.dotA ?? DEFAULT_THEME.dotA), 20, 100),
      dotSoftA: clamp(Number(theme?.dotSoftA ?? DEFAULT_THEME.dotSoftA), 10, 100)
    };
  }

  function sanitizeBackground(bg){
    return {
      tint: normalizeHex(bg?.tint, DEFAULT_BG.tint),
      strength: clamp(Number(bg?.strength ?? DEFAULT_BG.strength), 0, 70),
      blur: clamp(Number(bg?.blur ?? DEFAULT_BG.blur), 0, 30),
      imageDataUrl: typeof bg?.imageDataUrl === "string" && bg.imageDataUrl ? bg.imageDataUrl : null
    };
  }

  function sanitizeView(view){
    const rangeDays = clamp(Number(view?.rangeDays ?? DEFAULT_VIEW.rangeDays), 14, 120);
    return {
      q: String(view?.q ?? DEFAULT_VIEW.q),
      tag: String(view?.tag ?? DEFAULT_VIEW.tag),
      rangeDays
    };
  }

  function sanitizeItem(it){
    return {
      id: String(it?.id || uid()),
      title: String(it?.title || "").trim().slice(0, 90),
      due: /^\d{4}-\d{2}-\d{2}$/.test(String(it?.due || "")) ? String(it.due) : "",
      course: String(it?.course || "").trim().slice(0, 70),
      tags: normalizeTags(it?.tags),
      notes: String(it?.notes || "").trim(),
      createdAt: it?.createdAt || nowISO(),
      updatedAt: it?.updatedAt || nowISO()
    };
  }

  function sanitizeState(raw){
    const clean = {
      version: 4,
      updatedAt: raw?.updatedAt || nowISO(),
      items: Array.isArray(raw?.items) ? raw.items.map(sanitizeItem) : [],
      theme: sanitizeTheme(raw?.theme || DEFAULT_THEME),
      background: sanitizeBackground(raw?.background || DEFAULT_BG),
      view: sanitizeView(raw?.view || DEFAULT_VIEW)
    };
    clean.items.sort((a,b) => (a.due || "").localeCompare(b.due || "") || a.title.localeCompare(b.title));
    return clean;
  }

  function setStatus(msg=""){
    els.presetStatus.textContent = msg;
  }

  function showSavedToast(msg="Saved"){
    els.savingBadge.textContent = msg;
    els.savingBadge.classList.add("show");
    clearTimeout(saveToastTimer);
    saveToastTimer = setTimeout(() => {
      els.savingBadge.classList.remove("show");
    }, 1200);
  }

  async function persistState(message){
    appState.updatedAt = nowISO();
    await Storage.setJSON(STORAGE_KEY, appState);
    if (!isBooting) showSavedToast(message || "Saved");
  }

  async function loadState(){
    const saved = await Storage.getJSON(STORAGE_KEY);
    appState = sanitizeState(saved || DEFAULT_STATE);
    themeDraft = { ...appState.theme };
    bgDraft = { ...appState.background };
  }

  async function loadPresets(){
    const raw = await Storage.getJSON(PRESETS_KEY);
    const list = Array.isArray(raw) ? raw : [];
    return list.filter(Boolean).map((p) => ({
      id: String(p.id || uid()),
      name: String(p.name || "Untitled"),
      ns: String(p.ns || PRESET_NAMESPACE),
      theme: sanitizeTheme(p.theme || {}),
      bg: sanitizeBackground(p.bg || {})
    }));
  }

  async function savePresets(list){
    await Storage.setJSON(PRESETS_KEY, list);
  }

  async function refreshPresetSelect(){
    const list = (await loadPresets()).filter(p => p.ns === PRESET_NAMESPACE);
    const current = els.presetSelect.value;
    els.presetSelect.innerHTML = `<option value="">—</option>`;
    for (const p of list){
      const opt = document.createElement("option");
      opt.value = p.id;
      opt.textContent = p.name || "Untitled";
      els.presetSelect.appendChild(opt);
    }
    if ([...els.presetSelect.options].some(o => o.value === current)) {
      els.presetSelect.value = current;
    }
  }

  async function getPresetById(id){
    const all = await loadPresets();
    return all.find(p => p.ns === PRESET_NAMESPACE && p.id === id) || null;
  }

  function syncThemeInputs(theme){
    els.tBg.value = theme.bg;
    els.tText.value = theme.text;
    els.tMuted.value = theme.muted;
    els.tPanelHex.value = theme.panelHex;
    els.tPanelA.value = String(theme.panelA);
    els.tLineHex.value = theme.lineHex;
    els.tLineA.value = String(theme.lineA);
    els.tHorizonHex.value = theme.horizonHex;
    els.tHorizonA.value = String(theme.horizonA);
    els.tDotHex.value = theme.dotHex;
    els.tDotA.value = String(theme.dotA);
    els.tDotSoftA.value = String(theme.dotSoftA);
  }

  function readThemeUi(){
    return sanitizeTheme({
      bg: els.tBg.value,
      text: els.tText.value,
      muted: els.tMuted.value,
      panelHex: els.tPanelHex.value,
      panelA: Number(els.tPanelA.value),
      lineHex: els.tLineHex.value,
      lineA: Number(els.tLineA.value),
      horizonHex: els.tHorizonHex.value,
      horizonA: Number(els.tHorizonA.value),
      dotHex: els.tDotHex.value,
      dotA: Number(els.tDotA.value),
      dotSoftA: Number(els.tDotSoftA.value)
    });
  }

  function applyTheme(theme){
    const t = sanitizeTheme(theme);

    document.documentElement.style.setProperty("--bg", t.bg);
    document.documentElement.style.setProperty("--text", t.text);
    document.documentElement.style.setProperty("--muted", t.muted);

    const panelA = clamp(t.panelA / 100, 0.40, 0.95);
    const lineA = clamp(t.lineA / 100, 0.08, 0.55);
    const lineStrongA = clamp(lineA + 0.12, 0.16, 0.7);
    const horizonA = clamp(t.horizonA / 100, 0.08, 0.70);
    const dotA = clamp(t.dotA / 100, 0.20, 1);
    const dotSoftA = clamp(t.dotSoftA / 100, 0.10, 1);

    document.documentElement.style.setProperty("--panel", hexToRgba(t.panelHex, panelA));
    document.documentElement.style.setProperty("--line", hexToRgba(t.lineHex, lineA));
    document.documentElement.style.setProperty("--lineStrong", hexToRgba(t.lineHex, lineStrongA));
    document.documentElement.style.setProperty("--horizon", hexToRgba(t.horizonHex, horizonA));
    document.documentElement.style.setProperty("--dot", hexToRgba(t.dotHex, dotA));
    document.documentElement.style.setProperty("--dotSoft", hexToRgba(t.dotHex, dotSoftA));
    document.documentElement.style.setProperty("--focus", hexToRgba(t.lineHex, 0.22));

    els.themeDot.style.background = t.text;
    els.themeDot.style.boxShadow = `0 0 0 6px ${hexToRgba(t.text, 0.10)}`;

    syncThemeInputs(t);
    render();
  }

  function syncBgInputs(bg){
    els.bgColor.value = bg.tint;
    els.bgStrength.value = String(bg.strength);
    els.bgBlur.value = String(bg.blur);
  }

  function setBoardImage(dataUrlOrNull){
    document.documentElement.style.setProperty("--board-image", dataUrlOrNull ? `url("${dataUrlOrNull}")` : "none");
  }

  function applyBackground(bg){
    const b = sanitizeBackground(bg);
    const strength = clamp(b.strength / 100, 0, 0.7);
    document.documentElement.style.setProperty("--board-tint", b.tint);
    document.documentElement.style.setProperty("--board-tint-a", String(strength));
    document.documentElement.style.setProperty("--board-blur", `${b.blur}px`);

    els.bgDot.style.background = b.tint;
    els.bgDot.style.boxShadow = `0 0 0 6px ${hexToRgba(b.tint, Math.min(0.36, strength + 0.12))}`;
    els.boardTint.style.background = hexToRgba(b.tint, strength);

    setBoardImage(b.imageDataUrl || null);
    syncBgInputs(b);
  }

  function matches(it, q){
    if (!q) return true;
    const hay = [it.title, it.course, it.notes, ...(it.tags || [])].join(" ").toLowerCase();
    return hay.includes(q.toLowerCase());
  }

  function buildTagOptions(allItems){
    const tagSet = new Set();
    allItems.forEach(it => (it.tags || []).forEach(t => tagSet.add(t)));
    const tags = [...tagSet].sort((a,b) => a.localeCompare(b));
    const selected = appState.view.tag;

    els.tagFilter.innerHTML =
      `<option value="">All tags</option>` +
      tags.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join("");

    if ([...els.tagFilter.options].some(o => o.value === selected)) {
      els.tagFilter.value = selected;
    } else {
      appState.view.tag = "";
      els.tagFilter.value = "";
    }

    els.tagPill.textContent = `${tags.length} tag${tags.length === 1 ? "" : "s"}`;
  }

  function applyFilters(){
    const q = appState.view.q.trim();
    const tag = appState.view.tag;

    let out = appState.items.filter(it => matches(it, q));
    if (tag) out = out.filter(it => (it.tags || []).includes(tag));
    out.sort((a,b) => (a.due || "").localeCompare(b.due || ""));
    return out;
  }

  function urgency(daysLeft){
    if (daysLeft <= 0) return 1;
    const r = appState.view.rangeDays;
    if (daysLeft >= r) return 0;
    const t = 1 - (daysLeft / r);
    return Math.pow(t, 0.65);
  }

  function layoutDots(filteredInRange){
    const lanes = [0, 1, 2, 3];
    const used = [];

    return filteredInRange.map((it) => {
      const today = startOfToday();
      const due = parseDate(it.due);
      const dLeft = daysBetween(today, due);

      const u = urgency(dLeft);
      const x = clamp(dLeft / appState.view.rangeDays, 0, 1);

      const yBase = 0.35 + (1 - x) * 0.37;
      let lane = 0;
      for (const l of lanes){
        const ok = used.every(p => Math.abs(p.x - x) > 0.05 || p.lane !== l);
        if (ok){ lane = l; break; }
      }
      used.push({ x, lane });

      const laneOffset = (lane - 1.5) * 0.03;
      const y = clamp(yBase + laneOffset, 0.18, 0.86);

      const size = 10 + u * 12;
      const soft = u < 0.35;
      const urgent = u > 0.78;
      const opacity = 0.35 + u * 0.65;

      return { it, x, y, size, soft, urgent, opacity, dLeft };
    });
  }

  function clearVizDots(){
    [...els.viz.querySelectorAll(".dot")].forEach(n => n.remove());
  }

  function showTooltip(dotEl, payload){
    const { it, dLeft } = payload;
    const due = parseDate(it.due);
    const dueText = due ? formatDate(due) : "—";

    let when = "";
    if (dLeft < 0) when = `${Math.abs(dLeft)} day${Math.abs(dLeft)===1?"":"s"} overdue`;
    else if (dLeft === 0) when = "due today";
    else when = `${dLeft} day${dLeft===1?"":"s"} left`;

    els.ttTitle.textContent = it.title || "Untitled";
    els.ttSub.textContent = `${it.course ? it.course + " · " : ""}${dueText} · ${when}`;
    els.ttChips.innerHTML = `
      ${(it.tags || []).slice(0, 6).map(t => `<span class="chip">${escapeHtml(t)}</span>`).join("")}
      ${it.notes ? `<span class="chip">notes</span>` : ""}
    `.trim();

    const rect = els.viz.getBoundingClientRect();
    const drect = dotEl.getBoundingClientRect();
    const x = (drect.left + drect.width/2) - rect.left;
    const y = (drect.top) - rect.top;

    els.tooltip.style.left = `${x}px`;
    els.tooltip.style.top = `${y}px`;
    els.tooltip.classList.add("show");
  }

  function hideTooltip(){
    els.tooltip.classList.remove("show");
  }

              <span class="smallPill">${escapeHtml(when)}</span>
              ${it.course ? `<span class="smallPill">${escapeHtml(it.course)}</span>` : ""}
              ${tags.map(t => `<span class="smallPill">${escapeHtml(t)}</span>`).join("")}

              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 20h4l10.5-10.5a1.8 1.8 0 0 0 0-2.5l-1.5-1.5a1.8 1.8 0 0 0-2.5 0L4 16v4Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
                <path d="M13.5 6.5 17.5 10.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </button>
            <button class="iconBtn" type="button" aria-label="Delete" title="Delete" id="del_${it.id}">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M6 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M8 7l1 14h6l1-14" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>

  function renderViz(filteredAll){
    clearVizDots();
    hideTooltip();

    const today = startOfToday();
    const inRange = filteredAll.filter(it => {
      const due = parseDate(it.due);
      if (!due) return false;
      const dLeft = daysBetween(today, due);
      return dLeft <= appState.view.rangeDays;
    });

    const dots = layoutDots(inRange);
    const W = els.viz.clientWidth;
    const H = els.viz.clientHeight;

    dots.forEach((p) => {
      const dot = document.createElement("button");
      dot.type = "button";
      dot.className = "dot" + (p.soft ? " soft" : "") + (p.urgent ? " urgent" : "");
      dot.style.left = `${(0.08 + p.x * 0.84) * W}px`;
      dot.style.top = `${p.y * H}px`;
      dot.style.width = `${p.size}px`;
      dot.style.height = `${p.size}px`;
      dot.style.opacity = String(p.opacity);
      dot.setAttribute("aria-label", `${p.it.title} due ${p.it.due}`);

      const show = () => showTooltip(dot, p);
      const hide = () => hideTooltip();

      dot.addEventListener("mouseenter", show);
      dot.addEventListener("mouseleave", hide);
      dot.addEventListener("focus", show);
      dot.addEventListener("blur", hide);

      dot.addEventListener("click", (e) => {
        e.stopPropagation();
        const visible = els.tooltip.classList.contains("show");
        if (visible && els.ttTitle.textContent === (p.it.title || "")) hide();
        else show();
      });

      els.viz.appendChild(dot);
    });

    els.viz.onclick = () => hideTooltip();
  }

  function renderEmpty(){
    els.viz.innerHTML = `
      <div class="tooltip" id="tooltip" style="display:none;"></div>
      <div class="empty" style="position:absolute; inset:0; display:grid; place-items:center;">
        <div style="display:grid; gap:12px; place-items:center; padding: 10px;">
          <div class="big" aria-hidden="true">⋯</div>
          <h2 style="margin:0;color:var(--text);font-size:16px;letter-spacing:-.01em;">No deadlines yet</h2>
          <button class="btn primary" type="button" id="emptyAddBtn">＋ Add your first deadline</button>

  function render(){
    els.search.value = appState.view.q;
    els.range.value = String(appState.view.rangeDays);

    buildTagOptions(appState.items);
    const filteredAll = applyFilters();

    els.countPill.textContent = `${appState.items.length} deadline${appState.items.length === 1 ? "" : "s"}`;

    const parts = [];
    if (appState.view.q) parts.push(`Search: “${appState.view.q}”`);
    if (appState.view.tag) parts.push(`Tag: ${appState.view.tag}`);
    parts.push(`Range: ${appState.view.rangeDays}d`);
    els.filteredMeta.textContent = `${filteredAll.length} shown · ${parts.join(" · ")}`;

    if (appState.items.length === 0){
      renderEmpty();
      return;
    }

    if (!els.viz.querySelector(".tooltip")){
      els.viz.prepend(els.tooltip);
    }

    renderViz(filteredAll);
    renderList(filteredAll);

  async function loadImage(src){
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  function readFileAsDataUrl(file){
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  async function processImageFile(file){
    if (!file) return null;

    const dataUrl = await readFileAsDataUrl(file);
    const img = await loadImage(dataUrl);

    const maxDim = 1800;
    const ratio = Math.min(1, maxDim / Math.max(img.width, img.height));
    const width = Math.max(1, Math.round(img.width * ratio));
    const height = Math.max(1, Math.round(img.height * ratio));

    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, width, height);

    let out;
    try{
      out = canvas.toDataURL("image/webp", 0.88);
    }catch{
      out = canvas.toDataURL("image/jpeg", 0.88);
    }
    return out;
  }

  async function loadRefreshState(){
    const saved = await Storage.getJSON(STORAGE_KEY);
    if (!saved) return;
    const next = sanitizeState(saved);
    if (String(next.updatedAt || "") === String(appState.updatedAt || "")) return;

    appState = next;
    themeDraft = { ...appState.theme };
    bgDraft = { ...appState.background };
    applyTheme(appState.theme);
    applyBackground(appState.background);
    render();
  }

  async function upsertItem(payload){
    const clean = sanitizeItem(payload);
    const idx = appState.items.findIndex(x => x.id === clean.id);
    if (idx >= 0) appState.items[idx] = clean;
    else appState.items.unshift(clean);

    appState.items.sort((a,b) => (a.due || "").localeCompare(b.due || "") || a.title.localeCompare(b.title));
    await persistState("Saved");
    render();
  }

  async function deleteItem(id){
    const it = appState.items.find(x => x.id === id);
    const name = it ? it.title : "this deadline";
    const ok = await askConfirm(`Delete "${name}"?`, { okText: "Delete", cancelText: "Cancel", danger: true });
    if (!ok) return;

    appState.items = appState.items.filter(x => x.id !== id);
    await persistState("Deleted");
    render();
  }

  async function clearAll(){
    if (!appState.items.length) return;
    const ok = await askConfirm("Clear all deadlines? This cannot be undone.", { okText: "Yes, clear", cancelText: "Cancel", danger: true });
    if (!ok) return;

    appState.items = [];
    await persistState("Cleared");
    render();
  }

  function exportJson(){
    const data = JSON.stringify(appState.items, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "deadline-horizon.json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  async function askConfirm(message, { okText="Confirm", cancelText="Cancel", danger=false } = {}){
    return new Promise((resolve) => {
      const wrap = document.createElement("div");
      wrap.style.position = "fixed";
      wrap.style.inset = "0";
      wrap.style.zIndex = "9999";
      wrap.style.display = "grid";
      wrap.style.placeItems = "center";
      wrap.style.padding = "18px";
      wrap.style.background = "rgba(20,18,16,.35)";
      wrap.style.backdropFilter = "blur(8px)";
      wrap.style.webkitBackdropFilter = "blur(8px)";

      wrap.innerHTML = `
        <div style="width:min(520px,100%);background:rgba(255,255,255,.94);border:1px solid rgba(43,43,43,.18);border-radius:20px;box-shadow:0 12px 40px rgba(0,0,0,.12);overflow:hidden;">
          <div style="padding:14px 16px;border-bottom:1px solid rgba(43,43,43,.12);font-weight:650;">Confirm</div>
          <div style="padding:14px 16px;line-height:1.45;color:rgba(43,43,43,.92);">${escapeHtml(message)}</div>
          <div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;padding:12px 16px;border-top:1px solid rgba(43,43,43,.12);">
            <button class="btn" type="button" id="cnlBtn">${escapeHtml(cancelText)}</button>
            <button class="btn ${danger ? "danger" : "primary"}" type="button" id="okBtn">${escapeHtml(okText)}</button>
          </div>
        </div>
      `;

      const cleanup = (val) => {
        document.removeEventListener("keydown", onKey);
        wrap.remove();
        resolve(val);
      };

      const onKey = (e) => { if (e.key === "Escape") cleanup(false); };

      wrap.addEventListener("click", (e) => {
        if (e.target === wrap) cleanup(false);
      });

      document.body.appendChild(wrap);
      document.addEventListener("keydown", onKey);

      wrap.querySelector("#cnlBtn").addEventListener("click", () => cleanup(false));
      const okBtn = wrap.querySelector("#okBtn");
      okBtn.addEventListener("click", () => cleanup(true));
      setTimeout(() => okBtn.focus(), 0);
    });
  }

  function resetForm(){
    els.editId.value = "";
    els.modalTitle.textContent = "Add deadline";
    els.saveBtn.textContent = "Save";
    els.dTitle.value = "";
    els.dDue.value = "";
    els.dCourse.value = "";
    els.dTags.value = "";
    els.dNotes.value = "";
  }

  function openModal(){
    lastFocusEl = document.activeElement;
    els.modalBackdrop.classList.add("show");
    setTimeout(() => els.dTitle.focus(), 0);
    document.addEventListener("keydown", onModalKeydown);
  }

  function closeModal(){
    els.modalBackdrop.classList.remove("show");
    document.removeEventListener("keydown", onModalKeydown);
    if (lastFocusEl && typeof lastFocusEl.focus === "function") lastFocusEl.focus();
    resetForm();
  }

  function onModalKeydown(e){
    if (e.key === "Escape") closeModal();

    if (e.key === "Tab"){
      const focusables = els.modalBackdrop.querySelectorAll(
        'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
      );
      const list = [...focusables].filter(x => !x.disabled && x.offsetParent !== null);
      if (!list.length) return;
      const first = list[0];
      const last = list[list.length - 1];

      if (e.shiftKey && document.activeElement === first){
        e.preventDefault();
        last.focus();
      } else if (!e.shiftKey && document.activeElement === last){
        e.preventDefault();
        first.focus();
      }
    }
  }

  function openAddModal(){
    resetForm();
    openModal();
  }

  function openEditModal(id){
    const it = appState.items.find(x => x.id === id);
    if (!it) return;

    els.editId.value = it.id;
    els.modalTitle.textContent = "Edit deadline";
    els.saveBtn.textContent = "Update";

    els.dTitle.value = it.title || "";
    els.dDue.value = it.due || "";
    els.dCourse.value = it.course || "";
    els.dTags.value = (it.tags || []).join(", ");
    els.dNotes.value = it.notes || "";

    openModal();
  }

      tint: els.bgColor.value,

      blur: Number(els.bgBlur.value),
      imageDataUrl: bgDraft.imageDataUrl
    });

      render();

      const id = els.presetSelect.value || "";
      if (!id){
        setStatus("Choose a preset first.");
        return;
      }

      const preset = await getPresetById(id);
      if (!preset){
        setStatus("Preset not found.");
        return;
      }

      themeDraft = { ...preset.theme };
      bgDraft = { ...preset.bg };
      appState.theme = { ...themeDraft };
      appState.background = { ...bgDraft };

      applyTheme(appState.theme);
      applyBackground(appState.background);

      await persistState("Preset applied");
      setStatus("Preset applied.");
    });

    els.presetDelete.addEventListener("click", async () => {
      const id = els.presetSelect.value || "";
      if (!id){
        setStatus("Choose a preset first.");
        return;
      }

      const list = await loadPresets();
      const next = list.filter(p => !(p && p.ns === PRESET_NAMESPACE && p.id === id));
      if (next.length === list.length){
        setStatus("Preset not found.");
        return;
      }

      await savePresets(next);
      await refreshPresetSelect();
      els.presetSelect.value = "";
      setStatus("Preset deleted.");
      showSavedToast("Preset deleted");
    });

    document.addEventListener("keydown", (e) => {
      if (els.modalBackdrop.classList.contains("show")) return;
      if (e.key === "/" && !e.ctrlKey && !e.metaKey && !e.altKey){
        const a = document.activeElement;
        const typing = a && (a.tagName === "INPUT" || a.tagName === "TEXTAREA" || a.isContentEditable);
        if (!typing){
          e.preventDefault();
          els.search.focus();
        }
      }
    });

    window.addEventListener("resize", () => {
      clearTimeout(renderResizeTimer);
      renderResizeTimer = setTimeout(render, 120);
    });

    window.addEventListener("storage", async (e) => {
      if (e.key === STORAGE_KEY || e.key === PRESETS_KEY) {
        await loadRefreshState();
        await refreshPresetSelect();
      }
    });

    document.addEventListener("visibilitychange", async () => {
      if (document.visibilityState === "visible") {
        await loadRefreshState();
      }
    });

    window.addEventListener("pageshow", async () => {
      await loadRefreshState();
    });
  }

  async function init(){
    await loadState();

    themeDraft = { ...appState.theme };
    bgDraft = { ...appState.background };

    applyTheme(appState.theme);
    applyBackground(appState.background);

    els.search.value = appState.view.q;
    els.range.value = String(appState.view.rangeDays);

    await refreshPresetSelect();
    render();
    attachEvents();

    isBooting = false;
  }

  init();
})();
</script>
</body>
</html>
