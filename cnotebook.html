<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Journal</title>
  <style>
    :root{
      --bg:#ffffff;
      --cream:#e6d8cc;
      --stone:#c9beb6;
      --text:#1f1f1f;
      --muted:#6b625c;

      --border: rgba(201,190,182,0.85);
      --borderSoft: rgba(201,190,182,0.55);
      --shadow: 0 18px 40px rgba(0,0,0,0.08);
      --shadowSoft: 0 6px 18px rgba(0,0,0,0.06);

      --rOuter: 18px;
      --rInner: 16px;
      --rPill: 999px;

      --a5w: 500px;
      --a5h: 595px;

      --paper: #fffdfb;
      --line: rgba(201,190,182,0.35);

      --lineH: 26px;
      --textTopPad: 10px;

      --inkOffset: 7px;

      --board-tint: #efe7e1;
      --board-tint-a: 0.30;
      --board-image: none;
      --board-blur: 0px;

      --paper-image: none;
      --paper-tint-a: 0.0;

      --card-bg: rgba(255,255,255,0.88);
      --field-bg: #ffffff;
      --panel-bg: rgba(255,255,255,0.92);
      --chip-bg: #ffffff;
    }

    *{ box-sizing:border-box; }
    html, body{ min-height:100%; }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      padding:22px;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    .wrap{ max-width: 1200px; margin: 0 auto; }
    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }
    .kicker{
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted);
      padding-top:4px;
    }

    .btn{
      appearance:none;
      border:1px solid var(--border);
      background:var(--field-bg);
      color:var(--text);
      border-radius:999px;
      padding:9px 14px;
      font-size:12px;
      letter-spacing:.10em;
      text-transform:uppercase;
      cursor:pointer;
      box-shadow: var(--shadowSoft);
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
      user-select:none;
      white-space:nowrap;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn:hover{ transform:translateY(-1px); box-shadow:0 14px 22px rgba(0,0,0,0.10); }
    .btn.primary{ background:var(--cream); }

    .popover{ position:relative; }
    .icon-pill{
      display:inline-flex;
      align-items:center;
      gap:10px;
      background: rgba(255,255,255,0.80);
      border: 1px solid var(--borderSoft);
      border-radius: 999px;
      padding: 6px 10px;
      box-shadow: var(--shadowSoft);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .bg-btn{
      width:34px;
      height:34px;
      border-radius:999px;
      border:1px solid var(--borderSoft);
      background: rgba(255,255,255,0.95);
      cursor:pointer;
      display:grid;
      place-items:center;
      -webkit-tap-highlight-color: transparent;
      color: rgba(31,31,31,0.70);
      font-weight:800;
      line-height:1;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: transform 140ms ease, box-shadow 140ms ease;
      touch-action: manipulation;
    }
    .bg-btn:hover{ transform: translateY(-1px); box-shadow: 0 14px 22px rgba(0,0,0,0.10); }
    .bg-btn:active{ transform: translateY(0px); }

    .bg-dot{
      width:14px;
      height:14px;
      border-radius:999px;
      border:1px solid rgba(201,190,182,0.75);
      background: var(--board-tint);
      box-shadow: 0 0 0 6px rgba(230,216,204,0.30);
    }

    .theme-dot{
      width:14px;
      height:14px;
      border-radius:999px;
      border:1px solid rgba(201,190,182,0.75);
      background: var(--text);
      box-shadow: 0 0 0 6px rgba(201,190,182,0.25);
    }

    .panel{
      position:absolute;
      top: 46px;
      right: 0;
      width: 300px;
      max-width: min(92vw, 300px);
      border-radius: 16px;
      border: 1px solid var(--borderSoft);
      background: var(--panel-bg);
      box-shadow: 0 18px 40px rgba(0,0,0,0.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 12px;
      display:none;
      z-index: 80;
    }
    .panel.open{ display:block; }

    .panel h2{
      margin: 0 0 10px 0;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(31,31,31,0.72);
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 8px 0;
    }
    .row label{
      font-size: 12px;
      color: var(--muted);
    }
    input[type="color"]{
      width: 36px;
      height: 28px;
      border: 1px solid var(--borderSoft);
      border-radius: 10px;
      padding: 0;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    input[type="range"]{ width: 150px; }
    .file{
      width:100%;
      font-size: 12px;
      color: rgba(31,31,31,0.75);
    }
    .mini-btn{
      width: 100%;
      border: 1px solid var(--borderSoft);
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      padding: 9px 10px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      font-size: 11px;
      color: rgba(31,31,31,0.80);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .mini-btn:active{ transform: translateY(1px); }

    .mini-input, .mini-select{
      width:100%;
      border:1px solid var(--borderSoft);
      background:rgba(255,255,255,0.95);
      border-radius:12px;
      padding:10px 12px;
      outline:none;
      font-size:12px;
      color:var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      min-height: 38px;
    }

    .divider{
      height: 1px;
      background: rgba(201,190,182,0.35);
      margin: 8px 0;
    }

    .panelActions{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      margin-top: 10px;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 360px;
      gap:14px;
      align-items:start;
      position: relative;
      z-index: 2;
    }

    .widgetBoard{
      position: relative;
      border-radius: var(--rOuter);
      overflow: hidden;
      border: 1px solid var(--borderSoft);
      box-shadow: var(--shadow);
      padding: 14px;
      background: transparent;
    }
    .widgetBoard::before{
      content:"";
      position:absolute;
      inset:0;
      background-image: var(--board-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(var(--board-blur)) saturate(1);
      z-index:0;
    }
    .widgetBoard::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(900px 520px at 16% 22%, rgba(255,255,255,0.35), transparent 60%),
        radial-gradient(760px 520px at 84% 30%, rgba(255,255,255,0.22), transparent 62%),
        rgba(255,255,255,0.30);
      background-blend-mode: screen;
      pointer-events: none;
      z-index:0;
    }
    .boardTint{
      position:absolute;
      inset:0;
      background: rgba(0,0,0,0);
      mix-blend-mode: multiply;
      pointer-events:none;
      z-index: 1;
    }

    .notebookShell{
      border:1px solid var(--border);
      border-radius: var(--rOuter);
      box-shadow: none;
      background:
        linear-gradient(180deg, rgba(230,216,204,0.14), rgba(255,255,255,0)),
        var(--card-bg);
      padding:14px;
      min-width:0;
    }

    .shellHead{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      margin-bottom:12px;
    }

    .dateRow{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    label.small{
      font-size:11px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .input, .select, input[type="date"]{
      border:1px solid var(--border);
      background:var(--field-bg);
      border-radius:12px;
      padding:9px 10px;
      font-size:13px;
      outline:none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      height:36px;
      color: var(--text);
      min-width: 0;
    }
    .input:focus, .select:focus, input[type="date"]:focus{
      border-color: rgba(201,190,182,1);
      box-shadow: 0 0 0 3px rgba(230,216,204,0.55);
    }

    .pill{
      font-size:11px;
      color:var(--muted);
      border:1px solid var(--borderSoft);
      border-radius:999px;
      padding:6px 10px;
      background:var(--chip-bg);
      line-height:1;
      user-select:none;
      white-space:nowrap;
    }

    .stage{
      display:flex;
      justify-content:center;
      align-items:center;
      padding:10px 0 6px;
    }

    .book{
      position:relative;
      width: min(100%, var(--a5w));
      height: var(--a5h);
      border-radius: 14px;
      background: var(--paper);
      border:1px solid var(--borderSoft);
      box-shadow: 0 18px 40px rgba(0,0,0,0.10);
      overflow:hidden;
    }

    .book::before{
      content:"";
      position:absolute;
      inset:0;
      background: transparent;
      pointer-events:none;
      opacity:0.55;
    }

    .spine{
      position:absolute;
      left:0;
      top:0;
      bottom:0;
      width:44px;
      background: linear-gradient(180deg, rgba(230,216,204,0.65), rgba(230,216,204,0.25));
      border-right: 1px solid rgba(201,190,182,0.45);
    }
    .spine::after{
      content:"";
      position:absolute;
      left:12px;
      top:18px;
      bottom:18px;
      width:2px;
      background: rgba(201,190,182,0.55);
      border-radius: 2px;
      opacity:0.9;
    }

    .paper{
      position:absolute;
      left:44px; right:0; top:0; bottom:0;
      padding: 18px 22px 18px 18px;
      background: var(--paper);
      overflow:hidden;
    }
    .paper::before{
      content:"";
      position:absolute;
      inset:0;
      background-image: var(--paper-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: var(--paper-tint-a);
      pointer-events:none;
      z-index:0;
    }

    .bookmarkTab{
      width:18px;
      height:34px;
      border-radius: 10px 0 0 10px;
      border:1px solid rgba(201,190,182,0.55);
      background: rgba(230,216,204,0.45);
      position:absolute;
      right:-1px;
      top:72px;
      box-shadow: var(--shadowSoft);
      display:none;
    }
    .bookmarkTab.on{ display:block; }

    .editorWrap{
      position:relative;
      height: 100%;
      border-radius: 12px;
      z-index: 1;
      overflow: hidden;
    }

    .editor{
      width:100%;
      height:100%;
      padding: var(--textTopPad) 6px 6px 2px;
      outline:none;
      background: transparent;
      overflow:auto;
      font-size: 15px;
      line-height: var(--lineH);
      color: var(--text);
      border-radius: 12px;
      user-select:text;
      position: relative;
      -webkit-overflow-scrolling: touch;
      overflow-wrap: anywhere;
      word-break: break-word;

      background-image: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent calc(var(--lineH) - var(--inkOffset)),
        var(--line) calc(var(--lineH) - var(--inkOffset)),
        var(--line) calc(var(--lineH) - var(--inkOffset) + 1px),
        transparent calc(var(--lineH) - var(--inkOffset) + 1px),
        transparent var(--lineH)
      );
      background-size: 100% var(--lineH);
      background-position: 0 var(--textTopPad);
      background-attachment: local;
    }
    .editor p{ margin:0; }
    .editor:empty::before{
      content: "Start writing...";
      color: rgba(107,98,92,0.60);
      pointer-events:none;
    }

    .imgWrap{
      display:inline-block;
      position:relative;
      margin: 6px 0;
      max-width:100%;
      vertical-align:baseline;
      border-radius:12px;
      touch-action:none;
    }
    .imgWrap img{
      display:block;
      width:100%;
      height:auto;
      border-radius:12px;
      border:1px solid rgba(201,190,182,0.55);
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      pointer-events:none;
      user-select:none;
    }
    .imgWrap[contenteditable="false"]{ user-select:none; }

    .imgWrap.freeMove{
      position:absolute;
      z-index: 20;
      margin: 0;
      cursor: grab;
    }

    .imgHandle{
      position:absolute;
      right:6px;
      bottom:6px;
      width:20px;
      height:20px;
      border-radius:8px;
      border:1px solid rgba(201,190,182,0.75);
      background: rgba(255,255,255,0.92);
      box-shadow: 0 8px 14px rgba(0,0,0,0.10);
      cursor: nwse-resize;
      touch-action:none;
    }
    .imgHandle::after{
      content:"";
      position:absolute;
      inset:4px;
      border-radius:6px;
      background:
        linear-gradient(135deg,
          rgba(201,190,182,0.0) 0 35%,
          rgba(201,190,182,0.85) 35% 40%,
          rgba(201,190,182,0.0) 40% 65%,
          rgba(201,190,182,0.85) 65% 70%,
          rgba(201,190,182,0.0) 70% 100%);
      opacity:0.7;
    }
    .imgDel{
      position:absolute;
      top:-10px;
      right:-10px;
      width:22px;
      height:22px;
      border-radius:999px;
      border:1px solid rgba(201,190,182,0.75);
      background:var(--field-bg);
      box-shadow: 0 8px 14px rgba(0,0,0,0.10);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      touch-action: manipulation;
    }

    .stickerLayer{
      position:absolute;
      inset:0;
      pointer-events:none;
    }
    .sticker{
      position:absolute;
      pointer-events:auto;
      cursor:grab;
      user-select:none;
      transform: translate(-50%, -50%);
      font-size: 28px;
      filter: drop-shadow(0 8px 10px rgba(0,0,0,0.10));
      touch-action:none;
    }
    .sticker:active{ cursor:grabbing; }
    .sticker .x{
      position:absolute;
      top:-10px;
      right:-10px;
      width:22px; height:22px;
      border-radius:999px;
      border:1px solid rgba(201,190,182,0.75);
      background:var(--field-bg);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      cursor:pointer;
      box-shadow: 0 8px 14px rgba(0,0,0,0.10);
      touch-action: manipulation;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:flex-end;
      justify-content:space-between;
      margin-top:12px;
      padding:12px;
      border:1px solid var(--borderSoft);
      border-radius: var(--rInner);
      background: linear-gradient(180deg, rgba(230,216,204,0.16), rgba(255,255,255,0));
    }
    .toolGroup{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:flex-end;
      min-width: 0;
    }
    .iconBtn{
      appearance:none;
      border:1px solid var(--border);
      background:var(--field-bg);
      border-radius:12px;
      width:40px;
      height:36px;
      cursor:pointer;
      box-shadow: var(--shadowSoft);
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
      user-select:none;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;
      -webkit-tap-highlight-color: transparent;
      color: var(--text);
      touch-action: manipulation;
    }
    .iconBtn:hover{ transform:translateY(-1px); box-shadow:0 14px 22px rgba(0,0,0,0.10); }
    .iconBtn.primary{ background: var(--cream); }

    .color{
      width:44px;
      height:36px;
      padding:0;
      border-radius:12px;
      border:1px solid var(--border);
      background:var(--field-bg);
      cursor:pointer;
      box-shadow: var(--shadowSoft);
    }

    .hint{
      font-size:12px;
      color:#7a716a;
      line-height:1.4;
      margin:0;
    }

    .side{
      border:1px solid var(--border);
      border-radius: var(--rOuter);
      box-shadow: none;
      background:
        linear-gradient(180deg, rgba(230,216,204,0.12), rgba(255,255,255,0)),
        var(--card-bg);
      padding:14px;
      min-width: 0;
    }
    .sideHead{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }
    .sideTitle{
      font-size:14px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
      margin:0;
    }
    .list{ display:grid; gap:10px; }
    .rowCard{
      border:1px solid var(--borderSoft);
      border-radius:14px;
      padding:10px;
      background:var(--field-bg);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      cursor:pointer;
      transition: transform 140ms ease, box-shadow 140ms ease;
      min-width: 0;
    }
    .rowCard:hover{ transform:translateY(-1px); box-shadow:0 14px 22px rgba(0,0,0,0.10); }
    .rowCard small{
      color:var(--muted);
      font-size:11px;
      letter-spacing:.10em;
      text-transform:uppercase;
    }
    .rowCard .left{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:0;
      flex: 1;
    }
    .rowCard .title{
      font-size:13px;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width: 250px;
    }
    .badge{
      font-size:11px;
      color:var(--muted);
      border:1px solid var(--borderSoft);
      border-radius:999px;
      padding:5px 8px;
      background:var(--chip-bg);
      line-height:1;
      user-select:none;
      white-space:nowrap;
      flex-shrink: 0;
    }

    @media (max-width: 980px){
      .grid{ grid-template-columns: 1fr; }
      .wrap{ max-width: 900px; }
      .widgetBoard{ padding: 12px; }
      .side{ order: 2; }
    }

    @media (max-width: 720px){
      body{ padding: 12px; }
      .top{ gap:12px; }
      .top > div:last-child{
        width:100%;
        justify-content:flex-start !important;
      }
      .panel{
        right:auto;
        left:0;
      }
      .shellHead{
        align-items:flex-start;
      }
      .dateRow{
        width:100%;
      }
      .dateRow > div{
        min-width: 0;
      }
      .dateRow input,
      .dateRow select{
        width:100%;
      }
      .book{
        height: min(72vh, 595px);
      }
      .toolbar{
        flex-direction:column;
        align-items:stretch;
      }
      .toolGroup{
        width:100%;
      }
      .rowCard .title{
        max-width: none;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="top">
      <div class="kicker"></div>

      <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; align-items:flex-start;">

        <div class="popover" id="bgPopover">
          <div class="icon-pill">
            <button class="bg-btn" id="bgBtn" type="button" aria-label="Background settings" title="Background settings">
              <span class="bg-dot" id="boardDot" aria-hidden="true"></span>
            </button>
          </div>

          <div class="panel" id="bgPanel" role="dialog" aria-label="Background settings">
            <h2>Background</h2>

            <div class="row">
              <label for="bgColor">Tint</label>
              <input id="bgColor" type="color" value="#efe7e1" />
            </div>

            <div class="row">
              <label for="bgStrength">Tint strength</label>
              <input id="bgStrength" type="range" min="0" max="70" value="30" />
            </div>

            <div class="row">
              <label for="bgBlur">Image blur</label>
              <input id="bgBlur" type="range" min="0" max="20" value="0" />
            </div>

            <div class="divider"></div>

            <div class="row" style="align-items:flex-start;">
              <label for="bgImage">Image</label>
              <input id="bgImage" class="file" type="file" accept="image/*" />
            </div>

            <div class="row">
              <button class="mini-btn" id="removeImage" type="button">Remove image</button>
            </div>

            <div class="panelActions">
              <button class="mini-btn" id="bgReset" type="button">Reset</button>
              <button class="mini-btn" id="bgApply" type="button">Apply</button>
            </div>
          </div>
        </div>

        <div class="popover" id="paperPopover">
          <div class="icon-pill">
            <button class="bg-btn" id="paperBtn" type="button" aria-label="Paper settings" title="Paper settings">
              <span class="bg-dot" id="paperDot" aria-hidden="true" style="background: var(--paper);"></span>
            </button>
          </div>

          <div class="panel" id="paperPanel" role="dialog" aria-label="Paper settings">
            <h2>Paper</h2>

            <div class="row">
              <label for="paperColor">Color</label>

  <script>
    window.addEventListener("DOMContentLoaded", async () => {
      "use strict";

      const STORAGE_DB_NAME = "notionJournalWidgetDB";
      const STORAGE_STORE_NAME = "kv";
      const SETTINGS_KEY = "notion_widget_settings_v3";
      const JOURNAL_KEY = "cute_notebook_journal_v5";
      const CHANNEL_NAME = "notion-journal-widget-sync";

      const canUseBroadcast = typeof BroadcastChannel !== "undefined";
      const bc = canUseBroadcast ? new BroadcastChannel(CHANNEL_NAME) : null;

      function safeParseJSON(raw){
        try{ return JSON.parse(raw); }catch{ return null; }
      }

      function deepClone(obj){
        return JSON.parse(JSON.stringify(obj));
      }

      function deepMerge(base, extra){
        if(Array.isArray(base)) return Array.isArray(extra) ? extra.slice() : base.slice();
        if(base && typeof base === "object"){
          const out = { ...base };
          if(extra && typeof extra === "object"){
            Object.keys(extra).forEach((key) => {
              if(base[key] && typeof base[key] === "object" && !Array.isArray(base[key])){
                out[key] = deepMerge(base[key], extra[key]);
              } else {
                out[key] = extra[key];
              }
            });
          }
          return out;
        }
        return extra ?? base;
      }

      function announce(kind){
        if(bc){
          try{ bc.postMessage({ kind, at: Date.now() }); }catch{}
        }
        try{
          localStorage.setItem("__notion_widget_ping__", JSON.stringify({ kind, at: Date.now(), nonce: Math.random() }));
        }catch{}
      }

      function createKVStorage(dbName, storeName){
        let dbPromise = null;

        function openDB(){
          if(dbPromise) return dbPromise;
          dbPromise = new Promise((resolve) => {
            if(!("indexedDB" in window)){
              resolve(null);
              return;
            }
            const req = indexedDB.open(dbName, 1);
            req.onupgradeneeded = () => {
              const db = req.result;
              if(!db.objectStoreNames.contains(storeName)){
                db.createObjectStore(storeName);
              }
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => resolve(null);
          });
          return dbPromise;
        }

        async function get(key){
          const db = await openDB();
          if(!db) return null;
          return new Promise((resolve) => {
            const tx = db.transaction(storeName, "readonly");
            const store = tx.objectStore(storeName);
            const req = store.get(key);
            req.onsuccess = () => resolve(req.result ?? null);
            req.onerror = () => resolve(null);
          });
        }

        async function set(key, value){
          const db = await openDB();
          if(!db) return false;
          return new Promise((resolve) => {
            const tx = db.transaction(storeName, "readwrite");
            const store = tx.objectStore(storeName);
            const req = store.put(value, key);
            req.onsuccess = () => resolve(true);
            req.onerror = () => resolve(false);
          });
        }

        return { get, set };
      }

      const kv = createKVStorage(STORAGE_DB_NAME, STORAGE_STORE_NAME);

      async function loadPersistent(key, fallbackValue){
        let localVal = null;
        try{
          localVal = safeParseJSON(localStorage.getItem(key));
        }catch{}
        const idbVal = await kv.get(key);
        const val = idbVal ?? localVal;
        if(val == null) return deepClone(fallbackValue);
        return deepMerge(fallbackValue, val);
      }

      async function savePersistent(key, value){
        const payload = deepClone(value);
        try{ localStorage.setItem(key, JSON.stringify(payload)); }catch{}
        await kv.set(key, payload);
      }

      const DEFAULT_SETTINGS = {
        version: 3,
        theme: {
          bg: "#ffffff",
          cardBg: "#ffffff",
          fieldBg: "#ffffff",
          text: "#1f1f1f",
          muted: "#6b625c",
          borderHex: "#c9beb6",
          cream: "#e6d8cc"
        },
        background: {
          tint: "#efe7e1",
          strength: 30,
          blur: 0,
          imageDataUrl: null
        },
        paper: {
          color: "#fffdfb",
          strength: 0,
          imageDataUrl: null
        },
        presets: []
      };

      function defaultPage(){
        return {
          html: "",
          font: "ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial",
          customFont: "",
          bookmark: false,
          stickers: []
        };
      }

      function defaultStore(){
        return {};
      }

      const savedSettings = await loadPersistent(SETTINGS_KEY, DEFAULT_SETTINGS);
      const draftSettings = deepClone(savedSettings);
      const store = await loadPersistent(JOURNAL_KEY, defaultStore());

      function pad2(n){ return String(n).padStart(2,"0"); }
      function isoDay(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }

      function hexToRgba(hex, a){
        const h = String(hex || "").replace("#","").trim();
        const full = h.length === 3 ? h.split("").map(c=>c+c).join("") : h;
        const num = parseInt(full || "efe7e1", 16);
        const r = (num >> 16) & 255;
        const g = (num >> 8) & 255;
        const b = num & 255;
        return `rgba(${r},${g},${b},${a})`;
      }

      function clamp(n, a, b){ return Math.max(a, Math.min(b, n)); }

      async function fileToDataURL(file){
        return new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = () => resolve(String(r.result));
          r.onerror = reject;
          r.readAsDataURL(file);
        });
      }

      function ensureDay(dateStr){
        if(!store[dateStr]) store[dateStr] = { pages: [ defaultPage() ] };
        if(!Array.isArray(store[dateStr].pages) || store[dateStr].pages.length === 0){
          store[dateStr].pages = [ defaultPage() ];
        }
        store[dateStr].pages = store[dateStr].pages.map((page) => ({
          ...defaultPage(),
          ...page,
          stickers: Array.isArray(page?.stickers) ? page.stickers : []
        }));
        return store[dateStr];
      }

      function stripHtml(html){
        const tmp = document.createElement("div");
        tmp.innerHTML = html;
        return tmp.textContent || tmp.innerText || "";
      }

      const paperBtn = document.getElementById("paperBtn");

      const paperStrength = document.getElementById("paperStrength");
      const paperImage = document.getElementById("paperImage");

      function setBoardImage(dataUrlOrNull){
        document.documentElement.style.setProperty("--board-image", dataUrlOrNull ? `url("${dataUrlOrNull}")` : "none");
      }

      function setPaperImage(dataUrlOrNull){
        document.documentElement.style.setProperty("--paper-image", dataUrlOrNull ? `url("${dataUrlOrNull}")` : "none");
      }

      function applyTheme(theme){
        document.documentElement.style.setProperty("--bg", theme.bg);
        document.documentElement.style.setProperty("--text", theme.text);
        document.documentElement.style.setProperty("--muted", theme.muted);
        document.documentElement.style.setProperty("--stone", theme.borderHex);
        document.documentElement.style.setProperty("--cream", theme.cream);
        document.documentElement.style.setProperty("--border", hexToRgba(theme.borderHex, 0.85));
        document.documentElement.style.setProperty("--borderSoft", hexToRgba(theme.borderHex, 0.55));
        document.documentElement.style.setProperty("--card-bg", hexToRgba(theme.cardBg, 0.88));
        document.documentElement.style.setProperty("--field-bg", theme.fieldBg);
        document.documentElement.style.setProperty("--chip-bg", theme.fieldBg);
        document.documentElement.style.setProperty("--panel-bg", hexToRgba(theme.cardBg, 0.92));
        document.documentElement.style.setProperty("--line", hexToRgba(theme.borderHex, 0.35));

        if(themeDot){
          themeDot.style.background = theme.text;
          themeDot.style.boxShadow = `0 0 0 6px ${hexToRgba(theme.borderHex, 0.25)}`;
          themeDot.style.borderColor = hexToRgba(theme.borderHex, 0.75);
        }
      }

      function applyBoardTint(tintHex, strengthPct){
        const strength = clamp(Number(strengthPct) || 0, 0, 70) / 100;
        document.documentElement.style.setProperty("--board-tint", tintHex);
        document.documentElement.style.setProperty("--board-tint-a", String(strength));

        if(boardDot){
          boardDot.style.background = tintHex;
          boardDot.style.boxShadow = `0 0 0 6px ${hexToRgba(tintHex, Math.min(0.35, strength + 0.12))}`;
          boardDot.style.borderColor = hexToRgba(draftSettings.theme.borderHex, 0.75);
        }
        if(boardTintEl){
          boardTintEl.style.background = hexToRgba(tintHex, strength);
        }
      }

      function applyBoardBlur(px){
        const blur = clamp(Number(px) || 0, 0, 20);
        document.documentElement.style.setProperty("--board-blur", `${blur}px`);
      }

      function applyPaper(colorHex, strengthPct){
        const strength = clamp(Number(strengthPct) || 0, 0, 70) / 100;
        document.documentElement.style.setProperty("--paper", colorHex);
        document.documentElement.style.setProperty("--paper-tint-a", String(strength));
        if(paperDot){
          paperDot.style.background = colorHex;
          paperDot.style.boxShadow = `0 0 0 6px ${hexToRgba(colorHex, Math.min(0.20, strength + 0.10))}`;
          paperDot.style.borderColor = hexToRgba(draftSettings.theme.borderHex, 0.75);
        }
      }

      function applyAllPreview(){
        applyTheme(draftSettings.theme);
        applyBoardTint(draftSettings.background.tint, draftSettings.background.strength);
        applyBoardBlur(draftSettings.background.blur);
        setBoardImage(draftSettings.background.imageDataUrl);
        applyPaper(draftSettings.paper.color, draftSettings.paper.strength);
        setPaperImage(draftSettings.paper.imageDataUrl);
      }

      function syncThemeInputs(theme){
        tWidgetBg.value = theme.bg;
        tCardBg.value = theme.cardBg;
        tFieldBg.value = theme.fieldBg;
        tText.value = theme.text;
        tMuted.value = theme.muted;
        tBorder.value = theme.borderHex;
        tCream.value = theme.cream;
      }

      function syncBgInputs(bg){
        bgColor.value = bg.tint;
        bgStrength.value = String(bg.strength);
        bgBlur.value = String(bg.blur || 0);
        bgImage.value = "";
      }

      function syncPaperInputs(p){
        paperColor.value = p.color;
        paperStrength.value = String(p.strength);
        paperImage.value = "";
      }

      function normalizePresetName(name){
        return String(name || "").trim().replace(/\s+/g, " ").slice(0, 60);
      }

      function getPresetPayloadFromDraft(){
        return {
          theme: deepClone(draftSettings.theme),
          background: deepClone(draftSettings.background),
          paper: deepClone(draftSettings.paper)
        };
      }

      function syncPresetSelect(){
        const presets = Array.isArray(savedSettings.presets) ? savedSettings.presets : [];
        const currentValue = presetSelect.value;
        presetSelect.innerHTML = '<option value="">Select preset</option>';

        presets.forEach((preset, index) => {
          const opt = document.createElement("option");
          opt.value = String(index);
          opt.textContent = preset.name || `Preset ${index + 1}`;
          presetSelect.appendChild(opt);
        });

        if(currentValue && presets[Number(currentValue)]){

      async function persistSettings(){
        savedSettings.version = DEFAULT_SETTINGS.version;
        savedSettings.theme = deepClone(draftSettings.theme);
        savedSettings.background = deepClone(draftSettings.background);
        savedSettings.paper = deepClone(draftSettings.paper);
        savedSettings.presets = Array.isArray(savedSettings.presets) ? savedSettings.presets : [];
        await savePersistent(SETTINGS_KEY, savedSettings);
        syncPresetSelect();
        announce("settings");
      }

      async function savePresetByName(name){
        const clean = normalizePresetName(name);
        if(!clean) return;

        savedSettings.presets = Array.isArray(savedSettings.presets) ? savedSettings.presets : [];

        const payload = getPresetPayloadFromDraft();
        const existingIndex = savedSettings.presets.findIndex(p => String(p.name).toLowerCase() === clean.toLowerCase());

        const entry = {
          name: clean,
          ...payload
        };

        if(existingIndex >= 0){
          savedSettings.presets[existingIndex] = entry;
        } else {
          savedSettings.presets.push(entry);
        }

        await persistSettings();
        syncPresetSelect();

        const newIndex = savedSettings.presets.findIndex(p => p.name === clean);
        if(newIndex >= 0) presetSelect.value = String(newIndex);
        presetName.value = clean;
      }

      async function applyPresetByIndex(index){
        const presets = Array.isArray(savedSettings.presets) ? savedSettings.presets : [];
        const preset = presets[index];
        if(!preset) return;

        draftSettings.theme = deepMerge(DEFAULT_SETTINGS.theme, preset.theme || {});
        draftSettings.background = deepMerge(DEFAULT_SETTINGS.background, preset.background || {});
        draftSettings.paper = deepMerge(DEFAULT_SETTINGS.paper, preset.paper || {});

        syncThemeInputs(draftSettings.theme);
        syncBgInputs(draftSettings.background);
        syncPaperInputs(draftSettings.paper);
        applyAllPreview();

        await persistSettings();
      }

      async function deletePresetByIndex(index){
        const presets = Array.isArray(savedSettings.presets) ? savedSettings.presets : [];
        if(!presets[index]) return;
        presets.splice(index, 1);
        savedSettings.presets = presets;
        await persistSettings();

      function pctFromPx(px, total){
        return (px / total) * 100;

      function makeStickerDraggable(el, page){
        let pointerId = null;
        let startX = 0;
        let startY = 0;
        let startLeft = 0;
        let startTop = 0;

        el.addEventListener("pointerdown", (e) => {
          if(e.target && e.target.classList && e.target.classList.contains("x")) return;
          pointerId = e.pointerId;
          el.setPointerCapture(pointerId);
          el.style.cursor = "grabbing";

          startX = e.clientX;
          startY = e.clientY;

          const rect = stickerLayer.getBoundingClientRect();
          const elRect = el.getBoundingClientRect();
          startLeft = elRect.left - rect.left + elRect.width/2;
          startTop = elRect.top - rect.top + elRect.height/2;

          e.preventDefault();
        });

        el.addEventListener("pointermove", (e) => {
          if(pointerId == null || e.pointerId !== pointerId) return;
          const rect = stickerLayer.getBoundingClientRect();
          const dx = e.clientX - startX;
          const dy = e.clientY - startY;
          let x = startLeft + dx;
          let y = startTop + dy;
          x = clamp(x, 10, rect.width - 10);
          y = clamp(y, 10, rect.height - 10);
          el.style.left = pctFromPx(x, rect.width) + "%";
          el.style.top = pctFromPx(y, rect.height) + "%";
          e.preventDefault();
        });

        function finishDrag(e){
          if(pointerId == null || e.pointerId !== pointerId) return;
          const id = el.dataset.id;
          const s = (page.stickers || []).find(t => t.id === id);
          if(s){
            s.xPct = parseFloat(el.style.left);
            s.yPct = parseFloat(el.style.top);
            scheduleSave(0);
          }
          el.style.cursor = "grab";
          try{ el.releasePointerCapture(pointerId); }catch{}
          pointerId = null;
        }

        el.addEventListener("pointerup", finishDrag);
        el.addEventListener("pointercancel", finishDrag);
      }

      function safeInsertHTML(html){
        editor.focus();
        try{

      function removeTrailingBrIfAny(wrap){
        const n = wrap && wrap.nextSibling;
        if(n && n.nodeName === "BR") n.remove();
      }

      function promoteToFreeMove(wrap){
        if(wrap.classList.contains("freeMove")) return;

        const edRect = editor.getBoundingClientRect();
        const wr = wrap.getBoundingClientRect();

        wrap.classList.add("freeMove");
        removeTrailingBrIfAny(wrap);

        const left = (wr.left - edRect.left) + editor.scrollLeft;
        const top = (wr.top - edRect.top) + editor.scrollTop;

        wrap.style.left = Math.max(0, left) + "px";
        wrap.style.top = Math.max(0, top) + "px";
      }

      let activePointerMode = null;

      function bindImageInteractionEvents(){
        const wraps = editor.querySelectorAll(".imgWrap");
        wraps.forEach((wrap) => {
          if(wrap.dataset.bound === "1") return;
          wrap.dataset.bound = "1";

          wrap.setAttribute("contenteditable", "false");

          const delBtn = wrap.querySelector(".imgDel");
          const handle = wrap.querySelector(".imgHandle");

          if(delBtn){
            delBtn.addEventListener("click", (e) => {
              e.preventDefault();
              e.stopPropagation();
              removeTrailingBrIfAny(wrap);
              wrap.remove();
              scheduleSaveFromEditor(0);
            });
          }

          wrap.addEventListener("pointerdown", (e) => {
            if(e.target === delBtn) return;

            const editorRect = editor.getBoundingClientRect();
            const currentWidth = wrap.getBoundingClientRect().width;
            const maxW = Math.max(140, Math.floor(editorRect.width - 18));
            const minW = 120;

            if(e.target === handle){
              activePointerMode = {
                type: "resize",
                pointerId: e.pointerId,
                wrap,
                startX: e.clientX,
                startWidth: currentWidth,
                minW,
                maxW
              };
              wrap.setPointerCapture(e.pointerId);
              e.preventDefault();
              return;
            }

            promoteToFreeMove(wrap);

            activePointerMode = {
              type: "drag",
              pointerId: e.pointerId,
              wrap,
              startX: e.clientX,
              startY: e.clientY,
              startLeft: parseFloat(wrap.style.left || "0"),
              startTop: parseFloat(wrap.style.top || "0")
            };
            wrap.style.cursor = "grabbing";
            wrap.setPointerCapture(e.pointerId);
            e.preventDefault();
          });
        });
      }

      window.addEventListener("pointermove", (e) => {
        if(!activePointerMode || e.pointerId !== activePointerMode.pointerId) return;

        if(activePointerMode.type === "resize"){
          const dx = e.clientX - activePointerMode.startX;
          const newW = clamp(activePointerMode.startWidth + dx, activePointerMode.minW, activePointerMode.maxW);
          activePointerMode.wrap.style.width = Math.round(newW) + "px";
          e.preventDefault();
          return;
        }

        if(activePointerMode.type === "drag"){
          const wrap = activePointerMode.wrap;
          const w = wrap.offsetWidth;
          const h = wrap.offsetHeight;

          const dx = e.clientX - activePointerMode.startX;
          const dy = e.clientY - activePointerMode.startY;

          let newLeft = activePointerMode.startLeft + dx;
          let newTop = activePointerMode.startTop + dy;

          const maxLeft = Math.max(0, editor.scrollWidth - w);
          const maxTop = Math.max(0, editor.scrollHeight - h);

          newLeft = clamp(newLeft, 0, maxLeft);
          newTop = clamp(newTop, 0, maxTop);

          wrap.style.left = Math.round(newLeft) + "px";
          wrap.style.top = Math.round(newTop) + "px";
          e.preventDefault();
        }
      }, { passive:false });

      window.addEventListener("pointerup", (e) => {
        if(!activePointerMode || e.pointerId !== activePointerMode.pointerId) return;
        if(activePointerMode.wrap){
          activePointerMode.wrap.style.cursor = "grab";
          try{ activePointerMode.wrap.releasePointerCapture(activePointerMode.pointerId); }catch{}
        }
        activePointerMode = null;
        scheduleSaveFromEditor(0);

      window.addEventListener("pointercancel", (e) => {

        if(activePointerMode.wrap){

      async function reloadFromStorage(kind){
        if(kind === "settings" || !kind){
          const latestSettings = await loadPersistent(SETTINGS_KEY, DEFAULT_SETTINGS);
          isApplyingRemoteState = true;

          Object.keys(savedSettings).forEach(k => delete savedSettings[k]);
          Object.assign(savedSettings, deepClone(latestSettings));

          Object.keys(draftSettings).forEach(k => delete draftSettings[k]);
          Object.assign(draftSettings, deepClone(latestSettings));

          syncThemeInputs(draftSettings.theme);
          syncBgInputs(draftSettings.background);
          syncPaperInputs(draftSettings.paper);
          applyAllPreview();
          syncPresetSelect();

          isApplyingRemoteState = false;
        }

        if(kind === "journal" || !kind){
          const latestStore = await loadPersistent(JOURNAL_KEY, defaultStore());
          isApplyingRemoteState = true;

          Object.keys(store).forEach((k) => delete store[k]);
          Object.assign(store, latestStore);

          ensureDay(currentDate);
          const pages = getDay().pages;
          currentPageIndex = clamp(currentPageIndex, 0, pages.length - 1);

          renderAll(false);
          bindImageInteractionEvents();

          isApplyingRemoteState = false;
        }
      }

        bc.addEventListener("message", async (event) => {

          if(kind === "settings" || kind === "journal"){
            await reloadFromStorage(kind);
          }
        });
      }

      window.addEventListener("storage", async (e) => {
        if(e.key === SETTINGS_KEY){
          await reloadFromStorage("settings");
        } else if(e.key === JOURNAL_KEY){
          await reloadFromStorage("journal");
        } else if(e.key === "__notion_widget_ping__"){
          const payload = safeParseJSON(e.newValue || "");
          if(payload?.kind){
            await reloadFromStorage(payload.kind);
          }
        }
      });

      window.addEventListener("beforeunload", () => {
        const page = getPage();
        if(page) page.html = editor.innerHTML;
        try{ localStorage.setItem(JOURNAL_KEY, JSON.stringify(store)); }catch{}
        try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(savedSettings)); }catch{}
      });

      window.addEventListener("pagehide", () => {
        const page = getPage();
        if(page) page.html = editor.innerHTML;
        try{ localStorage.setItem(JOURNAL_KEY, JSON.stringify(store)); }catch{}
        try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(savedSettings)); }catch{}
      });

      document.addEventListener("visibilitychange", () => {
        if(document.visibilityState === "hidden"){
          const page = getPage();
          if(page) page.html = editor.innerHTML;
          try{ localStorage.setItem(JOURNAL_KEY, JSON.stringify(store)); }catch{}
          try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(savedSettings)); }catch{}
        }
      });

      syncThemeInputs(draftSettings.theme);
      syncBgInputs(draftSettings.background);
      syncPaperInputs(draftSettings.paper);
      applyAllPreview();
      syncPresetSelect();

      datePick.value = currentDate;
      ensureDay(currentDate);
      renderAll(false);
      bindImageInteractionEvents();
      markSaving(false);
    });
  </script>
</body>
</html>
