<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,viewport-fit=cover"
  />
  <title>Workout Tracker + Planner</title>
  <style>
    :root{
      --page-bg:#ffffff;
      --widget-bg:#ffffff;
      --cream:#e6d8cc;
      --stone:#c9beb6;
      --text:#1f1f1f;
      --muted:#6b625c;

      --border: rgba(201,190,182,0.85);
      --borderSoft: rgba(201,190,182,0.55);
      --creamSoft: rgba(230,216,204,0.20);

      --shadow: 0 10px 26px rgba(0,0,0,0.06);
      --shadowSoft: 0 3px 10px rgba(0,0,0,0.05);

      --rOuter: 18px;
      --rInner: 16px;
      --rPill: 999px;

      --fsKicker: 12px;
      --fsLabel: 11px;
      --fsBody: 13px;

      --dayMin: 160px;

      --board-tint: #efe7e1;
      --board-tint-a: 0.30;
      --board-image: none;
      --board-blur: 0px;

      --card-bg: rgba(255,255,255,0.88);
      --field-bg: #ffffff;
    }

    *{ box-sizing:border-box; }

    html, body{
      width:100%;
      min-height:100%;
    }

    body{
      margin:0;
      background:var(--page-bg);
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      padding:26px;
      -webkit-text-size-adjust:100%;
    }

    button, input, select, textarea{
      font: inherit;
    }

    input, textarea, select{
      color: var(--text);
    }

    .wrap{ max-width:1120px; margin:0 auto; }

    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .kicker{
      font-size:var(--fsKicker);
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted);
      padding-top:4px;
    }

    .btns{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .btn,
    .mini-btn,
    .bg-btn,
    .chip,
    .toggle{
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .btn{
      appearance:none;
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      border-radius:var(--rPill);
      padding:9px 14px;
      font-size:12px;
      letter-spacing:.10em;
      text-transform:uppercase;
      cursor:pointer;
      box-shadow: var(--shadowSoft);
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
      user-select:none;
      white-space:nowrap;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 18px rgba(0,0,0,0.08);
    }

    .btn.primary{
      background:var(--cream);
    }

    .popover{ position:relative; }

    .icon-pill{
      display:inline-flex;
      align-items:center;
      gap:10px;
      background: rgba(255,255,255,0.80);
      border: 1px solid var(--borderSoft);
      border-radius: 999px;
      padding: 6px 10px;
      box-shadow: var(--shadowSoft);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .bg-btn{
      width:34px;
      height:34px;
      border-radius:999px;
      border:1px solid var(--borderSoft);
      background: rgba(255,255,255,0.95);
      cursor:pointer;
      display:grid;
      place-items:center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: transform 140ms ease, box-shadow 140ms ease;
    }

    .bg-btn:hover{
      transform: translateY(-1px);
      box-shadow: 0 14px 22px rgba(0,0,0,0.10);
    }

    .bg-btn:active{ transform: translateY(0px); }

    .bg-dot{
      width:14px;
      height:14px;
      border-radius:999px;
      border:1px solid rgba(201,190,182,0.75);
      background: var(--board-tint);
      box-shadow: 0 0 0 6px rgba(230,216,204,0.30);
    }

    .theme-dot{
      width:14px;
      height:14px;
      border-radius:999px;
      border:1px solid rgba(201,190,182,0.75);
      background: var(--text);
      box-shadow: 0 0 0 6px rgba(201,190,182,0.25);
    }

    .panel{
      position:absolute;
      top: 46px;
      right: 0;
      width: 320px;
      border-radius: 16px;
      border: 1px solid var(--borderSoft);
      background: rgba(255,255,255,0.94);
      box-shadow: 0 18px 40px rgba(0,0,0,0.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 12px;
      display:none;
      z-index: 80;
      max-height: min(76vh, 680px);
      overflow: auto;
    }

    .panel.open{ display:block; }

    .panel h2{
      margin: 0 0 10px 0;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(31,31,31,0.72);
    }

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 8px 0;
    }

    .row label{
      font-size: 12px;
      color: var(--muted);
    }

    input[type="color"]{
      width: 42px;
      height: 32px;
      border: 1px solid var(--borderSoft);
      border-radius: 10px;
      padding: 0;
      background: transparent;
      cursor: pointer;
      flex: 0 0 auto;
    }

    input[type="range"]{
      width: 150px;
      max-width: 100%;
    }

    .file{
      width:100%;
      font-size: 12px;
      color: rgba(31,31,31,0.75);
    }

    .mini-btn{
      width: 100%;
      border: 1px solid var(--borderSoft);
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      font-size: 11px;
      color: rgba(31,31,31,0.80);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      user-select: none;
    }

    .mini-btn:active{ transform: translateY(1px); }

    .divider{
      height: 1px;
      background: rgba(201,190,182,0.35);
      margin: 8px 0;
    }

    .hintSmall{
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.35;
    }

    .presetName, .presetSelect{
      width: 100%;
      border: 1px solid var(--borderSoft);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.95);
      color: var(--text);
      font-size: 13px;
      outline: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .presetSelect{ min-height: 40px; }

    .status{
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      min-height: 14px;
    }

    .widgetBoard{
      position: relative;
      border-radius: var(--rOuter);
      overflow: hidden;
      border: 1px solid var(--borderSoft);
      box-shadow: var(--shadow);
      padding: 14px;
      background: var(--widget-bg);
    }

    .widgetBoard::before{
      content:"";
      position:absolute;
      inset:0;
      background-image: var(--board-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(var(--board-blur)) saturate(1);
      transform: scale(1.03);
      z-index:0;
      will-change: transform, filter;
    }

    .widgetBoard::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events: none;
      z-index:0;
      background: rgba(255,255,255,0.30);
    }

    .boardTint{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:1;
    }

    .grid{
      display:grid;
      grid-template-columns: 1.25fr 0.85fr;
      gap:14px;
      position: relative;
      z-index: 2;
    }

    .card{
      background: var(--card-bg);
      border:1px solid var(--border);
      border-radius:var(--rOuter);
      box-shadow: none;
      padding:14px;
      min-width:0;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .cardHead{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    .cardTitle{
      font-size:14px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
      margin:0;
    }

    .meta{
      font-size:12px;
      color:var(--muted);
      letter-spacing:.04em;
      white-space:nowrap;
    }

    .planFrame{
      border:1px solid var(--borderSoft);
      border-radius:var(--rInner);
      padding:12px;
      background: var(--field-bg);
      overflow:auto;
      -webkit-overflow-scrolling:touch;
    }

    .days{
      display:grid;
      grid-auto-flow:column;
      grid-auto-columns: minmax(var(--dayMin), 1fr);
      gap:10px;
      align-items:start;
      width:max-content;
      min-width:100%;
    }

    .day{
      border:1px solid var(--borderSoft);
      border-radius:var(--rInner);
      padding:12px;
      background: var(--creamSoft);
      min-height:360px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .dayTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
    }

    .dow{
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .datePill{
      font-size:11px;
      color:var(--muted);
      border:1px solid var(--borderSoft);
      border-radius:var(--rPill);
      padding:5px 8px;
      background: var(--field-bg);
      line-height:1;
      user-select:none;
      white-space:nowrap;
    }

    .label{
      font-size:var(--fsLabel);
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
      margin:0 0 6px 0;
    }

    .input{
      width:100%;
      border:1px solid var(--border);
      background: var(--field-bg);
      border-radius:12px;
      padding:9px 10px;
      font-size:var(--fsBody);
      outline:none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      min-height:36px;
    }

    .input:focus{
      border-color: rgba(201,190,182,1);
      box-shadow: 0 0 0 3px rgba(230,216,204,0.55);
    }

    .planBox{
      border:1px solid var(--border);
      border-radius:12px;
      background: var(--field-bg);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      padding:8px 9px;
      display:flex;
      gap:8px;
      align-items:center;
      min-height:64px;
    }

    .planNums{
      display:flex;
      flex-direction:column;
      gap:6px;
      font-size:12px;
      line-height:1;
      color:var(--muted);
      user-select:none;
      padding-left:2px;
      min-width:18px;
    }

    .planText{
      border:0;
      outline:none;
      background:transparent;
      width:100%;
      font-size:var(--fsBody);
      color: var(--text);
      min-height:30px;
    }

    .stack{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .chip{
      appearance:none;
      border:1px solid var(--border);
      background: var(--field-bg);
      border-radius:var(--rPill);
      padding:9px 10px;
      font-size:12px;
      cursor:pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
      user-select:none;
      text-align:left;
      min-height:34px;
      color: var(--text);
    }

    .chip:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 18px rgba(0,0,0,0.08);
    }

    .chip[data-active="true"]{
      background:var(--cream);
      box-shadow: 0 10px 18px rgba(0,0,0,0.08);
      transform:translateY(-1px);
    }

    .doneRow{
      margin-top:auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding-top:4px;
    }

    .doneLabel{
      font-size:12px;
      color:var(--muted);
      user-select:none;
    }

    .toggle{
      width:40px;
      height:24px;
      border-radius:var(--rPill);
      border:1px solid var(--border);
      background: var(--field-bg);
      position:relative;
      cursor:pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      transition: background 160ms ease;
      flex:0 0 auto;
    }

    .toggle::after{
      content:"";
      position:absolute;
      top:2px;
      left:2px;
      width:20px;
      height:20px;
      border-radius:var(--rPill);
      background:var(--stone);
      transition: transform 160ms ease, background 160ms ease;
    }

    .toggle[data-on="true"]{
      background: rgba(230,216,204,0.65);
    }

    .toggle[data-on="true"]::after{
      transform: translateX(16px);
      background: var(--stone);
    }

    .summary{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .box{
      border:1px solid var(--borderSoft);
      border-radius:var(--rInner);
      padding:12px;
      background: var(--creamSoft);
    }

    .boxTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }

    .boxLabel{
      font-size:12px;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .big{
      font-size:26px;
      font-weight:740;
      letter-spacing:-0.02em;
    }

    .bar{
      height:10px;
      border-radius:var(--rPill);
      background: rgba(201,190,182,0.30);
      border:1px solid var(--borderSoft);
      overflow:hidden;
      margin-bottom:8px;
    }

    .bar > div{
      height:100%;
      width:0%;
      background: var(--stone);
      transition: width 220ms ease;
    }

    .hint{
      font-size:12px;
      color:#7a716a;
      line-height:1.4;
      margin:0;
    }

    .bullets{
      margin:8px 0 0 0;
      padding-left:18px;
      color:#5e564f;
      font-size:13px;
      line-height:1.45;
    }

    .todayRow{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }

    .todayPill{
      font-size:11px;
      color:var(--muted);
      border:1px solid var(--borderSoft);
      border-radius:var(--rPill);
      padding:5px 8px;
      background: var(--field-bg);
      line-height:1;
      user-select:none;
      white-space:nowrap;
    }

    @media (max-width: 1040px){
      .grid{ grid-template-columns: 1fr; }
    }

    @media (max-width: 720px){
      body{ padding:14px; }
      .top{ gap:12px; }
      .btns{ width:100%; }
      .panel{
        position: fixed;
        top: 14px;
        left: 14px;
        right: 14px;
        width: auto;
        max-height: calc(100dvh - 28px);
        z-index: 999;
      }
      .widgetBoard{ padding:10px; }
      .card{ padding:10px; }
      .planFrame{ padding:10px; }
      .days{ gap:8px; }
      .day{
        padding:10px;
        min-height:320px;
      }
      .input,
      .planText,
      .presetName,
      .presetSelect{
        font-size:16px;
      }
      input[type="range"]{
        width: 120px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div class="kicker">Workout Tracker + Planner</div>

      <div class="btns">
        <div class="popover" id="bgPopover">
          <div class="icon-pill">
            <button class="bg-btn" id="bgBtn" type="button" aria-label="Background settings" title="Background settings">
              <span class="bg-dot" id="bgDot" aria-hidden="true"></span>
            </button>
          </div>

          <div class="panel" id="bgPanel" role="dialog" aria-label="Background settings">
            <h2>Background</h2>

            <button class="mini-btn" id="bgApply" type="button">Apply background</button>
            <button class="mini-btn" id="bgReset" type="button" style="margin-top:8px;">Reset background</button>

            <div class="divider"></div>

            <div class="row">
              <label for="bgColor">Tint</label>
              <input id="bgColor" type="color" value="#efe7e1" />
            </div>

            <div class="row">
              <label for="bgStrength">Tint strength</label>
              <input id="bgStrength" type="range" min="0" max="70" value="30" />
            </div>

            <div class="row">
              <label for="bgBlur">Image blur</label>
              <input id="bgBlur" type="range" min="0" max="20" value="0" />
            </div>

            <div class="divider"></div>

            <div class="row" style="align-items:flex-start;">
              <label for="bgImage">Image</label>
              <input id="bgImage" class="file" type="file" accept="image/*" />
            </div>

            <div class="row">
              <button class="mini-btn" id="removeImage" type="button">Remove image</button>
            </div>
          </div>
        </div>

        <div class="popover" id="themePopover">
          <div class="icon-pill">
            <button class="bg-btn" id="themeBtn" type="button" aria-label="Theme settings" title="Theme settings">
              <span class="theme-dot" id="themeDot" aria-hidden="true"></span>
            </button>
          </div>

          <div class="panel" id="themePanel" role="dialog" aria-label="Theme settings">
            <h2>Theme</h2>

            <button class="mini-btn" id="themeApply" type="button">Apply theme</button>
            <button class="mini-btn" id="resetTheme" type="button" style="margin-top:8px;">Reset theme</button>

            <div class="divider"></div>

            <div class="row"><label for="tWidgetBg">Widget bg</label><input id="tWidgetBg" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tCardBg">Card bg</label><input id="tCardBg" type="color" value="#ffffff" /></div>
            <div class="row"><label for="tFieldBg">Fields bg</label><input id="tFieldBg" type="color" value="#ffffff" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tText">Text</label><input id="tText" type="color" value="#1f1f1f" /></div>
            <div class="row"><label for="tMuted">Muted text</label><input id="tMuted" type="color" value="#6b625c" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tBorder">Borders</label><input id="tBorder" type="color" value="#c9beb6" /></div>
            <div class="row"><label for="tStone">Accent</label><input id="tStone" type="color" value="#c9beb6" /></div>

            <div class="divider"></div>

            <div class="row"><label for="tCream">Highlight</label><input id="tCream" type="color" value="#e6d8cc" /></div>
            <div class="row"><label for="tCreamSoft">Panels tint</label><input id="tCreamSoft" type="color" value="#e6d8cc" /></div>

            <div class="divider"></div>

            <h2 style="margin-top:4px;">Presets</h2>

            <input class="presetName" id="presetName" placeholder="Preset name">

            <button class="mini-btn" id="presetSave" type="button" style="margin-top:8px;">Save current as preset</button>

            <div class="divider"></div>

            <select class="presetSelect" id="presetSelect"></select>

            <button class="mini-btn" id="presetApply" type="button" style="margin-top:8px;">Apply preset</button>
            <button class="mini-btn" id="presetDelete" type="button" style="margin-top:8px;">Delete preset</button>

            <div class="status" id="presetStatus" aria-live="polite"></div>
          </div>
        </div>

        <button id="prevWeek" class="btn" type="button">◀ PREV</button>
        <button id="nextWeek" class="btn" type="button">NEXT ▶</button>
        <button id="clearWeek" class="btn primary" type="button">CLEAR WEEK</button>
      </div>
    </div>

    <div class="widgetBoard" id="widgetBoard" aria-label="Workout widget board">
      <div class="boardTint" id="boardTint"></div>

      <div class="grid">
        <section class="card" aria-label="Weekly plan">
          <div class="cardHead">
            <h2 class="cardTitle">Weekly plan</h2>
            <div id="weekMeta" class="meta"></div>
          </div>

          <div class="planFrame">
            <div id="days" class="days"></div>
          </div>
        </section>

        <aside class="card" aria-label="Summary">
          <div class="cardHead">
            <h2 class="cardTitle">Summary</h2>
            <div class="meta">auto updates</div>
          </div>

          <div class="summary">
            <div class="box">
              <div class="boxTop">
                <div class="boxLabel">Workouts completed</div>
                <div id="completedVal" class="big">0</div>
              </div>
              <div class="bar"><div id="completedBar"></div></div>
            </div>

            <div class="box">
              <div class="boxTop">
                <div class="boxLabel">Planned sessions</div>
                <div id="plannedVal" class="big">0</div>
              </div>
              <div class="bar"><div id="plannedBar"></div></div>
              <p class="hint">A day counts as planned if it has a workout name.</p>
            </div>

            <div class="box">
              <div class="boxTop">
                <div class="boxLabel">Intensity mix</div>
                <div id="mixVal" class="big">—</div>
              </div>
              <ul id="mixList" class="bullets">
                <li>Light: 0</li>
                <li>Moderate: 0</li>
                <li>Intense: 0</li>
              </ul>
            </div>

            <div class="box">
              <div class="todayRow">
                <div class="boxLabel">Today’s plan</div>
                <div id="todayPill" class="todayPill">—</div>
              </div>
              <p id="todaySummary" class="hint" style="margin-top:8px;">No plan set for today yet.</p>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script>
    (function(){
      "use strict";

      const MS_DAY = 86400000;
      const dowNames = ["MON","TUE","WED","THU","FRI","SAT","SUN"];

      function canUseLocalStorage(){
        try{
          const k = "__t__" + Math.random().toString(16).slice(2);
          localStorage.setItem(k, "1");
          localStorage.removeItem(k);
          return true;
        }catch{
          return false;
        }
      }

      const hasLS = canUseLocalStorage();
      const mem = Object.create(null);

      function lsGet(key){
        try{
          return hasLS ? localStorage.getItem(key) : (mem[key] ?? null);
        }catch{
          return mem[key] ?? null;
        }
      }

      function lsSet(key, value){
        try{
          if(hasLS) localStorage.setItem(key, value);
          else mem[key] = String(value);
        }catch{
          mem[key] = String(value);
        }
      }

      function lsRemove(key){
        try{
          if(hasLS) localStorage.removeItem(key);
          else delete mem[key];
        }catch{
          delete mem[key];
        }
      }

      function loadJSON(key, fallback = null){
        try{
          const raw = lsGet(key);
          return raw ? JSON.parse(raw) : fallback;
        }catch{
          return fallback;
        }
      }

      function saveJSON(key, value){
        lsSet(key, JSON.stringify(value));
      }

      function sanitizeId(value){
        return String(value || "")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9_-]+/g, "-")
          .replace(/^-+|-+$/g, "") || "default";
      }

      function getWidgetId(){
        try{
          const params = new URLSearchParams(location.search);
          const fromQuery = sanitizeId(params.get("wid"));
          if(fromQuery && fromQuery !== "default") return fromQuery;
        }catch{}

        const fromPath = sanitizeId(location.pathname.replace(/\.[^/.]+$/, ""));
        return fromPath || "default";
      }

      const WID = getWidgetId();
      const BC_NAME = "workout-planner-sync";
      const channel = ("BroadcastChannel" in window) ? new BroadcastChannel(BC_NAME) : null;

      function broadcast(type, payload){

        }catch{}

      const DB_NAME = "workout_tracker_planner_db_v3";
      const DB_STORE = "kv";
      let dbPromise = null;

      function openDB(){
        if(dbPromise) return dbPromise;

        dbPromise = new Promise((resolve) => {
          if(!("indexedDB" in window)){
            resolve(null);
            return;
          }

          const request = indexedDB.open(DB_NAME, 1);

          request.onupgradeneeded = () => {
            const db = request.result;
            if(!db.objectStoreNames.contains(DB_STORE)){
              db.createObjectStore(DB_STORE);
            }
          };

          request.onsuccess = () => resolve(request.result);
          request.onerror = () => resolve(null);
        });

        return dbPromise;
      }

      async function idbGet(key){
        const db = await openDB();
        if(!db) return null;

        return new Promise((resolve) => {
          try{
            const tx = db.transaction(DB_STORE, "readonly");
            const store = tx.objectStore(DB_STORE);
            const req = store.get(key);
            req.onsuccess = () => resolve(req.result ?? null);
            req.onerror = () => resolve(null);
          }catch{
            resolve(null);
          }
        });
      }

      async function idbSet(key, value){
        const db = await openDB();
        if(!db) return false;

        return new Promise((resolve) => {
          try{
            const tx = db.transaction(DB_STORE, "readwrite");
            const store = tx.objectStore(DB_STORE);
            const req = store.put(value, key);
            req.onsuccess = () => resolve(true);
            req.onerror = () => resolve(false);
          }catch{
            resolve(false);
          }
        });
      }

      async function idbRemove(key){
        const db = await openDB();
        if(!db) return false;

        return new Promise((resolve) => {
          try{
            const tx = db.transaction(DB_STORE, "readwrite");
            const store = tx.objectStore(DB_STORE);
            const req = store.delete(key);
            req.onsuccess = () => resolve(true);
            req.onerror = () => resolve(false);
          }catch{
            resolve(false);
          }
        });
      }

      function clamp(n, min, max){
        const x = Number(n);
        if(!Number.isFinite(x)) return min;
        return Math.max(min, Math.min(max, x));
      }

      function normHex(hex, fallback){
        const s = String(hex || "").trim();
        return /^#[0-9a-fA-F]{6}$/.test(s) ? s.toLowerCase() : fallback;
      }

      function hexToRgba(hex, alpha){
        const h = normHex(hex, "#ffffff").replace("#", "");
        const num = parseInt(h, 16);
        const r = (num >> 16) & 255;
        const g = (num >> 8) & 255;
        const b = num & 255;
        return `rgba(${r},${g},${b},${alpha})`;
      }

      function startOfWeek(date){
        const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const js = d.getDay();
        const mondayOffset = (js === 0) ? -6 : (1 - js);
        d.setDate(d.getDate() + mondayOffset);
        d.setHours(0,0,0,0);
        return d;
      }

      function isoKey(d){
        const y = d.getFullYear();
        const m = String(d.getMonth()+1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return `${y}-${m}-${day}`;
      }

      function fmtPill(d){
        const m = d.toLocaleString(undefined, { month:"short" });
        return `${d.getDate()} ${m}`;
      }

      function fmtRange(ws){
        const end = new Date(ws.getTime() + 6 * MS_DAY);
        return `${ws.getDate()} ${ws.toLocaleString(undefined,{month:"short"})} — ${end.getDate()} ${end.toLocaleString(undefined,{month:"short"})} · ${ws.getFullYear()}`;
      }

      function fileToDataUrl(file){
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function sanitizeWeekData(ws, data){
        const out = {};
        const source = (data && typeof data === "object") ? data : {};
        for(let i=0;i<7;i++){
          const d = new Date(ws.getTime() + i * MS_DAY);
          const k = isoKey(d);
          const item = source[k] || {};
          out[k] = {
            workout: String(item.workout || ""),
            plan: String(item.plan || ""),
            intensity: ["light","moderate","intense"].includes(item.intensity) ? item.intensity : "moderate",
            done: !!item.done
          };
        }
        return out;
      }

      function loadWeek(ws){

      function clampPct(p){

      function updateSummary(){
        const keys = Object.keys(weekData);
        const planned = keys.filter(k => (weekData[k].workout || "").trim().length > 0);
        const completed = planned.filter(k => weekData[k].done);

        els.plannedVal.textContent = planned.length;
        els.completedVal.textContent = completed.length;

        els.plannedBar.style.width = clampPct((planned.length / 7) * 100) + "%";
        const denom = planned.length > 0 ? planned.length : 7;
        els.completedBar.style.width = clampPct((completed.length / denom) * 100) + "%";

        const mix = { light:0, moderate:0, intense:0 };
        for(const key of planned){
          const intensity = weekData[key].intensity || "moderate";
          if(mix[intensity] !== undefined) mix[intensity] += 1;
        }

        els.mixVal.textContent = planned.length ? `${mix.light}/${mix.moderate}/${mix.intense}` : "—";
        els.mixList.innerHTML = `
          <li>Light: ${mix.light}</li>
          <li>Moderate: ${mix.moderate}</li>
          <li>Intense: ${mix.intense}</li>
        `;

        const today = new Date();
        const tk = isoKey(today);
        els.todayPill.textContent = fmtPill(today);

        const t = weekData[tk];
        if(t && (t.workout || "").trim()){
          const nice = (t.intensity || "moderate").replace(/^\w/, c => c.toUpperCase());
          const done = t.done ? "Done" : "Planned";
          const planSnippet = (t.plan || "").trim() ? ` · ${t.plan.trim()}` : "";
          els.todaySummary.textContent = `${done}: ${t.workout} · ${nice}${planSnippet}`;
        }else{
          els.todaySummary.textContent = "No plan set for today yet.";
        }

          const inTheme = e.target.closest("#themePanel") || e.target.closest("#themeBtn");
          if(!inBg) els.bgPanel.classList.remove("open");
          if(!inTheme) els.themePanel.classList.remove("open");
        });

        document.addEventListener("keydown", (e) => {
          if(e.key === "Escape") closePanels();
        });
      }

      function attachThemeEvents(){
        [
          els.tWidgetBg,
          els.tCardBg,
          els.tFieldBg,
          els.tText,
          els.tMuted,
          els.tBorder,
          els.tStone,
          els.tCream,
          els.tCreamSoft
        ].forEach(el => {
          el.addEventListener("input", () => {
            themeDraft = applyTheme(readThemeInputs());
            setStatus("");
          });
        });

        els.themeApply.addEventListener("click", async () => {
          themeDraft = applyTheme(readThemeInputs());
          await saveTheme(themeDraft);
          syncThemeInputs(themeDraft);
          setStatus("Theme applied.");
        });

        els.resetTheme.addEventListener("click", async () => {
          themeDraft = applyTheme(DEFAULT_THEME);
          syncThemeInputs(themeDraft);
          await saveTheme(themeDraft);
          setStatus("Theme reset.");
        });
      }

      function attachBackgroundEvents(){
        els.bgColor.addEventListener("input", () => {
          bgDraft = readBgInputs();
          applyBackgroundVisual(bgDraft, bgDraftImage);
          setStatus("");
        });

        els.bgStrength.addEventListener("input", () => {
          bgDraft = readBgInputs();
          applyBackgroundVisual(bgDraft, bgDraftImage);
          setStatus("");
        });

        els.bgBlur.addEventListener("input", () => {
          bgDraft = readBgInputs();
          applyBackgroundVisual(bgDraft, bgDraftImage);
          setStatus("");
        });

        els.bgImage.addEventListener("change", async () => {
          const file = els.bgImage.files && els.bgImage.files[0];
          if(!file) return;
          try{
            bgDraftImage = await fileToDataUrl(file);
            applyBackgroundVisual(bgDraft, bgDraftImage);
            setStatus("");
          }catch{
            setStatus("Could not load image.");
          }
        });

        els.removeImage.addEventListener("click", () => {
          bgDraftImage = null;
          els.bgImage.value = "";
          applyBackgroundVisual(bgDraft, bgDraftImage);
          setStatus("");
        });

        els.bgApply.addEventListener("click", async () => {
          bgDraft = readBgInputs();
          applyBackgroundVisual(bgDraft, bgDraftImage);
          await saveBackground(bgDraft, bgDraftImage);
          setStatus("Background applied.");
        });

        els.bgReset.addEventListener("click", async () => {
          bgDraft = safeBg(DEFAULT_BG);
          bgDraftImage = null;
          els.bgImage.value = "";
          syncBgInputs(bgDraft);
          applyBackgroundVisual(bgDraft, bgDraftImage);
          await saveBackground(bgDraft, bgDraftImage);
          setStatus("Background reset.");
        });
      }

      function attachPresetEvents(){
        els.presetSave.addEventListener("click", async () => {
          const name = String(els.presetName.value || "").trim();
          if(!name){
            setStatus("Type a preset name first.");
            return;
          }

          const presets = await loadPresets();
          const id = makeId();

          const theme = readThemeInputs();
          const bg = readBgInputs();

          presets.unshift({
            id,
            name,
            theme,
            bg,
            hasImage: !!bgDraftImage
          });

          if(bgDraftImage){
            await idbSet(presetImageKey(id), bgDraftImage);
          }

          await savePresets(presets);
          els.presetName.value = "";
          await refreshPresetSelect();
          els.presetSelect.value = id;
          setStatus("Preset saved.");
        });

        els.presetApply.addEventListener("click", async () => {
          const id = String(els.presetSelect.value || "");
          if(!id){
            setStatus("Choose a preset first.");
            return;
          }

          const preset = await getPresetById(id);
          if(!preset){
            setStatus("Preset not found.");
            return;
          }

          const newTheme = safeTheme(preset.theme || DEFAULT_THEME);
          const newBg = safeBg(preset.bg || DEFAULT_BG);
          const presetImage = preset.hasImage ? await idbGet(presetImageKey(id)) : null;

          themeDraft = applyTheme(newTheme);
          syncThemeInputs(themeDraft);
          await saveTheme(themeDraft);

          bgDraft = newBg;
          bgDraftImage = (typeof presetImage === "string" && presetImage) ? presetImage : null;
          syncBgInputs(bgDraft);
          applyBackgroundVisual(bgDraft, bgDraftImage);
          await saveBackground(bgDraft, bgDraftImage);

          setStatus("Preset applied.");
        });

        els.presetDelete.addEventListener("click", async () => {
          const id = String(els.presetSelect.value || "");
          if(!id){
            setStatus("Choose a preset first.");
            return;
          }

          const presets = await loadPresets();
          const next = presets.filter(p => p.id !== id);
          if(next.length === presets.length){
            setStatus("Preset not found.");
            return;
          }

          await idbRemove(presetImageKey(id));
          await savePresets(next);
          await refreshPresetSelect();
          els.presetSelect.value = "";
          setStatus("Preset deleted.");
        });
      }

      function attachWeekEvents(){
        els.prevWeek.addEventListener("click", () => {
          weekStart = new Date(weekStart.getTime() - 7 * MS_DAY);
          weekData = loadWeek(weekStart);
          renderWeek();
        });

        els.nextWeek.addEventListener("click", () => {
          weekStart = new Date(weekStart.getTime() + 7 * MS_DAY);
          weekData = loadWeek(weekStart);
          renderWeek();
        });

        els.clearWeek.addEventListener("click", () => {
          lsRemove(KEYS.week(weekStart));
          weekData = loadWeek(weekStart);
          renderWeek();
          broadcast("week", { week: isoKey(weekStart) });
        });

        window.addEventListener("pagehide", () => {
          saveWeek(weekStart, weekData);
        });

        document.addEventListener("visibilitychange", () => {
          if(document.visibilityState === "hidden"){
            saveWeek(weekStart, weekData);
          }
        });
      }

      function attachSyncEvents(){
        window.addEventListener("storage", async (e) => {
          if(!e.key) return;

          if(e.key === KEYS.theme){
            await hardReloadTheme();
          }
          if(e.key === KEYS.bg){
            await hardReloadBackground();
          }
          if(e.key === KEYS.presets){
            await refreshPresetSelect();
          }
          if(e.key === KEYS.week(weekStart)){
            weekData = loadWeek(weekStart);
            renderWeek();
          }
        });

        if(channel){
          channel.onmessage = async (event) => {
            const msg = event.data || {};
            if(!msg.type) return;

            if(msg.type === "theme"){
              await hardReloadTheme();
            }
            if(msg.type === "background"){
              await hardReloadBackground();
            }
            if(msg.type === "presets"){
              await refreshPresetSelect();
            }
            if(msg.type === "week"){
              const targetWeek = msg.payload && msg.payload.week;
              if(targetWeek === isoKey(weekStart)){
                weekData = loadWeek(weekStart);
                renderWeek();
              }
            }
          };
        }
      }

      async function init(){
        attachPopoverEvents();
        attachThemeEvents();
        attachBackgroundEvents();
        attachPresetEvents();
        attachWeekEvents();
        attachSyncEvents();

        await initSettings();
        weekData = loadWeek(weekStart);
        renderWeek();
      }

      init();
    })();
  </script>
</body>
</html>
